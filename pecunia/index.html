   overview:'The Islamic gold dinar, first struck by Umayyad Caliph Abd al-Malik ibn Marwan in 696 CE, became the premier international trade currency of the medieval world. Its name derived from the Roman denarius, but its consistent gold purity (typically 4.25 grams of high-quality gold) and the vast commercial networks of the Islamic world gave it a reach and prestige that surpassed its Roman ancestor. From Spain to Indonesia, the dinar facilitated trade across the largest contiguous economic zone the world had yet seen, and its stability over centuries made it the benchmark against which all other currencies were measured.',
   d:{
    overview:'The Islamic gold dinar served as the primary international trade currency of the medieval world from the 7th to the 13th century. Struck to exacting standards of weight and purity across a vast empire stretching from Iberia to Central Asia, the dinar facilitated the most sophisticated commercial networks of its era.',
    currency:'The dinar was standardised at approximately 4.25 grams of high-purity gold, a weight derived from the Byzantine solidus but refined to Islamic standards. Abd al-Malik\'s reform of 696 CE replaced Byzantine and Sasanian imagery with Quranic inscriptions, creating a distinctly Islamic monetary identity. The silver dirham (approximately 2.97 grams) served as the complementary denomination, with a legal exchange ratio that varied by region and era.',
    banking:'Islamic banking developed sophisticated instruments to facilitate long-distance trade while respecting the Quranic prohibition on riba (interest). The suftaja (bill of exchange), the hawala (transfer system), and the mudaraba (profit-sharing partnership) were all innovations of the Islamic financial world. Merchants could deposit dinars in Baghdad and draw funds in Córdoba, creating a transfer network spanning thousands of miles centuries before European banking emerged.',
    trade:'The dinar facilitated trade across an economic zone stretching from al-Andalus (Islamic Spain) to the Malay Archipelago. Islamic merchants dominated the Indian Ocean trade, the trans-Saharan gold routes, the Silk Road, and the Mediterranean sea lanes. The dinar\'s consistent gold content made it universally acceptable, and hoards of Islamic gold coins have been found as far afield as Scandinavia, sub-Saharan Africa, and China.',
    taxation:'Islamic taxation was structured around Quranic principles: zakat (alms tax of 2.5% on wealth), jizya (tax on non-Muslim subjects), kharaj (land tax), and \'ushr (customs duties). These taxes, collected in dinars and dirhams, funded the extensive infrastructure of the caliphate — roads, postal systems, irrigation works, and military campaigns. The predictability and religious legitimacy of Islamic taxation contributed to the remarkable stability of the dinar system.',
    inflation:'The dinar maintained remarkable price stability over centuries, largely because Islamic legal scholars insisted on maintaining gold purity as a religious obligation. Debasement was considered sinful, and caliphs who debased the coinage faced scholarly condemnation. This religious constraint on monetary manipulation provided a form of institutional price stability that secular rulers could not match, though it also limited the state\'s ability to use monetary policy as an economic tool.',
    labor:'The Islamic world developed sophisticated labor markets facilitated by dinar-denominated wages. Guild systems (asnaf) regulated crafts and trades in every major city, setting wage standards and quality controls. Skilled artisans in Baghdad, Córdoba, and Cairo earned wages that afforded a standard of living comparable to or exceeding that of their European contemporaries. Islamic law provided extensive protections for contracted workers and regulated the terms of employment.',
    debt:'Islamic finance developed complex instruments to manage credit and debt while respecting the prohibition on interest. Murabaha (cost-plus financing), ijara (leasing), and musharaka (joint venture) all served functions similar to interest-bearing loans without technically charging interest. These instruments demonstrate remarkable financial ingenuity and continue to influence the modern Islamic banking industry, which manages trillions of dollars in assets.',
    monopoly:'The Abbasid caliphate maintained state monopolies on certain strategic commodities, including precious metals minting. Private minting was generally prohibited, giving the state control over the money supply. The caliphate also regulated key industries through the muhtasib (market inspector), who enforced quality standards, fair weights, and honest pricing — a sophisticated system of market regulation that anticipated modern consumer protection.',
    colonialism:'The Islamic dinar system was itself an expression of imperial power, extending across conquered territories from North Africa to Central Asia. The replacement of local currencies with dinars and dirhams was a deliberate act of monetary colonialism, imposing Islamic monetary standards on diverse populations. However, the relative tolerance of the Islamic system — which allowed non-Muslims to participate in trade and maintain some economic autonomy — distinguished it from later European colonial monetary regimes.',
    technology:'Islamic minting technology achieved exceptional standards of precision and consistency. Caliphal mints used calibrated weights, standardised dies, and quality-control systems that produced coins of remarkable uniformity across vast distances. Islamic metallurgy, particularly in gold refining and alloy control, was the most advanced in the medieval world, ensuring that a dinar struck in Baghdad was virtually identical to one struck in Córdoba.',
    inequality:'Wealth inequality in the Islamic world was moderated by the zakat system, which redistributed 2.5% of accumulated wealth annually to the poor, orphans, and travelers. This obligatory alms-giving represented the world\'s first systematic wealth redistribution mechanism. However, enormous wealth concentrated in the hands of merchant families, court officials, and landowners, and the gap between the commercial elite and the rural poor remained substantial.',
    philosophy:'Islamic economic philosophy drew on Quranic principles, Hadith traditions, and Greek philosophical inheritance to create a distinctive approach to money and markets. The prohibition of riba (interest), gharar (excessive uncertainty), and maysir (gambling) shaped financial innovation in directions that differed fundamentally from Christian European practice. Scholars like al-Ghazali articulated a theory of money as a measure of value rather than a commodity, anticipating modern monetary theory by centuries.',
    policy:'Caliphal monetary policy maintained the dinar\'s gold standard with remarkable consistency, enforcing weight and purity standards through a network of official assayers and mint masters. The muhtasib system provided market regulation that enforced fair dealing, accurate weights, and quality standards. Islamic monetary policy was uniquely constrained by religious law, which limited the state\'s ability to manipulate the currency but also provided extraordinary long-term stability.',
    crisis:'The Mongol destruction of Baghdad in 1258 devastated the Abbasid caliphate\'s monetary system, disrupting trade networks and mint operations across the Islamic world. The subsequent fragmentation of the Islamic world into competing dynasties led to a proliferation of local currencies and the gradual erosion of the dinar\'s universal status. The Black Death (1347–1351) further disrupted Islamic commerce, creating labour shortages and price instability across the region.',
    legacy:'The dinar\'s legacy endures in the currencies of modern nations: the Bahraini, Iraqi, Jordanian, Kuwaiti, and Libyan dinars all trace their names to the medieval Islamic gold coin. Islamic banking principles derived from dinar-era financial law now govern a global industry worth trillions of dollars. The dinar\'s centuries of stability remain a reference point in debates about monetary policy and the gold standard.',
    figures:'Caliph Abd al-Malik ibn Marwan (r.685–705 CE) created the first distinctly Islamic coinage. The merchant Sindbad — whether historical or legendary — personified the dinar-financed maritime trade of the Islamic world. Al-Ghazali (1058–1111) articulated Islamic monetary philosophy. Ibn Khaldun (1332–1406) developed the most sophisticated pre-modern theory of money, taxation, and economic cycles.',
    innovation:'The Islamic world pioneered financial instruments that shaped global commerce: the suftaja (bill of exchange, predecessor of the modern check), the hawala (informal value transfer, still used globally), the mudaraba (limited partnership), and the waqf (charitable endowment, a form of institutional investment). These innovations enabled trade across vast distances and diverse legal systems without requiring the physical transport of gold.',
    resistance:'Resistance to the dinar system took various forms, from the persistence of pre-Islamic local currencies in peripheral regions to the philosophical critiques of monetary accumulation by Sufi mystics. The Zanj Rebellion (869–883 CE) in southern Iraq, involving enslaved African workers in the salt flats, was partly a revolt against the economic system that the dinar facilitated. Some communities deliberately maintained barter systems as resistance to monetary integration.',
    globalisation:'The Islamic gold dinar created the most extensive monetary zone the world had yet seen, stretching from the Atlantic to the Pacific. Muslim merchants connected the economies of four continents, and the dinar served as the common standard of value across this vast network. Viking silver hoards in Scandinavia, Chinese ceramics in Egyptian markets, and African gold in Spanish mints all testify to the extraordinary reach of the dinar-based trading system.',
   }},
  {id:'florin',fp:{innov:8,reach:7,lon:4,stab:9,trade:9,inst:7},lon:11.25,lat:43.77,nm:'Florentine Florin',sb:'Florence · Renaissance Gold Standard',s:1252,e:1533,
   conns:['dinar','athenian','sterling'],
   overview:'The gold florin, first struck by the Republic of Florence in 1252, revolutionised European commerce and finance. Containing approximately 3.54 grams of pure gold stamped with the city\'s iconic fleur-de-lis, the florin became the first widely accepted gold trade currency in Western Europe since antiquity. Its consistent purity and the financial sophistication of Florentine bankers made it the standard currency of international trade, papal finance, and royal treasuries across Europe. The florin helped launch the Renaissance by financing the artistic and intellectual achievements that transformed Western civilisation.',
   d:{
    overview:'The Florentine gold florin, struck from 1252, became the dominant trade currency of medieval and Renaissance Europe. Its unwavering gold purity and the financial genius of Florentine bankers created a monetary system that funded the Renaissance and transformed European commerce.',
    currency:'The florin contained approximately 3.54 grams of virtually pure (23.67 carat) gold, stamped with the fleur-de-lis of Florence on one side and the city\'s patron Saint John the Baptist on the other. Its extraordinary consistency — maintained for nearly three centuries without debasement — made it the gold standard of European commerce. The florin was widely imitated: the Hungarian forint, the Dutch gulden, and the Aragonese florín all derived from the Florentine original.',
    banking:'Florence became the banking capital of Europe through the florin. The Bardi, Peruzzi, and later the Medici banking families built financial empires that spanned the continent, accepting deposits, extending credit, and managing the finances of popes and kings. Florentine bankers invented or perfected double-entry bookkeeping, bills of exchange, holding companies, and correspondent banking networks that formed the foundation of modern financial infrastructure.',
    trade:'The florin facilitated the great expansion of European trade in the 13th–15th centuries. Florentine merchants and their gold coins were present at every major trading centre — Bruges, London, Constantinople, Alexandria. The cloth trade between Florence and northern Europe, the spice trade through Venice, and the wool trade with England all depended on the florin as a reliable medium of exchange and unit of account.',
    taxation:'Florentine taxation was among the most sophisticated in medieval Europe. The catasto of 1427 was a comprehensive wealth census that taxed citizens on their total assets — real estate, business investments, and financial holdings — anticipating the modern income tax by four centuries. The revenue funded Florence\'s military campaigns, public works, and the patronage system that supported Renaissance art and architecture.',
    inflation:'The florin\'s most remarkable feature was its resistance to inflation. While nearly every other European currency underwent periodic debasement, the florin maintained its gold content unchanged from 1252 to 1533. This extraordinary stability was a deliberate policy choice by Florence\'s merchant oligarchy, who understood that the city\'s commercial prosperity depended on maintaining absolute confidence in its currency.',
    labor:'Florentine workers operated within one of the most advanced urban economies in medieval Europe. The wool and silk industries employed thousands of workers organised in guilds (arti), from wealthy master weavers to impoverished carders and dyers. Wage laborers — the ciompi — existed in a precarious position, paid in small-denomination coins while the great merchants dealt in florins, creating a dual monetary economy divided by social class.',
    debt:'Florentine public debt, managed through the Monte Comune (established 1345), was one of the most innovative fiscal instruments of the medieval world. Citizens purchased shares in the public debt that paid regular interest, creating a secondary market in government bonds. This system transformed public finance by allowing the state to borrow at scale and gave wealthy Florentines a direct financial stake in the republic\'s fiscal stability.',
    monopoly:'Florence\'s monetary dominance rested on its effective monopoly over high-quality gold coinage in 13th-century Europe. The city controlled this monopoly not through force but through reputation — the florin\'s guaranteed purity made it universally preferred over debased competitors. Florence also dominated specific industries, particularly luxury cloth production and banking, giving it outsized economic influence relative to its small territorial base.',
    colonialism:'Florence was not a colonial power in the territorial sense, but Florentine financial networks exercised a form of economic imperialism across Europe. Florentine bankers controlled the finances of the English crown, the papacy, and the kingdoms of Naples and Hungary, extracting interest payments and commercial privileges that amounted to a kind of financial colonialism. The Bardi and Peruzzi banks lent enormous sums to Edward III of England, financing his wars in exchange for commercial concessions.',
    technology:'Florentine financial technology was the most advanced in medieval Europe. Double-entry bookkeeping, systematised in Florence and Genoa, provided unprecedented accuracy in tracking complex commercial transactions. Bills of exchange eliminated the need to transport gold over dangerous roads. Holding company structures allowed the Medici to manage a continent-wide banking network while limiting liability — innovations that underpin modern corporate finance.',
    inequality:'Florence was a deeply unequal society despite its republican constitution. The catasto of 1427 revealed that the wealthiest 1% of households controlled roughly 25% of the city\'s wealth. The contrast between the magnificent palaces of the Medici, Strozzi, and Pitti families and the cramped quarters of wool workers illustrated the stark class divisions that the florin economy produced and reinforced.',
    philosophy:'Florentine thinkers grappled with the moral implications of money-making in a Christian society. Civic humanists like Leonardo Bruni and Coluccio Salutati defended the active commercial life against monastic ideals of poverty. The gradual acceptance of interest-bearing lending — despite its condemnation as usury by the Church — required elaborate theological justifications that reshaped European attitudes toward profit, investment, and economic ambition.',
    policy:'Florentine monetary policy was managed by the Arte del Cambio (Guild of Money Changers), which regulated exchange rates, supervised mint operations, and maintained the florin\'s gold standard. The republic\'s monetary authorities demonstrated remarkable policy consistency, maintaining the florin\'s weight and purity unchanged for nearly three centuries — an achievement unmatched by any other medieval European government.',
    crisis:'The great banking crisis of the 1340s, triggered by Edward III of England\'s default on enormous loans, destroyed the Bardi and Peruzzi banks — the largest financial institutions in Europe. Combined with the Black Death of 1348, which killed perhaps half of Florence\'s population, this crisis devastated the Florentine economy and reshaped its banking sector. The Medici rose to dominance in the aftermath, building a more diversified banking empire that learned from its predecessors\' catastrophic concentration of risk.',
    legacy:'The florin\'s legacy pervades modern finance. The Dutch guilder (gulden/florin), the Hungarian forint, and the Aruban florin all descend from the Florentine original. Double-entry bookkeeping, bills of exchange, public debt markets, and correspondent banking — all perfected in florin-era Florence — remain the foundations of global finance. The very concept of a stable, trusted international trade currency descends from the Florentine model.',
    figures:'The Medici family dominated Florentine finance for a century: Cosimo de\' Medici (1389–1464) built the bank into Europe\'s largest financial institution, and Lorenzo the Magnificent (1449–1492) used its wealth to fund the Renaissance\'s greatest artists. Francesco Pegolotti, author of the Pratica della Mercatura (c.1340), documented the florin-based commercial world in unprecedented detail. Luca Pacioli codified double-entry bookkeeping in 1494.',
    innovation:'Florence\'s financial innovations transformed European commerce: double-entry bookkeeping (providing accurate profit-and-loss accounting), bills of exchange (enabling cashless international transfers), the holding company structure (limiting liability across branches), public debt instruments (creating government bond markets), and marine insurance (spreading commercial risk). These innovations, all developed within the florin economy, constitute the foundational architecture of modern capitalism.',
    resistance:'The Ciompi Revolt of 1378, in which Florence\'s wool-workers seized control of the government for six weeks, was one of the first proletarian uprisings in European history. The ciompi demanded guild representation, fair wages, and political rights within a system that had enriched merchants and bankers while leaving laborers impoverished. Though ultimately suppressed, the revolt exposed the social tensions inherent in Florence\'s financial capitalism.',
    globalisation:'The florin created a unified monetary zone across Europe that facilitated the emergence of a continental economy. Florentine banking networks connected London to Constantinople, Bruges to Naples, and Barcelona to Budapest. The florin\'s role as a universal trade currency anticipated the dollar\'s modern function, demonstrating that monetary globalisation depends not just on economic power but on sustained institutional credibility.',
   }},
  {id:'songmoney',fp:{innov:10,reach:6,lon:4,stab:5,trade:7,inst:8},lon:114.3,lat:34.8,nm:'Song Dynasty Paper Money',sb:'Kaifeng · World\'s First Paper Currency',s:960,e:1279,
   conns:['cashcoins','yuan','florin'],
   overview:'The Song Dynasty (960–1279 CE) produced the world\'s first government-issued paper currency, an innovation that would not be replicated in Europe for nearly seven hundred years. Beginning with privately issued jiaozi notes in Sichuan around 1024 CE and evolving into the government-backed huizi of the Southern Song, Chinese paper money represented a revolutionary leap in monetary technology. Born from the practical need to avoid transporting heavy bronze coins over long distances, paper money enabled an unprecedented expansion of commerce and government finance — but also introduced the world to the perils of unbacked monetary expansion and inflation.',
   d:{
    overview:'The Song Dynasty created the world\'s first paper money system, beginning with private jiaozi notes around 1024 CE and evolving into government-issued huizi currency. This revolutionary innovation preceded European paper money by nearly seven centuries and transformed the relationship between states and monetary systems.',
    currency:'The jiaozi, first issued by private merchants in Sichuan around 1024 CE, was the world\'s first paper currency. Originally backed by iron coin deposits, it was later adopted and issued by the Song government. The huizi, introduced by the Southern Song in 1160, became the primary national paper currency. These notes were printed on mulberry bark paper using sophisticated woodblock techniques, with elaborate designs, serial numbers, and official seals to prevent counterfeiting.',
    banking:'The Song Dynasty developed the most advanced banking system in the medieval world. Government currency offices (jiaozi wu) managed note issuance and redemption, functioning as proto-central banks. Private money shops provided deposit, lending, and exchange services across the empire. The flying money system inherited from the Tang Dynasty evolved into a sophisticated network of paper-based transfers that facilitated long-distance commerce without physical coin transport.',
    trade:'Song Dynasty paper money enabled an extraordinary commercial expansion. The economy of the Southern Song, concentrated in the Yangtze Delta and the southeastern coast, was the most monetised and commercially sophisticated in the world. Paper money facilitated internal trade flows, maritime commerce with Southeast Asia and the Indian Ocean, and the enormous government procurement operations that supplied the military and bureaucracy.',
    taxation:'The Song government increasingly collected taxes in paper currency rather than grain or bronze coins, accelerating the monetisation of the rural economy. This shift simplified collection and gave the state greater fiscal flexibility but also exposed peasants to inflation risk. The government\'s ability to print money to finance military expenditure and disaster relief created a persistent temptation toward fiscal irresponsibility that would ultimately undermine the currency\'s value.',
    inflation:'The Song Dynasty experienced the world\'s first paper money inflation. As the government printed increasing quantities of huizi to finance wars against the Jin and Mongol empires, the currency\'s purchasing power declined steadily. By the late Southern Song, prices had risen dramatically and the government struggled to maintain confidence in its paper money. This experience provided the world\'s first empirical demonstration that unbacked paper currency expansion leads to inflation — a lesson that would be repeatedly relearned.',
    labor:'Song Dynasty workers participated in the most commercially advanced economy of their era. Urban artisans, merchants, and service workers were paid in paper money, while rural laborers increasingly encountered monetary wages as the cash economy penetrated the countryside. The textile, ceramics, and iron industries employed large numbers of wage laborers, and the commercialisation of agriculture created rural labor markets where paper money circulated alongside bronze coins.',
    debt:'The Song government\'s paper money system was itself a form of public debt — each note represented an obligation to redeem the paper for coin or goods. As the government printed more notes than it could redeem, this implicit debt grew, eventually undermining confidence in the currency. Private lending also expanded dramatically during the Song Dynasty, facilitated by the increased liquidity that paper money provided.',
    monopoly:'The Song state maintained monopolies on salt, tea, and wine that generated enormous revenue. These monopoly goods could be purchased with paper money, giving the currency a form of commodity backing beyond mere government decree. The government also held a monopoly on paper money issuance, criminalising private note production and counterfeiting with severe penalties including death.',
    colonialism:'The Song Dynasty was not a colonial power in the European sense, but its commercial reach extended throughout East and Southeast Asia. Song merchants established trading communities from Japan to Java, and Chinese cash coins and paper money influenced monetary practices across the region. The Southern Song\'s maritime trade network, facilitated by paper money, represented a form of commercial expansion that shaped the economic development of the entire Indo-Pacific region.',
    technology:'Song Dynasty monetary technology was centuries ahead of the rest of the world. Woodblock printing, already highly developed for books, was adapted for currency production with sophisticated anti-counterfeiting measures: multiple ink colours, intricate designs, embedded fibres in the paper, official seals, and serial numbers. The scale of production — millions of notes printed annually — required industrial-scale printing operations unmatched anywhere until Gutenberg\'s press in the 15th century.',
    inequality:'The Song Dynasty\'s commercial revolution created new forms of wealth and new patterns of inequality. Merchant families amassed enormous fortunes in the monetised economy, challenging the traditional Confucian social hierarchy that ranked merchants below farmers. Urban wealth concentrated in the great commercial cities of Hangzhou, Kaifeng, and Quanzhou, while rural areas remained significantly poorer, creating an urban-rural divide that persists in China to this day.',
    philosophy:'Song Dynasty neo-Confucian philosophers debated the proper role of money in society with a sophistication unmatched elsewhere in the medieval world. Zhu Xi (1130–1200) argued for fiscal restraint and sound money, while reform-minded officials advocated for expansionary monetary policy to stimulate commerce and fund military defence. These debates anticipated modern controversies between monetary hawks and doves by eight centuries.',
    policy:'Song monetary policy evolved from conservative coin-based management to increasingly aggressive paper money expansion. The government experimented with issue limits, redemption deadlines, and denomination controls to manage inflation — the world\'s first attempts at paper money policy. The Southern Song\'s monetary authorities grappled with problems that modern central bankers would recognize: balancing economic stimulus against inflation control, managing public expectations, and maintaining currency credibility.',
    crisis:'The Song Dynasty\'s monetary crisis intensified as Mongol invasion pressures forced ever-greater paper money issuance to finance military defence. By the 1270s, rampant inflation had eroded confidence in the huizi, and the economy was under severe strain. The Mongol conquest of 1279 ended the Song monetary experiment but did not end Chinese paper money — the Yuan Dynasty adopted and expanded paper currency, eventually producing history\'s most spectacular hyperinflation.',
    legacy:'The Song Dynasty\'s paper money legacy is immense: it demonstrated that abstract representations of value could function as effective currency, pioneered central banking concepts, and provided the first empirical evidence about the relationship between money supply and inflation. Every paper banknote and digital currency in the world today descends conceptually from the Song Dynasty\'s revolutionary experiment. Marco Polo\'s description of Chinese paper money astonished Europeans and planted the seed for eventual Western adoption of the idea.',
    figures:'Emperor Renzong (r.1022–1063) oversaw the government\'s adoption of jiaozi paper money. Wang Anshi (1021–1086) implemented sweeping financial reforms including government credit programs for farmers. Jia Sidao (1213–1275) attempted aggressive monetary expansion to finance resistance against the Mongols. The anonymous Sichuan merchants who first issued jiaozi notes around 1024 CE created perhaps the single most consequential financial innovation in human history.',
    innovation:'The Song Dynasty produced the most consequential monetary innovation in history: paper money. This single innovation — representing value with printed symbols rather than intrinsic metal content — required and enabled a fundamental reconceptualization of the nature of money. Supporting innovations included industrial-scale printing, anti-counterfeiting technology, central banking institutions, and monetary policy frameworks that the rest of the world would not develop for centuries.',
    resistance:'Resistance to Song paper money took the form of hoarding bronze coins (driving them out of circulation per Gresham\'s Law), demanding payment in metal rather than paper, and black-market trading at rates that reflected paper money\'s true depreciated value rather than its official face value. The rural population was particularly resistant to paper money, preferring the tangible certainty of bronze coins and grain to the abstract promise of government paper.',
    globalisation:'Song Dynasty China was the world\'s most globally connected economy. Maritime trade routes linked Quanzhou and Guangzhou to Southeast Asia, India, the Persian Gulf, and East Africa. Chinese ceramics, silk, and paper money influenced economies throughout the Indo-Pacific. The Song monetary revolution — demonstrating that paper could serve as money — was arguably the most significant Chinese contribution to global economic development, eventually transforming monetary systems worldwide.',
   }},
];

let year=-6000,lenses=new Set(),sel=null,sel2=null,lensDD=false,mode="explore",activeThread=null;

const OVERVIEW_COL='#c8881c';

function fmt(y){return y<0?`${Math.abs(y)} BCE`:y===0?'1 CE':`${y} CE`}
function eraName(y){let n=ERAS[0].n;for(const e of ERAS){if(y>=e.y)n=e.n;}return n;}
function active(c){return year>=c.s&&year<=c.e}
function getLensCol(){
  if(!lenses.size)return OVERVIEW_COL;
  const L=LENSES.find(l=>l.id===[...lenses][0]);
  return L?L.col:OVERVIEW_COL;
}

function toggleLensDD(){
  lensDD=!lensDD;
  document.getElementById('lens-dd-list').classList.toggle('open',lensDD);
  document.getElementById('lens-dd-hdr').classList.toggle('open',lensDD);
  document.getElementById('lens-dd-arrow').classList.toggle('open',lensDD);
}

function lensLabel(){
  if(!lenses.size)return'Economic Arc';
  const names=[...lenses].map(id=>{const L=LENSES.find(l=>l.id===id);return L?L.lbl:'';});
  if(names.length===1)return names[0];
  if(names.length<=3)return names.join(' · ');
  return names.slice(0,2).join(' · ')+` +${names.length-2}`;
}

function renderLensDD(){
  const hook=document.getElementById('lens-position-hook');
  const dt=hook||document.getElementById('drawer-top');
  if(!dt)return;
  if(hook){
    hook.style.cssText='padding:8px 0 4px';
    const drawerTop=document.getElementById('drawer-top');
    if(drawerTop)drawerTop.innerHTML='';
  }
  const arcOn=!lenses.size;
  const rows=LENSES.map(l=>{
    const on=lenses.has(l.id);
    return`<div class="lens-row${on?' on':''}" onclick="toggleLens('${l.id}')">
      <div class="lens-row-chk${on?' on':''}">${on?'✓':''}</div>
      <span class="lens-row-ico">${l.ico}</span>
      <span class="lens-row-lbl">${l.lbl}</span>
    </div>`;
  }).join('');
  dt.innerHTML=`<div class="lens-dd-wrap">
    <div class="lens-dd-hdr${lensDD?' open':''}" id="lens-dd-hdr" onclick="toggleLensDD()">
      <span class="lens-dd-title">Lens</span>
      <span class="lens-dd-summary">${lensLabel()}</span>
      <span class="lens-dd-arrow${lensDD?' open':''}" id="lens-dd-arrow">▾</span>
    </div>
    <div class="lens-dd-list${lensDD?' open':''}" id="lens-dd-list">
      <div class="lens-row${arcOn?' on':''}" onclick="toggleLens('__arc__')">
        <div class="lens-row-chk${arcOn?' on':''}">${arcOn?'✓':''}</div>
        <span class="lens-row-ico">◎</span>
        <span class="lens-row-lbl">Economic Arc</span>
      </div>
      <div class="lens-row-sep"></div>
      ${rows}
      <div class="lens-dd-close-btn" onclick="toggleLensDD()">Done ▴</div>
    </div>
  </div>`;
}

function toggleLens(id){
  if(id==='__arc__'){lenses.clear();}
  else{
    if(lenses.has(id))lenses.delete(id);
    else lenses.add(id);
  }
  renderLensDD();
  if(sel){
    const c=sel;
    let body='';
    if(!lenses.size){
      body=`<div class="overview-arc"><p>${c.overview||c.d.overview}</p></div>`;
    } else {
      body=[...lenses].map(lid=>{
        const L=LENSES.find(l=>l.id===lid);
        if(!L)return'';
        return`<div class="lens-section">
          <div class="lens-section-hdr">
            <span class="lens-section-ico">${L.ico}</span>
            <span class="lens-section-lbl">${L.lbl}</span>
          </div>
          <div class="info-txt">${c.d[lid]||'No data for this lens.'}</div>
        </div>`;
      }).join('');
    }
    const col=lenses.size?getLensCol():OVERVIEW_COL;
    const actIds=new Set(ITEMS.filter(x=>active(x)).map(x=>x.id));
    const connHTML=c.conns.length?`<div class="conn-hdr" id="conn-hdr">Historical connections</div>`+c.conns.map(cid=>{
      const o=ITEMS.find(x=>x&&x.id===cid);if(!o)return'';
      const isA=actIds.has(cid);
      const badge=isA?'ACTIVE':'→ JUMP';
      const tip=isA?`View ${o.nm} (active in this era)`:`Jump to ${o.nm} (${fmt(o.s)} – ${fmt(o.e)})`;
      return`<button class="conn-item" tabindex="0"
          aria-label="${tip}"
          onclick="navigateToItem('${cid}')"
          style="width:100%;background:none;border:none;border-bottom:1px solid var(--conn-bdr);text-align:left;cursor:pointer;opacity:${isA?1:.7}">
        <div class="conn-dot" style="background:${isA?col:'var(--txt3)'}"></div>
        <span style="flex:1;color:var(--txt${isA?'':'3'})">${o.nm}</span>
        <span style="font-size:9px;font-family:'Cinzel',serif;letter-spacing:1px;color:${isA?'var(--amber-b)':'var(--amber)'};white-space:nowrap">${badge}</span>
      </button>`;
    }).join(''):'';
    const lensDiv=document.getElementById('drawer-lens-body');
    if(lensDiv) lensDiv.innerHTML=body+connHTML;
  }
  renderMap();
}


// ── NON-LINEAR TIMELINE ──
// Slider 0-100 maps to -6000 to -1000 (deep history, 10% of slider)
// Slider 100-1000 maps to -1000 to 2024 (recorded history, 90% of slider)
function sliderToYear(v){
  v=parseInt(v);
  if(v<=100){
    return Math.round(-6000+((-1000-(-6000))*(v/100)));
  } else {
    return Math.round(-1000+((2024-(-1000))*((v-100)/900)));
  }
}
function yearToSlider(yr){
  yr=parseInt(yr);
  if(yr<=-1000){
    return Math.round(100*((yr-(-6000))/(-1000-(-6000))));
  } else {
    return Math.round(100+900*((yr-(-1000))/(2024-(-1000))));
  }
}

function itemPt(c){
  if(!c)return[500,260];
  if(!window._proj)return[c.x||500,c.y||260];
  if(typeof c.lon!=='number'||typeof c.lat!=='number')return[c.x||500,c.y||260];
  try{const pt=window._proj([c.lon,c.lat]);return pt&&isFinite(pt[0])&&isFinite(pt[1])?pt:[c.x||500,c.y||260];}
  catch(e){return[c.x||500,c.y||260];}
}

function renderMap(){
  const ids=new Set(ITEMS.filter(c=>active(c)).map(c=>c.id));
  window.ids_cache=ids;
  const col=lenses.size?getLensCol():OVERVIEW_COL;

  const drawn=new Set();
  let cl='';
  ITEMS.forEach(c=>{
    if(!ids.has(c.id))return;
    c.conns.forEach(id=>{
      const k=[c.id,id].sort().join('-');
      if(drawn.has(k)||!ids.has(id))return;
      drawn.add(k);
      const o=ITEMS.find(x=>x&&x.id===id);
      if(!o)return;
      const [cx,cy]=itemPt(c),[ox,oy]=itemPt(o);
      const mx=(cx+ox)/2,my=Math.min(cy,oy)-28;
      cl+=`<path d="M${cx},${cy} Q${mx},${my} ${ox},${oy}" stroke="${col}" stroke-width=".8" fill="none" stroke-dasharray="3,5" opacity="${sel?0.1:0.25}"/>`;
    });
  });
  document.getElementById('conn-layer').innerHTML=cl;

  let rings='', dots='', ll='';
  const itemData=ITEMS.map(c=>{
    const on=ids.has(c.id);
    const isSel=sel&&sel.id===c.id;
    const mcol=isSel?'#f0d060':'#c8881c';
    const op=on?1:0.06;
    const [cx,cy]=itemPt(c);
    return {c,on,isSel,mcol,op,cx,cy};
  });
  // Pass 1: decorative rings
  itemData.filter(Boolean).forEach(({c,on,isSel,mcol,op,cx,cy})=>{
    const _zr=1000/_vbW;
    const _rR=Math.max(4,(16/_zr)).toFixed(1);
    const _pR=Math.max(2,(6/_zr)).toFixed(1);
    const _pMax=Math.max(5,(16/_zr)).toFixed(1);
    rings+=`<g opacity="${op}" pointer-events="none">
      <circle cx="${cx}" cy="${cy}" r="${_rR}" fill="none" stroke="${mcol}" stroke-width=".5" opacity=".15"/>
      <circle cx="${cx}" cy="${cy}" r="${(Math.max(3,10/_zr)).toFixed(1)}" fill="${mcol}" fill-opacity=".06"/>
      ${on?`<circle cx="${cx}" cy="${cy}" r="${_pR}" fill="${mcol}" opacity=".45">
        <animate attributeName="r" values="${_pR};${_pMax};${_pR}" dur="2.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".45;0;.45" dur="2.8s" repeatCount="indefinite"/>
      </circle>`:''}
    </g>`;
  });
  // Pass 2: clickable dots
  const sorted=[...itemData].filter(Boolean).sort((a,b)=>a.isSel?1:b.isSel?-1:0);
  sorted.forEach(({c,on,isSel,mcol,op,cx,cy})=>{
    if(on){
      const zr=1000/_vbW;
      const dotR=Math.max(2, (isSel?9:7)/zr);
      const ringR=Math.max(3, 16/zr);
      const pulseMax=Math.max(8, 16/zr);
      dots+=`<g role="button" tabindex="0" data-item="${c.id}"
          aria-label="${c.nm} — click to explore"
          onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();itemClick('${c.id}')}"
          opacity="${op}" pointer-events="none">
          <circle cx="${cx}" cy="${cy}" r="${dotR.toFixed(1)}"
            fill="${mcol}" filter="url(#glow${isSel?'2':''})"
          />
        </g>`;
      ll+=`<text x="${cx}" y="${cy+26}" font-family="Cinzel,serif" font-size="11"
        letter-spacing="1" fill="${isSel?'#f0d060':'#c8881c'}"
        text-anchor="middle" pointer-events="none">${c.nm}</text>`;
    } else {
      dots+=`<circle cx="${cx}" cy="${cy}" r="4" fill="${mcol}" opacity=".12" pointer-events="none"/>`;
    }
  });
  document.getElementById('mark-layer').innerHTML=rings+dots;
  document.getElementById('label-layer').innerHTML=ll;
}

function navigateToItem(id){
  const c=ITEMS.find(x=>x&&x.id===id);
  if(!c)return;
  if(mode==='compare'){
    if(!sel){sel=c;}
    else if(!sel2&&sel.id!==c.id){sel2=c;}
    else{sel=c;sel2=null;}
    renderDrawer();renderMap();updateURL();
    openMobileSheet();
    return;
  }
  if(!active(c)){
    const targetYear=c.s;
    document.getElementById('tl').value=yearToSlider(targetYear);
    setYear(targetYear);
  }
  sel=c;lensDD=false;
  renderDrawer();renderMap();updateURL();
  openMobileSheet();
  document.getElementById('info-panel').scrollTo({top:0,behavior:'smooth'});
}

function itemClick(id){
  navigateToItem(id);
}
 {id:'yen',fp:{innov:7,reach:8,lon:6,stab:6,trade:8,inst:9},lon:139.7,lat:35.7,nm:'Japanese Yen',sb:'Tokyo · Meiji Modernisation',s:1871,e:2024,
  conns:['dollar','sterling','euro'],
  overview:'The Japanese yen — introduced in 1871 as part of the Meiji government\'s radical modernisation programme — transformed a feudal economy based on rice stipends into an industrial powerhouse within a single generation. Modelled on the European gold standard, the yen system replaced the chaotic han-issued paper currencies of the Tokugawa era with a centralised, decimal currency managed by the Bank of Japan. By the mid-20th century, the yen had survived hyperinflation, military defeat, and occupation to become the world\'s third most traded currency, anchoring Asia\'s post-war economic miracle and pioneering the monetary policy experiments — from zero interest rates to quantitative easing — that the rest of the world would later adopt.',
  d:{
   overview:'The Japanese yen was introduced in 1871 as part of the Meiji Restoration\'s sweeping modernisation reforms. It replaced the complex multi-domain monetary system of the Tokugawa shogunate with a single national currency pegged to gold, transforming Japan from a feudal economy into an industrial and financial power within decades.',
   currency:'The yen was established by the New Currency Act of 1871, adopting a decimal system modelled on the US dollar and European currencies. It replaced the Tokugawa-era system of gold ryō, silver bu, and copper mon alongside hundreds of domain-issued paper notes (hansatsu). The yen was initially pegged to gold at 1.5 grams per yen, placing Japan on the international gold standard.',
   banking:'The Bank of Japan, established in 1882 on the Belgian central bank model, became Asia\'s first modern central bank. The zaibatsu conglomerates — Mitsui, Mitsubishi, Sumitomo, and Yasuda — dominated Japanese banking, combining industrial production with financial services in a way that shaped Japan\'s distinctive form of state-guided capitalism. Post-war keiretsu networks continued this tradition of interlinked banking and industry.',
   trade:'Japan\'s trade strategy evolved from Tokugawa-era isolation (sakoku) to aggressive export-led growth. The yen\'s value was deliberately managed to support exports: undervaluation in the 1950s–1970s fuelled the export boom, while the Plaza Accord of 1985 forced a dramatic appreciation that reshaped global trade patterns. Japan\'s trade surplus with the United States became one of the defining economic tensions of the late 20th century.',
   taxation:'The Meiji government replaced feudal rice taxes with a modern land tax payable in yen, forcing the monetisation of the rural economy. This transformation — completed by the Land Tax Reform of 1873 — destroyed the samurai class\'s economic base while generating revenue for industrialisation. Japan\'s post-war tax system balanced high corporate taxes with incentives for savings and investment.',
   inflation:'Japan experienced severe inflation following World War II, with prices rising over 100-fold between 1945 and 1949. The Dodge Line stabilisation programme of 1949 imposed fiscal austerity and fixed the yen at 360 to the dollar, a rate maintained until 1971. In stark contrast, Japan later experienced prolonged deflation from the 1990s onward, becoming the world\'s foremost example of a deflationary trap.',
   labor:'Japan\'s post-war economic miracle was built on a distinctive labor system featuring lifetime employment, seniority-based wages, and enterprise unions. This system — combining job security with corporate loyalty — produced extraordinary productivity gains but also rigid labor markets. The spring wage offensive (shuntō) became the annual ritual through which wage increases were negotiated economy-wide.',
   debt:'Japan\'s government debt-to-GDP ratio exceeded 250% by the 2020s, the highest among developed nations. Yet Japanese government bonds remained stable because over 90% were held domestically, primarily by Japanese banks and the Bank of Japan itself. This internal financing model — sometimes called \'owing money to ourselves\' — challenged orthodox assumptions about sovereign debt sustainability.',
   monopoly:'The zaibatsu — dissolved by American occupation authorities after 1945 but reconstituted as keiretsu — represented a distinctive form of corporate concentration. These interlocking networks of banks, manufacturers, and trading companies dominated the Japanese economy, creating oligopolistic market structures that enabled coordinated industrial strategy but limited competition and innovation in domestic markets.',
   colonialism:'Japan\'s imperial expansion from the 1890s to 1945 created a yen bloc across East Asia. Colonial currencies in Korea, Taiwan, and Manchuria were pegged to the yen, and the Southern Development Bank financed exploitation of Southeast Asian resources during World War II. Japan\'s colonial monetary system extracted wealth through exchange rate manipulation and forced currency conversion.',
   technology:'Japan pioneered numerous financial technologies, from the sophisticated rice futures market at the Dōjima exchange in Osaka (established 1697, arguably the world\'s first futures market) to modern innovations in electronic payments. Japan\'s convenience store banking network and the development of QR code payment systems demonstrated a distinctive approach to financial technology emphasising accessibility.',
   inequality:'Japan\'s post-war economic miracle produced one of the most equal income distributions among developed nations, with a strong middle class and relatively compressed wage differentials. However, inequality increased significantly after the bubble\'s collapse in 1991, with rising non-regular employment, stagnant wages, and growing generational wealth gaps. The \'lost decades\' disproportionately affected younger workers.',
   philosophy:'Japanese economic thought blended Confucian values with Western economics. The concept of keizai (economy) originally meant \'governing the world and relieving the people\'s suffering\' — a fundamentally moral framing. Shibusawa Eiichi\'s philosophy of combining the Analects of Confucius with the abacus shaped Japanese business ethics, emphasising corporate social responsibility alongside profit.',
   policy:'The Bank of Japan became the world\'s laboratory for unconventional monetary policy. Zero interest rate policy (ZIRP), adopted in 1999, was followed by quantitative easing (2001), negative interest rates (2016), and yield curve control (2016). These experiments — born of Japan\'s unique deflationary challenge — provided the playbook that Western central banks adopted during the 2008 financial crisis and COVID-19 pandemic.',
   crisis:'The Japanese asset bubble of the late 1980s — when the Imperial Palace grounds were famously valued higher than all California real estate — burst catastrophically in 1991. The resulting \'lost decade\' (which became lost decades) saw property prices fall 80%, stock markets collapse, and zombie banks limp along with unrealised losses. Japan\'s experience became the defining case study in post-bubble economic stagnation.',
   legacy:'The yen\'s legacy extends beyond Japan\'s borders. Japan\'s post-war economic model — combining state guidance, export orientation, and managed currency — was adopted by South Korea, Taiwan, Singapore, and eventually China. Japan\'s monetary policy experiments with zero interest rates and quantitative easing became the template for central banks worldwide after 2008.',
   figures:'Matsukata Masayoshi, as Finance Minister in the 1880s, established the Bank of Japan and put the yen on the gold standard. Takahashi Korekiyo, \'Japan\'s Keynes,\' pioneered deficit spending in the 1930s before Keynes published his General Theory. Kuroda Haruhiko launched \'Abenomics\' monetary easing in 2013, the most aggressive central bank intervention in modern history.',
   innovation:'Japan\'s monetary innovations include the Dōjima rice futures market (1697), Asia\'s first modern central bank (1882), the first zero interest rate policy (1999), and the first major economy to implement negative interest rates (2016). Japanese candlestick charting, developed by rice traders in the 18th century, remains the standard method of financial market analysis worldwide.',
   resistance:'Resistance to monetary modernisation was fierce during the Meiji era. The Satsuma Rebellion of 1877 was partly a response to the destruction of the samurai\'s rice-based economic system. Rural protests against the land tax reform reflected the hardship of forced monetisation. In the post-war period, resistance to financial liberalisation slowed deregulation for decades.',
   globalisation:'The yen\'s internationalisation accelerated after the end of Bretton Woods in 1971 and the Plaza Accord of 1985. Tokyo became one of the world\'s three major financial centres alongside London and New York. Japanese capital exports in the 1980s — purchasing American real estate, European art, and global corporate assets — represented the first major Asian challenge to Western financial dominance.',
