<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── DARK THEME (default) ── */
:root{
  --bg:#02040a;
  --panel:#070b12;
  --panel2:#0c1018;
  --ocean-start:#0a1628;--ocean-end:#061020;
  --land:#2a4a18;--land-s:#3a6020;
  --amber:#e89820;--amber-b:#f0b040;--amber-d:#3a2204;
  --amber-x:rgba(232,152,32,0.14);--amber-xx:rgba(232,152,32,0.08);
  --txt:#f2e8d5;--txt2:#e0d4b4;--txt3:#c8aa78;
  --bdr:rgba(232,152,32,0.22);--bdr2:rgba(232,152,32,0.10);
  --hint:rgba(224,212,180,0.65);
  --tl-bg:rgba(2,4,10,0.99);
  --hdr-bg:rgba(2,4,10,0.97);
  --conn-bdr:rgba(232,152,32,0.10);
  --shadow:rgba(0,0,0,0.6);
}

/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#f0ebe0;
  --panel:#e8e0d0;
  --panel2:#ddd4c0;
  --ocean-start:#b8cce0;--ocean-end:#a8bcd4;
  --land:#8ca860;--land-s:#7a9850;
  --amber:#4a2c00;--amber-b:#5a3800;--amber-d:#f0d8a0;
  --amber-x:rgba(122,78,0,0.10);--amber-xx:rgba(122,78,0,0.06);
  --txt:#1a1206;--txt2:#1a1206;--txt3:#2e2010;
  --bdr:rgba(122,78,0,0.28);--bdr2:rgba(122,78,0,0.14);
  --hint:rgba(30,18,6,0.6);
  --tl-bg:rgba(236,228,214,0.99);
  --hdr-bg:rgba(236,228,214,0.97);
  --conn-bdr:rgba(122,78,0,0.12);
  --shadow:rgba(0,0,0,0.18);
}

@media(prefers-color-scheme:light){
  :root:not([data-theme="dark"]){
    --bg:#f0ebe0;--panel:#e8e0d0;--panel2:#ddd4c0;
    --ocean-start:#b8cce0;--ocean-end:#a8bcd4;
    --land:#8ca860;--land-s:#7a9850;
    --amber:#4a2c00;--amber-b:#5a3800;--amber-d:#f0d8a0;
    --amber-x:rgba(122,78,0,0.10);--amber-xx:rgba(122,78,0,0.06);
    --txt:#1a1206;--txt2:#1a1206;--txt3:#2e2010;
    --bdr:rgba(122,78,0,0.28);--bdr2:rgba(122,78,0,0.14);
    --hint:rgba(30,18,6,0.6);
    --tl-bg:rgba(236,228,214,0.99);
    --hdr-bg:rgba(236,228,214,0.97);
    --conn-bdr:rgba(122,78,0,0.12);
    --shadow:rgba(0,0,0,0.18);
  }
}

html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Crimson Pro',serif}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--hdr-bg);gap:12px}
.hdr-left{display:flex;align-items:baseline;gap:0;min-width:0}
.logo-t{font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:700;color:var(--amber-b);letter-spacing:3px;white-space:nowrap}
.logo-s{font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin-left:10px;white-space:nowrap}
.era-disp{text-align:center;font-family:'Cinzel',serif;flex-shrink:0}
.era-y{font-size:22px;font-weight:600;color:var(--amber-b);letter-spacing:1px}
.era-n{font-size:12px;letter-spacing:1.5px;color:var(--txt2);margin-top:1px;text-transform:uppercase;font-weight:600}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.cnt-disp{text-align:right;font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;color:var(--txt3)}
.cnt-n{font-size:22px;font-weight:600;color:var(--amber);display:block;line-height:1}
.theme-btn{background:none;border:1px solid var(--bdr);padding:4px 8px;cursor:pointer;font-size:13px;color:var(--txt2);border-radius:3px;transition:all .15s;flex-shrink:0}
.theme-btn:hover{background:var(--amber-x);color:var(--amber-b)}

/* ── MAIN LAYOUT ── */
.main{position:fixed;top:52px;left:0;right:0;bottom:0;display:flex}
.map-c{flex:1;position:relative;overflow:hidden;min-width:0;min-height:0}
.map-tl-col{display:flex;flex-direction:column;flex:1;min-width:0}
#wsvg{width:100%;height:100%}

/* ── DESKTOP PANEL ── */
.info-panel{width:320px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--bdr);overflow-y:auto;padding:18px 18px 28px;position:relative}
.info-close{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:16px;line-height:1;padding:4px;float:right;margin:-2px -2px 0 0}
.info-close:hover{color:var(--amber-b)}
.info-nm{font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:700;color:var(--amber-b);margin-bottom:3px;clear:both}
.info-sb{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1.5px;color:var(--txt2);text-transform:uppercase;margin-bottom:10px}
.info-dates{display:flex;gap:6px;margin-bottom:14px;align-items:center}
.info-dt{padding:5px 12px;border:1px solid var(--bdr);font-family:'Cinzel',serif;font-size:13.5px;color:var(--amber-b)}
.info-arr{color:var(--txt2);font-size:12px}

/* ── LENS DROPDOWN ── */
.lens-dd-wrap{border:1px solid var(--bdr);margin-bottom:14px}
.lens-dd-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;cursor:pointer;user-select:none;background:var(--amber-xx);border-bottom:1px solid transparent;transition:background .15s}
.lens-dd-hdr:hover{background:var(--amber-x)}
.lens-dd-hdr.open{border-bottom-color:var(--bdr)}
.lens-dd-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:2.5px;color:var(--txt2);text-transform:uppercase;flex-shrink:0}
.lens-dd-summary{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.5px;color:var(--amber-b);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;padding:0 6px}
.lens-dd-arrow{color:var(--txt2);font-size:10px;transition:transform .18s;flex-shrink:0}
.lens-dd-arrow.open{transform:rotate(180deg)}
.lens-dd-list{display:none;max-height:260px;overflow-y:auto}
.lens-dd-list.open{display:block}
.lens-row{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--bdr2);transition:background .15s}
.lens-row:last-child{border-bottom:none}
.lens-row:hover{background:var(--amber-x)}
.lens-row-chk{width:13px;height:13px;border:1px solid var(--bdr);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--amber-b);line-height:1}
.lens-row-chk.on{background:var(--amber-x);border-color:var(--amber-b)}
.lens-row-ico{font-size:14px;width:16px;text-align:center;flex-shrink:0;color:var(--txt2)}
.lens-row-lbl{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.5px;color:var(--txt2)}
.lens-row.on .lens-row-lbl{color:var(--amber-b);font-weight:600}
.lens-row-sep{border-bottom:1px solid var(--bdr);margin-bottom:2px}
.lens-dd-close-btn{text-align:center;padding:10px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;color:var(--amber-b);border-top:1px solid var(--bdr);cursor:pointer;text-transform:uppercase;transition:background .15s}
.lens-dd-close-btn:hover{background:var(--amber-x)}

/* ── DRAWER CONTENT ── */
.lens-section{margin-bottom:18px}
.lens-section-hdr{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.lens-section-ico{font-size:12px;color:var(--txt2)}
.lens-section-lbl{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;color:var(--amber-b);text-transform:uppercase;font-weight:600}
.info-div{border:none;border-top:1px solid var(--bdr);margin:12px 0}
.info-txt{font-size:17.5px;line-height:1.95;color:var(--txt);font-style:italic}
.overview-arc{font-size:17.5px;line-height:1.95;color:var(--txt)}
.overview-arc p{margin-bottom:14px}
.civ-span-bar{height:3px;background:var(--bdr2);position:relative;margin:14px 0 6px;border-radius:2px}
.civ-span-fill{position:absolute;top:0;height:100%;background:var(--amber-b);border-radius:2px;opacity:.8}
.civ-span-lbls{display:flex;justify-content:space-between;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--txt3)}
.conn-hdr{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1.5px;color:var(--txt3);text-transform:uppercase;margin:18px 0 8px;font-weight:600}
.conn-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--conn-bdr);font-size:16px;color:var(--txt2);cursor:pointer;transition:color .15s}
.conn-item:hover{color:var(--amber-b)}
.conn-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── TIMELINE ── */
.tl-wrap{position:relative;height:88px;background:var(--tl-bg);border-top:1px solid var(--bdr);padding:8px 20px 14px;flex-shrink:0}
.tl-lbls{display:flex;justify-content:space-between;margin-bottom:5px}
.tl-lbl{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.8px;color:var(--txt3);text-transform:uppercase;font-weight:600}
.tl-trk{position:relative;height:5px;background:var(--bdr);border-radius:3px}
.tl-fill{position:absolute;top:0;left:0;height:5px;background:var(--amber-b);border-radius:3px;pointer-events:none;opacity:.7}
.tl-thumb{position:absolute;top:50%;width:20px;height:20px;background:var(--amber-b);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--amber),0 0 20px rgba(232,152,32,.3);pointer-events:none;transition:left .04s linear}
input.tl-range{position:absolute;top:50%;left:0;width:100%;height:28px;opacity:0;cursor:pointer;transform:translateY(-50%);margin:0;z-index:2}
.hint{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;color:var(--hint);display:flex;align-items:center;justify-content:center;padding:0 8px;white-space:nowrap;overflow:hidden}
#map-hint-text{pointer-events:none;overflow:hidden;text-overflow:ellipsis}

/* ── MOB MAP BUTTON ── */
.mob-map-btn{display:none}

/* ── PORTRAIT MOBILE ── */
@media(max-width:768px) and (orientation:portrait){
  .logo-s{display:none}
  .cnt-disp{display:none}
  .hdr{padding:8px 12px}
  .logo-t{font-size:16px;letter-spacing:2px}
  .era-y{font-size:18px}
  .era-n{font-size:10px;letter-spacing:1.5px}
  .main{top:52px!important}
  .main{bottom:0;flex-direction:column}
  .map-tl-col{width:100%}
  .map-c{flex:0 0 42vh;width:100%}
  .info-panel{flex:1;width:100%;border-left:none;border-top:1px solid var(--bdr);overflow-y:auto;padding:0 16px 16px;border-radius:0}
  .tl-wrap{height:76px;padding:6px 14px 10px}
  .tl-lbl{font-size:9px;letter-spacing:.8px}
  .hint{font-size:8px;letter-spacing:.8px}
  .lens-dd-list{max-height:180px}
  .info-txt,.overview-arc{font-size:16px;line-height:1.82}
  .lens-row-lbl{font-size:13px}
}

/* ── LANDSCAPE MOBILE ── */
@media(max-width:900px) and (orientation:landscape){
  .logo-s{display:none}
  .hdr{padding:6px 14px}
  .logo-t{font-size:15px;letter-spacing:2px}
  .era-y{font-size:15px}
  .hint{font-size:7px;letter-spacing:.5px;white-space:normal;text-align:center;line-height:1.4}
  .tl-wrap{height:68px;padding:4px 12px 8px}
  .tl-lbl{font-size:8px}
  .info-panel{width:280px}
}

@keyframes ring-pulse{0%{r:5;opacity:.7}100%{r:26;opacity:0}}

@media(pointer:coarse){
  #mark-layer g[role="button"]{cursor:pointer}
}

/* ── ACCESSIBILITY ── */
:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px;border-radius:2px}
.conn-item:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px}
.lens-row:focus-visible{outline:2px solid var(--amber-b);outline-offset:-2px}
button:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px}
.skip-link{position:absolute;top:-40px;left:0;background:var(--amber-b);color:var(--bg);padding:8px 16px;z-index:9999;font-family:'Cinzel',serif;font-size:11px;text-decoration:none}
.skip-link:focus{top:0}

/* ── THREAD PANEL ── */
.thread-panel{position:fixed;top:52px;left:0;right:0;z-index:400;background:var(--panel);max-height:0;overflow:hidden;transition:max-height .32s cubic-bezier(.4,0,.2,1)}
.thread-panel.open{border-bottom:1px solid var(--bdr);box-shadow:0 6px 24px var(--shadow)}
.thread-panel.open{max-height:70vh}
.thread-panel-inner{padding:16px 20px 20px;overflow-y:auto;max-height:calc(70vh - 1px)}
.thread-panel-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bdr)}
.thread-panel-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase}
.thread-close-btn{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:18px;line-height:1;padding:4px;transition:color .15s}
.thread-close-btn:hover{color:var(--amber-b)}
.thread-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.thread-concept-btn{width:100%;background:none;border:1px solid var(--bdr2);padding:9px 12px;text-align:left;cursor:pointer;border-radius:3px;transition:all .15s}
.thread-concept-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.thread-concept-name{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.8px;color:var(--txt2);display:block;margin-bottom:4px}
.thread-concept-chain{font-size:11px;color:var(--txt3);line-height:1.5}
.thread-back-btn{background:none;border:none;padding:0;cursor:pointer;font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--amber-b);text-transform:uppercase;transition:opacity .15s}
.thread-back-btn:hover{opacity:.7}
.thread-active-title{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--amber-b);margin:10px 0 14px}
.thread-steps-grid{display:flex;flex-direction:column;align-items:center;padding:4px 0 16px}
.thread-step{width:min(360px,90%);text-align:center;padding:10px 14px;border:1px solid var(--bdr2);border-radius:4px;font-size:12.5px;color:var(--txt2);background:var(--panel2)}
.thread-step-yr{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);margin-bottom:4px}
.thread-step-txt{line-height:1.6;color:var(--txt2)}
.thread-step-civ{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);margin-bottom:4px}
.thread-chain-link{display:flex;flex-direction:column;align-items:center;padding:2px 0;color:var(--amber-b);opacity:.6}
.thread-chain-line{width:1px;height:8px;background:var(--amber-b);opacity:.4}

/* ── COMPARE MODE ── */
.compare-wrap{display:flex;gap:0;height:100%;width:100%}
.compare-col{flex:1;min-width:0;overflow-y:auto;padding:16px;border-right:1px solid var(--bdr)}
.compare-col:last-child{border-right:none}
.compare-col-hdr{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--amber-b);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.compare-remove{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:14px;padding:2px}
.compare-remove:hover{color:var(--amber-b)}
.compare-prompt{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--txt3);font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:20px;opacity:.6}
.compare-diff{background:var(--amber-xx);border-left:2px solid var(--amber-b);padding:6px 8px;margin-bottom:2px}

/* ── SHARE TOAST ── */
.share-toast{position:fixed;bottom:108px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--panel);border:1px solid var(--bdr);padding:8px 18px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1.5px;color:var(--amber-b);text-transform:uppercase;border-radius:20px;opacity:0;transition:all .3s;pointer-events:none;z-index:500;white-space:nowrap}
.share-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── FINGERPRINT CHART ── */
.fp-wrap{margin:14px 0 6px}
.fp-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--txt3);text-transform:uppercase;margin-bottom:8px}
.fp-svg{display:block;margin:0 auto}
.fp-label{font-family:'Cinzel',serif;font-size:8px;fill:var(--txt3)}
.fp-poly{fill:rgba(212,168,32,.18);stroke:#d4a820;stroke-width:1.2}
.fp-grid{fill:none;stroke:var(--bdr);stroke-width:.5}

/* ── CONTEMPORARY BAR ── */
.contemp-wrap{margin:12px 0 4px}
.contemp-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;cursor:pointer;transition:opacity .15s}
.contemp-bar-row:hover{opacity:.75}
.contemp-bar-nm{font-family:'Cinzel',serif;font-size:8.5px;color:var(--txt3);width:80px;flex-shrink:0;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.contemp-bar-track{flex:1;height:5px;background:var(--bdr2);border-radius:2px;position:relative}
.contemp-bar-fill{position:absolute;top:0;height:100%;border-radius:2px;opacity:.7}
.contemp-bar-yr{font-family:'Cinzel',serif;font-size:7.5px;color:var(--txt3);white-space:nowrap;width:60px;text-align:right;flex-shrink:0}

/* ── DENSITY SPARKLINE ── */
#density-bar{height:18px;width:100%;display:block;margin-bottom:1px}

/* ── WHAT-IF MODE ── */
.whatif-civ-btn{width:100%;background:none;border:1px solid var(--bdr2);padding:7px 10px;text-align:left;cursor:pointer;font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:.5px;color:var(--txt2);margin-bottom:3px;border-radius:2px;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.whatif-civ-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.whatif-civ-btn.selected{background:rgba(212,168,32,.12);border-color:#d4a820;color:#d4a820}
.whatif-result{margin-top:12px;padding:12px;border:1px solid var(--bdr);border-radius:3px;background:var(--panel2)}

<script>
// ── LENSES ──

const ERAS=[
  {y:-6000,n:'PRE-MONETARY EXCHANGE'},
  {y:-3000,n:'EARLY COMMODITY MONEY'},
  {y:-1000,n:'FIRST COINAGES'},
  {y:-500,n:'CLASSICAL MONETARY SYSTEMS'},
  {y:0,n:'IMPERIAL CURRENCIES'},
  {y:500,n:'MEDIEVAL MONETARY ORDERS'},

  {y:1971,n:'FIAT CURRENCY AGE'},

  {y:2009,n:'CRYPTOCURRENCY AGE'},
];

const FP_LABELS=['Innovation','Reach','Longevity','Stability','Trade Impact','Institutional'];
const FP_KEYS=['innov','reach','lon','stab','trade','inst'];

const ITEMS=[
  {id:'silver',fp:{innov:9,reach:7,lon:10,stab:7,trade:9,inst:8},lon:46.1,lat:30.96,nm:'Mesopotamian Silver',sb:'Ur · Commodity Money',s:-3000,e:-500,
   conns:['lydian','cowrie','salt'],
   overview:'Silver became the first widely accepted medium of exchange in Mesopotamia around 3000 BCE, weighed in shekels and standardised by temple authorities. The temples of Ur functioned as both banks and mints, storing silver and issuing receipts that themselves circulated as currency. This system created the first credit economy: merchants could borrow silver at interest, recorded on clay tablets that constitute humanity\'s oldest financial documents. The shekel was not a coin but a weight — roughly 8.3 grams — and the tension between measured commodity and abstract unit of account began here and has never been resolved.',
   d:{
    overview:'Silver became the first widely accepted medium of exchange in Mesopotamia around 3000 BCE, weighed in shekels and standardised by temple authorities. The temples of Ur functioned as both banks and mints, storing silver and issuing receipts that themselves circulated as currency. This system created the first credit economy: merchants could borrow silver at interest, recorded on clay tablets that constitute humanity\'s oldest financial documents. The shekel was not a coin but a weight — roughly 8.3 grams — and the tension between measured commodity and abstract unit of account began here and has never been resolved.',
    currency:'Silver was weighed, not coined — merchants carried balance scales and standardised weights to verify payments. The shekel (approximately 8.3 grams) became the base unit, with the mina (60 shekels) and talent (60 minae) forming a sexagesimal hierarchy that influenced all subsequent weight-based monetary systems. Barley served as a secondary currency for smaller transactions, establishing the world\'s first bimetallic standard. The quality of silver varied significantly, requiring assayers at every major transaction point.',
    banking:'The temples of Ur and Babylon functioned as the world\'s first banks, accepting deposits of grain and silver, making loans at regulated interest rates (typically 20% per annum for silver, 33% for grain), and issuing clay tablet receipts that circulated as negotiable instruments. The Code of Hammurabi (c.1754 BCE) regulated banking practices in detail, specifying maximum interest rates, collateral requirements, and penalties for fraud — the world\'s first banking regulation.',
    trade:'Mesopotamian silver facilitated the first long-distance trade networks, connecting the Indus Valley, Egypt, Anatolia, and the Persian Gulf. Merchant houses (tamkārum) operated as international trading firms, extending credit across borders and maintaining agents in foreign cities. Silver\'s portability and divisibility made it the ideal medium for caravan trade across thousands of miles where no single political authority prevailed.',
    taxation:'Temple tithes and royal taxes were assessed in silver or grain equivalents, creating the first systematic tax collection apparatus. Tax farmers — private contractors who paid the king a lump sum and then collected taxes themselves — appear in Mesopotamian records, establishing a pattern that would persist for four thousand years through Roman publicani to Ottoman tax farming.',
    inflation:'Silver supply fluctuations caused periodic price instability. The conquest of new silver sources could crash local prices, while supply disruptions caused deflation. The simultaneous use of silver and barley as parallel currencies created arbitrage opportunities and exchange rate volatility that Mesopotamian merchants exploited and complained about in equal measure.',
    labor:'Workers were typically paid in barley rations — measured daily allotments that varied by gender, age, and skill level. Skilled artisans received larger portions, and master craftsmen might be paid in silver. The surviving ration lists from Ur III (c.2100 BCE) constitute the world\'s first payroll records, documenting a wage hierarchy that would be recognisable in any modern organisation.',
    debt:'Mesopotamia invented interest-bearing debt. Loans of silver at 20% annual interest and grain at 33% were standard, documented on clay tablets that served as legally binding contracts. Debt slavery — where defaulting borrowers or their family members became bonded laborers — was common enough to prompt periodic royal debt amnesties (andurārum), the first recorded debt jubilees.',
    monopoly:'Temple complexes held near-monopolies on silver storage and lending, functioning simultaneously as religious institutions, granaries, and central banks. The palace competed with temples for economic control, creating a dual-sector economy. Royal monopolies on certain trade goods (metals, luxury items) restricted market access and directed profits toward the state.',
    colonialism:'Mesopotamian city-states extracted tribute from conquered territories, establishing the first colonial economic relationships. The Akkadian Empire (c.2334–2154 BCE) systematised tribute extraction from peripheral regions, draining resources from conquered peoples to fund the imperial centre — a pattern that would repeat across every subsequent colonial system.',
    technology:'The invention of the balance scale, standardised weights, clay tablet accounting, and sealed containers for silver transport constituted a technological revolution in financial infrastructure. The abacus originated here as a counting device for commercial calculation. Cylinder seals served as signatures and anti-fraud devices on financial documents.',
    inequality:'Mesopotamian society was stratified into free citizens, dependent workers (muškenum), and slaves, with wealth concentrated in temple and palace elites. The Gini coefficient of ancient Mesopotamian cities would have been extreme by modern standards. Periodic debt crises forced subsistence farmers into bondage, concentrating land ownership in ever fewer hands.',
    philosophy:'The Mesopotamians developed no formal economic philosophy but embedded economic principles in legal codes and wisdom literature. The Dialogue of Pessimism questions whether wealth brings happiness. The Code of Hammurabi implicitly argues for regulated markets and state intervention to prevent exploitation — economic philosophy expressed through law rather than treatise.',
    policy:'Price controls on essential goods, maximum interest rates, mandatory wages for certain occupations, and periodic debt cancellations constituted the world\'s first economic policy framework. The Ur III dynasty (c.2112–2004 BCE) attempted centralised economic planning on a scale not seen again until the 20th century, documenting every transaction in a bureaucratic system of staggering complexity.',
    crisis:'The collapse of the Akkadian Empire (c.2154 BCE), likely caused by severe drought, disrupted trade networks and caused the first documented economic depression. The subsequent Dark Age saw trade volumes collapse, silver hoarding increase, and urban populations decline — a pattern of crisis, hoarding, and contraction that would repeat throughout monetary history.',
    legacy:'The shekel survives as Israel\'s modern currency. Interest-bearing loans, balance-scale accounting, and the concept of money as a standardised weight rather than an arbitrary token all originate in Mesopotamian practice. The fundamental tension between commodity money and credit money was first articulated on Sumerian clay tablets.',
    figures:'Rim-Sin of Larsa issued one of the earliest known debt amnesties. Hammurabi codified financial law. The merchant Ea-nasir of Ur became history\'s first documented bad businessman — a clay tablet complaint about his copper quality survives as the world\'s oldest customer complaint letter.',
    innovation:'The clay tablet as financial document, the sealed bulla as tamper-proof container, the cylinder seal as signature device, and the standardised weight system as basis for exchange — Mesopotamia invented the entire infrastructure of financial transactions that subsequent civilisations inherited and refined.',
    resistance:'Periodic debt amnesties (andurārum) were royal responses to social unrest caused by debt accumulation. The concept that unsustainable debt could be cancelled by fiat — that the social contract trumped the private contract — originated here and remains one of the most radical economic ideas in history.',
    globalisation:'Mesopotamian silver connected economies from the Indus Valley to Egypt, creating the first intercontinental economic system. Standardised weights allowed value comparison across political boundaries. The merchant networks radiating from Ur and Babylon constituted the first globalised trade system, linking diverse economies through a common medium of exchange.',
   }},
  {id:'lydian',fp:{innov:10,reach:8,lon:3,stab:6,trade:8,inst:7},lon:28.0,lat:38.5,nm:'Lydian Coinage',sb:'Sardis · First True Coins',s:-640,e:-546,
   conns:['silver','athenian','denarius'],
   overview:'Around 640 BCE in the kingdom of Lydia (modern western Turkey), someone — probably King Alyattes — had the revolutionary idea of stamping a guaranteed weight of electrum (a natural gold-silver alloy) with a royal seal, creating the world\'s first true coins. This was not merely a convenience but a conceptual revolution: the state guaranteed the value, transforming money from weighed commodity into certified token. Croesus refined the system by separating gold and silver into distinct denominations, creating the first bimetallic coinage. The phrase "rich as Croesus" survived the kingdom itself by two and a half millennia.',
   d:{
    overview:'Around 640 BCE in the kingdom of Lydia, someone — probably King Alyattes — had the revolutionary idea of stamping a guaranteed weight of electrum with a royal seal, creating the world\'s first true coins. This was not merely a convenience but a conceptual revolution: the state guaranteed the value, transforming money from weighed commodity into certified token. Croesus refined the system by separating gold and silver into distinct denominations, creating the first bimetallic coinage.',
    currency:'The earliest Lydian coins were bean-shaped lumps of electrum (a natural gold-silver alloy) stamped with a lion\'s head — the royal symbol. Croesus (r. 560–546 BCE) introduced the first bimetallic system: pure gold staters and silver half-staters at a fixed exchange ratio. This innovation solved the fundamental problem of electrum coinage — its variable natural composition — by standardising purity through refining technology.',
    banking:'Lydian money-changers and bankers emerged as a professional class to handle the new coinage, establishing exchange services in the agora of Sardis. The concentration of wealth in coin form enabled the first private banking operations distinct from temple finance. Sardis became the first city where private wealth could be stored, transferred, and lent through purely secular financial institutions.',
    trade:'Lydian coins rapidly spread throughout the Aegean and Mediterranean, accelerating commerce by eliminating the need to weigh and assay metal at every transaction. Greek city-states adopted and adapted Lydian coinage within decades, creating competing monetary systems that facilitated but also complicated international trade. The coin as a portable, verifiable store of value transformed the speed and scale of commercial exchange.',
    taxation:'Coins made tax collection dramatically more efficient — assessments could be standardised, payments verified instantly, and state revenue stored compactly. Lydia\'s wealth (the gold-bearing River Pactolus flowed through Sardis) funded a powerful military and monumental architecture, demonstrating the fiscal advantages of coined money over weighed metal.',
    inflation:'The introduction of coins created new inflationary risks: rulers could debase coinage by reducing precious metal content while maintaining face value. This temptation, first available to Lydian kings, would prove irresistible to virtually every subsequent ruler who controlled a mint. The gap between intrinsic value and face value — seigniorage — became a permanent feature of monetary systems.',
    labor:'Coined money transformed labor markets by enabling standardised wage payments. Workers could be paid precise amounts without the inconvenience of weighing metal, and the portability of coins allowed labor mobility — workers could carry their savings to new cities. The coin wage replaced the ration payment, fundamentally altering the relationship between employer and employee.',
    debt:'Coins made lending simpler and more transparent: amounts could be specified exactly, interest calculated precisely, and repayment verified instantly. This facilitated the expansion of private credit beyond temple-controlled lending, creating the first competitive credit markets where multiple lenders competed for borrowers.',
    monopoly:'The royal mint was a state monopoly — only the king could produce coins, and counterfeiting was punishable by death. This monopoly gave rulers control over money supply and the ability to profit from seigniorage. The mint monopoly established the principle that money creation is a sovereign prerogative, a concept that persists in every modern central bank.',
    colonialism:'Lydian monetary innovation was adopted by the Persian Empire after Cyrus conquered Lydia in 546 BCE. The Persian daric — modeled on Lydian gold staters — became the first imperial currency, circulating from Egypt to India. Lydian coinage technology was thus transmitted through conquest, establishing a pattern where monetary systems spread through colonial expansion.',
    technology:'The technical innovations required to produce standardised coins — metal refining to separate gold from silver, die cutting for consistent imagery, weight standardisation within narrow tolerances — represented a significant advance in metallurgical and manufacturing technology. Lydian refiners invented the technique of cementation to separate gold from silver using salt and heat.',
    inequality:'Coined money accelerated wealth concentration by making accumulation easier and more liquid. The proverbial wealth of Croesus represented a new phenomenon: private wealth on a scale previously possible only for states. Coins enabled individuals to accumulate portable, durable, and universally accepted wealth independent of land or political position.',
    philosophy:'The invention of coinage coincided with and arguably stimulated the birth of Greek philosophy. Aristotle later analysed money as a social convention — not intrinsically valuable but valuable by agreement. The Lydian innovation raised fundamental questions about the nature of value that philosophers have debated ever since: is money a commodity or a symbol?',
    policy:'Croesus\'s decision to create separate gold and silver coinages at a fixed ratio was the first deliberate monetary policy decision. By setting the gold-to-silver ratio, the king determined relative prices throughout his economy. This power to set exchange rates through mint policy became a central tool of state economic management.',
    crisis:'The Persian conquest of Lydia (546 BCE) destroyed the kingdom but not its monetary innovation. Croesus himself was reportedly captured while trying to flee with his gold. The fall of Lydia demonstrated that monetary wealth could not substitute for military power — a lesson repeatedly relearned throughout history.',
    legacy:'Every coin in your pocket descends from Lydian innovation. The concept of state-guaranteed, standardised, portable money tokens is the single most consequential financial invention in human history. The word "coin" ultimately derives from the Latin "cuneus" (wedge), but the practice derives from Sardis.',
    figures:'Alyattes (r. c.610–560 BCE) likely introduced the first coins. His son Croesus (r. 560–546 BCE) perfected bimetallic coinage and became the ancient world\'s symbol of wealth. Herodotus, writing a century later, called the Lydians "the first people we know of to strike and use gold and silver coins."',
    innovation:'The conceptual leap from weighed metal to certified coin was perhaps the greatest single innovation in monetary history. It required not just metallurgical skill but a new social institution: state guarantee of value. Every subsequent form of money — paper currency, digital payments, cryptocurrency — builds on this Lydian foundation of institutional trust.',
    resistance:'The populations of conquered Greek cities initially resisted Lydian coinage, preferring their traditional barter and weighed-metal systems. The adoption of coinage was not voluntary in many cases but imposed through tribute requirements denominated in coins — economic resistance overcome by political power.',
    globalisation:'Lydian coinage spread across the ancient world with remarkable speed — within a century, independent coinages had appeared from Spain to India. The technology of guaranteed-value tokens proved so useful that no society that encountered it failed to adopt it. This was perhaps the fastest voluntary adoption of a financial innovation until the spread of paper money.',
   }},
  {id:'athenian',fp:{innov:8,reach:9,lon:7,stab:8,trade:9,inst:8},lon:23.7,lat:37.97,nm:'Athenian Owl',sb:'Athens · Silver Drachma',s:-594,e:-322,
   conns:['lydian','denarius','florin'],
   overview:'The silver tetradrachm of Athens — bearing Athena\'s owl on its reverse — became the first international reserve currency, accepted from Spain to Afghanistan purely on the strength of its consistent silver content and the commercial reputation of Athens. Minted from the rich silver mines of Laurion, these coins funded the Athenian navy that defeated Persia, the Parthenon that crowned the Acropolis, and the democracy that invented Western political life. Athens understood what modern central bankers still preach: the value of a currency rests on trust, and trust rests on consistency.',
   d:{
    overview:'The silver tetradrachm of Athens — bearing Athena\'s owl on its reverse — became the first international reserve currency, accepted from Spain to Afghanistan purely on the strength of its consistent silver content and the commercial reputation of Athens. Minted from the rich silver mines of Laurion, these coins funded the Athenian navy, the Parthenon, and the democracy that invented Western political life.',
    currency:'The Athenian owl tetradrachm maintained its weight (approximately 17.2 grams) and purity (over 90% silver) for over two centuries — an extraordinary achievement in monetary consistency. Athens deliberately refused to debase its coinage even during the financial pressures of the Peloponnesian War, understanding that the owl\'s commercial reputation was worth more than short-term seigniorage gains. The coin\'s distinctive design made counterfeiting difficult and authenticity instantly verifiable.',
    banking:'The trapezitai (table-men, from their counting tables) of Athens constituted the ancient world\'s most sophisticated private banking sector. Pasion, a freed slave, became Athens\' wealthiest banker, accepting deposits, making loans, facilitating international transfers, and even issuing letters of credit — financial services indistinguishable from those of a modern commercial bank.',
    trade:'Athenian owls circulated as the de facto reserve currency of the Mediterranean world. Their consistent quality meant they were accepted without assay from the Pillars of Hercules to the Hindu Kush. Athens leveraged this monetary hegemony to dominate grain trade, requiring allies to use Athenian weights, measures, and coinage — the first currency imperialism.',
    taxation:'Athens funded its empire through the Delian League treasury — tribute from allied (and subject) states originally intended for collective defence but increasingly directed toward Athenian building projects and domestic spending. Pericles diverted League funds to build the Parthenon, creating one of history\'s most beautiful examples of imperial misappropriation.',
    inflation:'Athens maintained remarkably stable prices through consistent coinage for most of its classical period. The exception came during the Peloponnesian War (431–404 BCE), when wartime expenditure, disruption of Laurion\'s silver mines, and the loss of tribute income created fiscal pressure. The emergency gold coinage of 407 BCE and bronze-plated coins of 406 BCE marked the only debasements in over 150 years.',
    labor:'The silver mines of Laurion employed an estimated 20,000 slaves in brutal conditions — the dark foundation of Athenian monetary supremacy. Free Athenian citizens earned daily wages of about one drachma (6 obols) for skilled labor, a sum sufficient to feed a family. The contrast between citizen prosperity and slave misery was the unspoken economic foundation of Athenian democracy.',
    debt:'Solon\'s seisachtheia (shaking off of burdens, 594 BCE) cancelled existing debts and freed Athenians who had been enslaved for debt — the most consequential debt relief programme in ancient history. This act, which preceded the adoption of coinage, established the principle that democratic governance requires preventing debt from becoming a mechanism of permanent social stratification.',
    monopoly:'Athens maintained a de facto monopoly on high-quality silver coinage in the eastern Mediterranean, enforcing this through the Standards Decree (c.449 BCE), which required allied states to use Athenian weights and measures. This monetary imperialism generated enormous seigniorage profits and commercial advantages for Athens.',
    colonialism:'The Delian League (478–404 BCE) evolved from a voluntary defensive alliance into an Athenian empire that extracted tribute in silver from over 200 subject states. The annual tribute of approximately 600 talents funded Athenian naval supremacy and domestic prosperity. When Naxos tried to leave the League, Athens besieged and conquered it — the first colony forced to remain in an economic union.',
    technology:'Laurion\'s silver extraction required sophisticated mining technology — shaft mines reaching 100 metres depth, ventilation systems, ore-crushing facilities, and cupellation furnaces for silver refinement. The scale of industrial organisation at Laurion was not matched in European mining until the 16th century.',
    inequality:'Athenian democracy coexisted with extreme economic inequality. Perhaps 30% of Athens\' population were slaves with no economic rights. Among free citizens, wealth disparities were significant but partially mitigated by liturgies — compulsory contributions from the wealthy to fund public services. The trierarchy (funding a warship) was both patriotic duty and status display.',
    philosophy:'Aristotle distinguished between natural wealth acquisition (oikonomia — household management, from which "economics" derives) and unnatural wealth acquisition (chrematistike — money-making for its own sake). Plato\'s Republic banned private property for guardian classes. Xenophon\'s Oikonomikos is the first economic treatise. Athens invented economic philosophy alongside its coinage.',
    policy:'Athens pursued an explicitly mercantilist policy — controlling grain imports, requiring tribute in silver, enforcing its currency standards on allies, and using the Piraeus as a commercial hub where favourable trade terms attracted merchants from across the Mediterranean. Athenian economic policy was as sophisticated as its political philosophy.',
    crisis:'The Peloponnesian War (431–404 BCE) bankrupted Athens. The Spartan occupation of Decelea cut off Laurion\'s silver supply. Emergency measures included melting gold statues and issuing debased coinage. Athens\' defeat demonstrated that monetary power depends on political and military security — a lesson the British pound would relearn in the 20th century.',
    legacy:'The concept of a trusted reserve currency — accepted internationally on the basis of consistent quality and institutional credibility — originates with the Athenian owl. The word "drachma" survived as the Greek currency unit until 2002, when it was replaced by the euro. Athens proved that monetary credibility, once established, can survive military defeat.',
    figures:'Solon (c.638–558 BCE) reformed Athenian coinage and cancelled debts. Pericles (c.495–429 BCE) used Delian League silver to fund Athens\' golden age. Pasion (d.370 BCE), a freed slave, became the ancient world\'s most successful banker. Aristophanes satirised monetary policy in The Frogs, where bad money drives out good — anticipating Gresham\'s Law by two millennia.',
    innovation:'The Athenian owl represented the first successful international reserve currency — a coin accepted across cultural and political boundaries purely on the basis of quality and trust. Athens also pioneered maritime insurance, commodity futures (grain contracts), and public finance through the liturgy system.',
    resistance:'Allied states periodically revolted against Athenian monetary imperialism. Mytilene, Melos, and other subject states resisted the imposition of Athenian coinage standards, viewing monetary independence as inseparable from political sovereignty. Athens crushed these revolts with force, establishing the principle that monetary hegemony requires military backing.',
    globalisation:'The Athenian owl circulated from Spain to Central Asia, creating the first Mediterranean-wide monetary standard. Hoards of Athenian owls have been found in Egypt, Persia, India, and even China, demonstrating a level of economic interconnection not surpassed until the modern era.',
   }},
  {id:'denarius',fp:{innov:7,reach:10,lon:9,stab:5,trade:9,inst:9},lon:12.5,lat:41.9,nm:'Roman Denarius',sb:'Rome · Imperial Currency',s:-211,e:300,
   conns:['athenian','sterling','dinar'],
   overview:'The Roman denarius — introduced around 211 BCE and debased into oblivion by the 3rd century CE — was the currency of the largest and most sophisticated economy the ancient world had known. At its peak, the Roman monetary system supported an economy of perhaps 70 million people across three continents, with financial instruments including banking, insurance, investment partnerships, and government bonds. The denarius\'s slow debasement from nearly pure silver to less than 5% silver content is history\'s most instructive lesson in monetary degradation: empires that debase their currency eventually debase themselves.',
   d:{
    overview:'The Roman denarius — introduced around 211 BCE and debased into oblivion by the 3rd century CE — was the currency of the largest and most sophisticated economy the ancient world had known. At its peak, the Roman monetary system supported an economy of perhaps 70 million people across three continents.',
    currency:'The denarius began as a 4.5-gram coin of nearly pure silver. By the reign of Nero (54–68 CE), it had been reduced to 3.4 grams at 93% purity. Under Septimius Severus (193–211 CE), purity dropped to 50%. By the reign of Gallienus (253–268 CE), the denarius contained less than 5% silver — a 95% debasement over four centuries that stands as history\'s most thoroughly documented inflation.',
    banking:'Roman argentarii (bankers) offered a full range of modern banking services: deposits, loans, money changing, bill payment, and letters of credit. The publicani formed joint-stock companies to bid for tax farming contracts — Rome\'s equivalent of modern corporations. Marcus Crassus, the richest Roman, made his fortune through banking, real estate speculation, and buying burning buildings at discount.',
    trade:'The Roman Empire created the largest free-trade zone in history until the modern era. The denarius circulated from Britain to Mesopotamia, from the Rhine to the Sahara. Roman trade with India and China — documented by archaeological finds of Roman coins in southern India and Chinese silk in Roman tombs — represented the first truly global trade network.',
    taxation:'The Roman tax system included direct taxes (tributum soli on land, tributum capitis on persons), indirect taxes (portoria on trade, centesima rerum venalium — a 1% sales tax), and inheritance taxes (vicesima hereditatium — a 5% estate tax introduced by Augustus). Tax farming by publicani was eventually replaced by direct imperial collection, one of the most significant administrative reforms in fiscal history.',
    inflation:'The debasement of the denarius produced a sustained inflation that accelerated through the 3rd century CE. Diocletian\'s Edict on Maximum Prices (301 CE) — which set price ceilings on over 1,000 goods and services — represents history\'s most comprehensive attempt at price control, and its abject failure demonstrated the futility of fighting monetary inflation with administrative fiat.',
    labor:'Roman wages are unusually well documented. A legionary soldier earned 225 denarii per year under Augustus, rising to 300 under Domitian, with deductions for food, equipment, and burial insurance. Skilled urban workers earned 12–15 denarii per month. The existence of a proletariat — citizens too poor to own property — gave Rome its modern political term.',
    debt:'Roman law developed sophisticated debt instruments: the stipulatio (verbal contract), the chirographum (written bond), and the syngrapha (witnessed instrument). Interest rates were regulated at 12% annually. Debt crises periodically convulsed the Republic — the conflict between debtors and creditors was the central political tension from the Struggle of the Orders to the fall of the Republic.',
    monopoly:'The Roman state maintained monopolies on salt production, mining, and certain manufacturing. The grain supply (annona) was effectively a state-controlled market, with the praefectus annonae managing imports from Egypt and North Africa. Imperial monopolies on purple dye, silk, and certain spices generated significant revenue.',
    colonialism:'Rome extracted enormous wealth from provinces through taxation, tribute, and outright plunder. The conquest of Macedon (167 BCE) brought so much gold to Rome that direct taxes on Roman citizens were suspended. Egypt\'s grain surplus fed the city of Rome. Provincial exploitation funded Roman prosperity — the most systematic colonial extraction system before the modern European empires.',
    technology:'Rome developed advanced financial technology including standardised coinage across three metals (gold aureus, silver denarius, bronze sestertius), a sophisticated system of government accounts, and banking networks that facilitated trade across three continents. Roman road infrastructure — 80,000 km of paved highways — was built primarily to facilitate military and commercial movement.',
    inequality:'Roman wealth inequality was extreme. During the late Republic, the richest 1% may have controlled over 16% of total wealth. Crassus\'s fortune was estimated at 200 million sestertii — roughly equivalent to the entire annual Roman military budget. The patron-client system institutionalised economic dependency, while the latifundia system concentrated agricultural land in aristocratic hands.',
    philosophy:'Cicero distinguished between honourable and dishonourable forms of wealth acquisition, placing agriculture first and retail trade last. Seneca, one of the richest men in Rome, wrote philosophical treatises on the unimportance of wealth. Roman economic thought emphasised the moral dimensions of commerce and the corrupting potential of excessive wealth.',
    policy:'Augustus\'s monetary reform — establishing the gold aureus, silver denarius, and bronze sestertius at fixed ratios — created the most sophisticated multi-metal monetary system in the ancient world. The aerarium (state treasury) and the fiscus (emperor\'s private treasury) managed public finances. The annona system guaranteed free or subsidised grain to Rome\'s urban poor.',
    crisis:'The Crisis of the Third Century (235–284 CE) saw the denarius collapse to less than 5% silver content, hyperinflation destabilise the economy, and the empire fragment into competing states. Diocletian\'s reforms (284–305 CE) — including a new coinage system and maximum price edicts — temporarily stabilised the situation but could not reverse the fundamental monetary degradation.',
    legacy:'The denarius gave its name to the dinar (still used across the Islamic world), the denier (medieval French), and the penny (abbreviated "d" from denarius until decimalisation in 1971). Roman monetary vocabulary, financial law, and institutional structures were transmitted through Byzantine, Islamic, and medieval European systems to the modern world.',
    figures:'Augustus (63 BCE–14 CE) created the most sophisticated monetary system of antiquity. Nero began the fateful debasement. Diocletian attempted the most comprehensive price controls in history. Marcus Licinius Crassus (c.115–53 BCE) became history\'s first financial mogul, assembling a fortune through banking, real estate, and slave-worked silver mines.',
    innovation:'Rome\'s monetary innovations included: the first tri-metallic currency system (gold, silver, bronze at fixed ratios), government-backed grain distributions (proto-welfare state), joint-stock companies (publicani), maritime insurance, and standardised weights and measures across an empire spanning three continents. Roman financial law remains the foundation of modern commercial law.',
    resistance:'Provincial resistance to Roman taxation was a constant feature of imperial governance. The Jewish revolt of 66 CE was partly triggered by Roman tax extraction. Boudicca\'s revolt in Britain (60/61 CE) was sparked by debt collection and property confiscation. The Bagaudae revolts in Gaul (3rd–5th century) were peasant uprisings against crushing tax burdens.',
    globalisation:'The Roman Empire created history\'s first truly global economic system. Roman coins have been found in Vietnam, Ethiopia, India, and China. The monsoon trade route to India, the Silk Road to China, and the trans-Saharan gold trade connected Rome to virtually every major economy on earth. Annual Roman imports from India alone may have reached 50 million sestertii.',
   }},
  {id:'cashcoins',fp:{innov:9,reach:8,lon:10,stab:7,trade:8,inst:9},lon:108.9,lat:34.3,nm:'Chinese Cash Coins',sb:'Xi\'an · Bronze Round Coins',s:-600,e:1912,
   conns:['silkroad','songmoney','yuan'],
   overview:'China\'s round bronze coins with square central holes — cash coins (qian) — were produced continuously for over 2,500 years, making them the longest-running currency system in human history. Strung on cords in strings of 100 or 1,000, they formed the backbone of the world\'s largest economy for most of recorded history. China also invented paper money, promissory notes, and government-backed fiat currency centuries before Europe. The Chinese monetary experience is the longest sustained experiment in state-managed currency the world has ever seen.',
   d:{
    overview:'China\'s round bronze coins with square central holes — cash coins — were produced continuously for over 2,500 years, making them the longest-running currency system in human history. China also invented paper money, promissory notes, and fiat currency centuries before Europe.',
    currency:'The ban liang coin, introduced by Qin Shi Huang after unification in 221 BCE, standardised Chinese currency: round bronze coins with square holes, strung on cords. This design persisted with minimal variation until 1912. The square hole was both practical (stringing) and cosmological (the round coin represented heaven, the square hole earth). The wu zhu coin of the Han Dynasty (118 BCE) became the standard for 700 years.',
    banking:'Chinese pawnshops (diandang) operated from at least the 5th century CE, lending against collateral. The flying money (feiqian) system of the Tang Dynasty (618–907 CE) created the world\'s first paper transfer system — merchants deposited cash in the capital and received certificates redeemable at provincial offices, eliminating the risk and cost of transporting heavy coins.',
    trade:'Cash coins facilitated the largest internal market in the pre-modern world. The Grand Canal connected northern and southern China, enabling trade flows that dwarfed anything in contemporary Europe. Chinese cash coins also circulated widely in Japan, Korea, Vietnam, and Southeast Asia, creating an East Asian monetary zone centred on Chinese currency.',
    taxation:'Chinese tax systems evolved from grain-based to money-based over millennia. The Single Whip Reform of 1581 consolidated all taxes into a single silver payment, dramatically simplifying collection but also increasing the monetisation of the rural economy. Tax collection efficiency was a primary driver of Chinese monetary innovation.',
    inflation:'China experienced history\'s first paper money hyperinflation under the Yuan (Mongol) Dynasty (1271–1368), when the government printed increasingly large quantities of unsecured paper notes to finance military campaigns. The resulting inflation destroyed public confidence in paper money and contributed to the dynasty\'s collapse — a cautionary tale that preceded European paper money experiments by four centuries.',
    labor:'Chinese workers were among the most productive in the pre-modern world. Agricultural laborers earned cash wages supplemented by food and housing. The enormous labor mobilisation projects — the Great Wall, the Grand Canal — were funded through corvée labor obligations supplemented by cash payments, creating hybrid labor markets that combined coercion and compensation.',
    debt:'Chinese lending practices included pawnbroking, merchant credit, and informal lending networks. Interest rates were regulated by the state, typically capped at 36% annually. Debt bondage existed but was less systematic than in Mesopotamia or Rome. Buddhist monasteries became major lenders during the medieval period, creating a parallel religious banking system.',
    monopoly:'The Chinese state maintained monopolies on salt, iron, and tea at various periods — the Salt and Iron Debate of 81 BCE is the earliest recorded economic policy discussion. Government monopolies generated enormous revenue but also sparked philosophical debates about the proper role of the state in economic life that continue to this day.',
    colonialism:'China\'s tributary system required neighbouring states to acknowledge Chinese suzerainty in exchange for trading privileges. This system — covering Korea, Vietnam, Japan, and Southeast Asian polities — created an economic sphere dominated by Chinese monetary and commercial practices without requiring direct colonial administration.',
    technology:'China pioneered virtually every major monetary technology before Europe: bronze casting for coins (6th century BCE), paper money (7th century CE), government-backed fiat currency (11th century CE), and silver-based international trade currency (16th century CE). The scale of Chinese mint operations — producing billions of coins per year — was unmatched anywhere in the world.',
    inequality:'Chinese wealth distribution followed dynastic cycles: relatively equal at dynasty founding, increasingly concentrated as elites accumulated land and commercial wealth, culminating in peasant revolt and dynastic collapse. The examination system provided some social mobility, but structural inequality between landowners and tenants, merchants and farmers, persisted throughout.',
    philosophy:'Confucian economic thought prioritised agriculture over commerce, placing merchants at the bottom of the social hierarchy despite their wealth. Legalist thinkers advocated state control of the economy. The Guanzi text (4th–3rd century BCE) contains sophisticated discussions of monetary policy, supply and demand, and government intervention that anticipate modern economic thought by two millennia.',
    policy:'Chinese monetary policy was the most sophisticated in the pre-modern world. The state managed copper supply, regulated private minting, controlled silver imports, and experimented with paper money backed by various commodities. The failure of Yuan Dynasty paper money provided empirical evidence about the limits of fiat currency that European theorists could only speculate about.',
    crisis:'The silver crisis of the 1630s–1640s, caused by declining Spanish silver imports from the Americas, contributed to the fall of the Ming Dynasty (1644). This demonstrates how China\'s integration into the global silver economy made it vulnerable to supply disruptions originating on the other side of the world — an early example of globalised financial contagion.',
    legacy:'Chinese monetary innovations — paper money, government fiat currency, centralised monetary policy — were adopted by the Mongol Empire and transmitted westward, eventually reaching Europe. The concept of state-managed currency, as opposed to commodity-based money, originates in Chinese practice. China\'s modern economic rise reprises its historical role as the world\'s largest economy.',
    figures:'Qin Shi Huang standardised Chinese currency in 221 BCE. Emperor Wu of Han established the wu zhu coin standard. Wang Mao attempted radical monetary reform in 9 CE. The Mongol emperor Kublai Khan issued the first national paper currency. Zhang Juzheng implemented the Single Whip tax reform of 1581.',
    innovation:'China\'s monetary innovations include: the first standardised national coinage (221 BCE), the first paper money (7th century CE), the first government fiat currency (11th century CE), the first hyperinflation (14th century), and the first silver-standard economy (16th century). Each innovation preceded its European equivalent by centuries.',
    resistance:'Peasant resistance to monetary taxation was a recurring feature of Chinese history. The White Lotus rebellions, the Taiping Rebellion, and countless local uprisings were triggered by tax burdens denominated in money that subsistence farmers struggled to obtain. The tension between state monetary demands and rural subsistence economies persisted for millennia.',
    globalisation:'China was the centre of the world\'s largest pre-modern trading network. The Silk Road, the Maritime Silk Road, and the Indian Ocean trade routes all connected to Chinese markets. From the 16th century, China became the ultimate destination for most of the world\'s silver — American silver mined in Potosí ended up in Chinese coffers, creating the first truly global monetary system.',
   }},
  {id:'cowrie',fp:{innov:6,reach:9,lon:10,stab:8,trade:9,inst:5},lon:73.5,lat:4.2,nm:'Cowrie Shell Currency',sb:'Maldives · Shell Money of Africa & Asia',s:-1200,e:1900,
   conns:['silver','salt','dinar'],
   overview:'The small, glossy cowrie shell (Cypraea moneta) served as currency across a vast swathe of Africa, South Asia, East Asia, and the Pacific for over three thousand years, making it one of the most widely used and longest-lived forms of money in human history. Harvested primarily in the Maldive Islands and the coast of East Africa, cowries were light, durable, nearly impossible to counterfeit, and naturally standardised in size. They facilitated trade from the Niger River to the Yangtze, and their use persisted in parts of West Africa into the twentieth century, long after European colonial currencies were introduced.',
   d:{
    overview:'Cowrie shells served as money across Africa, South Asia, and the Pacific for over three millennia, making them one of history\'s most widespread currencies. Their natural uniformity, durability, and resistance to counterfeiting made them an almost ideal medium of exchange for societies without metalworking traditions.',
    currency:'The money cowrie (Cypraea moneta) and the ring cowrie (Cypraea annulus) were the two principal species used as currency. Their value derived from scarcity outside their oceanic harvesting zones, natural standardisation of size and weight, and cultural significance accumulated over centuries. In West Africa, cowries were counted in strings of 40, bunches of 200, heads of 2,000, and bags of 20,000 — a sophisticated counting system that facilitated transactions at every scale.',
    banking:'Cowrie-based banking was largely informal, relying on trusted merchants and clan networks rather than institutional structures. Wealthy traders in West Africa and the Indian Ocean rim accumulated vast stores of cowries, effectively acting as banks by extending credit and financing trade expeditions. The Maldivian rulers who controlled the primary harvesting grounds functioned as a kind of central bank, regulating supply through export controls.',
    trade:'Cowries were the lubricant of trans-Saharan, Indian Ocean, and Southeast Asian trade networks for millennia. Arab and later Portuguese, Dutch, and British traders used cowries as a medium of exchange throughout the Indian Ocean world. The shells traveled extraordinary distances — harvested in the Maldives, shipped to Bengal, traded across the Sahara to West Africa, and used to purchase gold, slaves, and ivory that entered European markets.',
    taxation:'African kingdoms such as Dahomey, Benin, and the Kongo collected taxes denominated in cowries, demonstrating the shells\' integration into state financial systems. The cowrie tax base gave rulers a strong incentive to control trade routes and shell imports. In some kingdoms, the monarch claimed a monopoly on cowrie importation, using control over the money supply as a tool of political power.',
    inflation:'Cowrie inflation occurred when Europeans massively increased shell imports to Africa in the 17th–19th centuries. The Dutch and British shipped enormous quantities of cowries from the Maldives and East Africa to West Africa, deliberately expanding the money supply to make African goods cheaper in cowrie terms. This monetary manipulation was a subtle but devastating form of economic exploitation that preceded formal colonialism.',
    labor:'Cowrie wages were common across West Africa, where agricultural laborers, porters, and domestic workers were paid in shells. The purchasing power of cowrie wages varied enormously by region and era, but they provided a flexible and divisible payment medium for small-scale labor. In many societies, cowrie-denominated bride-price payments represented the largest single financial transaction in a person\'s life.',
    debt:'Debt relationships denominated in cowries structured social life across West Africa and parts of South Asia. Lending at interest was common, with typical rates of 30–50% for agricultural loans. Failure to repay cowrie debts could result in debt bondage or enslavement — a connection between monetary debt and human bondage that profoundly shaped the social fabric of cowrie-using societies.',
    monopoly:'The Maldivian sultans held a natural monopoly on the primary source of money cowries, controlling harvesting rights and export volumes. This geographic monopoly gave the tiny island chain outsized geopolitical significance — Ibn Battuta noted in the 14th century that Maldivian cowries were the currency of choice from Bengal to Timbuktu. European colonial powers later sought to control or bypass this monopoly by sourcing cowries from East Africa.',
    colonialism:'European colonisers exploited cowrie currency systems through deliberate monetary inflation, flooding African markets with cheaply acquired shells to depress the terms of trade. The British, Dutch, and Portuguese all used cowries as instruments of colonial extraction. Colonial governments eventually suppressed cowrie currencies in favour of metropolitan coinage and paper money, destroying indigenous monetary sovereignty as a precondition for economic control.',
    technology:'Cowrie currency required no technology to produce — the shells were harvested, cleaned, and traded without modification. This technological simplicity was both a strength (no minting costs, impossible to counterfeit) and a limitation (supply depended on natural harvesting rather than deliberate production). The counting and stringing systems developed across Africa represented sophisticated indigenous financial technologies for managing shell-based transactions at scale.',
    inequality:'Cowrie-denominated wealth was distributed unevenly, with merchant elites and ruling families accumulating vast reserves while subsistence farmers held minimal stocks. The extreme portability of cowries made wealth easy to hide but also easy to loot, creating cycles of accumulation and dispossession. Gender dynamics varied — in some West African societies, women controlled significant cowrie wealth through market trading, giving them unusual economic autonomy.',
    philosophy:'In many African and South Asian cultures, cowries carried deep spiritual and cosmological significance beyond their monetary function. The shell\'s resemblance to a half-closed eye connected it to divination, fertility, and protection across diverse cultures. This dual nature — simultaneously sacred object and currency — challenges the Western assumption that money is a purely secular, rational institution.',
    policy:'African rulers managed cowrie monetary policy by controlling imports, setting exchange rates against gold and other commodities, and regulating market transactions. The kingdom of Dahomey maintained particularly sophisticated cowrie monetary management, adjusting the money supply to stabilise prices and finance military campaigns. These indigenous monetary policies demonstrated considerable economic sophistication despite operating without formal written economic theory.',
    crisis:'The great cowrie inflation of the 18th–19th centuries, driven by massive European imports, devastated West African economies. Prices in cowrie terms multiplied tenfold or more in some regions, wiping out savings and destabilising social hierarchies built on cowrie wealth. This monetary crisis weakened African states precisely when they faced the growing threat of European imperial expansion.',
    legacy:'The cowrie\'s legacy endures in language, culture, and symbolism across Africa and Asia. The Chinese character for "money" (貝/贝) depicts a cowrie shell, preserving the memory of shell currency in the world\'s most widely used writing system. Cowrie motifs appear in West African art, fashion, and spiritual practice to this day, and the shells remain symbols of wealth and fertility across the continent.',
    figures:'The sultans of the Maldives controlled the world\'s primary cowrie supply for centuries, making them quietly pivotal figures in global monetary history. Mansa Musa of Mali (r.1312–1337) ruled an empire where cowries and gold coexisted as complementary currencies. King Agaja of Dahomey (r.1718–1740) attempted to manage cowrie inflation while expanding his kingdom\'s trade networks.',
    innovation:'The cowrie represents one of humanity\'s earliest monetary innovations: the use of a naturally occurring, standardised object as a universal medium of exchange. The counting and stringing systems developed independently across Africa, South Asia, and China demonstrate convergent financial innovation. The cowrie\'s three-thousand-year run as currency remains one of the longest for any single monetary instrument.',
    resistance:'Resistance to cowrie currency often took the form of rejection — communities that had been impoverished by cowrie inflation sometimes refused to accept shells, reverting to barter or adopting alternative currencies. In colonial West Africa, indigenous resistance to the replacement of cowries by European coinage reflected a defence of economic sovereignty as much as monetary preference.',
    globalisation:'The cowrie shell created one of history\'s earliest global monetary networks, linking the Maldive Islands to West Africa, China to the Pacific Islands, and South Asia to Southeast Asia. This shell-based monetary globalisation preceded European maritime expansion by centuries and demonstrates that global economic integration is not a uniquely modern or Western phenomenon.',
   }},
  {id:'salt',fp:{innov:5,reach:7,lon:8,stab:6,trade:8,inst:4},lon:12.5,lat:41.9,nm:'Salt Currency',sb:'Rome & Sahara · Commodity Money',s:-500,e:1900,
   conns:['silver','cowrie','denarius'],
   overview:'Salt — essential for human survival, food preservation, and livestock health — served as currency across the Roman Empire, sub-Saharan Africa, and Central Asia for over two millennia. Roman soldiers may have received part of their pay in salt (the origin of "salary"), and blocks of rock salt functioned as standardised currency bars in Ethiopia, Tibet, and the Saharan trade routes. Salt\'s universal utility, relative scarcity in inland regions, and capacity for standardisation made it one of the most enduring commodity currencies in history.',
   d:{
    overview:'Salt served as both commodity and currency across the Roman world, sub-Saharan Africa, Tibet, and the Saharan trade routes for over two thousand years. Its universal necessity, portability in block form, and natural divisibility made it an effective medium of exchange wherever metal coinage was scarce.',
    currency:'Salt currency took various physical forms: the amole salt bars of Ethiopia (standardised rectangular blocks), the rock salt slabs traded across the Sahara, and the measured salt rations distributed in Roman military camps. Each form was shaped by local geology and trade practices but served the same monetary function. Salt\'s consumption in use meant it had a natural scarcity mechanism — unlike metal coins, salt money was literally consumed, preventing excessive accumulation.',
    banking:'Salt-based banking was minimal in the formal sense, but salt merchants operated as de facto financial intermediaries across the Saharan and Ethiopian trade networks. Wealthy salt traders extended credit, financed caravans, and maintained reserves that functioned as banking capital. In medieval Ethiopia, salt bars (amole) were deposited with trusted merchants who issued informal receipts, creating a proto-banking system in the absence of metallic currency.',
    trade:'The trans-Saharan salt trade was one of the great commercial enterprises of the medieval world. Salt mined at Taghaza and Taoudenni in the deep Sahara was carried by camel caravan to the markets of Timbuktu, Djenné, and Kano, where it was exchanged for gold, slaves, and other goods. The famous observation that salt was worth its weight in gold south of the Sahara, though somewhat exaggerated, captures the enormous value differentials that drove this trade.',
    taxation:'Roman salt taxes (vectigal salarium) were among the earliest excise duties, and control over salt production was a recurrent tool of state revenue across civilisations. In China, the salt monopoly was the single largest source of government revenue for much of imperial history. Ethiopian emperors taxed salt at every stage of production and transport, creating a fiscal system built on this essential commodity.',
    inflation:'Salt currency was subject to unique inflationary pressures. Discovery of new salt deposits could dramatically increase supply and reduce purchasing power, while blockades of trade routes could create severe deflation in salt-scarce regions. The gradual improvement of salt mining technology over the centuries tended to increase supply and reduce salt\'s monetary value, contributing to its eventual replacement by metallic currencies.',
    labor:'The Roman word "salary" derives from salarium, traditionally linked to salt rations or salt-purchase allowances given to soldiers. Whether or not Roman soldiers were literally paid in salt, the linguistic connection preserves the deep association between salt and labor compensation. In the Saharan salt mines of Taghaza, enslaved workers toiled in appalling conditions to produce the salt bars that served as currency across West Africa.',
    debt:'Salt debts structured economic relationships in regions where salt served as the primary medium of exchange. In highland Ethiopia, debts denominated in amole salt bars persisted into the twentieth century, with interest payments calculated in salt units. The perishability of salt compared to metal coins meant that hoarding was less practical, which may have reduced the severity of debt accumulation compared to metallic currency systems.',
    monopoly:'State salt monopolies were among the most common and profitable government enterprises in the pre-modern world. The Roman Republic controlled salt production at Ostia, China maintained a salt monopoly for over two thousand years, and various African kingdoms monopolised salt trade routes. These monopolies generated enormous revenues but also provoked resistance — Gandhi\'s Salt March of 1930 was a protest against the British colonial salt monopoly in India.',
    colonialism:'European colonial powers exploited salt as both a commodity and a tool of control. The British salt monopoly in India, which criminalized private salt production, was one of the most resented features of colonial rule. In Africa, colonial governments disrupted indigenous salt trade networks and imposed metropolitan currencies, undermining economic systems that had functioned effectively for centuries.',
    technology:'Salt production technology evolved from simple solar evaporation of seawater to deep mining of rock salt deposits. The salt pans of the Mediterranean, the deep mines of Wieliczka in Poland, and the solar evaporation terraces of the Sahara each represented distinct technological traditions. Standardisation of salt bars — uniform in weight and dimension — was itself a monetary technology comparable to coin minting.',
    inequality:'Control over salt sources and trade routes generated enormous wealth for merchant elites and ruling families while leaving producers — often enslaved miners and low-status salt workers — in poverty. The salt trade across the Sahara enriched the merchant cities of Timbuktu and Djenné while depending on the brutal labor of enslaved workers in the desert mines of Taghaza.',
    philosophy:'Salt\'s dual nature as life necessity and currency raises fundamental questions about the relationship between money and survival. Unlike gold, which is desired but not needed, salt is both biologically essential and historically monetary. This challenges the assumption that money must be intrinsically useless to function as a medium of exchange — salt proves that the most effective currencies can be those with direct use value.',
    policy:'Roman salt policy set important precedents for government commodity management. The state controlled production, set prices, and used salt distribution as a tool of social policy. The Chinese salt debate of 81 BCE (the Discourses on Salt and Iron) produced one of history\'s most sophisticated discussions of government monopoly versus free markets, with arguments that remain remarkably relevant to modern economic policy debates.',
    crisis:'Salt supply crises could trigger severe economic disruption in regions dependent on salt currency. The disruption of trans-Saharan trade routes during periods of political instability caused salt famines in West African markets, demonstrating the vulnerability of commodity-based monetary systems to supply-chain disruption. These crises often coincided with broader political upheaval, as states lost the revenue and legitimacy derived from controlling salt distribution.',
    legacy:'Salt\'s monetary legacy survives in language across many cultures: "salary" (English), "solde" (French), "sold" (Romanian), and the phrase "worth one\'s salt" all preserve the memory of salt as money. The association of salt with value, preservation, and essential worth runs deep in human culture, from biblical references to modern idioms. Salt\'s role as currency influenced the geography of cities, the routes of roads, and the structure of empires.',
    figures:'Marcus Livius Salinator earned his cognomen from reforming Rome\'s salt tax in the 3rd century BCE. Mansa Musa\'s Mali Empire derived much of its wealth from controlling the salt-gold exchange. Mahatma Gandhi chose salt as the symbol of resistance to British colonial extraction in his famous 1930 march, recognising the commodity\'s deep economic and cultural significance.',
    innovation:'Salt\'s monetary innovation lay in demonstrating that a consumable commodity could serve as effective currency. The standardisation of salt into bars of uniform weight and dimension — the amole of Ethiopia, the slabs of the Sahara — was a genuine monetary innovation that solved the problem of measuring and exchanging a bulk commodity. Salt also pioneered the concept of commodity-backed state revenue through salt monopolies.',
    resistance:'Resistance to salt-based taxation and monopoly control has been a persistent theme across civilisations. Gandhi\'s Salt March of 1930, in which thousands marched to the sea to make their own salt in defiance of the British monopoly, remains the most famous act of economic resistance in modern history. Earlier salt protests occurred in Rome, China, France (the gabelle provoked repeated uprisings), and across colonial Africa.',
    globalisation:'Salt trade networks connected the Mediterranean to sub-Saharan Africa, Tibet to the Indian lowlands, and the European interior to the Atlantic coast. The trans-Saharan salt trade was one of the great engines of pre-modern globalisation, linking the economies of North and West Africa across thousands of miles of desert. Salt\'s universal necessity ensured that salt trade routes became conduits for cultural exchange, religious transmission, and political influence.',
   }},
  {id:'dinar',fp:{innov:8,reach:9,lon:7,stab:9,trade:10,inst:8},lon:44.4,lat:33.3,nm:'Islamic Gold Dinar',sb:'Baghdad · Caliphate Standard',s:696,e:1924,
   conns:['denarius','florin','sterling'],
