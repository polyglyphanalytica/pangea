 {id:'dollar',fp:{innov:8,reach:10,lon:8,stab:8,trade:10,inst:10},lon:-77.0,lat:38.9,nm:'US Dollar',sb:'Washington · Global Reserve',s:1792,e:2024,
  conns:['sterling','spanish','euro','bitcoin'],
  overview:'The United States dollar — established by the Coinage Act of 1792 and now the undisputed global reserve currency — is the most powerful monetary instrument in human history. From its origins as a decimal adaptation of the Spanish dollar, the greenback survived a civil war, multiple banking panics, and the Great Depression to emerge from World War II as the anchor of the Bretton Woods system and, after 1971, as the world\'s first truly global fiat currency. The dollar\'s dominance rests not merely on American economic power but on an institutional infrastructure — the Federal Reserve, Treasury markets, and the SWIFT network — that makes the dollar indispensable to global commerce, finance, and geopolitics.',
  d:{
   overview:'The US dollar, established by the Coinage Act of 1792, evolved from a fledgling republic\'s currency into the world\'s dominant reserve asset. Its global supremacy, consolidated after World War II through the Bretton Woods agreement, makes it the most consequential monetary instrument in modern history.',
   currency:'The dollar was modelled on the Spanish milled dollar (piece of eight), adopting a decimal system at the urging of Thomas Jefferson. The Coinage Act of 1792 defined the dollar as 371.25 grains of pure silver or 24.75 grains of pure gold, establishing a bimetallic standard. Continental currency, greenbacks, gold certificates, silver certificates, and Federal Reserve notes have all served as dollar-denominated paper money at different periods.',
   banking:'The United States experimented with central banking more than any other nation: the First Bank of the United States (1791–1811), the Second Bank (1816–1836), the National Banking System (1863), and finally the Federal Reserve System (1913). Each iteration reflected the tension between centralised monetary authority and American suspicion of concentrated financial power. The Fed\'s dual mandate — price stability and maximum employment — is unique among major central banks.',
   trade:'The dollar became the world\'s primary trade currency after World War II, when the Bretton Woods system pegged other currencies to the dollar at fixed rates. Even after the end of gold convertibility in 1971, the dollar retained its dominance: approximately 88% of foreign exchange transactions and 60% of global reserves are denominated in dollars. The petrodollar system, established when OPEC priced oil exclusively in dollars, cemented this hegemony.',
   taxation:'The US federal income tax, established by the Sixteenth Amendment (1913), transformed American fiscal capacity. During World War II, payroll withholding was introduced, making tax collection automatic and dramatically increasing compliance. The Internal Revenue Service became one of the most powerful fiscal institutions in the world, while American tax policy — from the New Deal to Reaganomics — shaped global debates about the relationship between taxation and economic growth.',
   inflation:'The dollar has experienced several inflationary episodes: the Continental currency collapse (\'not worth a Continental\'), Civil War greenback inflation, the 1970s stagflation, and post-COVID price surges. The Volcker shock of 1979–1982 — raising interest rates to 20% to crush inflation — remains the most dramatic monetary tightening in modern history, establishing the Fed\'s credibility as an inflation-fighting institution at the cost of severe recession.',
   labor:'The dollar\'s purchasing power defines the lived experience of the world\'s largest consumer economy. American wages, denominated in dollars, set global benchmarks: the federal minimum wage, first established at $0.25 per hour in 1938, became a reference point for labor standards worldwide. The dollar wage premium attracted immigrants from every nation, making the United States the world\'s largest labor market.',
   debt:'US Treasury securities are the world\'s benchmark risk-free asset, with over $33 trillion outstanding by 2024. The Treasury market is the deepest and most liquid in the world, serving as collateral for the entire global financial system. America\'s unique ability to borrow in its own currency at low rates — the \'exorbitant privilege\' identified by Valéry Giscard d\'Estaing — allows the US to run persistent deficits that would bankrupt any other nation.',
   monopoly:'The dollar\'s monopoly on global reserve status gives the United States extraordinary power. The ability to impose financial sanctions through the dollar-based payments system (SWIFT) has become America\'s most potent non-military weapon. Dollar dominance creates a natural monopoly in global finance: because everyone uses dollars, everyone must continue using dollars, creating a self-reinforcing cycle of monetary hegemony.',
   colonialism:'The dollar extended American economic influence globally through mechanisms distinct from European colonialism. The Marshall Plan, Bretton Woods institutions (IMF and World Bank), and dollar-denominated aid created networks of financial dependency. Dollar diplomacy — using financial power rather than military force to influence foreign governments — became a distinctive American form of economic imperialism from the early 20th century onward.',
   technology:'The dollar has been at the forefront of monetary technology: the first widely circulated paper currency (Continental dollars, 1775), the first electronic interbank transfer system (Fedwire, 1918), the first credit card networks (1950s), and the development of algorithmic trading and digital payment systems. The US dominates global financial technology infrastructure, from SWIFT messaging to credit card networks to cryptocurrency exchanges.',
   inequality:'The dollar economy has produced extreme wealth concentration. By the 2020s, the top 1% of Americans held more wealth than the bottom 90% combined. The Federal Reserve\'s monetary policies — particularly quantitative easing — have been criticised for inflating asset prices that primarily benefit the wealthy while doing little for wage earners. The dollar\'s role as global reserve currency distributes these inequality effects worldwide.',
   philosophy:'American monetary philosophy has oscillated between hard money and easy money traditions. The Jeffersonian suspicion of banks, the Jacksonian war on central banking, the Populist demand for silver coinage, and the monetarist revolution of Milton Friedman represent distinct philosophical currents. The ongoing debate between Austrian, Keynesian, and Modern Monetary Theory (MMT) perspectives continues to shape dollar policy.',
   policy:'The Federal Reserve\'s monetary policy decisions reverberate across the global economy. The Fed funds rate, quantitative easing programmes, and forward guidance shape not only American economic conditions but interest rates, capital flows, and exchange rates worldwide. The Fed\'s response to the 2008 financial crisis — slashing rates to zero and purchasing trillions in assets — redefined the boundaries of central bank intervention.',
   crisis:'The dollar has been tested by repeated crises: the Panic of 1907, the Great Depression, the Nixon Shock of 1971 (ending gold convertibility), the 2008 global financial crisis, and the COVID-19 pandemic response. Each crisis paradoxically strengthened the dollar\'s position — in times of global stress, investors flee to dollar-denominated assets, reinforcing the currency\'s safe-haven status even when the crisis originates in the United States.',
   legacy:'The dollar\'s legacy is the global financial architecture itself. The Bretton Woods institutions, the eurodollar market, the petrodollar system, Treasury-based global reserves, and dollar-denominated commodity pricing collectively constitute the monetary operating system of the modern world. No currency in history has achieved such comprehensive dominance over global commerce, finance, and geopolitics.',
   figures:'Alexander Hamilton designed the dollar system and the First Bank of the United States. Andrew Jackson destroyed the Second Bank in the name of democratic populism. Paul Volcker crushed inflation with unprecedented interest rate hikes in 1979–1982. Ben Bernanke orchestrated the Federal Reserve\'s extraordinary response to the 2008 financial crisis, expanding the Fed\'s balance sheet from $900 billion to over $4 trillion.',
   innovation:'Dollar-system innovations include: the decimal currency system (1792), the national banking system (1863), the Federal Reserve (1913), Bretton Woods fixed exchange rates (1944), floating exchange rates (1971), financial derivatives (1970s–1980s), and quantitative easing (2008). Each innovation reshaped not only American but global monetary practice.',
   resistance:'Resistance to dollar dominance has been a persistent theme in global politics. De Gaulle\'s demand for gold conversion in the 1960s, OPEC\'s oil embargo of 1973, and 21st-century efforts by China, Russia, and BRICS nations to create alternative payment systems all represent challenges to dollar hegemony. Domestically, movements from Populist silver advocates to Bitcoin enthusiasts have challenged the dollar\'s monopoly on American money.',
   globalisation:'The dollar is the infrastructure of globalisation itself. Over 60% of global foreign exchange reserves, approximately 40% of international debt, and roughly 88% of foreign exchange trading volume are denominated in dollars. The eurodollar market — dollars held outside the United States — exceeds $13 trillion, creating a parallel monetary system that operates beyond any single nation\'s regulatory control.',
  }},
 {id:'euro',fp:{innov:9,reach:8,lon:1,stab:7,trade:9,inst:9},lon:4.35,lat:50.85,nm:'Euro',sb:'Brussels · Continental Unity',s:1999,e:2024,
  conns:['dollar','sterling','guilder'],
  overview:'The euro — launched as an electronic currency in 1999 and as physical notes and coins in 2002 — is the most ambitious monetary experiment in modern history: a single currency shared by sovereign nations that retain independent fiscal policies, labor markets, and political systems. Born from the ashes of two world wars and the ambition of European integration, the euro replaced legacy currencies from the German mark to the Greek drachma, creating a monetary union of over 340 million people. Its first quarter-century has tested the limits of monetary union without fiscal union, producing both the world\'s second most important reserve currency and a series of sovereign debt crises that nearly tore the project apart.',
  d:{
   overview:'The euro is the shared currency of the eurozone, currently comprising 20 European Union member states. Launched in 1999 as an electronic currency and introduced as physical cash in 2002, it represents the most significant voluntary surrender of monetary sovereignty in history.',
   currency:'The euro replaced national currencies at irrevocably fixed conversion rates on 1 January 1999. Physical euro banknotes and coins entered circulation on 1 January 2002 in the largest currency changeover in history, simultaneously replacing twelve national currencies used by 300 million people. Euro banknotes deliberately feature architectural styles rather than national figures, symbolising unity while avoiding national favouritism.',
   banking:'The European Central Bank (ECB), headquartered in Frankfurt, manages monetary policy for the entire eurozone. Modelled on the Bundesbank and committed to price stability as its primary mandate, the ECB operates independently of political authorities. The Single Supervisory Mechanism, established in 2014, gave the ECB direct oversight of the eurozone\'s largest banks, creating the most comprehensive supranational banking supervision in history.',
   trade:'The euro eliminated exchange rate risk within the eurozone, dramatically reducing transaction costs and boosting intra-European trade. The eurozone represents the world\'s largest single market by GDP, and the euro is the second most traded currency globally. However, the single currency also eliminated exchange rate adjustment as a tool for managing trade imbalances between member states, contributing to persistent surpluses in Germany and deficits in southern Europe.',
   taxation:'The euro exists alongside twenty separate national tax systems, creating a fundamental asymmetry between monetary union and fiscal fragmentation. Tax competition between member states — particularly Ireland\'s low corporate tax rates attracting multinational headquarters — has been a persistent source of tension. The absence of a large federal budget comparable to the US federal system limits the eurozone\'s capacity for fiscal stabilisation.',
   inflation:'The ECB\'s primary mandate is price stability, defined as inflation \'below, but close to, 2%\' (later revised to a symmetric 2% target). The ECB has generally delivered low inflation, but the eurozone has also experienced prolonged periods of below-target inflation bordering on deflation. The post-COVID inflation surge of 2021–2023 presented the ECB with its most significant inflationary challenge, requiring aggressive rate hikes.',
   labor:'The euro was intended to promote labor mobility across the eurozone, but language barriers, cultural differences, and non-transferable qualifications have limited cross-border worker movement. The inability to devalue national currencies forced \'internal devaluation\' — wage and price cuts — on crisis-hit countries like Greece, Spain, and Ireland, imposing severe hardship on workers in those economies.',
   debt:'The European sovereign debt crisis (2010–2015) exposed the fundamental flaw of the euro\'s design: a monetary union without a fiscal union or common debt instruments. Greece, Ireland, Portugal, Spain, and Cyprus required bailouts, imposing austerity conditions that caused severe recessions. ECB President Mario Draghi\'s pledge to do \'whatever it takes\' to preserve the euro in July 2012 proved to be the most consequential single sentence in modern monetary history.',
   monopoly:'The ECB holds a monopoly on monetary policy for the entire eurozone, but unlike the Federal Reserve, it operates without a unified fiscal counterpart. This institutional design gives the ECB extraordinary power while limiting its tools — it can set interest rates and purchase bonds but cannot transfer resources between member states. The \'one size fits all\' monetary policy inevitably favours some economies over others.',
   colonialism:'The euro extended European monetary influence through the CFA franc zone in West and Central Africa, where fourteen countries use currencies pegged to the euro (previously the French franc). This arrangement — requiring African nations to deposit 50% of their foreign exchange reserves with the French Treasury — has been criticised as a form of monetary neo-colonialism that limits African monetary sovereignty.',
   technology:'The euro was the first major currency designed for the digital age, with sophisticated anti-counterfeiting features and electronic clearing systems (TARGET2) built from scratch. The ECB\'s exploration of a digital euro represents the next frontier, potentially creating a central bank digital currency for the world\'s second-largest currency area. The TARGET2 payments system processes over 350,000 transactions daily.',
   inequality:'The euro has produced divergent economic outcomes across member states. Northern European economies — particularly Germany, the Netherlands, and Austria — have benefited from a currency weaker than their national currencies would have been, boosting exports. Southern European economies have suffered from a currency stronger than their national alternatives, undermining competitiveness and contributing to higher unemployment and slower growth.',
   philosophy:'The euro embodies the functionalist philosophy of European integration: the theory that shared institutions create shared interests, gradually building political union through economic interdependence. The competing ordoliberal tradition — emphasising rules, stability, and limited government intervention — shaped the ECB\'s institutional design and the strict convergence criteria required for euro membership.',
   policy:'ECB monetary policy has evolved dramatically from the conservative, Bundesbank-inspired approach of its early years. Under Mario Draghi (2011–2019), the ECB adopted negative interest rates, massive bond-purchasing programmes (quantitative easing), and forward guidance. These tools — initially controversial, particularly in Germany — proved essential to preserving the euro during the sovereign debt crisis.',
   crisis:'The eurozone sovereign debt crisis (2010–2015) was the euro\'s existential test. Greece\'s debt crisis, Ireland\'s banking collapse, and contagion to Portugal, Spain, and Italy threatened to unravel the entire monetary union. The crisis exposed the absence of fiscal transfers, common deposit insurance, and a lender of last resort — design flaws that required emergency improvisation and ad hoc institutional creation to address.',
   legacy:'The euro\'s legacy is still being written, but it has already achieved several historic firsts: the largest voluntary currency union in history, the first supranational central bank with real authority, and the most significant pooling of monetary sovereignty since the formation of nation-states. Whether the euro ultimately succeeds or fails will shape debates about monetary integration for centuries.',
   figures:'Robert Schuman and Jean Monnet laid the intellectual foundations for European integration in the 1950s. Helmut Kohl and François Mitterrand drove the political bargain that created the euro. Wim Duisenberg served as the ECB\'s first president. Mario Draghi\'s \'whatever it takes\' speech in July 2012 is widely credited with saving the euro from collapse during the sovereign debt crisis.',
   innovation:'The euro\'s innovations include: the first multinational currency union with a supranational central bank, the largest simultaneous currency changeover in history (2002), the TARGET2 real-time settlement system, negative interest rate policy in a major currency area, and the development of common bond-purchasing programmes. Each represents a novel solution to the unprecedented challenge of managing money across sovereign borders.',
   resistance:'Resistance to the euro has been persistent and diverse. The United Kingdom, Denmark, and Sweden opted out. Greek popular opposition to euro-imposed austerity nearly led to \'Grexit\' in 2015. Eurosceptic movements across the continent have challenged the legitimacy of supranational monetary governance. The tension between monetary integration and national sovereignty remains the euro\'s fundamental political challenge.',
   globalisation:'The euro was conceived partly as a counterweight to dollar dominance in the global monetary system. It now accounts for approximately 20% of global foreign exchange reserves and is the second most traded currency worldwide. The euro\'s international role, however, remains significantly below what the eurozone\'s economic weight would suggest, partly because the eurozone lacks the unified capital markets and safe assets that underpin dollar dominance.',
  }},
 {id:'bitcoin',fp:{innov:10,reach:6,lon:1,stab:2,trade:4,inst:3},lon:-122.4,lat:37.8,nm:'Bitcoin',sb:'Internet · Decentralised Money',s:2009,e:2024,
  conns:['dollar','euro','cashcoins'],
  overview:'Bitcoin — launched in January 2009 by the pseudonymous Satoshi Nakamoto — is the world\'s first successful decentralised digital currency, a peer-to-peer electronic cash system that operates without central banks, governments, or financial intermediaries. Built on blockchain technology — a distributed ledger maintained by a global network of computers — Bitcoin represents the most radical challenge to state-controlled money since the invention of coinage itself. Whether it proves to be a transformative monetary innovation or history\'s largest speculative bubble, Bitcoin has already permanently altered the conversation about what money is, who should control it, and whether the nation-state\'s monopoly on currency issuance is truly inevitable.',
  d:{
   overview:'Bitcoin is a decentralised digital currency created in 2009 by the pseudonymous Satoshi Nakamoto. Operating on a peer-to-peer network without central authority, it introduced blockchain technology and challenged fundamental assumptions about money, sovereignty, and trust that had governed monetary systems for millennia.',
   currency:'Bitcoin exists purely as entries on a distributed digital ledger (the blockchain), with no physical form. Its supply is algorithmically capped at 21 million coins, with new bitcoins created through \'mining\' — the computational process of validating transactions. This hard supply cap represents a radical departure from all previous monetary systems, where currency supply is determined by human institutions. Each bitcoin is divisible to eight decimal places, with the smallest unit (0.00000001 BTC) called a satoshi.',
   banking:'Bitcoin was designed to eliminate the need for traditional banking intermediaries. The whitepaper explicitly cited the 2008 financial crisis and bank bailouts as motivation. Cryptocurrency exchanges (Coinbase, Binance, Kraken) have emerged as quasi-banking institutions, while decentralised finance (DeFi) protocols attempt to replicate lending, borrowing, and trading without centralised intermediaries. The irony of centralised exchanges becoming critical infrastructure for a decentralised currency reflects the persistent demand for institutional intermediation.',
   trade:'Bitcoin\'s use as a medium of exchange remains limited compared to its role as a speculative asset. High transaction fees, slow confirmation times (averaging 10 minutes per block), and extreme price volatility make it impractical for everyday commerce. El Salvador\'s adoption of Bitcoin as legal tender in 2021 represented the most significant attempt to use cryptocurrency for routine transactions, with mixed results. The Lightning Network, a second-layer solution, attempts to address scalability limitations.',
   taxation:'Bitcoin created entirely new challenges for tax authorities worldwide. The classification of cryptocurrency as property (US), currency (Japan), or commodity varies by jurisdiction, with different tax implications in each case. The pseudonymous nature of blockchain transactions initially enabled widespread tax evasion, but increasing regulatory requirements for exchanges — including Know Your Customer (KYC) and Anti-Money Laundering (AML) rules — have progressively closed these gaps.',
   inflation:'Bitcoin\'s fixed supply of 21 million coins makes it inherently deflationary — unlike fiat currencies, no central authority can create more. Proponents argue this makes Bitcoin a hedge against fiat currency inflation, dubbing it \'digital gold.\' The \'halving\' events, which reduce mining rewards by 50% approximately every four years, create a predictable supply schedule that contrasts with the discretionary monetary policy of central banks.',
   labor:'Bitcoin mining evolved from a hobbyist activity performed on personal computers to an industrial-scale operation consuming more electricity than many countries. Mining farms employ thousands of workers in locations with cheap energy, from Iceland to Texas to Kazakhstan. The proof-of-work consensus mechanism has been criticised for its enormous energy consumption, estimated at over 100 terawatt-hours annually — comparable to the electricity consumption of the Netherlands.',
   debt:'Bitcoin\'s ecosystem has developed its own credit and lending markets, from centralised lending platforms (Celsius, BlockFi) to decentralised protocols (Aave, Compound). The collapse of major crypto lenders in 2022 — triggered by the implosion of the Terra/Luna stablecoin and the fraud at FTX — demonstrated that cryptocurrency markets are as vulnerable to credit cycles and contagion as traditional finance, despite claims of decentralisation and transparency.',
   monopoly:'Although Bitcoin\'s network is theoretically decentralised, significant concentration exists in practice. A small number of mining pools control the majority of hash power, a handful of exchanges dominate trading volume, and early adopters (including Satoshi\'s estimated 1 million unmoved coins) hold a disproportionate share of supply. This concentration of power challenges Bitcoin\'s founding narrative of democratic, distributed money.',
   colonialism:'Bitcoin has been adopted in countries with unstable currencies or limited banking access, from Nigeria to Argentina to Lebanon. Proponents frame this as financial liberation from neo-colonial monetary systems (particularly the CFA franc and dollar-pegged regimes). Critics argue that cryptocurrency adoption in developing countries primarily benefits wealthy speculators while exposing vulnerable populations to extreme volatility and fraud.',
   technology:'Bitcoin\'s underlying technology — the blockchain — is its most significant innovation. A distributed ledger maintained by consensus among thousands of nodes, the blockchain solves the \'double-spending problem\' that had prevented previous digital currency attempts. The proof-of-work mining process, SHA-256 cryptographic hashing, and the UTXO transaction model represent fundamental innovations in computer science and cryptography with applications far beyond currency.',
   inequality:'Bitcoin has created a new class of crypto-millionaires and billionaires while its wealth distribution is highly concentrated: approximately 2% of addresses control over 95% of all Bitcoin. Early adopters benefited enormously, while late entrants have often suffered devastating losses in the currency\'s boom-bust cycles. The narrative of financial democratisation sits uncomfortably alongside a wealth distribution more concentrated than traditional financial markets.',
   philosophy:'Bitcoin embodies a distinctive philosophical synthesis of Austrian economics (hard money, opposition to central banking), cyberpunk anarchism (distrust of state surveillance and control), and libertarian politics (individual sovereignty over collective authority). The Bitcoin whitepaper and Satoshi\'s forum posts articulate a vision of money freed from political manipulation, where trust in institutions is replaced by trust in mathematics.',
   policy:'Governments worldwide have struggled to develop coherent cryptocurrency policy. Responses range from outright bans (China, 2021) to legal tender status (El Salvador, 2021) to comprehensive regulatory frameworks (EU\'s MiCA regulation, 2023). The United States has pursued regulation through enforcement, with the SEC and CFTC competing for jurisdiction. Central bank digital currencies (CBDCs) represent the institutional response to the challenge Bitcoin poses.',
   crisis:'Bitcoin\'s brief history has been punctuated by dramatic crises: the Mt. Gox exchange hack and collapse (2014), the ICO bubble and crash (2017–2018), the COVID crash of March 2020, and the cascading collapses of 2022 (Terra/Luna, Three Arrows Capital, FTX). Each crisis has tested Bitcoin\'s resilience — and each time, the network has recovered and reached new price highs, reinforcing the \'antifragile\' narrative of its proponents.',
   legacy:'Bitcoin\'s legacy, regardless of its ultimate fate as a currency, includes the introduction of blockchain technology, the demonstration that decentralised digital money is technically feasible, and the permanent disruption of the assumption that money must be issued by states. It has inspired thousands of alternative cryptocurrencies, central bank digital currency research, and a fundamental rethinking of monetary sovereignty in the digital age.',
   figures:'Satoshi Nakamoto — whose true identity remains unknown — published the Bitcoin whitepaper in October 2008 and mined the genesis block in January 2009. Hal Finney received the first Bitcoin transaction. Vitalik Buterin created Ethereum, extending blockchain technology beyond currency. Sam Bankman-Fried\'s fraud at FTX became the most spectacular scandal in cryptocurrency history.',
   innovation:'Bitcoin\'s innovations include: the first successful solution to the Byzantine Generals\' Problem in a permissionless network, the proof-of-work consensus mechanism, the blockchain distributed ledger, algorithmic monetary policy with fixed supply, pseudonymous peer-to-peer value transfer, and programmable money through Script. These innovations collectively represent the most significant advance in monetary technology since the invention of paper money.',
   resistance:'Bitcoin itself is an act of resistance — against central banking, government monetary policy, financial surveillance, and institutional control of money. The genesis block contains the embedded text \'The Times 03/Jan/2009 Chancellor on brink of second bailout for banks,\' explicitly framing Bitcoin as a response to the failures of traditional finance. Governments have resisted Bitcoin through regulation, bans, and the development of competing CBDCs.',
   globalisation:'Bitcoin operates on a borderless, censorship-resistant network accessible to anyone with an internet connection. It enables cross-border value transfer without banking intermediaries, correspondent banks, or foreign exchange markets. This capability is particularly significant for remittances, where traditional channels charge fees of 5–10%. Bitcoin\'s global network of nodes, miners, and users constitutes a monetary system that exists outside the jurisdiction of any single nation-state.',
  }},
 {id:'silkroad',fp:{innov:6,reach:8,lon:9,stab:5,trade:10,inst:5},lon:66.96,lat:39.65,nm:'Silk Road Currencies',sb:'Samarkand · Trade Route Money',s:-200,e:1500,
  conns:['cashcoins','dinar','denarius','silver'],
  overview:'The Silk Road — the network of overland and maritime trade routes connecting China to the Mediterranean from roughly the 2nd century BCE to the 15th century CE — was not merely a conduit for goods but a monetary ecosystem where dozens of currencies circulated, competed, and cross-pollinated. In the caravanserais of Samarkand, Bukhara, and Kashgar, Chinese cash coins changed hands alongside Roman denarii, Sasanian drachms, Islamic dinars, and Kushan gold coins. The Silk Road\'s monetary history demonstrates that trade creates its own monetary solutions: where goods flow, money follows, and where multiple monetary systems meet, innovation flourishes in the spaces between civilisations.',
  d:{
   overview:'The Silk Road currencies encompass the diverse monetary instruments used along the vast trade networks connecting East Asia to the Mediterranean over seventeen centuries. No single currency dominated; instead, traders developed sophisticated exchange systems that accommodated Chinese bronze, Roman silver, Indian gold, and Islamic coinage.',
   currency:'Silk Road trade relied on a remarkable diversity of currencies. Chinese cash coins (bronze with square holes) dominated the eastern sections. Kushan gold coins circulated in Central Asia and northern India. Roman and Byzantine gold and silver served the western terminus. Sasanian silver drachms became the standard commercial currency of the Iranian plateau. This monetary pluralism required constant exchange and created a cosmopolitan commercial culture comfortable with multiple denominations.',
   banking:'Silk Road banking emerged from the needs of long-distance trade. The Sogdian merchants — history\'s greatest commercial intermediaries — developed letters of credit, bills of exchange, and partnership agreements that enabled trade across thousands of miles. These financial instruments anticipated European banking innovations by centuries. Buddhist monasteries along the route served as safe deposit institutions, lending operations, and currency exchange points.',
   trade:'The Silk Road was the world\'s most extensive pre-modern trade network, stretching from Chang\'an (Xi\'an) to Rome, with maritime branches reaching Southeast Asia, India, and East Africa. Silk, spices, precious metals, gemstones, glass, horses, and ideas flowed along routes that crossed deserts, mountain passes, and vast steppes. The volume of trade fluctuated with political stability, reaching peaks under the Han Dynasty, the Tang Dynasty, the Abbasid Caliphate, and the Mongol Empire.',
   taxation:'Every kingdom, khanate, and city-state along the Silk Road levied tolls on passing merchants. These transit taxes were the primary revenue source for Central Asian polities. The Sogdians paid tribute to successive overlords — Turks, Arabs, Chinese — while maintaining their commercial networks. The proliferation of taxation points made overland trade progressively more expensive, eventually contributing to the shift toward maritime routes.',
   inflation:'Silk Road monetary stability varied dramatically by region and era. The influx of Roman gold and silver into Central and South Asia altered local monetary systems, while the flow of Chinese silk westward sometimes functioned as a form of commodity money. The Mongol period brought periods of stability under a unified political authority, but the introduction of paper money in the western khanates was less successful than in China itself.',
   labor:'Silk Road commerce depended on specialised labor: camel drivers, caravan guards, translators, innkeepers, and money changers formed a service economy along the routes. The Sogdian merchant diaspora — communities of Central Asian traders settled in Chinese, Indian, and Persian cities — represented a mobile labor force that facilitated cross-cultural commerce. Slave trading was also a significant component of Silk Road commerce.',
   debt:'Long-distance Silk Road trade required sophisticated credit instruments because carrying physical currency across thousands of miles was impractical and dangerous. Sogdian merchants developed partnership contracts (similar to the later Islamic mudaraba) that distributed risk and profit among investors and travelling traders. These credit relationships were built on community trust and enforced through reputation networks rather than legal systems.',
   monopoly:'No single power monopolised Silk Road trade for long, though many tried. The Chinese state periodically attempted to control silk exports. The Sasanian Empire taxed transit trade heavily. The Mongol Empire\'s Pax Mongolica (13th–14th centuries) created the closest thing to unified trade governance, with standardised weights, protected trade routes, and an empire-wide postal system (yam) that also facilitated commercial communication.',
   colonialism:'The Silk Road was shaped by successive imperial powers — Achaemenid Persia, Alexander\'s successors, the Kushan Empire, the Tang Dynasty, the Arab Caliphate, and the Mongol Empire — each of which imposed its monetary and commercial practices on subject populations. Chinese monetary influence extended westward through trade, while Islamic coinage standards spread eastward after the 7th century Arab conquests.',
   technology:'Silk Road trade drove monetary technology transfer between civilisations. Chinese papermaking technology travelled westward, eventually enabling European banknotes. Indian numeral systems (including zero) moved along trade routes to the Islamic world and then to Europe. Coinage techniques, metallurgical knowledge, and financial practices were exchanged alongside physical goods, making the Silk Road the world\'s most important conduit for technological diffusion.',
   inequality:'Silk Road wealth was concentrated among a small commercial elite — the Sogdian, Jewish, and later Muslim merchant communities — who controlled the most lucrative long-distance trade routes. The caravan workers, farmers in oasis settlements, and nomadic herders who facilitated trade received a small fraction of its profits. The cities of Samarkand, Bukhara, and Kashgar displayed extreme wealth alongside widespread poverty.',
   philosophy:'Silk Road commerce facilitated the exchange of economic ideas alongside goods. Buddhist concepts of charitable lending, Islamic prohibitions on usury, Chinese state monetary theory, and Greek philosophical traditions regarding commerce all encountered and influenced each other along the routes. The cosmopolitan intellectual environment of Silk Road cities produced hybrid approaches to economic organisation.',
   policy:'Silk Road monetary policy was necessarily decentralised, reflecting the fragmented political geography of Central Asia. Individual states set their own coinage standards, tax rates, and trade regulations. The most successful periods of Silk Road trade coincided with political unification — under the Tang Dynasty, the Abbasid Caliphate, or the Mongol Empire — which reduced transaction costs by standardising rules across large territories.',
   crisis:'The Silk Road experienced repeated crises driven by political instability, nomadic invasions, and plague. The Black Death, which travelled along Silk Road trade routes from Central Asia to Europe in the 1340s, devastated populations and disrupted commerce across the entire network. The fall of the Mongol Empire in the 14th century fragmented the trade routes, while the rise of Ottoman power and Portuguese maritime routes in the 15th century redirected global trade away from overland Central Asian routes.',
   legacy:'The Silk Road\'s monetary legacy lies in its role as a zone of exchange between the world\'s major monetary traditions. Chinese, Indian, Persian, and Mediterranean monetary concepts met, competed, and hybridised along these routes. The financial techniques developed for long-distance trade — letters of credit, partnership agreements, and bills of exchange — were transmitted to the Islamic world and thence to medieval Europe.',
   figures:'Zhang Qian, the Han Dynasty envoy who opened Chinese contact with Central Asia in 138 BCE, initiated the Silk Road\'s expansion. The Sogdian merchant An Lushan rose to become a Tang Dynasty general whose rebellion (755 CE) devastated Chinese Central Asian commerce. Genghis Khan and his successors created the Pax Mongolica that produced the Silk Road\'s final golden age.',
   innovation:'Silk Road monetary innovations arose from the practical challenges of multi-currency long-distance trade. These include: early forms of bills of exchange, partnership contracts distributing risk across investors and travellers, sophisticated money-changing operations handling dozens of currencies, and the development of trust-based credit networks spanning thousands of miles. The Silk Road was history\'s greatest laboratory for monetary interoperability.',
   resistance:'Silk Road commerce faced resistance from multiple quarters: nomadic peoples who preferred raiding to trading, religious authorities who condemned mercantile wealth, and imperial governments that sought to control or tax trade. Banditry was a constant threat, driving the development of armed caravans, fortified caravanserais, and mutual protection agreements among merchant communities.',
   globalisation:'The Silk Road was the original engine of globalisation, connecting the economies of China, India, Persia, Central Asia, and the Mediterranean into a single commercial network. Roman consumers wore Chinese silk; Chinese pharmacies stocked Mediterranean coral; Indian spices flavoured Persian cuisine. This pre-modern globalisation demonstrated that economic integration precedes political integration, and that trade networks, once established, prove remarkably resilient across centuries of political upheaval.',
  }},
];

function renderDrawerContent(){
  const c=sel;
  const dc=document.getElementById('drawer-content');
  if(!dc)return;
  if(!c) return;

  let body='';
  if(!lenses.size){
    body=`<div class="overview-arc"><p>${c.overview||c.d.legacy||''}</p></div>${renderEnhancedSpanBar(c)}${renderFingerprint(c)}`;
  } else {
    body=[...lenses].map(id=>{
      const L=LENSES.find(l=>l.id===id);
      if(!L)return'';

function closeInfo(){sel=null;lenses.clear();lensDD=false;renderDrawer();renderMap();}

function setYear(y){
  year=parseInt(y);
  const sl=document.getElementById('tl');
  const sliderVal=yearToSlider(year);
  if(sl.value!=sliderVal) sl.value=sliderVal;
  const pct=sliderVal/10; // 0-1000 → 0-100%
  document.getElementById('tl-thumb').style.left=pct+'%';
  const fill=document.getElementById('tl-fill');
  if(fill) fill.style.width=pct+'%';
  const tlEl=document.getElementById('tl');
  tlEl.setAttribute('aria-valuenow',sliderVal);
  tlEl.setAttribute('aria-valuetext',fmt(year));
  document.getElementById('era-y').textContent=fmt(year);
  document.getElementById('era-n').textContent=eraName(year);
  document.getElementById('cnt-n').textContent=ITEMS.filter(c=>active(c)).length;
  renderMap();
  if(sel&&!active(sel))closeInfo();
  else renderDrawer();
}

function renderWorldMap(world){
  const svg=document.getElementById('wsvg');
  const W=1000,H=520;
  const proj=d3.geoMercator().scale(158).translate([W/2,H/2+40]);
  window._proj=proj;
  const pathGen=d3.geoPath().projection(proj);
  const land=topojson.feature(world,world.objects.land);
  const countries=topojson.feature(world,world.objects.countries);
  // Graticule
  const graticule=d3.geoGraticule()();
  const gratPath=pathGen(graticule)||'';
  // Land
  const landPath=pathGen(land)||'';
  // Country borders
  const borders=topojson.mesh(world,world.objects.countries,(a,b)=>a!==b);
  const borderPath=pathGen(borders)||'';
  let g=document.getElementById('map-layer');
  g.innerHTML=
    `<path d="${gratPath}" fill="none" stroke="var(--bdr2)" stroke-width=".3"/>` +
    `<path id="land-path" d="${landPath}" fill="var(--land)" stroke="var(--land-s)" stroke-width=".4"/>` +
    `<path d="${borderPath}" fill="none" stroke="var(--land-s)" stroke-width=".3" opacity=".6"/>`;
}

// ══════════════════════════════════════════════════════
// FINGERPRINT RADAR CHART
// ══════════════════════════════════════════════════════
function renderFingerprint(c){
  if(!c.fp)return'';
  const W=360,H=300,cx=W/2,cy=H/2+10,R=88;
  const n=FP_LABELS.length;
  const angles=FP_LABELS.map((_,i)=>(i*2*Math.PI/n)-Math.PI/2);

  let svg=`<svg class="fp-svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  // Grid rings
  [2,4,6,8,10].forEach(level=>{
    const r=R*(level/10);
    const pts=angles.map(a=>`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`).join(' ');
    svg+=`<polygon points="${pts}" class="fp-grid"/>`;
  });
  // Axis lines
  angles.forEach(a=>{
    svg+=`<line x1="${cx}" y1="${cy}" x2="${(cx+R*Math.cos(a)).toFixed(1)}" y2="${(cy+R*Math.sin(a)).toFixed(1)}" class="fp-grid"/>`;
  });
  // Data polygon
  const vals=FP_KEYS.map(k=>c.fp[k]||0);
  const dataPts=angles.map((a,i)=>{
    const r=R*(vals[i]/10);
    return`${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;
  }).join(' ');
  svg+=`<polygon points="${dataPts}" class="fp-poly"/>`;
  // Labels
  angles.forEach((a,i)=>{
    const lr=R+26;
    const lx=cx+lr*Math.cos(a);
    const ly=cy+lr*Math.sin(a);
    const cosA=Math.cos(a);
    const anchor=cosA>0.15?'start':cosA<-0.15?'end':'middle';
    const dy=Math.sin(a)>0.15?4:Math.sin(a)<-0.15?-4:4;
    svg+=`<text x="${lx.toFixed(1)}" y="${(ly+dy).toFixed(1)}" text-anchor="${anchor}" class="fp-label">${FP_LABELS[i]}</text>`;
  });
  svg+='</svg>';
  return`<div class="fp-wrap"><div class="fp-title">Economic Fingerprint</div>${svg}</div>`;
}

// ══════════════════════════════════════════════════════
// ENHANCED SPAN BAR WITH CONTEMPORARIES
// ══════════════════════════════════════════════════════
function renderEnhancedSpanBar(c){
  const MIN=-6000,MAX=2024,total=MAX-MIN;
  const left=Math.max(0,(c.s-MIN)/total*100);
  const width=Math.min(100-left,(c.e-c.s)/total*100);

  // Find up to 4 contemporaries that overlap with this item's lifespan
  const overlap=ITEMS.filter(x=>x.id!==c.id&&x.s<c.e&&x.e>c.s)
    .map(x=>{
      const overlapStart=Math.max(x.s,c.s);
      const overlapEnd=Math.min(x.e,c.e);
      return{...x,overlapYrs:overlapEnd-overlapStart};
    })
    .sort((a,b)=>b.overlapYrs-a.overlapYrs)
    .slice(0,4);

  const colors=['#e89820','#4a8870','#4a7faa','#9b6fd4'];

  let bars=overlap.map((x,i)=>{
    const xl=Math.max(0,(x.s-MIN)/total*100);
    const xw=Math.min(100-xl,(x.e-x.s)/total*100);
    const ol=Math.max(xl,left);
    const or_=Math.min(xl+xw,left+width);
    const ow=Math.max(0,or_-ol);
    return`<div class="contemp-bar-row" onclick="navigateToItem('${x.id}')" title="Navigate to ${x.nm}">
      <div class="contemp-bar-nm">${x.nm}</div>
      <div class="contemp-bar-track">
        <div class="contemp-bar-fill" style="left:${(ol-left).toFixed(1)}%;width:${ow.toFixed(1)}%;background:${colors[i]}"></div>
      </div>
      <div class="contemp-bar-yr">${fmt(x.s)}\u2013${fmt(x.e)}</div>
    </div>`;
  }).join('');

  const mainBar=`<div class="civ-span-bar" title="${fmt(c.s)} to ${fmt(c.e)}">
    <div class="civ-span-fill" style="left:${left.toFixed(1)}%;width:${width.toFixed(1)}%"></div>
  </div>
  <div class="civ-span-lbls"><span>${fmt(c.s)}</span><span style="color:var(--txt3);font-size:8px">${c.e-c.s} years</span><span>${fmt(c.e)}</span></div>`;

  const contemp=overlap.length?`<div class="contemp-wrap">
    <div class="fp-title" style="margin-top:10px">Active at the same time</div>
    ${bars}
  </div>`:'';

  return mainBar+contemp;
}

// ══════════════════════════════════════════════════════
// TIMELINE DENSITY SPARKLINE
// ══════════════════════════════════════════════════════
function renderDensityBar(){
  const svg=document.getElementById('density-bar');
  if(!svg)return;
  const W=svg.parentElement?svg.parentElement.offsetWidth||600:600;
  svg.setAttribute('viewBox',`0 0 ${W} 18`);
  const MIN=-6000,MAX=2024,total=MAX-MIN;
  const steps=200;
  const stepYr=total/steps;
  const counts=[];
  let mx=0;
  for(let i=0;i<steps;i++){
    const yr=MIN+i*stepYr;
    const n=ITEMS.filter(c=>c.s<=yr&&c.e>=yr).length;
    counts.push(n);
    if(n>mx)mx=n;
  }
  if(!mx)return;
  const pts=counts.map((n,i)=>{
    const x=(i/steps)*W;
    const y=18-(n/mx)*14-1;
    return`${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const poly=`0,18 ${pts.join(' ')} ${W},18`;
  svg.innerHTML=`<polygon points="${poly}" fill="rgba(232,152,32,.25)" stroke="rgba(232,152,32,.5)" stroke-width=".5"/>
    <line x1="0" y1="18" x2="${W}" y2="18" stroke="var(--bdr2)" stroke-width=".5"/>`;
}
