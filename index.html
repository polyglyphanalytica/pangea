<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── DARK THEME (default) ── */
:root{
  --bg:#02040a;
  --panel:#070b12;
  --panel2:#0c1018;
  --amber:#e89820;--amber-b:#f0b040;--amber-d:#3a2204;
  --amber-x:rgba(232,152,32,0.14);--amber-xx:rgba(232,152,32,0.08);
  --txt:#f2e8d5;--txt2:#c4aa80;--txt3:#8a7254;
  --bdr:rgba(232,152,32,0.22);--bdr2:rgba(232,152,32,0.10);
  --shadow:rgba(0,0,0,0.6);
  --hdr-bg:rgba(2,4,10,0.97);
}

/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#f0ebe0;
  --panel:#e8e0d0;
  --panel2:#ddd4c0;
  --amber:#7a4e00;--amber-b:#8a5800;--amber-d:#f0d8a0;
  --amber-x:rgba(122,78,0,0.10);--amber-xx:rgba(122,78,0,0.06);
  --txt:#1a1206;--txt2:#3a2a10;--txt3:#6a5030;
  --bdr:rgba(122,78,0,0.28);--bdr2:rgba(122,78,0,0.14);
  --shadow:rgba(0,0,0,0.18);
  --hdr-bg:rgba(236,228,214,0.97);
}

@media(prefers-color-scheme:light){
  :root:not([data-theme="dark"]){
    --bg:#f0ebe0;--panel:#e8e0d0;--panel2:#ddd4c0;
    --amber:#7a4e00;--amber-b:#8a5800;--amber-d:#f0d8a0;
    --amber-x:rgba(122,78,0,0.10);--amber-xx:rgba(122,78,0,0.06);
    --txt:#1a1206;--txt2:#3a2a10;--txt3:#6a5030;
    --bdr:rgba(122,78,0,0.28);--bdr2:rgba(122,78,0,0.14);
    --shadow:rgba(0,0,0,0.18);
    --hdr-bg:rgba(236,228,214,0.97);
  }
}

html,body{width:100%;height:100%;background:var(--bg);color:var(--txt);font-family:'Crimson Pro',serif}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--hdr-bg);border-bottom:1px solid var(--bdr2)}
.hdr-left{display:flex;align-items:baseline;gap:0;min-width:0}
.logo-t{font-family:'Cinzel Decorative',serif;font-size:18px;font-weight:700;color:var(--amber-b);letter-spacing:3px;white-space:nowrap}
.logo-s{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin-left:10px;white-space:nowrap}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.theme-btn{background:none;border:1px solid var(--bdr);padding:4px 8px;cursor:pointer;font-size:13px;color:var(--txt2);border-radius:3px;transition:all .15s;flex-shrink:0}
.theme-btn:hover{background:var(--amber-x);color:var(--amber-b)}

/* ── MAIN ── */
.main{padding:72px 20px 40px;max-width:1100px;margin:0 auto;overflow-y:auto;height:100%}

/* ── HERO ── */
.hero{text-align:center;padding:40px 0 32px}
.hero-title{font-family:'Cinzel Decorative',serif;font-size:28px;font-weight:700;color:var(--amber-b);letter-spacing:4px;margin-bottom:8px}
.hero-sub{font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;color:var(--txt3);text-transform:uppercase;margin-bottom:16px}
.hero-tagline{font-size:16px;line-height:1.7;color:var(--txt2);max-width:580px;margin:0 auto;font-style:italic}

/* ── TIER HEADERS ── */
.tier-hdr{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin:32px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--bdr2);display:flex;align-items:center;gap:10px}
.tier-hdr::after{content:'';flex:1;height:1px;background:var(--bdr2)}

/* ── CARD GRID ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:8px}

/* ── CARDS ── */
.card{background:var(--panel);border:1px solid var(--bdr2);border-radius:4px;padding:16px 18px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.card:hover{border-color:var(--bdr);background:var(--panel2);transform:translateY(-1px);box-shadow:0 4px 16px var(--shadow)}
.card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:8px}
.card-ico{font-size:24px;flex-shrink:0;line-height:1}
.card-title-wrap{flex:1;min-width:0}
.card-nm{font-family:'Cinzel Decorative',serif;font-size:14px;font-weight:700;color:var(--amber-b);letter-spacing:1.5px;margin-bottom:2px}
.card-tagline{font-size:13px;color:var(--txt2);line-height:1.5}
.card-badge{position:absolute;top:12px;right:14px;font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:2px 8px;border-radius:10px;border:1px solid}
.badge-live{color:#4a9;border-color:rgba(68,170,136,0.4);background:rgba(68,170,136,0.1)}
.badge-building{color:#e89820;border-color:rgba(232,152,32,0.3);background:rgba(232,152,32,0.08)}
.badge-forthcoming{color:var(--txt3);border-color:var(--bdr2);background:var(--amber-xx)}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.tag{font-family:'Cinzel',serif;font-size:8px;letter-spacing:1.5px;color:var(--txt3);text-transform:uppercase;padding:2px 8px;border:1px solid var(--bdr2);border-radius:2px}
.card-coming{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--txt3);text-transform:uppercase;margin-top:8px}
.card-go{display:inline-block;margin-top:10px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--amber-b);text-transform:uppercase;text-decoration:none;border:1px solid var(--bdr);padding:4px 14px;border-radius:3px;transition:all .15s}
.card-go:hover{background:var(--amber-x);border-color:var(--amber-b)}

/* ── DETAIL MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.55);align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--bdr);border-radius:6px;padding:28px 32px;max-width:520px;width:calc(100% - 40px);max-height:calc(100vh - 80px);overflow-y:auto;position:relative;box-shadow:0 16px 48px rgba(0,0,0,.6)}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--txt3);cursor:pointer;font-size:18px;line-height:1;padding:4px;transition:color .15s}
.modal-close:hover{color:var(--amber-b)}
.modal-ico{font-size:28px;margin-bottom:8px}
.modal-nm{font-family:'Cinzel Decorative',serif;font-size:18px;font-weight:700;color:var(--amber-b);letter-spacing:2px;margin-bottom:4px}
.modal-tagline{font-size:14px;color:var(--txt2);margin-bottom:6px}
.modal-badge{display:inline-block;font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:2px 8px;border-radius:10px;border:1px solid;margin-bottom:16px}
.modal-hook{font-size:14px;line-height:1.75;color:var(--txt2);margin-bottom:16px;font-style:italic}
.modal-section-lbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--txt3);text-transform:uppercase;margin-bottom:6px}
.modal-list{list-style:none;margin-bottom:16px}
.modal-list li{font-size:13px;color:var(--txt2);padding:3px 0;padding-left:14px;position:relative;line-height:1.5}
.modal-list li::before{content:'·';position:absolute;left:0;color:var(--amber-b);font-weight:700}
.modal-complexity{display:flex;align-items:center;gap:8px;margin-top:10px;margin-bottom:16px}
.modal-complexity-lbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--txt3);text-transform:uppercase}
.complexity-dots{display:flex;gap:3px}
.complexity-dot{width:8px;height:8px;border-radius:50%;border:1px solid var(--bdr);background:transparent}
.complexity-dot.filled{background:var(--amber-b);border-color:var(--amber-b)}
.modal-link{display:inline-block;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--amber-b);text-transform:uppercase;text-decoration:none;border:1px solid var(--bdr);padding:8px 20px;border-radius:3px;transition:all .15s}
.modal-link:hover{background:var(--amber-x);border-color:var(--amber-b)}

/* ── FOOTER ── */
.hub-footer{text-align:center;padding:32px 0 24px;border-top:1px solid var(--bdr2);margin-top:24px}
.hub-footer-org{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin-bottom:6px}
.hub-footer-copy{font-size:12px;color:var(--txt3)}

/* ── ACCESSIBILITY ── */
:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px;border-radius:2px}
.skip-link{position:absolute;top:-40px;left:0;background:var(--amber-b);color:var(--bg);padding:8px 16px;z-index:9999;font-family:'Cinzel',serif;font-size:11px;text-decoration:none}
.skip-link:focus{top:0}

/* ── MOBILE ── */
@media(max-width:768px){
  .logo-s{display:none}
  .hdr{padding:8px 12px}
  .logo-t{font-size:14px;letter-spacing:2px}
  .hero{padding:28px 0 20px}
  .hero-title{font-size:20px;letter-spacing:2px}
  .hero-tagline{font-size:14px}
  .card-grid{grid-template-columns:1fr}
  .main{padding:56px 14px 32px}
  .modal{padding:20px 18px;max-width:100%;width:calc(100% - 24px)}
  .modal-nm{font-size:15px}
}
</style>
</head>

const TIER_LABELS = {0:'Tier 0 — Live',1:'Tier I — Natural',2:'Tier II — Systems',3:'Tier III — Culture',4:'Tier IV — Hidden'};

function renderCatalogue(){
  const container = document.getElementById('card-grid-main');
  let html = '';
  let currentTier = -1;

  ATLASES.forEach((a,idx) => {
    if(a.tier !== currentTier){
      currentTier = a.tier;
      html += `<div class="tier-hdr">${TIER_LABELS[currentTier]}</div><div class="card-grid">`;
      if(idx > 0) {
        // close previous grid before opening new tier
        const insertPos = html.lastIndexOf('<div class="tier-hdr">');
        html = html.substring(0, insertPos) + '</div>' + html.substring(insertPos);
      }
    }

    const badgeClass = a.status === 'live' ? 'badge-live' : a.status === 'building' ? 'badge-building' : 'badge-forthcoming';
    const badgeText = a.status.toUpperCase();
    const tags = a.tags.map(t => `<span class="tag">${t}</span>`).join('');
    const comingSoon = a.status === 'forthcoming' ? '<div class="card-coming">Coming Soon</div>' : '';
    const goLink = a.href ? `<a class="card-go" href="${a.href}" onclick="event.stopPropagation()">Open Atlas →</a>` : '';

    html += `
      <div class="card" data-id="${a.id}" onclick="openModal('${a.id}')" role="button" tabindex="0">
        <span class="card-badge ${badgeClass}">${badgeText}</span>
        <div class="card-top">
          <span class="card-ico">${a.ico}</span>
          <div class="card-title-wrap">
            <div class="card-nm">${a.nm}</div>
            <div class="card-tagline">${a.tagline}</div>
          </div>
        </div>
        <div class="card-tags">${tags}</div>
        ${comingSoon}
        ${goLink}
      </div>`;
  });
  html += '</div>'; // close last grid
  container.innerHTML = html;
}

function openModal(id){
  const a = ATLASES.find(x => x.id === id);
  if(!a) return;
  const badgeClass = a.status === 'live' ? 'badge-live' : a.status === 'building' ? 'badge-building' : 'badge-forthcoming';
  const features = a.features ? a.features.map(f => `<li>${f}</li>`).join('') : '';
  const lenses = a.lenses ? a.lenses.map(l => `<li>${l}</li>`).join('') : '';
  const dots = Array.from({length:5},(_, i) => `<span class="complexity-dot${i < a.complexity ? ' filled' : ''}"></span>`).join('');
  const linkBtn = a.href ? `<a class="modal-link" href="${a.href}">Open Atlas →</a>` : '';

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-ico">${a.ico}</div>
    <div class="modal-nm" id="modal-title">${a.nm}</div>
    <div class="modal-tagline">${a.tagline}</div>
    <span class="modal-badge ${badgeClass}">${a.status.toUpperCase()}</span>
    <div class="modal-hook">${a.hook}</div>
    <div class="modal-section-lbl">Core Features</div>
    <ul class="modal-list">${features}</ul>
    <div class="modal-section-lbl">Unique Lenses</div>
    <ul class="modal-list">${lenses}</ul>
    <div class="modal-complexity">
      <span class="modal-complexity-lbl">Build Complexity</span>
      <div class="complexity-dots">${dots}</div>
    </div>
    ${linkBtn}`;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
}

// Keyboard support
document.addEventListener('keydown', e => {
  if(e.key === 'Enter' && e.target.classList.contains('card')){
    openModal(e.target.dataset.id);
  }
  if(e.key === 'Escape') closeModal();
});

// ── THEME ──
function applyTheme(t){
  document.documentElement.dataset.theme = t;
  document.getElementById('theme-btn').textContent = t === 'dark' ? '◑' : '◐';
  localStorage.setItem('pangea-theme', t);
}
function toggleTheme(){
  const cur = document.documentElement.dataset.theme ||
    (window.matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark');
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
(function(){
  const saved = localStorage.getItem('pangea-theme');
  if(saved){ applyTheme(saved); }
  else {
    const sys = window.matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark';
    document.documentElement.dataset.theme = sys;
    document.getElementById('theme-btn').textContent = sys === 'dark' ? '◑' : '◐';
  }
})();

document.getElementById('footer-year').textContent = new Date().getFullYear();
renderCatalogue();
</script>
