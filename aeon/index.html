<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── DARK THEME (default) ── */
:root{
  --bg:#02040a;
  --panel:#070b12;
  --panel2:#0c1018;
  --ocean-start:#0a1628;--ocean-end:#061020;
  --land:#2a4a18;--land-s:#3a6020;
  --amber:#e89820;--amber-b:#f0b040;--amber-d:#3a2204;
  --amber-x:rgba(232,152,32,0.14);--amber-xx:rgba(232,152,32,0.08);
  --txt:#f2e8d5;--txt2:#e0d4b4;--txt3:#c8aa78;
  --bdr:rgba(232,152,32,0.22);--bdr2:rgba(232,152,32,0.10);
  --hint:rgba(224,212,180,0.65);
  --tl-bg:rgba(2,4,10,0.99);
  --hdr-bg:rgba(2,4,10,0.97);
  --conn-bdr:rgba(232,152,32,0.10);
  --shadow:rgba(0,0,0,0.6);
}

/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#f0ebe0;
  --panel:#e8e0d0;
  --panel2:#ddd4c0;
  --ocean-start:#b8cce0;--ocean-end:#a8bcd4;
  --land:#8ca860;--land-s:#7a9850;
  --amber:#4a2c00;--amber-b:#5a3800;--amber-d:#f0d8a0;
  --amber-x:rgba(122,78,0,0.10);--amber-xx:rgba(122,78,0,0.06);
  --txt:#1a1206;--txt2:#1a1206;--txt3:#2e2010;
  --bdr:rgba(122,78,0,0.28);--bdr2:rgba(122,78,0,0.14);
  --hint:rgba(30,18,6,0.6);
  --tl-bg:rgba(236,228,214,0.99);
  --hdr-bg:rgba(236,228,214,0.97);
  --conn-bdr:rgba(122,78,0,0.12);
  --shadow:rgba(0,0,0,0.18);
}

@media(prefers-color-scheme:light){
  :root:not([data-theme="dark"]){
    --bg:#f0ebe0;--panel:#e8e0d0;--panel2:#ddd4c0;
    --ocean-start:#b8cce0;--ocean-end:#a8bcd4;
    --land:#8ca860;--land-s:#7a9850;
    --amber:#4a2c00;--amber-b:#5a3800;--amber-d:#f0d8a0;
    --amber-x:rgba(122,78,0,0.10);--amber-xx:rgba(122,78,0,0.06);
    --txt:#1a1206;--txt2:#1a1206;--txt3:#2e2010;
    --bdr:rgba(122,78,0,0.28);--bdr2:rgba(122,78,0,0.14);
    --hint:rgba(30,18,6,0.6);
    --tl-bg:rgba(236,228,214,0.99);
    --hdr-bg:rgba(236,228,214,0.97);
    --conn-bdr:rgba(122,78,0,0.12);
    --shadow:rgba(0,0,0,0.18);
  }
}

html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Crimson Pro',serif}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--hdr-bg);gap:12px}
.hdr-left{display:flex;align-items:baseline;gap:0;min-width:0}
.logo-t{font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:700;color:var(--amber-b);letter-spacing:3px;white-space:nowrap}
.logo-s{font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin-left:10px;white-space:nowrap}
.era-disp{text-align:center;font-family:'Cinzel',serif;flex-shrink:0}
.era-y{font-size:22px;font-weight:600;color:var(--amber-b);letter-spacing:1px}
.era-n{font-size:12px;letter-spacing:1.5px;color:var(--txt2);margin-top:1px;text-transform:uppercase;font-weight:600}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.cnt-disp{text-align:right;font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;color:var(--txt3)}
.cnt-n{font-size:22px;font-weight:600;color:var(--amber);display:block;line-height:1}
.theme-btn{background:none;border:1px solid var(--bdr);padding:4px 8px;cursor:pointer;font-size:13px;color:var(--txt2);border-radius:3px;transition:all .15s;flex-shrink:0}
.theme-btn:hover{background:var(--amber-x);color:var(--amber-b)}

/* ── MAIN LAYOUT ── */
.main{position:fixed;top:52px;left:0;right:0;bottom:0;display:flex}
.map-c{flex:1;position:relative;overflow:hidden;min-width:0;min-height:0}
.map-tl-col{display:flex;flex-direction:column;flex:1;min-width:0}
#wsvg{width:100%;height:100%}

/* ── DESKTOP PANEL ── */
.info-panel{width:320px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--bdr);overflow-y:auto;padding:18px 18px 28px;position:relative}
.info-close{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:16px;line-height:1;padding:4px;float:right;margin:-2px -2px 0 0}
.info-close:hover{color:var(--amber-b)}
.info-nm{font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:700;color:var(--amber-b);margin-bottom:3px;clear:both}
.info-sb{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1.5px;color:var(--txt2);text-transform:uppercase;margin-bottom:10px}
.info-dates{display:flex;gap:6px;margin-bottom:14px;align-items:center}
.info-dt{padding:5px 12px;border:1px solid var(--bdr);font-family:'Cinzel',serif;font-size:13.5px;color:var(--amber-b)}
.info-arr{color:var(--txt2);font-size:12px}

/* ── LENS DROPDOWN ── */
.lens-dd-wrap{border:1px solid var(--bdr);margin-bottom:14px}
.lens-dd-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;cursor:pointer;user-select:none;background:var(--amber-xx);border-bottom:1px solid transparent;transition:background .15s}
.lens-dd-hdr:hover{background:var(--amber-x)}
.lens-dd-hdr.open{border-bottom-color:var(--bdr)}
.lens-dd-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:2.5px;color:var(--txt2);text-transform:uppercase;flex-shrink:0}
.lens-dd-summary{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.5px;color:var(--amber-b);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;padding:0 6px}
.lens-dd-arrow{color:var(--txt2);font-size:10px;transition:transform .18s;flex-shrink:0}
.lens-dd-arrow.open{transform:rotate(180deg)}
.lens-dd-list{display:none;max-height:260px;overflow-y:auto}
.lens-dd-list.open{display:block}
.lens-row{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--bdr2);transition:background .15s}
.lens-row:last-child{border-bottom:none}
.lens-row:hover{background:var(--amber-x)}
.lens-row-chk{width:13px;height:13px;border:1px solid var(--bdr);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--amber-b);line-height:1}
.lens-row-chk.on{background:var(--amber-x);border-color:var(--amber-b)}
.lens-row-ico{font-size:14px;width:16px;text-align:center;flex-shrink:0;color:var(--txt2)}
.lens-row-lbl{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.5px;color:var(--txt2)}
.lens-row.on .lens-row-lbl{color:var(--amber-b);font-weight:600}
.lens-row-sep{border-bottom:1px solid var(--bdr);margin-bottom:2px}
.lens-dd-close-btn{text-align:center;padding:10px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;color:var(--amber-b);border-top:1px solid var(--bdr);cursor:pointer;text-transform:uppercase;transition:background .15s}
.lens-dd-close-btn:hover{background:var(--amber-x)}

/* ── DRAWER CONTENT ── */
.lens-section{margin-bottom:18px}
.lens-section-hdr{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.lens-section-ico{font-size:12px;color:var(--txt2)}
.lens-section-lbl{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;color:var(--amber-b);text-transform:uppercase;font-weight:600}
.info-div{border:none;border-top:1px solid var(--bdr);margin:12px 0}
.info-txt{font-size:17.5px;line-height:1.95;color:var(--txt);font-style:italic}
.overview-arc{font-size:17.5px;line-height:1.95;color:var(--txt)}
.overview-arc p{margin-bottom:14px}
.civ-span-bar{height:3px;background:var(--bdr2);position:relative;margin:14px 0 6px;border-radius:2px}
.civ-span-fill{position:absolute;top:0;height:100%;background:var(--amber-b);border-radius:2px;opacity:.8}
.civ-span-lbls{display:flex;justify-content:space-between;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--txt3)}
.conn-hdr{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1.5px;color:var(--txt3);text-transform:uppercase;margin:18px 0 8px;font-weight:600}
.conn-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--conn-bdr);font-size:16px;color:var(--txt2);cursor:pointer;transition:color .15s}
.conn-item:hover{color:var(--amber-b)}
.conn-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── TIMELINE ── */
.tl-wrap{position:relative;height:88px;background:var(--tl-bg);border-top:1px solid var(--bdr);padding:8px 20px 14px;flex-shrink:0}

.tl-lbls{display:flex;justify-content:space-between;margin-bottom:5px}
.tl-lbl{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.8px;color:var(--txt3);text-transform:uppercase;font-weight:600}
.tl-trk{position:relative;height:5px;background:var(--bdr);border-radius:3px}
.tl-fill{position:absolute;top:0;left:0;height:5px;background:var(--amber-b);border-radius:3px;pointer-events:none;opacity:.7}
.tl-thumb{position:absolute;top:50%;width:20px;height:20px;background:var(--amber-b);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--amber),0 0 20px rgba(232,152,32,.3);pointer-events:none;transition:left .04s linear}
input.tl-range{position:absolute;top:50%;left:0;width:100%;height:28px;opacity:0;cursor:pointer;transform:translateY(-50%);margin:0;z-index:2}
.hint{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;color:var(--hint);display:flex;align-items:center;justify-content:center;padding:0 8px;white-space:nowrap;overflow:hidden}
#map-hint-text{pointer-events:none;overflow:hidden;text-overflow:ellipsis}

/* ── SHEET HANDLE — hidden by default, shown only when drawer is expanded ── */
.drawer-handle{display:none}

/* ── MOB MAP BUTTON ── */
.mob-map-btn{display:none}

/* ── PORTRAIT MOBILE (≤768px, portrait orientation) ── */
@media(max-width:768px) and (orientation:portrait){
  .logo-s{display:none}
  .cnt-disp{display:none}
  .hdr{padding:8px 12px}
  .logo-t{font-size:16px;letter-spacing:2px}
  .era-y{font-size:18px}
  .era-n{font-size:10px;letter-spacing:1.5px}
  .main{top:52px!important}
  /* Map takes top ~42vh, timeline 76px, drawer fills the rest (~50%) */
  .main{
    bottom:0;
    flex-direction:column;
    position:fixed;
  }
  .map-tl-col{
    width:100%;
  }
  .map-c{
    flex:0 0 42vh;
    width:100%;
  }
  .info-panel{
    flex:1;
    width:100%;
    border-left:none;
    border-top:1px solid var(--bdr);
    overflow-y:auto;
    padding:0 16px 16px;
    border-radius:0;
    min-height:50%;
  }
  /* Expanded: overlay covers timeline + half map */
  .info-panel.mob-open{
    position:absolute;
    left:0;right:0;
    bottom:0;
    top:21vh;
    border-top:none;
    border-radius:12px 12px 0 0;
    background:var(--panel);
    box-shadow:0 -4px 24px rgba(0,0,0,.4);
    z-index:100;
  }

  /* Drag handle — only visible when drawer is expanded */
  .mob-open .drawer-handle{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:10px 0 6px;
    cursor:grab;
    touch-action:none;
    user-select:none;
    position:sticky;
    top:0;
    z-index:10;
    background:var(--panel);
    border-radius:12px 12px 0 0;
  }
  .mob-open .drawer-handle::before{
    content:'';
    width:36px;height:4px;
    border-radius:2px;
    background:var(--bdr);
    transition:background .15s;
  }
  .mob-open .drawer-handle:active::before{
    background:var(--amber-b);
  }

  .tl-wrap{height:76px;padding:6px 14px 10px}
  .tl-lbl{font-size:9px;letter-spacing:.8px}
  .hint{font-size:8px;letter-spacing:.8px}
  .lens-dd-list{max-height:180px}
  .info-txt,.overview-arc{font-size:16px;line-height:1.82}
  .lens-row-lbl{font-size:13px}
}

/* ── LANDSCAPE MOBILE (≤768px, landscape) — desktop layout ── */
@media(max-width:900px) and (orientation:landscape){
  .logo-s{display:none}
  .hdr{padding:6px 14px}
  .logo-t{font-size:15px;letter-spacing:2px}
  .era-y{font-size:15px}
  .hint{font-size:7px;letter-spacing:.5px;white-space:normal;text-align:center;line-height:1.4}
  .tl-wrap{height:68px;padding:4px 12px 8px}

  .tl-lbl{font-size:8px}
  /* Keep side-by-side layout (same as desktop) */
  .info-panel{width:280px}
}



@keyframes ring-pulse{0%{r:5;opacity:.7}100%{r:26;opacity:0}}

/* Touch devices: pointer cursor on markers */
@media(pointer:coarse){
  #mark-layer g[role="button"]{cursor:pointer}
}

/* ── ACCESSIBILITY ── */
:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px;border-radius:2px}
.conn-item:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px}
.lens-row:focus-visible{outline:2px solid var(--amber-b);outline-offset:-2px}
button:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px}
/* Skip to content */
.skip-link{position:absolute;top:-40px;left:0;background:var(--amber-b);color:var(--bg);padding:8px 16px;z-index:9999;font-family:'Cinzel',serif;font-size:11px;text-decoration:none}
.skip-link:focus{top:0}



/* ── THREAD PANEL ── */
/* ── THREAD OVERLAY — full-width drop from top ── */
.thread-panel{
  position:fixed;top:52px;left:0;right:0;z-index:400;
  background:var(--panel);
  max-height:0;overflow:hidden;
  transition:max-height .32s cubic-bezier(.4,0,.2,1);
}
.thread-panel.open{border-bottom:1px solid var(--bdr);box-shadow:0 6px 24px var(--shadow)}
.thread-panel.open{max-height:70vh}
.thread-panel-inner{
  padding:16px 20px 20px;
  overflow-y:auto;
  max-height:calc(70vh - 1px);
}
.thread-panel-bar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bdr);
}
.thread-panel-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase}
.thread-close-btn{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:18px;line-height:1;padding:4px;transition:color .15s}
.thread-close-btn:hover{color:var(--amber-b)}
/* Concept grid — 2 cols on desktop, 1 on mobile */
.thread-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.thread-concept-btn{width:100%;background:none;border:1px solid var(--bdr2);padding:9px 12px;text-align:left;cursor:pointer;border-radius:3px;transition:all .15s}
.thread-concept-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.thread-concept-name{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.8px;color:var(--txt2);display:block;margin-bottom:4px}
.thread-concept-chain{font-size:11px;color:var(--txt3);line-height:1.5}
/* Active thread view */
.thread-back-btn{background:none;border:none;padding:0;cursor:pointer;font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--amber-b);text-transform:uppercase;transition:opacity .15s}
.thread-back-btn:hover{opacity:.7}
.thread-active-title{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--amber-b);margin:10px 0 14px}
.thread-steps-grid{display:flex;flex-direction:column;align-items:center;padding:4px 0 16px}
.thread-step{width:min(360px,90%);text-align:center;padding:10px 14px;border:1px solid var(--bdr2);border-radius:4px;font-size:12.5px;color:var(--txt2);background:var(--panel2)}
.thread-step-yr{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);margin-bottom:4px}
.thread-step-txt{line-height:1.6;color:var(--txt2)}
.thread-step-civ{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);margin-bottom:4px}
.thread-chain-link{display:flex;flex-direction:column;align-items:center;padding:2px 0;color:var(--amber-b);opacity:.6}
.thread-chain-line{width:1px;height:8px;background:var(--amber-b);opacity:.4}

/* ── COMPARE MODE ── */
.compare-wrap{display:flex;gap:0;height:100%;width:100%}
.compare-col{flex:1;min-width:0;overflow-y:auto;padding:16px;border-right:1px solid var(--bdr)}
.compare-col:last-child{border-right:none}
.compare-col-hdr{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--amber-b);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.compare-remove{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:14px;padding:2px}
.compare-remove:hover{color:var(--amber-b)}
.compare-prompt{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--txt3);font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:20px;opacity:.6}
.compare-diff{background:var(--amber-xx);border-left:2px solid var(--amber-b);padding:6px 8px;margin-bottom:2px}


/* ── SHARE TOAST ── */
.share-toast{position:fixed;bottom:108px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--panel);border:1px solid var(--bdr);padding:8px 18px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1.5px;color:var(--amber-b);text-transform:uppercase;border-radius:20px;opacity:0;transition:all .3s;pointer-events:none;z-index:500;white-space:nowrap}
.share-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}


/* ── SOUND ── */
.sound-btn{background:none;border:1px solid var(--bdr);padding:3px 8px;cursor:pointer;font-size:13px;border-radius:3px;color:var(--txt3);transition:all .15s;flex-shrink:0}
.sound-btn:hover,.sound-btn.playing{background:var(--amber-x);border-color:var(--amber-b);color:var(--amber-b)}
.sound-artifact{font-size:11px;line-height:1.55;color:var(--txt3);font-style:italic;padding:8px 10px;border-left:2px solid var(--bdr);margin:10px 0 14px;background:var(--amber-xx)}

/* ── FINGERPRINT CHART ── */
.fp-wrap{margin:14px 0 6px}
.fp-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--txt3);text-transform:uppercase;margin-bottom:8px}
.fp-svg{display:block;margin:0 auto}
.fp-label{font-family:'Cinzel',serif;font-size:8px;fill:var(--txt3)}
.fp-poly{fill:rgba(232,152,32,.18);stroke:#e89820;stroke-width:1.2}
.fp-grid{fill:none;stroke:var(--bdr);stroke-width:.5}

/* ── CONTEMPORARY BAR ── */
.contemp-wrap{margin:12px 0 4px}
.contemp-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;cursor:pointer;transition:opacity .15s}
.contemp-bar-row:hover{opacity:.75}
.contemp-bar-nm{font-family:'Cinzel',serif;font-size:8.5px;color:var(--txt3);width:80px;flex-shrink:0;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.contemp-bar-track{flex:1;height:5px;background:var(--bdr2);border-radius:2px;position:relative}
.contemp-bar-fill{position:absolute;top:0;height:100%;border-radius:2px;opacity:.7}
.contemp-bar-yr{font-family:'Cinzel',serif;font-size:7.5px;color:var(--txt3);white-space:nowrap;width:60px;text-align:right;flex-shrink:0}

/* ── DENSITY SPARKLINE ── */
#density-bar{height:18px;width:100%;display:block;margin-bottom:1px}

/* ── WHAT-IF MODE ── */
.whatif-civ-btn{width:100%;background:none;border:1px solid var(--bdr2);padding:7px 10px;text-align:left;cursor:pointer;font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:.5px;color:var(--txt2);margin-bottom:3px;border-radius:2px;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.whatif-civ-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.whatif-civ-btn.selected{background:rgba(232,37,26,.12);border-color:#e8251a;color:#e8251a}
.whatif-result{margin-top:12px;padding:12px;border:1px solid var(--bdr);border-radius:3px;background:var(--panel2)}
.whatif-chain{padding:6px 0;border-bottom:1px solid var(--bdr2);font-size:12px;color:var(--txt2)}
.whatif-chain:last-child{border-bottom:none}
.whatif-chain.lost{color:#e8251a;text-decoration:line-through;opacity:.6}
.whatif-intro{font-size:13px;line-height:1.7;color:var(--txt2);font-style:italic;margin-bottom:12px}

/* ── HERITAGE MODE ── */
.heritage-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.heritage-btn{background:none;border:1px solid var(--bdr2);padding:8px 6px;cursor:pointer;font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.5px;color:var(--txt2);border-radius:2px;transition:all .15s;text-align:center}
.heritage-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.heritage-btn.active{background:var(--amber-x);border-color:var(--amber-b);color:var(--amber-b)}

/* ── MAP ZOOM TRANSITION ── */

#cluster-picker{

.cluster-btn:last-child{border-bottom:none}
.cluster-btn:hover,.cluster-btn:active{background:var(--amber-xx)}
.cluster-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cluster-nm{font-family:'Cinzel',serif;font-size:10px;color:var(--txt2);letter-spacing:.3px}
.cluster-sb{font-size:9px;color:var(--txt3);margin-top:1px}


/* ── MAP ZOOM/PAN ── */
#wsvg{touch-action:none;user-select:none;-webkit-user-select:none}
.map-zoom-ctrl{position:absolute;bottom:8px;right:8px;display:flex;flex-direction:column;gap:3px;z-index:50}
.map-zoom-btn{width:28px;height:28px;background:var(--panel);border:1px solid var(--bdr);color:var(--amber-b);
  font-size:16px;cursor:pointer;border-radius:3px;display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;transition:all .15s}
.map-zoom-btn:hover{background:var(--panel2);border-color:var(--amber)}
.cluster-hint{position:absolute;bottom:44px;left:50%;transform:translateX(-50%);
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--amber-b);
  background:var(--panel);border:1px solid var(--bdr);padding:4px 12px;border-radius:20px;
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:51}
.cluster-hint.show{opacity:1}

/* ── CLUSTER PICKER ── */
#cluster-picker{
  position:fixed;z-index:900;background:var(--panel);
  border:1px solid var(--bdr);border-radius:6px;
  min-width:180px;max-width:260px;max-height:320px;overflow-y:auto;

}

}
.cluster-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;
  cursor:pointer;border-bottom:1px solid var(--bdr2);
  transition:background .12s;
}
.cluster-item:last-child{border-bottom:none}
.cluster-item:hover,.cluster-item:active{background:var(--panel2)}
.cluster-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#e8251a}
.cluster-item-nm{font-family:'Cinzel',serif;font-size:13px;color:var(--txt);flex:1}
.cluster-item-sb{font-size:11px;color:var(--txt3);margin-top:1px}

/* ── BURGER MENU ── */
.burger-wrap{position:relative}
.burger-btn{background:none;border:1px solid var(--bdr);color:var(--amber-b);cursor:pointer;
  width:34px;height:34px;border-radius:3px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;padding:0}
.burger-btn:hover{background:var(--panel2);border-color:var(--amber)}
.burger-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--panel);
  border:1px solid var(--bdr);border-radius:4px;min-width:196px;
  box-shadow:0 8px 32px var(--shadow);z-index:800;
  display:none;flex-direction:column;overflow:hidden}
.burger-menu.open{display:flex}
.burger-item{display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:none;border:none;color:var(--txt2);cursor:pointer;text-align:left;
  font-family:'Cinzel',serif;font-size:12px;letter-spacing:.5px;width:100%;
  transition:background .12s;white-space:nowrap}
.burger-item:hover,.burger-item:active{background:var(--panel2);color:var(--txt)}
.burger-item.active,.burger-item.burger-mode.active{background:var(--amber-x);color:var(--amber-b)}
.burger-item-badge{margin-left:auto;font-size:9px;color:var(--amber-b);

.burger-divider{height:1px;background:var(--bdr2);margin:2px 0}
/* Herstory tint on mode items */
body.herstory .burger-item.burger-mode.active{background:rgba(192,96,160,.12);color:#c060a0}
body.herstory .hdr{border-bottom-color:rgba(192,96,160,.3)}

</style>

<script>
// ── LENSES ──────────────────────────────────────────────────────────────────
// IMPORTANT FOR FUTURE AGENTS: always insert new lenses in strict alphabetical
// order by `lbl`. The lens picker renders this array as-is; an unsorted entry
// will appear out of place in the UI and break predictable scan order.
// ────────────────────────────────────────────────────────────────────────────
const LENSES=[];


const ERAS=[];

const ITEMS=[
{id:'hadean',nm:'Hadean Eon',sb:'Formation of Earth · 4.5–4.0 Ga',s:-4500000000,e:-4000000000,lon:0,lat:0,
fp:{dur:10,imp:10,scl:10,cpx:2,leg:10,evi:2},
conns:['late_heavy_bombardment','archean','theia_impact'],
overview:'The Hadean Eon spans Earth\'s first 500 million years, from the planet\'s accretion out of the solar nebula around 4.54 billion years ago to approximately 4.0 billion years ago. Named after the Greek underworld Hades, this was a period of relentless bombardment, magma oceans, and atmospheric outgassing that transformed a ball of molten rock into a world with liquid water and a primitive atmosphere. The oldest known terrestrial mineral — a zircon crystal from Jack Hills, Western Australia, dated to 4.4 billion years ago — suggests oceans may have formed far earlier than once thought.',
d:{
biology:'No confirmed life existed during the Hadean, though the boundary is contested. The formation of amino acids and nucleotides from simpler precursors likely began in this period through processes such as those demonstrated by the Miller-Urey experiment. Hydrothermal vents on the early ocean floor may have provided the chemical gradients necessary for proto-metabolic reactions, and recent studies of carbon isotope signatures in 4.1-billion-year-old zircons hint at possible biological carbon cycling.',
chemistry:'The Hadean saw the differentiation of Earth\'s core, mantle, and crust through gravitational separation of heavy elements like iron and nickel. Volcanic outgassing released water vapour, carbon dioxide, nitrogen, and hydrogen sulfide, building Earth\'s first atmosphere. The late veneer hypothesis suggests that much of Earth\'s water and volatile elements were delivered by carbonaceous chondrite meteorites during this period.',
climate:'Earth\'s early atmosphere was dominated by carbon dioxide, nitrogen, and water vapour with virtually no free oxygen. Surface temperatures likely exceeded 200°C during the early magma ocean phase but cooled sufficiently for liquid water to condense by around 4.4 billion years ago. The faint young Sun paradox — the Sun was 30% dimmer than today, yet Earth was not frozen — is resolved by greenhouse warming from high CO2 concentrations.',
culture:'No culture existed during the Hadean. The concept is inapplicable to a lifeless world, yet the Hadean\'s naming itself reflects human culture — the choice of \'Hades\' frames deep time through Greek mythology, revealing how even geological science is shaped by cultural inheritance. The Hadean challenges human comprehension of time itself.',
ecology:'No ecosystems existed. The Hadean\'s relevance to ecology lies in establishing the planetary conditions — liquid water, an energy source, chemical gradients — that would eventually permit the first ecosystems. The prebiotic chemistry of the Hadean set the stage for the transition from geochemistry to biochemistry.',
energy:'Earth\'s primary energy sources during the Hadean were gravitational accretion heat, radioactive decay of short-lived isotopes like aluminium-26, and energy from asteroid impacts. The heat budget was enormous — enough to maintain a global magma ocean for millions of years. Tidal heating from the much-closer Moon also contributed significantly to early Earth\'s energy balance.',
extinction:'No extinctions could occur in the absence of life. However, the Hadean established the template for planetary catastrophe that would define Earth\'s history: the Late Heavy Bombardment, volcanic resurfacing, and atmospheric instability created a world where destruction and renewal were inseparable processes from the start.',
geology:'The Hadean saw Earth\'s geological differentiation into a metallic core, silicate mantle, and thin crust. The earliest rocks that survive from this period are the Acasta Gneiss in Canada (4.03 Ga) and the Jack Hills zircons in Australia (4.4 Ga). The formation of the first continental nuclei — protocontinents called cratons — began toward the end of the Hadean.',
governance:'The concept is inapplicable. Yet the Hadean illustrates how physical laws — gravity, thermodynamics, electromagnetism — impose an absolute governance on matter that no subsequent human system has ever matched in consistency or enforcement. The universe governs through physics before politics was possible.',
innovation:'No intentional innovation existed. But the Hadean produced what might be called natural innovation on a planetary scale: the differentiation of a molten ball into layered structure, the condensation of oceans from an atmosphere, and the synthesis of complex organic molecules from simple precursors. These emergent processes are the deepest ancestors of all subsequent creativity.',
legacy:'The Hadean\'s legacy is total — it created the planet on which all subsequent events occur. Earth\'s mass, its distance from the Sun, the Moon\'s stabilising influence on axial tilt, the magnetic field generated by the liquid iron core, and the volatile inventory delivered by late accretion all constrain every subsequent possibility. Every living thing inherits the Hadean.',
migration:'No biological migration occurred. However, the Hadean saw the most consequential movement of matter in Earth\'s history: the inward migration of iron to form the core, the outward migration of lighter silicates to form the mantle and crust, and the upward migration of volatiles through outgassing to form the atmosphere and oceans.',
ocean:'Earth\'s oceans likely formed during the Hadean, perhaps as early as 4.4 billion years ago based on oxygen isotope evidence from Jack Hills zircons. The source of Earth\'s water remains debated — endogenous outgassing, cometary delivery, and carbonaceous chondrite delivery all contribute. By the end of the Hadean, a global ocean likely covered most of the planet.',
philosophy:'The Hadean forces a confrontation with deep time that challenges every human philosophical framework. The recognition that Earth existed for 500 million years before anything resembling life appeared places consciousness in a humbling context. The Hadean is the ultimate argument against anthropocentrism — the universe was not waiting for us.',
scale:'The Hadean spans approximately 500 million years — longer than the entire Phanerozoic (the last 541 million years that contains all complex life). Earth\'s mass is 5.97 × 10²⁴ kg. The energy released during the Theia impact that formed the Moon is estimated at 10³² joules — roughly 100 million times the energy that would later kill the dinosaurs.',
survival:'Nothing needed to survive because nothing yet lived. But the conditions for survival were being established: liquid water as a solvent, a magnetic field to shield the surface from solar wind, and an atmosphere thick enough to moderate temperature. The Hadean created the stage; life would have to invent survival itself.',
tipping_point:'The condensation of the first liquid water on Earth\'s surface was the single most consequential tipping point in the planet\'s history. Without it, Earth would have remained a Venus-like hothouse. The formation of the Moon through the Theia impact is the other critical threshold — without the Moon, Earth\'s axial tilt would be unstable, seasons chaotic, and complex life far less likely.',
trade:'No exchange occurred between organisms. Yet the Hadean established the planetary cycles — the water cycle, the carbon cycle, the rock cycle — that constitute the deepest form of material exchange on Earth. All subsequent trade, biological or economic, is a surface perturbation of these underlying geochemical cycles.',
transformation:'The Hadean is defined by transformation: from solar nebula to protoplanet, from homogeneous ball to differentiated layers, from magma ocean to solid crust, from steam atmosphere to liquid ocean. No subsequent period in Earth\'s history involved transformation of comparable magnitude. The Hadean made a planet out of dust.',
violence:'The Hadean was the most violent period in Earth\'s history. The Theia impact vaporised a significant fraction of the proto-Earth and ejected enough material to form the Moon. The Late Heavy Bombardment (c. 4.1–3.8 Ga) delivered millions of asteroid impacts. Impact energies routinely exceeded those that would later cause mass extinctions, and several may have sterilised the entire surface.'}},
{id:'theia_impact',nm:'Theia Impact',sb:'Moon-Forming Collision · ~4.5 Ga',s:-4530000000,e:-4500000000,lon:0,lat:0,
fp:{dur:1,imp:10,scl:10,cpx:3,leg:10,evi:4},
conns:['hadean','late_heavy_bombardment','archean'],
overview:'Approximately 4.53 billion years ago, a Mars-sized protoplanet called Theia collided with the young Earth in a cataclysm that reshaped the planet and created the Moon. The giant impact hypothesis, first proposed by William Hartmann and Donald Davis in 1975 and refined by Alastair Cameron and William Ward, is now the leading explanation for the Moon\'s origin. The collision vaporised Theia entirely and melted much of Earth\'s mantle, ejecting a disk of molten debris that coalesced into the Moon within perhaps a century.',
d:{
biology:'The Theia impact almost certainly sterilised Earth\'s surface completely, resetting any prebiotic chemistry that may have begun. Paradoxically, this destruction may have been essential for life\'s eventual emergence: the collision delivered additional volatiles, created the tidal forces that would later drive coastal chemistry, and established the axial tilt that produces seasons — a driver of biological diversity.',
chemistry:'The impact homogenised Earth\'s mantle and contributed to core formation by driving remaining iron downward. The isotopic similarity between Earth and Moon rocks — particularly in oxygen, titanium, and tungsten isotopes — suggests thorough mixing, challenging earlier models that predicted the Moon would be compositionally distinct. The collision also delivered siderophile (iron-loving) elements to Earth\'s mantle.',
climate:'The immediate aftermath was a magma ocean covering the entire Earth, with surface temperatures exceeding 2,000°C. The vaporised rock created a silicate atmosphere that took thousands of years to cool and condense. The Moon\'s subsequent tidal influence on Earth\'s rotation and axial stability would prove critical for long-term climate stability.',
culture:'The Theia impact has become a powerful metaphor in popular culture for catastrophic creative destruction — the idea that the worst possible event can produce something essential. The Moon it created has shaped every human culture through mythology, calendrics, navigation, and the tidal rhythms that organised coastal societies for millennia.',
ecology:'No ecology existed at the time. But the Moon created by Theia\'s impact would become one of the most important ecological drivers in Earth\'s history: tidal cycles created the intertidal zone, one of the most biologically productive habitats on Earth and possibly the site where life first transitioned from water to land.',
energy:'The Theia impact released approximately 10³² joules of energy — equivalent to billions of nuclear arsenals. This energy melted Earth\'s entire surface and interior, creating a global magma ocean. The collision also added rotational energy, spinning Earth to a 5-hour day, which tidal friction from the Moon has gradually slowed to the current 24 hours.',
extinction:'If any primitive life existed before the impact, it was annihilated. The Theia impact represents the ultimate extinction event — not merely the destruction of species but the destruction of habitability itself. Every square metre of Earth\'s surface was rendered molten. Life had to begin entirely anew after the planet cooled.',
geology:'The collision added roughly 10% to Earth\'s mass and completed core-mantle differentiation. The impact angle — estimated at approximately 45 degrees — was critical: a head-on collision would not have produced enough debris for the Moon, while a glancing blow would have been insufficient. Computer simulations suggest the entire event lasted only hours.',
governance:'Inapplicable to a lifeless world. Yet the Theia impact demonstrates the ultimate ungovernable force — a collision between planetary bodies that no amount of intelligence, technology, or organisation could prevent or survive. It is the baseline against which all human concepts of power must be measured.',
innovation:'The Theia impact produced the Moon — arguably the most consequential natural innovation in Earth\'s history after the planet\'s own formation. The Moon stabilises Earth\'s axial tilt at 23.5 degrees, preventing the chaotic oscillations (0–85 degrees) that would make complex life impossible. Without Theia, Earth may never have developed conditions suitable for evolution.',
legacy:'The Moon. Every lunar calendar, every tide, every eclipse, every poem about moonlight traces back to this single collision. The Moon\'s gravitational stabilisation of Earth\'s axis made seasons predictable and climate zones stable — preconditions for the evolution of complex life and eventually agriculture. Theia\'s violence made civilisation possible.',
migration:'The debris from the collision migrated into orbit around Earth, forming a disk of molten material that accreted into the Moon within approximately 100 years. The Moon itself has been migrating outward ever since — it was originally roughly 15 times closer than today, and continues to recede at 3.8 centimetres per year.',
ocean:'The impact boiled away any water present on Earth\'s surface, but the water was not lost — it remained in the atmosphere as superheated vapour and recondensed as the planet cooled over the following millennia. The impact may also have delivered additional water from Theia\'s own volatile inventory, contributing to Earth\'s eventual ocean volume.',
philosophy:'The Theia impact is a profound philosophical provocation: the existence of everything we value — life, consciousness, beauty, meaning — depends on an event of inconceivable violence and randomness. If Theia had missed, or hit at a different angle, the Moon would not exist, Earth\'s axis would be unstable, and we would not be here to contemplate it.',
scale:'Theia was approximately the size of Mars — 6,000 km in diameter. The collision velocity was approximately 4 km/s. The energy released was 100 million times greater than the Chicxulub impact that killed the dinosaurs. The resulting debris disk extended to roughly 20,000 km from Earth\'s surface. The Moon formed from this disk within decades to centuries.',
survival:'Nothing survived. The Theia impact created conditions incompatible with any conceivable biochemistry: surface temperatures of 2,000°C+, a silicate vapour atmosphere, and a global magma ocean hundreds of kilometres deep. The concept of survival is meaningless in the face of planetary-scale melting.',
tipping_point:'The Theia impact was the most consequential tipping point in Earth\'s history. Before it, Earth was one of many rocky protoplanets. After it, Earth had a large stabilising moon, a lengthened day-night cycle, tidal forces, and the mass necessary to retain a substantial atmosphere. The difference between Earth and Venus may ultimately trace to this single event.',
trade:'No exchange of any kind occurred. The concept is inapplicable. Yet the Theia impact was itself the ultimate forced exchange — two planetary bodies merged their mass, energy, and chemical inventories in a transaction from which neither could withdraw. Earth received Theia\'s iron core; the Moon received Earth\'s silicate mantle.',
transformation:'The most extreme transformation in Earth\'s history. A collision between two planetary bodies produced a single larger planet and a moon. Earth\'s rotation period changed from unknown to approximately 5 hours. Its mass increased by 10%. Its surface was entirely resurfaced with molten rock. A world without a moon became a world with one.',
violence:'The Theia impact defines the upper limit of violence in Earth\'s history. The kinetic energy of a Mars-sized body striking at 4 km/s exceeds human comprehension. The entire planet was liquefied. The atmosphere was replaced with rock vapour. The debris field extended tens of thousands of kilometres. Nothing in subsequent Earth history — no extinction, no eruption, no human war — approaches this scale of destruction.'}},
{id:'late_heavy_bombardment',nm:'Late Heavy Bombardment',sb:'Cataclysmic Asteroid Period · 4.1–3.8 Ga',s:-4100000000,e:-3800000000,lon:0,lat:0,
fp:{dur:6,imp:9,scl:9,cpx:2,leg:8,evi:5},
conns:['hadean','theia_impact','archean','eoarchean_life'],
overview:'The Late Heavy Bombardment (LHB), also called the lunar cataclysm, was a period roughly 4.1 to 3.8 billion years ago when the inner Solar System experienced a dramatic spike in asteroid and comet impacts. Evidence comes primarily from radiometric dating of lunar impact basins — the great dark maria visible from Earth — which cluster suspiciously around 3.9 billion years ago. The Nice model suggests this bombardment was triggered by a gravitational resonance between Jupiter and Saturn that destabilised the asteroid belt and scattered planetesimals inward.',
d:{
biology:'The LHB may have repeatedly sterilised Earth\'s surface, forcing life to begin multiple times or to shelter in deep subsurface environments. Paradoxically, impacts may also have delivered organic molecules and water to Earth. The frustration hypothesis suggests that life could not gain a permanent foothold until the bombardment subsided around 3.8 Ga — neatly coinciding with the earliest chemical evidence for life.',
chemistry:'Impactors delivered extraterrestrial material including water, carbon compounds, and platinum-group elements to Earth\'s surface. The siderophile element anomaly in Earth\'s mantle — metals that should have sunk to the core are present in unexpected quantities — is partly explained by late delivery during the LHB. Impact-generated hydrothermal systems may have driven prebiotic chemistry.',
climate:'Individual large impacts could vaporise entire oceans, creating temporary steam atmospheres lasting thousands of years. Smaller impacts ejected dust that blocked sunlight, causing impact winters. The cumulative effect was extreme climate instability — Earth oscillated between hothouse and freezing conditions on timescales far shorter than any subsequent climate variation.',
culture:'The LHB is invisible to the naked eye from Earth but written across the face of the Moon. The dark lunar maria — the \'seas\' that form the Man in the Moon — are basalt flows that filled impact basins created during this period. Every culture that has seen patterns in the Moon is reading the scars of the Late Heavy Bombardment.',
ecology:'No established ecosystems existed. The LHB prevented ecological stability by repeatedly resetting surface conditions. Any organisms that had emerged were confined to the deep subsurface or destroyed. The end of the LHB around 3.8 Ga marks the transition from a hostile to a habitable surface — the opening of the ecological stage.',
energy:'The energy delivered by the LHB was staggering. The South Pole-Aitken basin impact on the Moon released approximately 10²⁶ joules. Earth received proportionally more impacts due to its larger cross-section and stronger gravity. The total energy delivered over 300 million years exceeded that of the Theia impact, though spread over a longer period.',
extinction:'If life existed before or during the LHB, it faced repeated extinction-level events. The largest impacts could sterilise the entire ocean to a depth of hundreds of metres. The concept of mass extinction is anachronistic for this period — it was serial near-annihilation, not the loss of established biodiversity but the prevention of biodiversity from establishing at all.',
geology:'The LHB resurfaced much of Earth\'s crust. The oldest surviving terrestrial rocks — the Acasta Gneiss (4.03 Ga) and Isua greenstone belt (3.8 Ga) — bracket this period, suggesting that the bombardment destroyed most earlier crustal material. Lunar maria, visible impact basins on Mars and Mercury, and the absence of older terrestrial rocks all support the LHB hypothesis.',
governance:'Inapplicable. The LHB illustrates the governance of chaos — orbital mechanics and gravitational resonances determining the fate of worlds with no possibility of intervention or appeal. The Nice model shows how the migration of giant planets 700 million years after the Solar System formed could cascade into planetary catastrophe.',
innovation:'The LHB may have delivered the raw materials for life\'s origin. Carbonaceous chondrite meteorites carry amino acids, sugars, and nucleobases. Impact-generated hydrothermal systems could have concentrated and polymerised these molecules. The bombardment was simultaneously destroyer and enabler — innovation through catastrophe at planetary scale.',
legacy:'The LHB\'s most visible legacy is the face of the Moon — every dark patch is a basalt-filled impact basin from this period. On Earth, the bombardment may have triggered plate tectonics by thinning and fracturing the early crust. The delivery of water and organics during this period may have been essential for the origin of life.',
migration:'The LHB was caused by the migration of the giant planets. In the Nice model, Jupiter and Saturn crossed a 2:1 orbital resonance that destabilised Neptune and Uranus, which scattered the Kuiper Belt and asteroid belt inward. This cascade of planetary migration caused the bombardment that reshaped the inner Solar System.',
ocean:'Earth\'s oceans were repeatedly disrupted during the LHB. The largest impacts could vaporise significant portions of the ocean, which would recondense over thousands of years. Despite this violence, the ocean as a whole persisted — Earth retained enough water throughout the bombardment to maintain liquid oceans once the surface cooled between major impacts.',
philosophy:'The LHB raises the question of contingency in cosmic history. If Jupiter and Saturn had not crossed their resonance, the bombardment might not have occurred, and life might have emerged 300 million years earlier — or not at all, if the bombardment delivered essential materials. The LHB is a meditation on how chaos at one scale creates order at another.',
scale:'The largest LHB impact basins on the Moon — Imbrium (1,145 km diameter) and Orientale (930 km) — required impactors tens of kilometres across. Earth, with its stronger gravity, attracted even larger bodies. An estimated 22,000 craters larger than 20 km formed on the Moon during this period; Earth received proportionally more.',
survival:'If microbial life existed during the LHB, it survived only in the deep subsurface — kilometres below the surface in rock fractures, fed by chemical energy from water-rock reactions. This hypothesis is supported by the existence of modern deep biosphere organisms that require no sunlight. The LHB may have selected for extremophile biochemistry from the very beginning.',
tipping_point:'The end of the LHB around 3.8 billion years ago was a critical tipping point. With impact rates dropping to background levels, Earth\'s surface became stably habitable for the first time. The earliest chemical evidence for life — carbon isotope signatures in the Isua greenstone belt — dates to precisely this transition. Life may have emerged the moment it could.',
trade:'No biological or cultural exchange existed. The LHB represents exchange at a cosmic scale — material from the asteroid belt and Kuiper Belt delivered to the inner Solar System through gravitational perturbation. Earth\'s inventory of water, noble gases, and platinum-group elements was permanently altered by this forced redistribution of Solar System material.',
transformation:'The LHB transformed the inner Solar System from a relatively stable post-accretion configuration into a scarred landscape of impact basins. On Earth, it may have initiated plate tectonics, delivered volatiles essential for the atmosphere and oceans, and created the hydrothermal environments where life first emerged. Destruction was the mechanism of transformation.',
violence:'The LHB was 300 million years of sustained planetary violence. Impactors ranging from kilometres to hundreds of kilometres in diameter struck Earth at velocities of 15-20 km/s. Individual impacts excavated craters hundreds of kilometres across, melted thousands of cubic kilometres of rock, and ejected debris into space. The cumulative effect was the most prolonged period of surface destruction in Earth\'s post-formation history.'}},
{id:'eoarchean_life',nm:'Origin of Life',sb:'First Microbial Life · ~3.8 Ga',s:-3800000000,e:-3500000000,lon:30,lat:-28,
fp:{dur:6,imp:10,scl:3,cpx:5,leg:10,evi:4},
conns:['late_heavy_bombardment','archean','great_oxygenation','stromatolites'],
overview:'Life emerged on Earth approximately 3.8 billion years ago, shortly after the Late Heavy Bombardment subsided. The earliest evidence comes from carbon isotope signatures in the Isua greenstone belt of Greenland (3.8 Ga) and possible microfossils in the Nuvvuagittuq belt of Quebec (up to 4.28 Ga, though contested). The mechanism remains one of science\'s deepest open questions — leading hypotheses include alkaline hydrothermal vents (the \'Lost City\' model), volcanic hot springs, and impact-generated environments. What is certain is that by 3.5 Ga, microbial life was abundant enough to build stromatolites.',
d:{
biology:'The origin of life required the transition from chemistry to biology — the emergence of self-replicating molecules capable of Darwinian evolution. The RNA World hypothesis suggests that RNA, which can both store information and catalyse reactions, preceded DNA and proteins. LUCA (Last Universal Common Ancestor) was likely a thermophilic organism living near hydrothermal vents, using hydrogen and CO2 for energy.',
chemistry:'The prebiotic chemistry that led to life required the formation of amino acids, nucleotides, lipids, and sugars from simple precursors like water, CO2, NH3, and H2S. The Miller-Urey experiment (1953) showed that amino acids form readily in reducing atmospheres. Modern research focuses on serpentinization at alkaline vents, which generates hydrogen gradients that could drive proto-metabolism.',
climate:'Life emerged into a world with no free oxygen, high CO2, and surface temperatures perhaps 50-80°C — a hot, acidic, reducing environment utterly unlike today. The earliest organisms were anaerobic, deriving energy from chemical reactions rather than sunlight. The climate was governed entirely by geological processes; biology had not yet begun to modify the atmosphere.',
culture:'The origin of life has been the subject of creation myths in every human culture. The scientific investigation of abiogenesis — from Pasteur\'s disproof of spontaneous generation to Miller-Urey to modern astrobiology — represents one of humanity\'s most profound intellectual quests. The question \'How did life begin?\' remains partially unanswered.',
ecology:'The first ecosystems were microbial communities in extreme environments — hydrothermal vents, hot springs, and possibly beneath rock surfaces. These communities were chemosynthetic, deriving energy from inorganic chemical reactions rather than sunlight. The deep biosphere model suggests life may have originated underground and only later colonised the surface.',
energy:'The first living systems harvested energy from chemical gradients — particularly the proton gradient across alkaline vent chimneys, where alkaline fluids met acidic ocean water. This \'chemiosmotic\' energy source is preserved in every living cell today: the ATP synthase enzyme that powers all life uses the same proton gradient mechanism.',
extinction:'The earliest life faced constant existential threats: asteroid impacts, UV radiation (no ozone layer existed), and geochemical instability. Multiple origins and extinctions may have occurred before life permanently established itself. The concept of \'extinction\' at this stage means the complete erasure of all biology, not the loss of particular species.',
geology:'The geological context of life\'s origin is debated. The Isua greenstone belt in Greenland preserves the oldest sedimentary rocks (3.8 Ga) with possible biosignatures. The Pilbara Craton in Western Australia and the Barberton Greenstone Belt in South Africa contain the oldest undisputed microbial fossils (3.5 Ga). These ancient rocks formed in shallow marine and hydrothermal environments.',
governance:'Inapplicable in any political sense. But life\'s origin established the first self-governing system on Earth: a biochemical network capable of maintaining itself, reproducing, and adapting to changing conditions. The genetic code is the oldest governance system on Earth — it has been in continuous operation for at least 3.5 billion years.',
innovation:'The origin of life was the most consequential innovation in Earth\'s history. The emergence of self-replicating molecules capable of natural selection introduced a fundamentally new process — Darwinian evolution — that would transform the planet\'s atmosphere, oceans, and geology. Every subsequent innovation, biological or cultural, descends from this single breakthrough.',
legacy:'Every living organism on Earth — from the deepest ocean vent bacterium to the human reading this — descends from the first self-replicating systems that emerged 3.8 billion years ago. The genetic code is universal: the same codons specify the same amino acids in bacteria, trees, and humans. Life\'s origin is the single event from which all biological legacy flows.',
migration:'The earliest life was confined to specific chemical environments — probably hydrothermal vents or similar energy-rich niches. The colonisation of new habitats was the first biological migration: from deep-sea vents to shallow waters, from ocean to freshwater, and eventually (billions of years later) from water to land. Each migration required evolutionary innovation.',
ocean:'Life almost certainly originated in the ocean — either at deep-sea hydrothermal vents, in shallow coastal waters, or in submarine volcanic environments. The ocean provided the water solvent essential for biochemistry, the dissolved minerals for energy, and the protection from ultraviolet radiation that would have destroyed unshielded organic molecules on the surface.',
philosophy:'The origin of life raises the deepest philosophical questions: Is life an inevitable consequence of chemistry given sufficient time and energy, or a vanishingly improbable accident? If life is chemistry made complex, where does \'life\' begin and \'non-life\' end? The emergence of something from nothing — meaning from matter — is the hard problem of biology.',
scale:'The first organisms were micrometre-scale — perhaps 1-2 micrometres across, similar to modern bacteria. Yet these microscopic entities would eventually transform the entire planet. The scale contrast between the first cell and the biosphere it would create is the most extreme amplification in Earth\'s history — from a single self-replicating molecule to a planetary phenomenon.',
survival:'The first living systems had to solve the fundamental problem of survival: maintaining internal order against the thermodynamic tendency toward disorder. This required energy harvesting, self-repair, and reproduction. The solutions invented by the earliest life — lipid membranes, enzyme catalysis, genetic information storage — remain the foundation of all biology.',
tipping_point:'The origin of life was an irreversible tipping point. Once self-replicating systems capable of evolution existed, they could never be permanently eliminated short of destroying the planet. Life has survived every subsequent catastrophe — asteroid impacts, snowball glaciations, mass extinctions — because evolution ensures that some organisms can adapt to any survivable condition.',
trade:'The earliest metabolic exchange was between organisms and their chemical environment — consuming hydrogen sulfide, carbon dioxide, and dissolved minerals, and excreting waste products that altered ocean chemistry. This proto-trade between life and geochemistry established the biogeochemical cycles that now regulate the entire Earth system.',
transformation:'The origin of life transformed Earth from a purely geological planet into a biogeological one. Within a few hundred million years of life\'s emergence, microbial metabolism was altering ocean chemistry, building stromatolite reefs, and beginning the slow oxygenation that would eventually transform the atmosphere. Life became a geological force.',
violence:'The earliest life existed in an environment of extreme geological violence: volcanic eruptions, hydrothermal instability, and residual asteroid impacts. Survival required tolerance of conditions that would be lethal to most modern organisms — extreme heat, acidity, radiation, and chemical toxicity. Life was born in violence and shaped by it from the beginning.'}},

{id:'archean',nm:'Archean Eon',sb:'Age of Microbes · 4.0–2.5 Ga',s:-4000000000,e:-2500000000,lon:25,lat:-30,
fp:{dur:10,imp:10,scl:10,cpx:4,leg:10,evi:5},
conns:['hadean','eoarchean_life','stromatolites','great_oxygenation'],
overview:'The Archean Eon spans from 4.0 to 2.5 billion years ago — 1.5 billion years during which life evolved from simple single-celled organisms into complex microbial ecosystems capable of reshaping the planet. The earliest continental crust stabilised, plate tectonics likely began, and the first photosynthetic organisms — cyanobacteria — appeared, beginning the slow oxygenation that would transform Earth\'s atmosphere. The Archean\'s microbial biosphere was invisible to the naked eye but planetary in its consequences.',
d:{
biology:'Archean life was entirely prokaryotic — single-celled organisms without nuclei, including bacteria and archaea. The major evolutionary innovations of this eon include photosynthesis (both anoxygenic and oxygenic), nitrogen fixation, and methanogenesis. Cyanobacteria evolved oxygenic photosynthesis by approximately 2.7 Ga, an innovation that would eventually transform Earth\'s atmosphere and enable all complex life.',
chemistry:'The Archean atmosphere contained negligible free oxygen — instead dominated by nitrogen, carbon dioxide, methane, and water vapour. Banded iron formations (BIFs), characteristic of this eon, record the episodic release of oxygen by cyanobacteria, which was immediately consumed by dissolved iron in the oceans. The ocean was green with dissolved ferrous iron, not blue.',
climate:'The Archean climate was warm despite the Sun being 20-25% fainter than today — the faint young Sun paradox. Greenhouse warming from high CO2 and methane concentrations kept surface temperatures above freezing. Methane produced by methanogenic archaea may have been a critical greenhouse gas. Some models suggest surface temperatures of 50-80°C during parts of the Archean.',
culture:'The Archean has no cultural dimension in the human sense. Yet Archean stromatolites — the oldest visible evidence of life, found in Western Australia\'s Pilbara region — have become iconic in the public imagination of deep time. They feature prominently in science education and have influenced the search for life on Mars.',
ecology:'Archean ecosystems were microbial mat communities dominated by chemosynthetic and photosynthetic bacteria. Stromatolites — layered structures built by cyanobacterial mats trapping sediment — formed the first reef-like structures. These microbial ecosystems were the sole biosphere for over a billion years, cycling carbon, nitrogen, and sulfur on a global scale.',
energy:'Archean organisms exploited diverse energy sources: chemical energy from hydrogen, sulfur, and iron compounds (chemosynthesis), and eventually sunlight (photosynthesis). The evolution of oxygenic photosynthesis was the most important energy innovation in biological history — it tapped an essentially unlimited energy source (sunlight) and produced a powerful oxidant (oxygen) as waste.',
extinction:'No mass extinction events are documented in the Archean, though the fossil record is too sparse to detect them. The rise of cyanobacteria and the beginning of oxygen production around 2.7 Ga may have caused the first biological extinction crisis — anaerobic organisms for whom oxygen was a lethal poison would have been displaced from surface environments.',
geology:'The Archean saw the formation of the first stable continental crust — cratons that survive today as the ancient cores of continents. The Canadian Shield, the Pilbara and Yilgarn cratons of Australia, and the Kaapvaal Craton of South Africa contain the oldest Archean rocks. Greenstone belts — sequences of metamorphosed volcanic and sedimentary rocks — are characteristic Archean geological formations.',
governance:'Inapplicable. The Archean\'s microbial ecosystems operated through chemical signalling and resource competition, not governance. Yet quorum sensing — the ability of bacteria to coordinate behaviour based on population density — may have evolved during this period, representing the oldest form of collective decision-making on Earth.',
innovation:'The Archean\'s greatest innovation was photosynthesis — the ability to convert sunlight into chemical energy. This single metabolic invention would ultimately oxygenate the atmosphere, enable aerobic respiration, permit the evolution of complex multicellular life, and create the ozone layer that protects life from ultraviolet radiation. It is the most consequential biological innovation in Earth\'s history.',
legacy:'The Archean\'s legacy is the living biosphere. Every photosynthetic organism — every plant, every alga, every cyanobacterium — uses photosynthetic machinery descended from Archean innovations. The continental cratons that formed in the Archean remain the geological cores of modern continents. The banded iron formations deposited during this eon are the source of most of the world\'s iron ore.',
migration:'Archean life migrated from deep-sea environments to shallow waters and eventually to continental surfaces. The colonisation of new habitats drove diversification. Horizontal gene transfer — the sharing of genetic material between unrelated organisms — was likely the dominant mode of genetic migration, spreading innovations like photosynthesis rapidly across microbial communities.',
ocean:'The Archean ocean was fundamentally different from today\'s: anoxic (no dissolved oxygen), rich in dissolved iron, and probably greenish in colour. It was stratified, with a thin oxygenated surface layer produced by cyanobacteria overlying a vast anoxic deep ocean. The banded iron formations that define Archean geology record the interaction between biological oxygen production and oceanic iron.',
philosophy:'The Archean challenges the human sense of importance. For 1.5 billion years — longer than the entire Phanerozoic — the most complex life on Earth was invisible to the naked eye. The Archean suggests that intelligence is not the purpose of evolution but an extremely late and possibly temporary addition to a microbial world.',
scale:'The Archean lasted 1.5 billion years — the longest named eon. It covers 33% of Earth\'s total history. During this time, the Sun\'s luminosity increased by approximately 5%, continental crust grew from perhaps 5% to 60% of its current volume, and microbial life colonised every accessible environment on the planet.',
survival:'Archean microbes survived through metabolic versatility — the ability to switch between energy sources as conditions changed. Extremophiles colonised environments from near-boiling hydrothermal vents to freezing polar seas. The fundamental survival strategy — genetic diversity through rapid reproduction and horizontal gene transfer — was established in the Archean and remains operative today.',
tipping_point:'The evolution of oxygenic photosynthesis around 2.7 Ga was the Archean\'s defining tipping point. It introduced a powerful oxidant — molecular oxygen — into a world that had evolved in its absence. The consequences would not be fully realised for another 300 million years (the Great Oxygenation Event), but the tipping point was the biological innovation itself.',
trade:'Microbial metabolism constituted the earliest form of biogeochemical trade: organisms consumed reduced compounds and excreted oxidised ones, or vice versa. Syntrophic relationships — where one organism\'s waste product is another\'s food — created the first trade networks. These metabolic exchanges drove global biogeochemical cycles that persist today.',
transformation:'The Archean transformed Earth from a largely abiotic planet into a world dominated by biology. Microbial metabolism altered ocean chemistry, began oxygenating the atmosphere, and contributed to continental crust formation through biologically-mediated mineral precipitation. By the end of the Archean, life was no longer a passive inhabitant of Earth but an active geological agent.',
violence:'The Archean was less violent than the Hadean — impact rates had declined dramatically — but still experienced significant geological violence including massive volcanic eruptions, large asteroid impacts, and tectonic upheavals. The Archean\'s violence was increasingly biological: the rise of oxygen-producing cyanobacteria constituted a slow-motion chemical assault on the anaerobic biosphere.'}},

{id:'stromatolites',nm:'Stromatolite Reefs',sb:'First Visible Life Structures · 3.5 Ga',s:-3500000000,e:-1000000000,lon:119,lat:-21,
fp:{dur:10,imp:8,scl:5,cpx:4,leg:9,evi:8},
conns:['eoarchean_life','archean','great_oxygenation','photosynthesis'],
overview:'Stromatolites are layered sedimentary structures built by cyanobacterial mats that trap and bind mineral grains. The oldest undisputed examples, from the Dresser Formation in Western Australia\'s Pilbara region, date to 3.48 billion years ago — making them the oldest visible evidence of life on Earth. For over two billion years, stromatolite reefs were the dominant macroscopic biological structure on the planet, slowly oxygenating the atmosphere through photosynthesis and building the geological record of early life.',
d:{
biology:'Stromatolites are not organisms but biogenic structures — the accumulated product of microbial mat communities dominated by cyanobacteria. Each layer represents a cycle of microbial growth, sediment trapping, and mineral precipitation. The cyanobacteria in these mats performed oxygenic photosynthesis, splitting water molecules and releasing oxygen as a waste product that would eventually transform Earth\'s atmosphere.',
chemistry:'Stromatolite formation involves complex biogeochemistry: cyanobacteria photosynthesise, raising local pH and causing calcium carbonate precipitation. The alternating light and dark layers record daily or seasonal growth cycles. Chemical analysis of ancient stromatolites reveals carbon isotope ratios consistent with biological fractionation — the strongest evidence for their biogenic origin.',
climate:'Stromatolite cyanobacteria were among the first organisms to significantly influence Earth\'s climate. By producing oxygen, they gradually reduced atmospheric methane (a potent greenhouse gas) through oxidation, potentially contributing to the Huronian glaciation — the first global ice age. Stromatolites were thus among the first life forms to modify planetary climate.',
culture:'Living stromatolites at Shark Bay in Western Australia and Lake Thetis became iconic images of deep time when they were recognised in the 1950s-60s as modern analogues of ancient life. They have become pilgrimage sites for geologists and feature prominently in textbooks, documentaries, and the iconography of astrobiology.',
ecology:'Stromatolite reefs created the first complex ecological structures on Earth — providing habitat, modifying water chemistry, and creating spatial heterogeneity in otherwise featureless shallow seas. The microbial mats within stromatolites contained diverse communities: photosynthetic cyanobacteria on top, chemosynthetic bacteria below, with complex metabolic interactions between layers.',
energy:'Stromatolite communities harvested solar energy through photosynthesis with remarkable efficiency. The layered structure optimised light capture: photosynthetic organisms on the surface intercepted sunlight while organisms in deeper layers exploited the chemical gradients created by surface metabolism. This vertical stratification of energy capture was the first biological energy architecture.',
extinction:'Stromatolites declined dramatically after the Cambrian Explosion (541 Ma), likely due to grazing by newly evolved animals. From dominating shallow marine environments for over two billion years, they were reduced to marginal habitats where grazing pressure was low — hypersaline lagoons, alkaline lakes, and extreme environments where animals could not survive.',
geology:'Stromatolite fossils are found on every continent and span nearly four billion years of Earth history. They are the primary geological evidence for Precambrian life. The Dresser Formation stromatolites (3.48 Ga) in Western Australia are the oldest undisputed examples. The Gunflint Formation (1.9 Ga) in Ontario contains exquisitely preserved microfossils within stromatolite layers.',
governance:'Microbial mat communities within stromatolites exhibited a form of collective organisation: different metabolic guilds occupied specific layers, with phototrophs on top, fermenters in the middle, and sulfate reducers at the base. This division of metabolic labour, maintained by chemical gradients, represents one of the oldest forms of biological organisation.',
innovation:'The stromatolite\'s greatest innovation was structural: the ability to build durable, layered edifices from microscopic organisms. This was the first instance of biological architecture — life constructing physical structures that outlast individual organisms. The principle of biogenic construction would eventually lead to coral reefs, termite mounds, and human buildings.',
legacy:'Stromatolites oxygenated the atmosphere over billions of years, enabling all subsequent aerobic life. The oxygen they produced created the ozone layer that protects terrestrial life from UV radiation. The calcium carbonate they deposited formed massive limestone deposits that would later become building materials, cave systems, and aquifers. Living stromatolites at Shark Bay are a UNESCO World Heritage site.',
migration:'Stromatolites spread from their earliest occurrence in shallow hydrothermal environments to colonise coastlines worldwide. Their distribution through the Archean and Proterozoic eons maps the expansion of habitable shallow marine environments as continental shelves grew. By the late Archean, stromatolite reefs were a global phenomenon.',
ocean:'Stromatolites were exclusively marine or lacustrine structures, growing in shallow waters where sunlight penetrated. They modified ocean chemistry by producing oxygen and precipitating carbonate, creating local alkaline environments. The transition from anoxic to oxygenated oceans — one of the most important changes in Earth history — was driven largely by stromatolite cyanobacteria.',
philosophy:'Stromatolites are a philosophical provocation: the most consequential life forms in Earth\'s history were microscopic organisms building rock structures in shallow seas. For two billion years, this was the pinnacle of biological complexity. Stromatolites challenge the assumption that evolution tends toward complexity — simple organisms transformed the planet more thoroughly than any subsequent life form.',
scale:'Individual stromatolites range from centimetres to metres in height. But stromatolite reefs extended for hundreds of kilometres along Precambrian coastlines. The cumulative oxygen output of stromatolite cyanobacteria over two billion years transformed Earth\'s atmosphere from less than 0.001% oxygen to approximately 2% — a planetary-scale chemical transformation by microscopic organisms.',
survival:'Stromatolites survived for over two billion years — the longest-lived macroscopic biological structure type in Earth\'s history. Their survival strategy was simplicity: cyanobacterial mats require only sunlight, water, and dissolved minerals. Living stromatolites persist today in environments too extreme for the animal grazers that elsewhere drove them to near-extinction.',
tipping_point:'The stromatolite-driven oxygenation of Earth\'s atmosphere was the slowest tipping point in the planet\'s history — it took approximately two billion years. But once atmospheric oxygen reached a critical threshold (~2% of modern levels), it triggered an irreversible cascade: the ozone layer formed, aerobic respiration became possible, and the stage was set for complex multicellular life.',
trade:'Stromatolite communities exemplified metabolic trade: cyanobacteria on the surface traded oxygen and organic carbon downward to heterotrophic bacteria below, which in return consumed the organic waste that would otherwise smother the photosynthesisers. This mutualistic exchange within microbial mats was the earliest form of structured biological trade.',
transformation:'Stromatolites transformed Earth from an anoxic world to an oxygenated one — the single most consequential biological transformation in planetary history. They also transformed the geological record: stromatolite fossils are the primary evidence of Precambrian life, allowing geologists to reconstruct biological history across billions of years.',
violence:'Stromatolites experienced violence primarily through geological disruption — burial by sediment, erosion by waves, destruction by volcanic activity. After the Cambrian Explosion, they faced a new form of violence: biological predation by grazing organisms. This biological violence was more devastating than any geological force, reducing stromatolites from global dominance to marginal survival.'}},

{id:'great_oxygenation',nm:'Great Oxygenation Event',sb:'Oxygen Catastrophe · 2.4–2.0 Ga',s:-2400000000,e:-2000000000,lon:25,lat:-30,
fp:{dur:8,imp:10,scl:10,cpx:5,leg:10,evi:7},
conns:['archean','stromatolites','huronian_glaciation','proterozoic'],
overview:'The Great Oxygenation Event (GOE), approximately 2.4 to 2.0 billion years ago, was the most dramatic atmospheric transformation in Earth\'s history. Cyanobacteria had been producing oxygen through photosynthesis for hundreds of millions of years, but geological sinks — dissolved iron, volcanic gases, and reduced minerals — had absorbed it. When these sinks were finally saturated, free oxygen accumulated in the atmosphere for the first time. For anaerobic organisms, this was an extinction-level catastrophe. For the future of complex life, it was the single most important environmental change the planet has ever undergone.',
d:{
biology:'The GOE was simultaneously the greatest biological success and the greatest biological catastrophe. Cyanobacteria\'s oxygen output finally overwhelmed geological sinks, but oxygen was lethal to most existing anaerobic life. Obligate anaerobes were driven into anoxic refugia — deep ocean sediments, waterlogged soils, animal guts — where their descendants remain today. The survivors were organisms that evolved antioxidant defences or aerobic respiration.',
chemistry:'Before the GOE, Earth\'s atmosphere contained less than 0.001% oxygen. After it, oxygen rose to perhaps 1-10% of modern levels. The chemical evidence is dramatic: banded iron formations ceased as dissolved oceanic iron was fully oxidised; red beds (oxidised terrestrial sediments) appeared for the first time; and mass-independent fractionation of sulfur isotopes — which requires an oxygen-free atmosphere — disappeared from the geological record.',
climate:'The GOE likely triggered the Huronian glaciation — the first global ice age. Atmospheric methane, a potent greenhouse gas produced by methanogens, was destroyed by reaction with oxygen. The resulting loss of greenhouse warming, combined with a still-faint Sun, may have plunged Earth into a snowball state. The GOE thus demonstrates how biological activity can cause catastrophic climate change.',
culture:'The GOE has become a powerful analogy for human-caused climate change — evidence that a single biological innovation (photosynthesis) can irreversibly transform a planet\'s atmosphere. It features prominently in climate science communication and in philosophical discussions about the Anthropocene. The parallel is instructive: cyanobacteria did not intend to oxygenate the atmosphere.',
ecology:'The GOE destroyed most existing ecosystems and created entirely new ones. Anaerobic communities were confined to oxygen-free refugia. Aerobic organisms — initially a marginal group — expanded to dominate surface environments. The ecological restructuring was total: energy flows, nutrient cycles, and community composition were all fundamentally reorganised by the presence of oxygen.',
energy:'Aerobic respiration, enabled by the GOE, is approximately 18 times more efficient than anaerobic fermentation. An organism using oxygen can extract 36-38 ATP molecules from a single glucose molecule, compared to 2 from fermentation. This energy windfall would eventually enable the evolution of large, active, complex organisms — including all animals. The GOE was the energy revolution that made complexity possible.',
extinction:'The GOE may have been the largest extinction event in Earth\'s history by proportion of affected species, though the fossil record is too sparse to quantify. Virtually all surface-dwelling anaerobic organisms — the dominant life forms for the preceding 1.5 billion years — were driven to extinction or confined to anoxic refugia. This has been called the \'Oxygen Holocaust\' or \'Oxygen Catastrophe\'.',
geology:'The GOE left unmistakable geological signatures: the disappearance of banded iron formations (as oceanic iron was fully oxidised), the first appearance of red beds (oxidised terrestrial sediments), the end of detrital pyrite and uraninite in riverbeds (minerals unstable in oxygen), and the loss of mass-independent sulfur isotope fractionation — a signal that requires an anoxic atmosphere.',
governance:'Inapplicable in the political sense. But the GOE illustrates the concept of unintended systemic consequences: cyanobacteria \'governed\' atmospheric composition through their collective metabolism without any centralised coordination or intention. The result — atmospheric oxygenation — was an emergent property of billions of individual organisms, not a planned outcome.',
innovation:'The GOE was not itself an innovation but the delayed consequence of one: oxygenic photosynthesis, which evolved perhaps 300-500 million years earlier. The innovation was in the response: organisms that evolved superoxide dismutase, catalase, and other antioxidant enzymes survived. Those that further evolved aerobic respiration gained an enormous metabolic advantage.',
legacy:'The GOE\'s legacy is the modern atmosphere. Every breath of oxygen-containing air, every aerobic organism, every ozone molecule shielding life from UV radiation traces back to this event. The GOE also created the conditions for eukaryotic evolution: the endosymbiotic incorporation of aerobic bacteria (future mitochondria) into anaerobic cells required an oxygenated environment.',
migration:'The GOE forced a massive migration of anaerobic life into oxygen-free environments — deep ocean sediments, waterlogged soils, and eventually the guts of animals. Aerobic organisms migrated in the opposite direction, colonising the newly oxygenated surface environments. This was the first biologically-driven habitat displacement on a global scale.',
ocean:'The GOE transformed the ocean from a reducing (anoxic, iron-rich) to an oxidising (oxygenated, iron-poor) state, though the deep ocean remained anoxic for another billion years. The transition is recorded in banded iron formations: the alternating iron-oxide and silica layers show the ocean\'s iron being progressively consumed by biological oxygen.',
