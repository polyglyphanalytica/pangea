<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── DARK THEME (default) ── */
:root{
  --bg:#02040a;
  --panel:#070b12;
  --panel2:#0c1018;
  --ocean-start:#0a1628;--ocean-end:#061020;
  --land:#2a4a18;--land-s:#3a6020;
  --amber:#e89820;--amber-b:#f0b040;--amber-d:#3a2204;
  --amber-x:rgba(232,152,32,0.14);--amber-xx:rgba(232,152,32,0.08);
  --txt:#f2e8d5;--txt2:#e0d4b4;--txt3:#c8aa78;
  --bdr:rgba(232,152,32,0.22);--bdr2:rgba(232,152,32,0.10);
  --hint:rgba(224,212,180,0.65);
  --tl-bg:rgba(2,4,10,0.99);
  --hdr-bg:rgba(2,4,10,0.97);
  --conn-bdr:rgba(232,152,32,0.10);
  --shadow:rgba(0,0,0,0.6);
}

/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#f0ebe0;
  --panel:#e8e0d0;
  --panel2:#ddd4c0;
  --ocean-start:#b8cce0;--ocean-end:#a8bcd4;
  --land:#8ca860;--land-s:#7a9850;
  --amber:#4a2c00;--amber-b:#5a3800;--amber-d:#f0d8a0;
  --amber-x:rgba(122,78,0,0.10);--amber-xx:rgba(122,78,0,0.06);
  --txt:#1a1206;--txt2:#1a1206;--txt3:#2e2010;
  --bdr:rgba(122,78,0,0.28);--bdr2:rgba(122,78,0,0.14);
  --hint:rgba(30,18,6,0.6);
  --tl-bg:rgba(236,228,214,0.99);
  --hdr-bg:rgba(236,228,214,0.97);
  --conn-bdr:rgba(122,78,0,0.12);
  --shadow:rgba(0,0,0,0.18);
}

@media(prefers-color-scheme:light){
  :root:not([data-theme="dark"]){
    --bg:#f0ebe0;--panel:#e8e0d0;--panel2:#ddd4c0;
    --ocean-start:#b8cce0;--ocean-end:#a8bcd4;
    --land:#8ca860;--land-s:#7a9850;
    --amber:#4a2c00;--amber-b:#5a3800;--amber-d:#f0d8a0;
    --amber-x:rgba(122,78,0,0.10);--amber-xx:rgba(122,78,0,0.06);
    --txt:#1a1206;--txt2:#1a1206;--txt3:#2e2010;
    --bdr:rgba(122,78,0,0.28);--bdr2:rgba(122,78,0,0.14);
    --hint:rgba(30,18,6,0.6);
    --tl-bg:rgba(236,228,214,0.99);
    --hdr-bg:rgba(236,228,214,0.97);
    --conn-bdr:rgba(122,78,0,0.12);
    --shadow:rgba(0,0,0,0.18);
  }
}

html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Crimson Pro',serif}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--hdr-bg);gap:12px}
.hdr-left{display:flex;align-items:baseline;gap:0;min-width:0}
.logo-t{font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:700;color:var(--amber-b);letter-spacing:3px;white-space:nowrap}
.logo-s{font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin-left:10px;white-space:nowrap}
.era-disp{text-align:center;font-family:'Cinzel',serif;flex-shrink:0}
.era-y{font-size:22px;font-weight:600;color:var(--amber-b);letter-spacing:1px}
.era-n{font-size:12px;letter-spacing:1.5px;color:var(--txt2);margin-top:1px;text-transform:uppercase;font-weight:600}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.cnt-disp{text-align:right;font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;color:var(--txt3)}
.cnt-n{font-size:22px;font-weight:600;color:var(--amber);display:block;line-height:1}
.theme-btn{background:none;border:1px solid var(--bdr);padding:4px 8px;cursor:pointer;font-size:13px;color:var(--txt2);border-radius:3px;transition:all .15s;flex-shrink:0}
.theme-btn:hover{background:var(--amber-x);color:var(--amber-b)}

/* ── MAIN LAYOUT ── */
.main{position:fixed;top:52px;left:0;right:0;bottom:0;display:flex}
.map-c{flex:1;position:relative;overflow:hidden;min-width:0;min-height:0}
.map-tl-col{display:flex;flex-direction:column;flex:1;min-width:0}
#wsvg{width:100%;height:100%}

/* ── DESKTOP PANEL ── */
.info-panel{width:320px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--bdr);overflow-y:auto;padding:18px 18px 28px;position:relative}
.info-close{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:16px;line-height:1;padding:4px;float:right;margin:-2px -2px 0 0}
.info-close:hover{color:var(--amber-b)}
.info-nm{font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:700;color:var(--amber-b);margin-bottom:3px;clear:both}
.info-sb{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1.5px;color:var(--txt2);text-transform:uppercase;margin-bottom:10px}
.info-dates{display:flex;gap:6px;margin-bottom:14px;align-items:center}
.info-dt{padding:5px 12px;border:1px solid var(--bdr);font-family:'Cinzel',serif;font-size:13.5px;color:var(--amber-b)}
.info-arr{color:var(--txt2);font-size:12px}

/* ── LENS DROPDOWN ── */
.lens-dd-wrap{border:1px solid var(--bdr);margin-bottom:14px}
.lens-dd-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;cursor:pointer;user-select:none;background:var(--amber-xx);border-bottom:1px solid transparent;transition:background .15s}
.lens-dd-hdr:hover{background:var(--amber-x)}
.lens-dd-hdr.open{border-bottom-color:var(--bdr)}
.lens-dd-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:2.5px;color:var(--txt2);text-transform:uppercase;flex-shrink:0}
.lens-dd-summary{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.5px;color:var(--amber-b);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;padding:0 6px}
.lens-dd-arrow{color:var(--txt2);font-size:10px;transition:transform .18s;flex-shrink:0}
.lens-dd-arrow.open{transform:rotate(180deg)}
.lens-dd-list{display:none;max-height:260px;overflow-y:auto}
.lens-dd-list.open{display:block}
.lens-row{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--bdr2);transition:background .15s}
.lens-row:last-child{border-bottom:none}
.lens-row:hover{background:var(--amber-x)}
.lens-row-chk{width:13px;height:13px;border:1px solid var(--bdr);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--amber-b);line-height:1}
.lens-row-chk.on{background:var(--amber-x);border-color:var(--amber-b)}
.lens-row-ico{font-size:14px;width:16px;text-align:center;flex-shrink:0;color:var(--txt2)}
.lens-row-lbl{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.5px;color:var(--txt2)}
.lens-row.on .lens-row-lbl{color:var(--amber-b);font-weight:600}
.lens-row-sep{border-bottom:1px solid var(--bdr);margin-bottom:2px}
.lens-dd-close-btn{text-align:center;padding:10px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;color:var(--amber-b);border-top:1px solid var(--bdr);cursor:pointer;text-transform:uppercase;transition:background .15s}
.lens-dd-close-btn:hover{background:var(--amber-x)}

/* ── DRAWER CONTENT ── */
.lens-section{margin-bottom:18px}
.lens-section-hdr{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.lens-section-ico{font-size:12px;color:var(--txt2)}
.lens-section-lbl{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;color:var(--amber-b);text-transform:uppercase;font-weight:600}
.info-div{border:none;border-top:1px solid var(--bdr);margin:12px 0}
.info-txt{font-size:17.5px;line-height:1.95;color:var(--txt);font-style:italic}
.overview-arc{font-size:17.5px;line-height:1.95;color:var(--txt)}
.overview-arc p{margin-bottom:14px}
.civ-span-bar{height:3px;background:var(--bdr2);position:relative;margin:14px 0 6px;border-radius:2px}
.civ-span-fill{position:absolute;top:0;height:100%;background:var(--amber-b);border-radius:2px;opacity:.8}
.civ-span-lbls{display:flex;justify-content:space-between;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--txt3)}
.conn-hdr{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1.5px;color:var(--txt3);text-transform:uppercase;margin:18px 0 8px;font-weight:600}
.conn-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--conn-bdr);font-size:16px;color:var(--txt2);cursor:pointer;transition:color .15s}
.conn-item:hover{color:var(--amber-b)}
.conn-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── TIMELINE ── */
.tl-wrap{position:relative;height:88px;background:var(--tl-bg);border-top:1px solid var(--bdr);padding:8px 20px 14px;flex-shrink:0}
.tl-lbls{display:flex;justify-content:space-between;margin-bottom:5px}
.tl-lbl{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.8px;color:var(--txt3);text-transform:uppercase;font-weight:600}
.tl-trk{position:relative;height:5px;background:var(--bdr);border-radius:3px}
.tl-fill{position:absolute;top:0;left:0;height:5px;background:var(--amber-b);border-radius:3px;pointer-events:none;opacity:.7}
.tl-thumb{position:absolute;top:50%;width:20px;height:20px;background:var(--amber-b);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--amber),0 0 20px rgba(232,152,32,.3);pointer-events:none;transition:left .04s linear}
input.tl-range{position:absolute;top:50%;left:0;width:100%;height:28px;opacity:0;cursor:pointer;transform:translateY(-50%);margin:0;z-index:2}
.hint{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;color:var(--hint);display:flex;align-items:center;justify-content:center;padding:0 8px;white-space:nowrap;overflow:hidden}
#map-hint-text{pointer-events:none;overflow:hidden;text-overflow:ellipsis}

/* ── MOB MAP BUTTON ── */
.mob-map-btn{display:none}

/* ── PORTRAIT MOBILE ── */
@media(max-width:768px) and (orientation:portrait){
  .logo-s{display:none}
  .cnt-disp{display:none}
  .hdr{padding:8px 12px}
  .logo-t{font-size:16px;letter-spacing:2px}
  .era-y{font-size:18px}
  .era-n{font-size:10px;letter-spacing:1.5px}
  .main{top:52px!important}
  .main{bottom:0;flex-direction:column}
  .map-tl-col{width:100%}
  .map-c{flex:0 0 42vh;width:100%}
  .info-panel{flex:1;width:100%;border-left:none;border-top:1px solid var(--bdr);overflow-y:auto;padding:0 16px 16px;border-radius:0}
  .tl-wrap{height:76px;padding:6px 14px 10px}
  .tl-lbl{font-size:9px;letter-spacing:.8px}
  .hint{font-size:8px;letter-spacing:.8px}
  .lens-dd-list{max-height:180px}
  .info-txt,.overview-arc{font-size:16px;line-height:1.82}
  .lens-row-lbl{font-size:13px}
}

/* ── LANDSCAPE MOBILE ── */
@media(max-width:900px) and (orientation:landscape){
  .logo-s{display:none}
  .hdr{padding:6px 14px}
  .logo-t{font-size:15px;letter-spacing:2px}
  .era-y{font-size:15px}
  .hint{font-size:7px;letter-spacing:.5px;white-space:normal;text-align:center;line-height:1.4}
  .tl-wrap{height:68px;padding:4px 12px 8px}
  .tl-lbl{font-size:8px}
  .info-panel{width:280px}
}

@keyframes ring-pulse{0%{r:5;opacity:.7}100%{r:26;opacity:0}}

@media(pointer:coarse){
  #mark-layer g[role="button"]{cursor:pointer}
}

/* ── ACCESSIBILITY ── */
:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px;border-radius:2px}
.conn-item:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px}
.lens-row:focus-visible{outline:2px solid var(--amber-b);outline-offset:-2px}
button:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px}
.skip-link{position:absolute;top:-40px;left:0;background:var(--amber-b);color:var(--bg);padding:8px 16px;z-index:9999;font-family:'Cinzel',serif;font-size:11px;text-decoration:none}
.skip-link:focus{top:0}

/* ── THREAD PANEL ── */
.thread-panel{
  position:fixed;top:52px;left:0;right:0;z-index:400;
  background:var(--panel);
  max-height:0;overflow:hidden;
  transition:max-height .32s cubic-bezier(.4,0,.2,1);
}
.thread-panel.open{border-bottom:1px solid var(--bdr);box-shadow:0 6px 24px var(--shadow)}
.thread-panel.open{max-height:70vh}
.thread-panel-inner{padding:16px 20px 20px;overflow-y:auto;max-height:calc(70vh - 1px)}
.thread-panel-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bdr)}
.thread-panel-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase}
.thread-close-btn{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:18px;line-height:1;padding:4px;transition:color .15s}
.thread-close-btn:hover{color:var(--amber-b)}
.thread-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.thread-concept-btn{width:100%;background:none;border:1px solid var(--bdr2);padding:9px 12px;text-align:left;cursor:pointer;border-radius:3px;transition:all .15s}
.thread-concept-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.thread-concept-name{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.8px;color:var(--txt2);display:block;margin-bottom:4px}
.thread-concept-chain{font-size:11px;color:var(--txt3);line-height:1.5}
.thread-back-btn{background:none;border:none;padding:0;cursor:pointer;font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--amber-b);text-transform:uppercase;transition:opacity .15s}
.thread-back-btn:hover{opacity:.7}
.thread-active-title{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--amber-b);margin:10px 0 14px}
.thread-steps-grid{display:flex;flex-direction:column;align-items:center;padding:4px 0 16px}
.thread-step{width:min(360px,90%);text-align:center;padding:10px 14px;border:1px solid var(--bdr2);border-radius:4px;font-size:12.5px;color:var(--txt2);background:var(--panel2)}
.thread-step-yr{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);margin-bottom:4px}
.thread-step-txt{line-height:1.6;color:var(--txt2)}
.thread-step-civ{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);margin-bottom:4px}
.thread-chain-link{display:flex;flex-direction:column;align-items:center;padding:2px 0;color:var(--amber-b);opacity:.6}
.thread-chain-line{width:1px;height:8px;background:var(--amber-b);opacity:.4}

/* ── COMPARE MODE ── */
.compare-wrap{display:flex;gap:0;height:100%;width:100%}
.compare-col{flex:1;min-width:0;overflow-y:auto;padding:16px;border-right:1px solid var(--bdr)}
.compare-col:last-child{border-right:none}
.compare-col-hdr{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--amber-b);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.compare-remove{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:14px;padding:2px}
.compare-remove:hover{color:var(--amber-b)}
.compare-prompt{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--txt3);font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:20px;opacity:.6}
.compare-diff{background:var(--amber-xx);border-left:2px solid var(--amber-b);padding:6px 8px;margin-bottom:2px}

/* ── SHARE TOAST ── */
.share-toast{position:fixed;bottom:108px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--panel);border:1px solid var(--bdr);padding:8px 18px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1.5px;color:var(--amber-b);text-transform:uppercase;border-radius:20px;opacity:0;transition:all .3s;pointer-events:none;z-index:500;white-space:nowrap}
.share-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── FINGERPRINT CHART ── */
.fp-wrap{margin:14px 0 6px}
.fp-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--txt3);text-transform:uppercase;margin-bottom:8px}
.fp-svg{display:block;margin:0 auto}
.fp-label{font-family:'Cinzel',serif;font-size:8px;fill:var(--txt3)}
.fp-poly{fill:rgba(200,168,232,.18);stroke:#c8a8e8;stroke-width:1.2}
.fp-grid{fill:none;stroke:var(--bdr);stroke-width:.5}

/* ── CONTEMPORARY BAR ── */
.contemp-wrap{margin:12px 0 4px}
.contemp-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;cursor:pointer;transition:opacity .15s}
.contemp-bar-row:hover{opacity:.75}
.contemp-bar-nm{font-family:'Cinzel',serif;font-size:8.5px;color:var(--txt3);width:80px;flex-shrink:0;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.contemp-bar-track{flex:1;height:5px;background:var(--bdr2);border-radius:2px;position:relative}
.contemp-bar-fill{position:absolute;top:0;height:100%;border-radius:2px;opacity:.7}
.contemp-bar-yr{font-family:'Cinzel',serif;font-size:7.5px;color:var(--txt3);white-space:nowrap;width:60px;text-align:right;flex-shrink:0}

/* ── DENSITY SPARKLINE ── */
#density-bar{height:18px;width:100%;display:block;margin-bottom:1px}

/* ── WHAT-IF MODE ── */
.whatif-civ-btn{width:100%;background:none;border:1px solid var(--bdr2);padding:7px 10px;text-align:left;cursor:pointer;font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:.5px;color:var(--txt2);margin-bottom:3px;border-radius:2px;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.whatif-civ-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.whatif-civ-btn.selected{background:rgba(200,168,232,.12);border-color:#c8a8e8;color:#c8a8e8}
.whatif-result{margin-top:12px;padding:12px;border:1px solid var(--bdr);border-radius:3px;background:var(--panel2)}

  {id:'politics',    ico:'⊞', lbl:'Political Influence',      col:'#606060'},
  {id:'legacy',      ico:'★', lbl:'Legacy',                   col:'#8a7040'},
  {id:'figures',     ico:'≡', lbl:'Key Figures',              col:'#d4a820'},
  {id:'dialogue',    ico:'↑', lbl:'Interfaith Dialogue',      col:'#608050'},
];

const ERAS=[
  {y:-10000,n:'ANIMISM & SHAMANISM'},
  {y:-3000, n:'POLYTHEISTIC AGE'},
  {y:-1500, n:'VEDIC PERIOD'},
  {y:-800,  n:'AXIAL AGE'},

  {y:1850,  n:'MODERN SPIRITUALITY'},
  {y:1950,  n:'GLOBAL INTERFAITH ERA'},
];

const FP_LABELS=['Global Reach','Philosophical Depth','Ritual Complexity','Artistic Legacy','Political Influence','Textual Tradition'];
const FP_KEYS=['reach','phil','ritual','art','pol','text'];

const ITEMS=[
{id:'hinduism',nm:'Hinduism',sb:'India · Sanatana Dharma',s:-1500,e:2024,lon:80.9,lat:26.8,
fp:{reach:8,phil:10,ritual:10,art:10,pol:8,text:10},conns:['buddhism','jainism','sikhism'],
overview:'Hinduism is among the oldest living religious traditions, emerging from the Vedic civilization of the Indian subcontinent around 1500 BCE. It encompasses an extraordinarily diverse array of philosophies, rituals, and devotional practices unified by shared scriptures, concepts of dharma, karma, and moksha. With over a billion adherents today, it remains one of the most pluralistic and internally varied spiritual traditions in human history.',
d:{
overview:'Hinduism defies simple categorization, functioning less as a single religion and more as a vast family of interrelated traditions sharing certain core concepts. Its historical development spans from the Vedic sacrificial religion through the philosophical Upanishads, the devotional bhakti movements, and into modern reform movements. The tradition has shown remarkable capacity for absorbing and reinterpreting diverse influences while maintaining continuity with its ancient roots.',
theology:'Hindu theology ranges from strict monotheism to polytheism, pantheism, and even atheistic philosophical schools. The concept of Brahman as ultimate reality underlies much Hindu thought, while devotional traditions center on personal deities such as Vishnu, Shiva, and Shakti. The relationship between the individual atman and universal Brahman forms the central theological question, answered differently by Advaita, Vishishtadvaita, and Dvaita Vedanta.',
texts:'The Hindu scriptural canon is vast, beginning with the four Vedas — Rig, Yajur, Sama, and Atharva — composed over centuries of oral tradition. The Upanishads explore metaphysical questions, while the epics Mahabharata and Ramayana provide narrative theology. The Bhagavad Gita, embedded within the Mahabharata, remains the most widely read Hindu text, synthesizing paths of knowledge, devotion, and action.',
ritual:'Hindu ritual life spans from elaborate temple ceremonies with precise Vedic mantras to simple household puja performed daily before a home shrine. The sixteen samskaras mark life transitions from conception through death, while annual festivals like Diwali, Holi, and Navaratri structure the sacred calendar. Fire sacrifice (yajna) remains central to many ceremonies, linking modern practice to the oldest Vedic traditions.',
mysticism:'Hindu mystical traditions include the contemplative paths of jnana yoga, the devotional ecstasies of bhakti, and the psychophysical disciplines of kundalini and tantric yoga. The Yoga Sutras of Patanjali systematize meditative practice into eight limbs culminating in samadhi. Saints and mystics like Ramakrishna, Ramana Maharshi, and Mirabai exemplify diverse approaches to direct experience of the divine.',
art:'Hindu art encompasses some of humanity's greatest architectural and sculptural achievements, from the cave temples of Ellora to the towering gopurams of South Indian temples. Iconographic traditions precisely codify the depiction of deities through mudras, attributes, and proportional systems. Bronze casting reached extraordinary heights in the Chola Nataraja, while temple walls served as encyclopedias of mythological narrative in stone.',
music:'Hindu sacred music ranges from Vedic chanting with precisely preserved tonal patterns to the raga-based devotional music of both Carnatic and Hindustani traditions. Bhajan and kirtan singing form the musical heart of bhakti worship, while classical forms like dhrupad originated in temple settings. The concept of nada brahman — sound as divine reality — gives music a uniquely theological status in Hindu thought.',
ethics:'Hindu ethics center on the concept of dharma, understood as cosmic order, moral law, and individual duty simultaneously. The tradition distinguishes between universal duties (sadharana dharma) like truthfulness and non-harm, and contextual duties (svadharma) varying by stage of life and social position. The doctrine of ahimsa (non-violence) has profoundly influenced Indian civilization, finding its most famous modern expression in Gandhi's philosophy.',
conversion:'Hinduism historically spread not through organized missionary activity but through cultural diffusion, trade, and royal patronage across Southeast Asia. The tradition has generally been absorptive rather than exclusivist, incorporating local deities and practices into its framework. Modern movements like ISKCON and the Ramakrishna Mission represent newer approaches to sharing Hindu teachings globally.',
persecution:'Hindus faced significant persecution during periods of Islamic conquest in medieval India, with temple destructions and forced conversions documented across centuries. The Portuguese Inquisition in Goa targeted Hindu practices with particular severity. In modern times, Hindu minorities face pressures in Pakistan and Bangladesh, while Hindu nationalist movements have themselves been accused of targeting religious minorities.',
schisms:'Rather than formal schisms, Hinduism has evolved through the emergence of distinct sampradayas (lineages) with different theological emphases. The six orthodox darshanas represent philosophical diversity within shared scriptural acceptance, while movements like Lingayatism and the Arya Samaj sought radical internal reform. The relationship between Brahmanical orthodoxy and popular devotional movements has been a recurring creative tension.',
women:'Women's roles in Hinduism present complex contradictions, from powerful goddess worship and women rishis in Vedic literature to restrictive social practices like sati and purdah. The bhakti movements offered women like Mirabai, Andal, and Akka Mahadevi paths to spiritual authority outside patriarchal structures. Modern Hindu feminists draw on goddess traditions and Vedic precedents to challenge gender restrictions within the tradition.',
sacred:'Hindu sacred geography encompasses the entire Indian subcontinent, with pilgrimage circuits (yatras) connecting sites from Varanasi on the Ganges to Rameshwaram at the southern tip. The seven sacred cities, four cardinal dhams, and twelve jyotirlingas create a sacred map overlaid on physical geography. Rivers, mountains, and groves all carry divine significance, making landscape itself a form of scripture.',
afterlife:'Hindu afterlife beliefs center on the cycle of samsara — death and rebirth governed by accumulated karma. Liberation (moksha) from this cycle represents the ultimate spiritual goal, achieved through knowledge, devotion, or disciplined action. The Garuda Purana describes post-mortem experiences in detail, while philosophical traditions debate whether liberation means merger with Brahman or eternal communion with a personal deity.',
cosmology:'Hindu cosmology operates on vast temporal scales, with cycles of creation and dissolution (yugas and kalpas) spanning billions of years. The current age, Kali Yuga, is the fourth and most degenerate phase of a cycle, destined to end in cosmic renewal. Multiple world-systems exist simultaneously, with fourteen lokas (planes of existence) stacked vertically from subterranean hells to celestial heavens.',
philosophy:'Hindu philosophy encompasses six orthodox schools (darshanas): Nyaya (logic), Vaisheshika (atomism), Samkhya (dualist enumeration), Yoga (disciplined practice), Mimamsa (ritual hermeneutics), and Vedanta (metaphysical inquiry). Vedanta itself branches into radically different interpretations of reality, from Shankara's non-dualism to Madhva's strict dualism. These schools developed sophisticated epistemologies, debating the valid means of knowledge with Buddhist and Jain philosophers.',
politics:'Hinduism has shaped Indian political life through concepts like dharmarajya (righteous rule) and the advisory role of Brahmin counselors to kings. The Arthashastra provides a pragmatic theory of statecraft, while the Ramayana offers an idealized model of kingship. In modern India, Hindu nationalism (Hindutva) has become a powerful political force, raising complex questions about the relationship between religious identity and secular democracy.',
legacy:'Hinduism's civilizational legacy includes foundational contributions to mathematics (zero, decimal system), astronomy, linguistics (Panini's grammar), and medicine (Ayurveda). Yoga and meditation practices have become global phenomena, while Hindu philosophical concepts of karma and dharma have entered world vocabulary. The tradition's influence shaped Southeast Asian civilizations from Angkor Wat to Bali, creating a cultural sphere far beyond the Indian subcontinent.',
figures:'Key figures include the legendary sages Vyasa and Valmiki, philosophers Shankara, Ramanuja, and Madhva, and bhakti saints like Kabir, Tulsidas, and Chaitanya. Modern reformers such as Ram Mohan Roy, Swami Vivekananda, and Sri Aurobindo reinterpreted the tradition for the contemporary world. Mahatma Gandhi drew deeply on Hindu ethics while advocating for interfaith harmony and social justice.',
dialogue:'Hinduism has a long history of internal philosophical debate (shastrartha) and engagement with Buddhism, Jainism, and Islam on Indian soil. The tradition's pluralistic theology — expressed in concepts like "truth is one, sages call it by many names" — provides resources for interfaith dialogue. Modern Hindu thinkers have been active participants in global interfaith movements while also debating the limits of religious inclusivism.'
}},
{id:'buddhism',nm:'Buddhism',sb:'India · The Middle Way',s:-563,e:2024,lon:83.9,lat:27.5,
fp:{reach:9,phil:10,ritual:8,art:10,pol:7,text:10},conns:['hinduism','jainism','taoism','shinto'],
overview:'Buddhism arose in the 5th century BCE from the teachings of Siddhartha Gautama, who attained enlightenment under the Bodhi tree and became the Buddha. His diagnosis of suffering (dukkha) and prescription of the Eightfold Path offered a practical philosophy that spread across Asia, adapting to diverse cultures while maintaining core insights about impermanence, non-self, and liberation. Today Buddhism claims roughly 500 million adherents across its Theravada, Mahayana, and Vajrayana branches.',
d:{
overview:'Buddhism began as a reform movement within the spiritual landscape of ancient India, rejecting caste hierarchy and Vedic ritualism in favor of individual ethical practice and meditation. The tradition split into multiple schools after the Buddha's death, with Theravada preserving early monastic discipline, Mahayana expanding the path to include lay practitioners and cosmic bodhisattvas, and Vajrayana developing esoteric tantric methods. Buddhism's near-disappearance from India by the 13th century contrasts with its transformative impact on East and Southeast Asian civilizations.',
theology:'Buddhist theology is distinctive in its rejection of a creator god and eternal soul, instead positing dependent origination (pratityasamutpada) as the fundamental principle of reality. The Three Marks of Existence — impermanence, suffering, and non-self — form the analytical foundation, while nirvana represents the cessation of craving and the end of cyclic rebirth. Mahayana theology introduces concepts like Buddha-nature and emptiness (shunyata) that reframe the tradition's metaphysical commitments.',
texts:'The Buddhist canon exists in three major collections: the Pali Tipitaka of the Theravada tradition, the Chinese Tripitaka, and the Tibetan Kangyur and Tengyur. The Dhammapada, Heart Sutra, Lotus Sutra, and Diamond Sutra are among the most influential individual texts. The sheer volume of Buddhist literature reflects centuries of philosophical elaboration, with commentarial traditions in multiple languages forming vast libraries of interpretation.',
ritual:'Buddhist ritual ranges from simple mindfulness meditation and chanting of sutras to elaborate Vajrayana ceremonies involving mandalas, mudras, and mantras. Monastic ordination follows procedures established in the Vinaya, while lay practice centers on dana (generosity), sila (morality), and meditation. Festivals like Vesak (celebrating the Buddha's birth, enlightenment, and death) and local traditions like Thailand's Loy Krathong blend Buddhist themes with cultural celebration.',
mysticism:'Buddhist mystical practice centers on meditation as the direct path to awakening, with techniques ranging from Theravada vipassana (insight meditation) to Zen's koan practice and sudden enlightenment. Vajrayana Buddhism employs visualization, deity yoga, and energy practices aimed at achieving Buddhahood in a single lifetime. The tradition produces detailed maps of contemplative states (jhanas) while simultaneously warning against attachment to spiritual experiences.',
art:'Buddhist art has produced some of humanity's most iconic works, from the serene Gandharan Buddhas blending Greco-Roman and Indian styles to the massive rock-carved figures at Bamiyan and Leshan. Thangka painting in Tibet, sand mandalas, and the austere ink-wash paintings of Zen represent vastly different aesthetic approaches to Buddhist themes. Temple architecture spans the stupas of Sanchi, the pagodas of East Asia, and the cosmic mountain of Borobudur in Java.',
music:'Buddhist music encompasses the deep overtone chanting of Tibetan monks, the rhythmic sutra recitation of Japanese temples, and the meditative bell-and-drum traditions of Korean Buddhism. Shomyo chanting in Japan influenced the development of secular musical forms, while Theravada traditions emphasize the human voice as the primary instrument. Silence itself holds musical significance in Zen aesthetics, where the space between sounds carries meaning.',
ethics:'Buddhist ethics rest on the Five Precepts — abstaining from killing, stealing, sexual misconduct, false speech, and intoxicants — as the foundation for lay moral life. The Eightfold Path integrates ethics (sila), meditation (samadhi), and wisdom (prajna) into a unified practice. The bodhisattva ideal in Mahayana Buddhism elevates compassion to a cosmic principle, vowing to postpone personal liberation until all beings are freed from suffering.',
conversion:'Buddhism spread primarily through peaceful means — royal patronage, monastic education, and trade route diffusion — becoming the first truly international religion. Emperor Ashoka's missionaries carried the dharma to Sri Lanka, Central Asia, and the Hellenistic world in the 3rd century BCE. Modern Buddhist evangelism includes the Vipassana movement, engaged Buddhism, and Western convert communities that adapt Asian practices for new cultural contexts.',
persecution:'Buddhism faced persecution during its decline in India through a combination of Brahmanical revival and Islamic conquests that destroyed major monastic universities like Nalanda. In China, the Great Anti-Buddhist Persecution of 845 CE destroyed thousands of monasteries, while in Japan, the Meiji government's haibutsu kishaku movement dismantled Buddhist institutions. Tibetan Buddhism suffered catastrophic losses during the Chinese Cultural Revolution, with most monasteries destroyed.',
schisms:'The first major Buddhist schism occurred at the Second Council around 383 BCE, eventually producing the Sthaviravada and Mahasanghika schools. The emergence of Mahayana around the 1st century CE represented not a clean organizational split but a gradual divergence in ideals and literature. Within Mahayana, distinct traditions like Pure Land, Chan/Zen, and Vajrayana developed their own transmission lineages and institutional structures.',
women:'Women's status in Buddhism has been contested since the Buddha reportedly hesitated before establishing the bhikkhuni (nun) ordination lineage. Theravada traditions lost full nun ordination for centuries, with recent revival efforts generating controversy. Mahayana and Vajrayana traditions have produced notable women teachers and practitioners, from the dakinis of Tibetan Buddhism to contemporary figures leading movements for gender equality within Buddhist institutions.',
sacred:'Buddhist sacred geography centers on the four pilgrimage sites associated with the Buddha's life: Lumbini (birth), Bodh Gaya (enlightenment), Sarnath (first teaching), and Kushinagar (death). Sacred mountains like Wutai Shan, Koya-san, and Adam's Peak attract millions of pilgrims across different Buddhist cultures. Stupas and reliquaries housing fragments of the Buddha's remains or belongings create networks of sacred presence throughout the Buddhist world.',
afterlife:'Buddhist afterlife beliefs center on rebirth across six realms — gods, demigods, humans, animals, hungry ghosts, and hell beings — driven by karma and craving. Nirvana represents the cessation of this cycle rather than an eternal heaven, though its precise nature is deliberately left undefined by the Buddha. Pure Land Buddhism offers rebirth in Amitabha's Western Paradise as an intermediate step toward final enlightenment, making liberation accessible through devotional practice.',
cosmology:'Buddhist cosmology describes multiple world-systems (lokadhatu) each containing Mount Meru surrounded by continents, heavenly realms, and hells. Time operates in vast cycles (kalpas) of expansion and contraction, with no ultimate beginning or creator. The Abhidharma traditions developed detailed taxonomies of mental and physical phenomena, while Mahayana philosophy radically reinterpreted cosmology through the lens of emptiness and interpenetration.',
philosophy:'Buddhist philosophy developed sophisticated analyses of mind, language, and reality through schools like Madhyamaka (emphasizing emptiness and the two truths) and Yogacara (exploring consciousness and cognition). Nagarjuna's dialectical method of demonstrating the emptiness of all concepts influenced both Asian and modern Western philosophy. The tradition's empirical approach to mental phenomena and its rejection of metaphysical absolutes have drawn comparisons to phenomenology and process philosophy.',
politics:'Buddhism has had complex political involvements, from Ashoka's dharma-based statecraft to the theocratic governance of Tibet and the sangha-state relationships of Southeast Asian kingdoms. The concept of the chakravartin (wheel-turning monarch) provided a model for Buddhist political authority. In modern times, engaged Buddhism addresses social justice issues, while political tensions involving Buddhist identity have surfaced in Myanmar, Sri Lanka, and Thailand.',
legacy:'Buddhism's civilizational legacy includes pioneering contributions to psychology, logic, and phenomenology, as well as the development of printing (the Diamond Sutra being the world's oldest dated printed book). Zen aesthetics profoundly shaped Japanese culture from garden design to martial arts, while Buddhist monasteries served as centers of learning, medicine, and literacy across Asia. Mindfulness meditation has become a global wellness phenomenon, adapted for healthcare, education, and corporate settings.',
figures:'Key figures include the historical Buddha Shakyamuni, his disciples Sariputta and Moggallana, and the great philosophers Nagarjuna, Vasubandhu, and Dignaga. Bodhidharma carried Chan Buddhism to China, while Padmasambhava established Buddhism in Tibet. Modern figures like the 14th Dalai Lama, Thich Nhat Hanh, and B.R. Ambedkar (who led mass Buddhist conversion among Dalits) have shaped contemporary Buddhism's global presence.',
dialogue:'Buddhism has engaged in interfaith dialogue since its inception, with the Buddha himself debating Brahmanical and heterodox teachers. The tradition's non-theistic framework creates unique points of contact with secular philosophies and scientific inquiry, particularly in neuroscience and psychology. The Dalai Lama's dialogues with scientists and Christian contemplatives exemplify Buddhism's contemporary role as a bridge between religious and secular worldviews.'
}},
{id:'jainism',nm:'Jainism',sb:'India · Path of Non-Violence',s:-599,e:2024,lon:73.0,lat:25.3,
fp:{reach:3,phil:9,ritual:8,art:7,pol:4,text:7},conns:['hinduism','buddhism'],
overview:'Jainism is one of the oldest living religions, traditionally traced to the teachings of Mahavira in the 6th century BCE, though Jains regard him as the 24th and last Tirthankara in a cosmic succession of spiritual teachers. The tradition is built on radical non-violence (ahimsa), non-absolutism (anekantavada), and ascetic self-discipline as the path to liberating the soul from karmic bondage. Despite its relatively small number of adherents — roughly 4 to 5 million, mostly in India — Jainism has exerted disproportionate influence on Indian philosophy, ethics, and commerce.',
d:{
overview:'Jainism shares the spiritual landscape of ancient India with Hinduism and Buddhism but maintains a distinctive metaphysics and ethical rigor that sets it apart. The tradition divides into two major sects — Digambara (sky-clad) and Shvetambara (white-clad) — differing on monastic practice and canonical texts but united in core philosophy. Jain communities have historically wielded influence far beyond their numbers through commercial success, philanthropic traditions, and intellectual contributions to Indian logic and philosophy.',
theology:'Jain theology is unique among Indian religions in its strict atheism regarding a creator god, combined with reverence for the Tirthankaras as perfected beings who have conquered the passions. The universe is understood as eternal and self-regulating, governed by natural laws of karma without divine intervention. Every living being possesses a soul (jiva) of infinite knowledge and bliss, currently obscured by karmic matter (ajiva) that must be shed through ethical conduct and asceticism.',
texts:'The Jain canonical literature includes the Agamas, based on the teachings of Mahavira, though the two main sects disagree about which texts are authentic. The Shvetambara canon comprises 45 texts organized into groups, while Digambaras consider the original teachings lost and rely on later philosophical treatises. Major works include the Tattvartha Sutra by Umasvati, which both sects accept, and the devotional poetry of figures like Kundakunda and Samantabhadra.',
ritual:'Jain ritual centers on the veneration of Tirthankara images in temples, with elaborate bathing ceremonies (abhisheka) and devotional singing. The practice of samayika (48-minute meditation periods) and pratikramana (confession and repentance) structure daily spiritual life. The festival of Paryushana, involving eight to ten days of fasting, confession, and universal forgiveness, represents the most important annual observance.',
mysticism:'Jain mystical practice focuses on the progressive purification of the soul through meditation (dhyana) and the stages of spiritual development (gunasthanas), culminating in omniscience (kevala jnana). The practice of kayotsarga — standing motionless in meditation — can extend for hours or days as an exercise in detachment from the body. Advanced practitioners develop extraordinary equanimity through progressively demanding renunciations, with the ultimate practice being sallekhana, the voluntary fast unto death undertaken with complete serenity.',
art:'Jain art is characterized by extraordinary detail and symbolic richness, from the colossal monolithic statue of Gommateshvara at Shravanabelagola to the exquisitely carved marble temples of Ranakpur and Dilwara. Jain manuscript painting, particularly from Gujarat, developed a distinctive style with projecting eyes and vivid colors that influenced broader Indian artistic traditions. Cosmographic paintings depicting the Jain universe with mathematical precision combine artistic beauty with philosophical instruction.',
music:'Jain devotional music includes stavans (hymns) and bhajans sung in temples and homes, with regional traditions varying across Gujarat, Rajasthan, and Karnataka. The tradition emphasizes the spiritual power of sacred sound while maintaining restrictions on musical instruments in some monastic contexts. Jain musical traditions have contributed to the broader development of devotional music in western India, with compositions by poet-saints forming a living repertoire.',
ethics:'Jain ethics represent perhaps the most rigorous system of non-violence (ahimsa) ever developed, extending protection to all living beings including insects and microorganisms. The five great vows (mahavratas) — non-violence, truthfulness, non-stealing, celibacy, and non-possessiveness — are observed absolutely by monks and in modified form by laypersons. The doctrine of anekantavada (many-sidedness of truth) promotes intellectual humility and tolerance, recognizing that reality is too complex for any single perspective to capture fully.',
conversion:'Jainism has historically not engaged in active proselytization, growing primarily through birth within Jain families and occasional voluntary adoption. The tradition's demanding ethical requirements, particularly regarding diet and livelihood, have naturally limited its expansion. In modern times, Jain principles of non-violence and vegetarianism have attracted interest from environmentalists and animal rights advocates worldwide, creating a form of philosophical influence without formal conversion.',
persecution:'Jains faced periodic persecution in medieval South India, particularly from Shaivite Hindu rulers, with traditional accounts describing mass impalement of Jain monks in the Tamil region. Competition with Hindu bhakti movements led to the decline of Jainism in several regions where it had previously flourished. Despite these pressures, Jain communities survived through commercial networks and royal patronage, particularly in western India.',
schisms:'The primary Jain schism between Digambara and Shvetambara traditions crystallized around the 3rd century BCE, centered on whether monks should wear clothing and whether women can achieve liberation. Within these major divisions, further sub-sects emerged: the Shvetambaras split into Murtipujak (image-worshipping), Sthanakvasi, and Terapanthi groups. These divisions reflect differing interpretations of monastic discipline and ritual practice rather than fundamental philosophical disagreements.',
women:'Women's spiritual status in Jainism is debated between the two major sects: Shvetambaras accept that women can achieve liberation (citing the 19th Tirthankara Mallinath as female), while Digambaras hold that a female body prevents final liberation. Jain nuns significantly outnumber monks in many communities and are respected for their learning and austerity. Lay Jain women have traditionally held important roles in maintaining religious practice within families and supporting monastic communities.',
sacred:'Jain sacred geography centers on the Shatrunjaya hills in Gujarat and Shravanabelagola in Karnataka, sites associated with Tirthankara legends and monastic history. Mount Sammeta (Parasnath Hill) in Jharkhand is revered as the site where twenty of the twenty-four Tirthankaras attained liberation. Jain temple cities like Palitana, with hundreds of temples on a single hilltop, represent some of the most concentrated expressions of sacred architecture in India.',
afterlife:'Jain cosmology describes a detailed system of rebirth across four categories of existence — celestial beings, humans, animals/plants, and hell beings — determined by accumulated karma. Liberation (moksha) is achieved when the soul completely sheds all karmic matter, ascending to the summit of the universe (Siddha-loka) where it exists in eternal omniscience and bliss. Unlike Buddhist nirvana, Jain liberation preserves individual identity, with each liberated soul retaining its distinctness forever.',
cosmology:'Jain cosmology envisions the universe as an uncreated, eternal structure shaped like a cosmic person (loka-purusha), with precise mathematical dimensions for each realm. The lower regions contain seven hells of increasing severity, the middle realm contains the human world with its continents and oceans, and the upper regions house celestial beings and liberated souls. Time cycles endlessly through ascending (utsarpini) and descending (avasarpini) phases, each producing twenty-four Tirthankaras.',
philosophy:'Jain philosophy makes distinctive contributions through anekantavada (many-sidedness), syadvada (conditional predication), and nayavada (standpoint epistemology), offering sophisticated tools for handling the complexity of truth claims. The tradition's metaphysics posits an eternal universe composed of six eternal substances (dravyas): soul, matter, space, time, motion, and rest. Jain logic developed a seven-valued predication system (saptabhangi) that anticipates aspects of modern many-valued and paraconsistent logic.',
politics:'Jainism's political influence has been exercised primarily through the economic power of Jain merchant communities and their patronage of rulers. Several Indian dynasties, including the Gangas and Rastrakutas, were influenced by Jain advisors and values. In modern India, Jain principles of non-violence inspired Mahatma Gandhi, while the community's commercial success continues to translate into political influence disproportionate to its numbers.',
legacy:'Jainism's legacy includes profound contributions to Indian logic, mathematics (including early concepts of infinity and set theory), and grammar. The tradition's radical non-violence philosophy influenced Gandhi and through him the global civil rights movement. Jain principles of environmental stewardship, minimal consumption, and respect for all life forms have gained new relevance in contemporary ecological and animal rights discourse.',
figures:'The twenty-four Tirthankaras are central, with Rishabhadeva (first) and Mahavira (twenty-fourth) receiving particular veneration. Historical figures include the philosopher Kundakunda, the polymath Hemachandra who shaped Gujarati literature and grammar, and the warrior-saint Bahubali (Gommateshvara). Modern leaders include Acharya Tulsi, who founded the Anuvrat movement for ethical living, and Chitrabhanu, who brought Jain teachings to Western audiences.',
dialogue:'Jainism's doctrine of anekantavada (many-sidedness of truth) provides a philosophical foundation for interfaith dialogue that few other traditions match. Historical debates between Jain, Buddhist, and Hindu philosophers produced sophisticated frameworks for understanding religious disagreement. In the modern period, Jain thinkers have contributed to interfaith movements emphasizing non-violence, vegetarianism, and environmental ethics as common ground across traditions.'
}},
{id:'judaism',nm:'Judaism',sb:'Canaan · Covenant Faith',s:-1800,e:2024,lon:35.2,lat:31.8,
fp:{reach:7,phil:9,ritual:9,art:7,pol:8,text:10},conns:['christianity','islam','zoroastrianism'],
overview:'Judaism is the oldest of the Abrahamic faiths, tracing its origins to the covenant between God and Abraham around 1800 BCE and later codified through the revelation at Sinai. It centers on monotheistic worship of YHWH, the binding covenant between God and the Jewish people, and the ongoing interpretation of Torah as a living guide for ethical and ritual life. With roughly 15 million adherents worldwide, Judaism has exerted an influence on Western civilization vastly disproportionate to its numbers, giving rise to both Christianity and Islam.',
d:{
overview:'Judaism emerged from the ancient Israelite religion, evolving through the patriarchal period, the Exodus, the monarchy, the Babylonian exile, and the destruction of the Second Temple in 70 CE, which transformed it from a temple-centered sacrificial religion into a text-centered rabbinic tradition. Its history is inseparable from the experience of diaspora, persecution, and cultural creativity, producing rich literary, philosophical, and legal traditions across diverse host cultures. Modern Judaism encompasses Orthodox, Conservative, Reform, and Reconstructionist movements reflecting different approaches to tradition and modernity.',
theology:'Jewish theology centers on radical monotheism — the absolute oneness and sovereignty of God — expressed in the Shema: "Hear O Israel, the Lord our God, the Lord is One." The covenant (brit) between God and Israel establishes a mutual relationship of obligation and blessing, with the Torah serving as its constitution. Jewish thinkers from Maimonides to Heschel have grappled with questions of divine attributes, providence, and the problem of evil, particularly after the Holocaust.',
texts:'The Hebrew Bible (Tanakh) comprises Torah (Pentateuch), Nevi'im (Prophets), and Ketuvim (Writings), forming the foundation of Jewish literary culture. The Talmud — consisting of the Mishnah and Gemara — represents centuries of rabbinic debate and legal reasoning, creating a vast ocean of interpretive tradition. Later works include Rashi's commentaries, Maimonides' Mishneh Torah and Guide for the Perplexed, and the Zohar, the central text of Kabbalah.',
ritual:'Jewish ritual life is structured by Shabbat (the weekly sabbath), the annual festival cycle (Rosh Hashanah, Yom Kippur, Sukkot, Passover, Shavuot), and the 613 commandments (mitzvot) governing daily conduct. The synagogue service centers on Torah reading and communal prayer, while home rituals like the Passover Seder and Shabbat candle-lighting anchor Jewish practice in family life. Life-cycle rituals — brit milah, bar/bat mitzvah, marriage, and mourning practices — mark transitions with ancient ceremony.',
mysticism:'Jewish mysticism encompasses the early merkavah (chariot) and hekhalot (palace) traditions, the medieval flowering of Kabbalah centered on the Zohar, and the ecstatic prayer and storytelling of Hasidism. Kabbalistic thought maps divine reality through the ten sefirot (emanations), offering a complex theosophical system for understanding God's relationship to creation. The Hasidic movement, founded by the Baal Shem Tov in the 18th century, democratized mystical experience through joyful worship, stories, and the cultivation of devekut (cleaving to God).',
art:'Jewish art has navigated the tension between the Second Commandment's prohibition on graven images and the human impulse toward visual expression. Synagogue decoration, illuminated manuscripts like the Sarajevo Haggadah, and ceremonial objects (Judaica) represent major artistic achievements. Marc Chagall's stained glass windows, the architectural heritage of synagogues from Dura-Europos to modern designs, and contemporary Israeli art continue to expand Jewish artistic expression.',
music:'Jewish music spans the ancient cantillation of Torah reading (trope), the haunting melodies of Ashkenazi and Sephardic liturgical traditions, and the ecstatic nigunim (wordless melodies) of Hasidic worship. The cantor (hazzan) tradition developed some of the most emotionally powerful vocal music in any religious context. Klezmer, emerging from Eastern European Jewish celebrations, became a globally recognized musical tradition, while Israeli music blends Middle Eastern and Western influences.',
ethics:'Jewish ethics derive from both the Torah's commandments and the rabbinic tradition's extensive legal and moral reasoning, emphasizing justice (tzedek), compassion (rachamim), and repair of the world (tikkun olam). The concept of pikuach nefesh — that saving a human life overrides nearly all other commandments — reveals the tradition's prioritization of human welfare. Rabbinic literature develops detailed ethical frameworks for business conduct, speech, charity, and interpersonal relations.',
conversion:'Judaism historically has not actively proselytized, though it accepts sincere converts through a rigorous process of study, practice, and ritual immersion (mikvah). The tradition's emphasis on peoplehood rather than universal mission distinguishes it from Christianity and Islam. Conversion requirements vary across denominations, with Orthodox conversion demanding full acceptance of halakhic observance while Reform and Conservative movements may emphasize different aspects of Jewish commitment.',
persecution:'Jewish history is marked by recurring persecution: the Babylonian exile, Roman destruction of the Temple, medieval European massacres and expulsions, the Spanish Inquisition, Russian pogroms, and the Holocaust, which murdered six million Jews. This history of suffering has profoundly shaped Jewish theology, identity, and communal organization. The establishment of Israel in 1948 represented both a response to centuries of persecution and the realization of ancient longings for return to Zion.',
schisms:'Major divisions in Judaism include the ancient split between Pharisees and Sadducees, the medieval divergence of Ashkenazi and Sephardi traditions, and the modern denominational spectrum from Ultra-Orthodox to Reform. The Hasidic-Mitnagdic controversy of the 18th century pitted mystical populism against rationalist elitism within Orthodoxy. The emergence of Zionism created new ideological divisions between religious and secular visions of Jewish identity and destiny.',
women:'Women's roles in Judaism have evolved dramatically, from biblical matriarchs and prophets through centuries of separate-sphere piety to the modern ordination of women rabbis in Reform (1972), Reconstructionist, and Conservative movements. Orthodox Judaism maintains gender-differentiated roles in ritual while debating the expansion of women's learning and liturgical participation. Feminist Jewish theology has recovered women's voices from tradition and created new rituals addressing women's experiences.',
sacred:'Jewish sacred geography centers on Jerusalem and the Temple Mount, the Western Wall being the holiest accessible site. Hebron (Cave of the Patriarchs), Safed (center of Kabbalah), and Tiberias join Jerusalem as the four holy cities of the Land of Israel. In the diaspora, synagogues, study houses, and cemeteries create sacred spaces, while the concept of eruv extends sanctified space into urban landscapes.',
afterlife:'Jewish afterlife beliefs are diverse and less dogmatically defined than in Christianity or Islam, ranging from the biblical concept of Sheol to rabbinic teachings about Olam Ha-Ba (the World to Come) and resurrection of the dead. The Talmud describes Gan Eden (paradise) and Gehinnom (a purgatorial period of purification lasting at most twelve months). Kabbalistic tradition introduces gilgul (reincarnation), while modern Jewish thinkers often emphasize ethical legacy over metaphysical speculation about death.',
cosmology:'Jewish cosmology begins with the Genesis creation narrative, which has generated countless interpretations from literal to allegorical across the centuries. Kabbalistic cosmology describes creation through tzimtzum (divine contraction), the shattering of vessels (shevirat ha-kelim), and ongoing repair (tikkun), providing a dramatic cosmic narrative of exile and restoration. Medieval Jewish philosophers engaged with Aristotelian and Neoplatonic cosmologies, while modern Jewish thought grapples with the relationship between scientific and religious accounts of origins.',
philosophy:'Jewish philosophy spans from Philo of Alexandria's synthesis of Torah and Greek thought through Maimonides' Aristotelian rationalism to modern existentialist thinkers like Martin Buber and Emmanuel Levinas. The tradition of halakhic reasoning developed sophisticated methods of legal interpretation, analogy, and precedent that parallel common law jurisprudence. Franz Rosenzweig, Hermann Cohen, and Abraham Joshua Heschel represent different approaches to articulating Jewish theology in dialogue with modern philosophy.',
politics:'Judaism's political thought ranges from the biblical model of theocratic monarchy to the prophetic tradition of speaking truth to power and demanding social justice. The experience of diaspora produced distinctive strategies of communal self-governance (kehilla) within host societies. Zionism transformed Jewish political identity by creating a nation-state, while debates between religious and secular governance continue to shape Israeli politics and Jewish political thought globally.',
legacy:'Judaism's legacy includes the foundational concept of ethical monotheism that shaped Western civilization, the prophetic tradition of social justice, and the rabbinic model of lifelong textual study. Jewish contributions to science, literature, philosophy, music, and the arts far exceed any proportional expectation. The concepts of Sabbath rest, individual moral responsibility, covenantal law, and messianic hope have become embedded in the broader cultural fabric of Western and global civilization.',
figures:'Key figures include the patriarchs Abraham, Isaac, and Jacob, the lawgiver Moses, and the prophets Isaiah, Jeremiah, and Ezekiel. Rabbinic giants include Hillel, Akiva, Rashi, and Maimonides, while the Hasidic movement produced the Baal Shem Tov and the Lubavitcher Rebbes. Modern figures like Theodor Herzl (Zionism), Abraham Joshua Heschel (theology and civil rights), and Elie Wiesel (Holocaust remembrance) have shaped contemporary Jewish identity.',
dialogue:'Judaism has engaged in interfaith dialogue throughout its history, from ancient philosophical encounters in Alexandria to medieval disputations with Christian and Muslim scholars. The post-Holocaust era saw dramatic improvements in Jewish-Christian relations, exemplified by Vatican II's Nostra Aetate declaration. Jewish thinkers have contributed distinctive perspectives to interfaith conversation, including the concept of the Noahide laws as a framework for universal ethical obligation.'
}},
{id:'zoroastrianism',nm:'Zoroastrianism',sb:'Persia · Good Thought',s:-1500,e:2024,lon:52.5,lat:32.7,
fp:{reach:5,phil:8,ritual:7,art:6,pol:7,text:7},conns:['judaism','christianity','islam','manichaeism'],
overview:'Zoroastrianism, founded by the prophet Zarathustra (Zoroaster) in ancient Persia, is one of the world's oldest monotheistic religions and arguably the most influential faith most people have never heard of. Its core teaching frames existence as a cosmic struggle between Ahura Mazda (Wise Lord) and Angra Mainyu (Destructive Spirit), resolved through human choice aligned with good thoughts, good words, and good deeds. Though reduced to fewer than 200,000 adherents today, its concepts of heaven, hell, judgment, resurrection, and messianic expectation profoundly shaped Judaism, Christianity, and Islam.',
d:{
overview:'Zoroastrianism served as the state religion of three successive Persian empires — Achaemenid, Parthian, and Sasanian — spanning over a millennium and influencing cultures from the Mediterranean to India. The Arab Muslim conquest of Persia in the 7th century CE led to gradual decline, with many Zoroastrians fleeing to India where they became known as Parsis. Today the tradition survives in small but culturally significant communities in India, Iran, and the global diaspora, facing demographic challenges while maintaining ancient rituals and ethical commitments.',
theology:'Zoroastrian theology centers on Ahura Mazda as the supreme, uncreated God of wisdom and righteousness, opposed by Angra Mainyu, the destructive spirit who chose evil. The Amesha Spentas (Bounteous Immortals) — seven divine attributes including Good Mind, Truth, and Devotion — serve as intermediaries and models for human virtue. Theological debate within the tradition ranges from strict dualism (two coeternal principles) to monotheistic interpretations where Angra Mainyu is a lesser, created being destined for final defeat.',
texts:'The Avesta is the primary Zoroastrian scripture, with the Gathas — seventeen hymns attributed directly to Zarathustra — forming its oldest and most sacred layer. The Yasna, Vispered, and Vendidad contain liturgical, ritual, and legal material, while the Bundahishn provides cosmological narrative. Much of the original Avestan corpus was lost after the Arab conquest, and later Pahlavi texts like the Denkard and Selections of Zadspram preserve traditions and commentaries in Middle Persian.',
ritual:'Zoroastrian ritual centers on the maintenance of sacred fire, which burns perpetually in fire temples (atash behrams) as a symbol of divine truth and righteousness. The Yasna ceremony, involving the preparation and offering of haoma, preserves rituals with Indo-Iranian roots spanning millennia. The Navjote (or Sedreh-Pushi) initiation ceremony invests young Zoroastrians with the sacred shirt (sudreh) and cord (kusti), which are worn daily as reminders of their faith.',
mysticism:'Zoroastrian mysticism is less developed as a distinct tradition than in Hinduism or Sufism, but contemplative dimensions exist in the practice of maintaining constant awareness of the cosmic battle between good and evil. The concept of khvarenah (divine glory or fortune) represents a mystical energy that can be cultivated through righteous living. The Gathas themselves contain passages of visionary intensity, with Zarathustra describing direct encounters with Ahura Mazda and the Amesha Spentas.',
art:'Zoroastrian art is known primarily through the monumental rock reliefs and architectural remains of the Persian empires, from the grand columned halls of Persepolis to the rock-cut tombs at Naqsh-e Rostam. The faravahar symbol — a winged disc representing divine glory or the higher soul — has become the most recognizable Zoroastrian icon. Fire temple architecture, with its distinctive domed chambers housing sacred fires, represents the tradition's most enduring architectural contribution.',
music:'Zoroastrian liturgical music centers on the rhythmic chanting of Avestan prayers, with specific tones and cadences preserved through oral tradition across centuries. The tradition maintains that sacred words must be properly intoned to be spiritually effective, giving pronunciation and melody liturgical significance. Parsi communities in India have developed their own musical traditions blending Zoroastrian devotional themes with Gujarati and Western musical influences.',
ethics:'Zoroastrian ethics are summarized in the triad of good thoughts (humata), good words (hukhta), and good deeds (hvarshta), emphasizing active righteousness over passive piety. The concept of asha (truth/righteousness) stands against druj (falsehood/deceit) as the fundamental moral axis of existence. Humans possess free will to choose between these forces, and their choices have cosmic significance — each righteous act strengthens the forces of good in the universe's ultimate drama.',
conversion:'Zoroastrianism's stance on conversion is one of its most debated contemporary issues, with traditionalists (especially among Parsis) opposing acceptance of converts while reformists argue for openness. Historically, the religion spread through the Persian empires without systematic missionary activity but was adopted by diverse peoples within the imperial sphere. The demographic decline of the community has intensified debates about whether accepting converts is necessary for the tradition's survival.',
persecution:'Zoroastrians faced severe persecution following the Arab Muslim conquest of Persia in the 7th century, including forced conversions, destruction of fire temples, and discriminatory jizya taxation. Those remaining in Iran were marginalized as a tolerated but subordinate minority for centuries. The migration of Zoroastrians to India (becoming the Parsi community) preserved the tradition, though small communities in Iran continued to practice under difficult conditions into the modern era.',
schisms:'Zoroastrianism has experienced relatively few formal schisms compared to larger religions, though significant theological differences exist between dualist and monotheist interpretations. The Zurvanite heresy, which posited a supreme deity (Zurvan/Time) above both Ahura Mazda and Angra Mainyu, was influential during the Sasanian period. Modern divisions between Parsi traditionalists and reformists, and between Iranian and Indian communities, reflect differing approaches to adaptation and preservation.',
women:'Women in Zoroastrianism have historically held a relatively favorable position compared to neighboring cultures, with the Gathas addressing men and women equally as moral agents. Zoroastrian law recognized women's property rights and legal standing in ways progressive for the ancient world. Contemporary debates center on the status of children from interfaith marriages, with Parsi communities particularly divided over whether children of Zoroastrian women married to non-Zoroastrian men can be initiated into the faith.',
sacred:'Zoroastrian sacred geography centers on fire temples, with the highest-grade Atash Behram fires burning continuously for centuries in locations like Udvada in Gujarat. Ancient sacred sites include Takht-e Soleyman in Iran, where a major fire temple served Sasanian royalty. Natural features — mountains, rivers, and sky — hold spiritual significance, reflecting the tradition's reverence for the good creations of Ahura Mazda.',
afterlife:'Zoroastrian afterlife beliefs have profoundly influenced Western religions, introducing concepts of individual judgment, heaven (House of Song), and hell (House of Lies) that became foundational in Judaism, Christianity, and Islam. The soul is judged at the Chinvat Bridge three days after death, weighed by its earthly deeds, and directed to its appropriate destination. The tradition also teaches a final renovation (Frashokereti) when evil is permanently defeated, the dead are resurrected, and the world is restored to perfection.',
cosmology:'Zoroastrian cosmology describes a universe created by Ahura Mazda as a trap for evil, with history unfolding in a cosmic drama spanning approximately 12,000 years divided into four ages. The physical world is inherently good — created as an arena where evil can be confronted and ultimately defeated. This optimistic cosmology distinguishes Zoroastrianism from traditions that view the material world as illusory or fallen, affirming the goodness of creation and humanity's role in its perfection.',
philosophy:'Zoroastrian philosophy introduced several concepts that became foundational for Western thought: ethical dualism, linear time with cosmic purpose, individual moral responsibility, and eschatological hope. The tradition's emphasis on free will and the moral significance of human choice influenced both Greek philosophy (through Persian contact) and Abrahamic theology. Modern scholars debate the extent of Zoroastrian influence on Jewish post-exilic theology, but parallels in angelology, demonology, resurrection, and final judgment are striking.',
politics:'Zoroastrianism served as the imperial religion of the Achaemenid dynasty, whose relatively tolerant governance model — exemplified by Cyrus the Great's policies toward conquered peoples — set precedents for managing religious diversity. The Sasanian period saw closer fusion of religious and political authority, with the Zoroastrian priesthood wielding significant state power. Parsi communities in India became politically influential through commercial success, producing prominent figures in Indian nationalism and post-independence governance.',
legacy:'Zoroastrianism's most profound legacy lies in its influence on the Abrahamic religions, particularly concepts of heaven and hell, angels and demons, cosmic judgment, resurrection, and messianic expectation. The tradition's ethical framework — emphasizing truth, righteousness, and active engagement with the world — shaped Persian civilization's enduring contributions to governance, art, and culture. Parsi communities have made outsized contributions to modern India, including the Tata industrial empire, and Freddie Mercury remains perhaps the most famous person of Zoroastrian heritage.',
figures:'Zarathustra (Zoroaster) stands as the founding prophet, with his Gathas representing the tradition's oldest and most authoritative voice. The Achaemenid kings Cyrus the Great and Darius I established Zoroastrian-influenced governance over the largest empire the world had yet seen. Modern figures include Dastur Dhalla, who sought to reform and revitalize the tradition, and the Tata family, whose Parsi Zoroastrian values of charitable enterprise transformed Indian industry.',
dialogue:'Zoroastrianism's historical interactions with Judaism during the Babylonian and Persian periods represent one of the most consequential interfaith encounters in religious history. The tradition's dualistic framework offers unique perspectives in dialogue with both monotheistic and Eastern religions. Modern Zoroastrian communities participate actively in interfaith movements, contributing their tradition's emphasis on environmental stewardship (caring for the good creations) and ethical activism as common ground with other faiths.'
}},
{id:'greek',nm:'Ancient Greek Religion',sb:'Mediterranean · Olympian Pantheon',s:-800,e:400,lon:23.7,lat:37.9,
fp:{reach:7,phil:10,ritual:8,art:10,pol:8,text:10},conns:['hinduism','judaism','christianity','norse'],
overview:'Ancient Greek religion encompassed the worship of the Olympian gods, mystery cults, oracular practices, and philosophical theology that profoundly shaped Western civilization. From Homer\'s epics through the mystery rites at Eleusis to the philosophical theology of Plato and Aristotle, Greek religious thought explored the relationship between mortals and the divine with unmatched intellectual sophistication. Though supplanted by Christianity, Greek religious concepts, mythological narratives, and philosophical frameworks remain foundational to Western culture, art, and thought.',
d:{
overview:'Ancient Greek religion was not a unified system but a diverse collection of local cults, pan-Hellenic festivals, mystery traditions, and philosophical theologies united by shared mythological narratives and ritual practices. The Olympian gods presided over a cosmos where divine and human worlds interpenetrated through sacrifice, prayer, oracle, and heroic action. Greek religious thought evolved from Homeric anthropomorphism through the mystery cults\' promises of personal salvation to the philosophical monotheism of late antiquity.',
theology:'Greek theology ranged from Homer\'s vividly anthropomorphic gods to Plato\'s abstract Form of the Good and Aristotle\'s Unmoved Mover. The Olympian pantheon, led by Zeus, represented cosmic forces and human attributes in divine form, while mystery cults like those at Eleusis offered initiates personal encounters with divinity. Philosophical theology progressively rationalized religious concepts, with Stoic pantheism and Neoplatonic emanation theory providing sophisticated frameworks that influenced both Christianity and Islam.',
texts:'Homer\'s Iliad and Odyssey served as foundational religious texts, defining the character of the gods and their relationship with mortals. Hesiod\'s Theogony and Works and Days provided systematic accounts of divine genealogy and cosmic order. The Orphic texts, Pindar\'s odes, and the tragedies of Aeschylus, Sophocles, and Euripides explored theological questions with depth and nuance that influenced all subsequent Western religious literature.',
ritual:'Greek ritual centered on animal sacrifice and libation, performed at altars before temples that served as houses for divine images rather than congregational spaces. The great pan-Hellenic festivals — Olympic, Pythian, Nemean, and Isthmian games — combined athletic competition with religious celebration. Mystery rites at Eleusis, Samothrace, and other centers offered initiates transformative experiences that promised a better fate in the afterlife.',
mysticism:'The Eleusinian Mysteries, celebrated for nearly two thousand years, offered initiates a profound experience of death and rebirth that was considered the most sacred event in Greek religion. Orphic and Dionysian traditions emphasized ecstatic experience, ritual purification, and the divine nature of the soul trapped in material existence. Greek mystical traditions, particularly as developed by Neoplatonic philosophers, provided the vocabulary and conceptual framework for Christian and Islamic mysticism.',
art:'Greek religious art achieved unparalleled excellence, from the monumental sculpture of Phidias to the refined pottery depicting mythological scenes. Temple architecture, culminating in the Parthenon, created sacred spaces that embodied mathematical harmony and divine proportion. Greek religious artistic traditions established the aesthetic standards of Western civilization, with their influence extending through Roman art to the Renaissance and beyond.',
music:'Music was integral to Greek religious practice, with hymns, paeans, and dithyrambs accompanying sacrifice and festival. The lyre and aulos provided musical accompaniment for religious ceremonies, theatrical performances, and philosophical instruction. Greek theories of musical harmony, attributed to Pythagoras and elaborated by later philosophers, connected music to cosmic order and influenced Western musical theory for millennia.',
ethics:'Greek religious ethics evolved from the heroic code of Homer, emphasizing honor and excellence, to the philosophical ethics of Plato and Aristotle, which sought rational foundations for moral behavior. The concept of hubris — overstepping mortal limits — served as a fundamental ethical principle reinforced by mythology and tragedy. Greek ethical philosophy, grounded in but transcending religious tradition, became the foundation of Western moral thought.',
conversion:'Greek religion did not proselytize, as worship was tied to civic identity and local cult rather than individual belief. Mystery cults accepted initiates from across the Greek world, creating a form of voluntary religious participation. The spread of Greek religion followed Greek colonization and cultural influence rather than missionary activity, with conquered peoples often adopting Greek gods alongside their own.',
persecution:'Greek religion was generally tolerant of diversity, but blasphemy and impiety against civic cults could be prosecuted, as in the trial of Socrates. The suppression of Dionysiac worship in some cities reflected anxiety about ecstatic religion\'s social disruption. The eventual Christian suppression of pagan worship in the fourth and fifth centuries CE brought Greek religious practice to an end after more than a millennium.',
schisms:'Greek religion lacked the centralized authority that produces formal schisms, but significant tensions existed between popular worship and philosophical theology. The Orphic tradition\'s emphasis on asceticism and the soul\'s divinity contrasted sharply with mainstream Greek religiosity\'s acceptance of material life. The mystery cults\' promise of personal salvation represented an alternative path within Greek religion that anticipated Christianity\'s appeal.',
women:'Women played essential roles in Greek religion as priestesses, particularly of female deities like Athena, Demeter, and Artemis. The Eleusinian Mysteries granted women equal participation, and the Thesmophoria was an exclusively female festival honoring Demeter. Despite women\'s exclusion from most political life, their religious roles gave them social authority and public visibility.',
sacred:'Greek sacred sites included mountain peaks, springs, groves, and caves as well as constructed temples and altars. The great oracular centers at Delphi, Dodona, and Didyma served as points of communication between human and divine worlds. Sacred space in Greek religion was defined by consecration and ritual boundary rather than theological distinction between sacred and profane.',
afterlife:'Greek afterlife beliefs ranged from Homer\'s gloomy Hades, where shades led diminished existences, to the mystery cults\' promises of blessed afterlife for initiates. The Orphic and Pythagorean traditions taught reincarnation and the soul\'s potential for divine reunion through purification. Plato\'s philosophical development of afterlife concepts, including judgment, punishment, and reward, profoundly influenced Christian eschatology.',
cosmology:'Greek cosmology evolved from Hesiod\'s mythological account of creation through chaos to the philosophical cosmologies of the pre-Socratics, Plato, and Aristotle. Plato\'s Timaeus described a rational creator-god fashioning the cosmos according to mathematical principles, influencing both Christian and Islamic creation theology. Aristotle\'s geocentric cosmology, integrated with his theology of the Unmoved Mover, dominated Western scientific and religious thought until Copernicus.',
philosophy:'Greek religion and philosophy were deeply intertwined, with philosophical inquiry emerging from and continually engaging with religious questions about the nature of the divine, the soul, and cosmic order. Plato\'s theory of Forms, Aristotle\'s theology, and Stoic pantheism all represented philosophical transformations of religious intuitions. Neoplatonism, the final flowering of Greek philosophical theology, provided the conceptual framework that enabled Christian theological development.',
politics:'Greek religion was inseparable from politics, with civic cults, oracles, and festivals reinforcing communal identity and political authority. The Delphic Oracle played a major political role, consulted by cities and individuals on matters of colonization, warfare, and governance. Religious festivals provided occasions for diplomatic interaction and the display of civic wealth and power.',
legacy:'Greek religion\'s legacy pervades Western civilization through its mythology, philosophy, art, and literature, remaining central to education and cultural literacy. The philosophical theology developed by Greek thinkers provided the conceptual vocabulary that Christianity, Islam, and Judaism used to articulate their own theological systems. Greek mythological narratives continue to provide archetypal frameworks for understanding human experience.',
