<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── DARK THEME (default) ── */
:root{
  --bg:#02040a;
  --panel:#070b12;
  --panel2:#0c1018;
  --ocean-start:#0a1628;--ocean-end:#061020;
  --land:#2a4a18;--land-s:#3a6020;
  --amber:#e89820;--amber-b:#f0b040;--amber-d:#3a2204;
  --amber-x:rgba(232,152,32,0.14);--amber-xx:rgba(232,152,32,0.08);
  --txt:#f2e8d5;--txt2:#e0d4b4;--txt3:#c8aa78;
  --bdr:rgba(232,152,32,0.22);--bdr2:rgba(232,152,32,0.10);
  --hint:rgba(224,212,180,0.65);
  --tl-bg:rgba(2,4,10,0.99);
  --hdr-bg:rgba(2,4,10,0.97);
  --conn-bdr:rgba(232,152,32,0.10);
  --shadow:rgba(0,0,0,0.6);
}

/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#f0ebe0;
  --panel:#e8e0d0;
  --panel2:#ddd4c0;
  --ocean-start:#b8cce0;--ocean-end:#a8bcd4;
  --land:#8ca860;--land-s:#7a9850;
  --amber:#4a2c00;--amber-b:#5a3800;--amber-d:#f0d8a0;
  --amber-x:rgba(122,78,0,0.10);--amber-xx:rgba(122,78,0,0.06);
  --txt:#1a1206;--txt2:#1a1206;--txt3:#2e2010;
  --bdr:rgba(122,78,0,0.28);--bdr2:rgba(122,78,0,0.14);
  --hint:rgba(30,18,6,0.6);
  --tl-bg:rgba(236,228,214,0.99);
  --hdr-bg:rgba(236,228,214,0.97);
  --conn-bdr:rgba(122,78,0,0.12);
  --shadow:rgba(0,0,0,0.18);
}

@media(prefers-color-scheme:light){
  :root:not([data-theme="dark"]){
    --bg:#f0ebe0;--panel:#e8e0d0;--panel2:#ddd4c0;
    --ocean-start:#b8cce0;--ocean-end:#a8bcd4;
    --land:#8ca860;--land-s:#7a9850;
    --amber:#4a2c00;--amber-b:#5a3800;--amber-d:#f0d8a0;
    --amber-x:rgba(122,78,0,0.10);--amber-xx:rgba(122,78,0,0.06);
    --txt:#1a1206;--txt2:#1a1206;--txt3:#2e2010;
    --bdr:rgba(122,78,0,0.28);--bdr2:rgba(122,78,0,0.14);
    --hint:rgba(30,18,6,0.6);
    --tl-bg:rgba(236,228,214,0.99);
    --hdr-bg:rgba(236,228,214,0.97);
    --conn-bdr:rgba(122,78,0,0.12);
    --shadow:rgba(0,0,0,0.18);
  }
}

html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Crimson Pro',serif}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--hdr-bg);gap:12px}
.hdr-left{display:flex;align-items:baseline;gap:0;min-width:0}
.logo-t{font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:700;color:var(--amber-b);letter-spacing:3px;white-space:nowrap}
.logo-s{font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin-left:10px;white-space:nowrap}
.era-disp{text-align:center;font-family:'Cinzel',serif;flex-shrink:0}
.era-y{font-size:22px;font-weight:600;color:var(--amber-b);letter-spacing:1px}
.era-n{font-size:12px;letter-spacing:1.5px;color:var(--txt2);margin-top:1px;text-transform:uppercase;font-weight:600}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.cnt-disp{text-align:right;font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;color:var(--txt3)}
.cnt-n{font-size:22px;font-weight:600;color:var(--amber);display:block;line-height:1}
.theme-btn{background:none;border:1px solid var(--bdr);padding:4px 8px;cursor:pointer;font-size:13px;color:var(--txt2);border-radius:3px;transition:all .15s;flex-shrink:0}
.theme-btn:hover{background:var(--amber-x);color:var(--amber-b)}

/* ── MAIN LAYOUT ── */
.main{position:fixed;top:52px;left:0;right:0;bottom:0;display:flex}
.map-c{flex:1;position:relative;overflow:hidden;min-width:0;min-height:0}
.map-tl-col{display:flex;flex-direction:column;flex:1;min-width:0}
#wsvg{width:100%;height:100%}

/* ── DESKTOP PANEL ── */
.info-panel{width:320px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--bdr);overflow-y:auto;padding:18px 18px 28px;position:relative}
.info-close{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:16px;line-height:1;padding:4px;float:right;margin:-2px -2px 0 0}
.info-close:hover{color:var(--amber-b)}
.info-nm{font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:700;color:var(--amber-b);margin-bottom:3px;clear:both}
.info-sb{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1.5px;color:var(--txt2);text-transform:uppercase;margin-bottom:10px}
.info-dates{display:flex;gap:6px;margin-bottom:14px;align-items:center}
.info-dt{padding:5px 12px;border:1px solid var(--bdr);font-family:'Cinzel',serif;font-size:13.5px;color:var(--amber-b)}
.info-arr{color:var(--txt2);font-size:12px}

/* ── LENS DROPDOWN ── */
.lens-dd-wrap{border:1px solid var(--bdr);margin-bottom:14px}
.lens-dd-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;cursor:pointer;user-select:none;background:var(--amber-xx);border-bottom:1px solid transparent;transition:background .15s}
.lens-dd-hdr:hover{background:var(--amber-x)}
.lens-dd-hdr.open{border-bottom-color:var(--bdr)}
.lens-dd-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:2.5px;color:var(--txt2);text-transform:uppercase;flex-shrink:0}
.lens-dd-summary{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.5px;color:var(--amber-b);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;padding:0 6px}
.lens-dd-arrow{color:var(--txt2);font-size:10px;transition:transform .18s;flex-shrink:0}
.lens-dd-arrow.open{transform:rotate(180deg)}
.lens-dd-list{display:none;max-height:260px;overflow-y:auto}
.lens-dd-list.open{display:block}
.lens-row{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--bdr2);transition:background .15s}
.lens-row:last-child{border-bottom:none}
.lens-row:hover{background:var(--amber-x)}
.lens-row-chk{width:13px;height:13px;border:1px solid var(--bdr);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--amber-b);line-height:1}
.lens-row-chk.on{background:var(--amber-x);border-color:var(--amber-b)}
.lens-row-ico{font-size:14px;width:16px;text-align:center;flex-shrink:0;color:var(--txt2)}
.lens-row-lbl{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.5px;color:var(--txt2)}
.lens-row.on .lens-row-lbl{color:var(--amber-b);font-weight:600}
.lens-row-sep{border-bottom:1px solid var(--bdr);margin-bottom:2px}
.lens-dd-close-btn{text-align:center;padding:10px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;color:var(--amber-b);border-top:1px solid var(--bdr);cursor:pointer;text-transform:uppercase;transition:background .15s}
.lens-dd-close-btn:hover{background:var(--amber-x)}

/* ── DRAWER CONTENT ── */
.lens-section{margin-bottom:18px}
.lens-section-hdr{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.lens-section-ico{font-size:12px;color:var(--txt2)}
.lens-section-lbl{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;color:var(--amber-b);text-transform:uppercase;font-weight:600}
.info-div{border:none;border-top:1px solid var(--bdr);margin:12px 0}
.info-txt{font-size:17.5px;line-height:1.95;color:var(--txt);font-style:italic}
.overview-arc{font-size:17.5px;line-height:1.95;color:var(--txt)}
.overview-arc p{margin-bottom:14px}
.civ-span-bar{height:3px;background:var(--bdr2);position:relative;margin:14px 0 6px;border-radius:2px}
.civ-span-fill{position:absolute;top:0;height:100%;background:var(--amber-b);border-radius:2px;opacity:.8}
.civ-span-lbls{display:flex;justify-content:space-between;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--txt3)}
.conn-hdr{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1.5px;color:var(--txt3);text-transform:uppercase;margin:18px 0 8px;font-weight:600}
.conn-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--conn-bdr);font-size:16px;color:var(--txt2);cursor:pointer;transition:color .15s}
.conn-item:hover{color:var(--amber-b)}
.conn-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── TIMELINE ── */
.tl-wrap{position:relative;height:88px;background:var(--tl-bg);border-top:1px solid var(--bdr);padding:8px 20px 14px;flex-shrink:0}
.tl-lbls{display:flex;justify-content:space-between;margin-bottom:5px}
.tl-lbl{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.8px;color:var(--txt3);text-transform:uppercase;font-weight:600}
.tl-trk{position:relative;height:5px;background:var(--bdr);border-radius:3px}
.tl-fill{position:absolute;top:0;left:0;height:5px;background:var(--amber-b);border-radius:3px;pointer-events:none;opacity:.7}
.tl-thumb{position:absolute;top:50%;width:20px;height:20px;background:var(--amber-b);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--amber),0 0 20px rgba(232,152,32,.3);pointer-events:none;transition:left .04s linear}
input.tl-range{position:absolute;top:50%;left:0;width:100%;height:28px;opacity:0;cursor:pointer;transform:translateY(-50%);margin:0;z-index:2}
.hint{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;color:var(--hint);display:flex;align-items:center;justify-content:center;padding:0 8px;white-space:nowrap;overflow:hidden}
#map-hint-text{pointer-events:none;overflow:hidden;text-overflow:ellipsis}

/* ── MOB MAP BUTTON ── */
.mob-map-btn{display:none}

/* ── PORTRAIT MOBILE ── */
@media(max-width:768px) and (orientation:portrait){
  .logo-s{display:none}
  .cnt-disp{display:none}
  .hdr{padding:8px 12px}
  .logo-t{font-size:16px;letter-spacing:2px}
  .era-y{font-size:18px}
  .era-n{font-size:10px;letter-spacing:1.5px}
  .main{top:52px!important}
  .main{bottom:0;flex-direction:column}
  .map-tl-col{width:100%}
  .map-c{flex:0 0 42vh;width:100%}
  .info-panel{flex:1;width:100%;border-left:none;border-top:1px solid var(--bdr);overflow-y:auto;padding:0 16px 16px;border-radius:0}
  .tl-wrap{height:76px;padding:6px 14px 10px}
  .tl-lbl{font-size:9px;letter-spacing:.8px}
  .hint{font-size:8px;letter-spacing:.8px}
  .lens-dd-list{max-height:180px}
  .info-txt,.overview-arc{font-size:16px;line-height:1.82}
  .lens-row-lbl{font-size:13px}
}

/* ── LANDSCAPE MOBILE ── */
@media(max-width:900px) and (orientation:landscape){
  .logo-s{display:none}
  .hdr{padding:6px 14px}
  .logo-t{font-size:15px;letter-spacing:2px}
  .era-y{font-size:15px}
  .hint{font-size:7px;letter-spacing:.5px;white-space:normal;text-align:center;line-height:1.4}
  .tl-wrap{height:68px;padding:4px 12px 8px}
  .tl-lbl{font-size:8px}
  .info-panel{width:280px}
}

@keyframes ring-pulse{0%{r:5;opacity:.7}100%{r:26;opacity:0}}

@media(pointer:coarse){
  #mark-layer g[role="button"]{cursor:pointer}
}

/* ── ACCESSIBILITY ── */
:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px;border-radius:2px}
.conn-item:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px}
.lens-row:focus-visible{outline:2px solid var(--amber-b);outline-offset:-2px}
button:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px}
.skip-link{position:absolute;top:-40px;left:0;background:var(--amber-b);color:var(--bg);padding:8px 16px;z-index:9999;font-family:'Cinzel',serif;font-size:11px;text-decoration:none}
.skip-link:focus{top:0}

/* ── THREAD PANEL ── */
.thread-panel{
  position:fixed;top:52px;left:0;right:0;z-index:400;
  background:var(--panel);
  max-height:0;overflow:hidden;
  transition:max-height .32s cubic-bezier(.4,0,.2,1);
}
.thread-panel.open{border-bottom:1px solid var(--bdr);box-shadow:0 6px 24px var(--shadow)}
.thread-panel.open{max-height:70vh}
.thread-panel-inner{padding:16px 20px 20px;overflow-y:auto;max-height:calc(70vh - 1px)}
.thread-panel-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bdr)}
.thread-panel-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase}
.thread-close-btn{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:18px;line-height:1;padding:4px;transition:color .15s}
.thread-close-btn:hover{color:var(--amber-b)}
.thread-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.thread-concept-btn{width:100%;background:none;border:1px solid var(--bdr2);padding:9px 12px;text-align:left;cursor:pointer;border-radius:3px;transition:all .15s}
.thread-concept-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.thread-concept-name{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.8px;color:var(--txt2);display:block;margin-bottom:4px}
.thread-concept-chain{font-size:11px;color:var(--txt3);line-height:1.5}
.thread-back-btn{background:none;border:none;padding:0;cursor:pointer;font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--amber-b);text-transform:uppercase;transition:opacity .15s}
.thread-back-btn:hover{opacity:.7}
.thread-active-title{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--amber-b);margin:10px 0 14px}
.thread-steps-grid{display:flex;flex-direction:column;align-items:center;padding:4px 0 16px}
.thread-step{width:min(360px,90%);text-align:center;padding:10px 14px;border:1px solid var(--bdr2);border-radius:4px;font-size:12.5px;color:var(--txt2);background:var(--panel2)}
.thread-step-yr{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);margin-bottom:4px}
.thread-step-txt{line-height:1.6;color:var(--txt2)}
.thread-step-civ{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);margin-bottom:4px}
.thread-chain-link{display:flex;flex-direction:column;align-items:center;padding:2px 0;color:var(--amber-b);opacity:.6}
.thread-chain-line{width:1px;height:8px;background:var(--amber-b);opacity:.4}

/* ── COMPARE MODE ── */
.compare-wrap{display:flex;gap:0;height:100%;width:100%}
.compare-col{flex:1;min-width:0;overflow-y:auto;padding:16px;border-right:1px solid var(--bdr)}
.compare-col:last-child{border-right:none}
.compare-col-hdr{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--amber-b);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.compare-remove{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:14px;padding:2px}
.compare-remove:hover{color:var(--amber-b)}
.compare-prompt{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--txt3);font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:20px;opacity:.6}
.compare-diff{background:var(--amber-xx);border-left:2px solid var(--amber-b);padding:6px 8px;margin-bottom:2px}

/* ── SHARE TOAST ── */
.share-toast{position:fixed;bottom:108px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--panel);border:1px solid var(--bdr);padding:8px 18px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1.5px;color:var(--amber-b);text-transform:uppercase;border-radius:20px;opacity:0;transition:all .3s;pointer-events:none;z-index:500;white-space:nowrap}
.share-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── FINGERPRINT CHART ── */
.fp-wrap{margin:14px 0 6px}
.fp-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--txt3);text-transform:uppercase;margin-bottom:8px}
.fp-svg{display:block;margin:0 auto}
.fp-label{font-family:'Cinzel',serif;font-size:8px;fill:var(--txt3)}
.fp-poly{fill:rgba(200,168,232,.18);stroke:#c8a8e8;stroke-width:1.2}
.fp-grid{fill:none;stroke:var(--bdr);stroke-width:.5}

/* ── CONTEMPORARY BAR ── */
.contemp-wrap{margin:12px 0 4px}
.contemp-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;cursor:pointer;transition:opacity .15s}
.contemp-bar-row:hover{opacity:.75}
.contemp-bar-nm{font-family:'Cinzel',serif;font-size:8.5px;color:var(--txt3);width:80px;flex-shrink:0;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.contemp-bar-track{flex:1;height:5px;background:var(--bdr2);border-radius:2px;position:relative}
.contemp-bar-fill{position:absolute;top:0;height:100%;border-radius:2px;opacity:.7}
.contemp-bar-yr{font-family:'Cinzel',serif;font-size:7.5px;color:var(--txt3);white-space:nowrap;width:60px;text-align:right;flex-shrink:0}

/* ── DENSITY SPARKLINE ── */
#density-bar{height:18px;width:100%;display:block;margin-bottom:1px}

/* ── WHAT-IF MODE ── */
.whatif-civ-btn{width:100%;background:none;border:1px solid var(--bdr2);padding:7px 10px;text-align:left;cursor:pointer;font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:.5px;color:var(--txt2);margin-bottom:3px;border-radius:2px;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.whatif-civ-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.whatif-civ-btn.selected{background:rgba(200,168,232,.12);border-color:#c8a8e8;color:#c8a8e8}
.whatif-result{margin-top:12px;padding:12px;border:1px solid var(--bdr);border-radius:3px;background:var(--panel2)}
.whatif-chain{padding:6px 0;border-bottom:1px solid var(--bdr2);font-size:12px;color:var(--txt2)}
.whatif-chain:last-child{border-bottom:none}
.whatif-chain.lost{color:#c8a8e8;text-decoration:line-through;opacity:.6}
.whatif-intro{font-size:13px;line-height:1.7;color:var(--txt2);font-style:italic;margin-bottom:12px}

/* ── HERITAGE MODE ── */
.heritage-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.heritage-btn{background:none;border:1px solid var(--bdr2);padding:8px 6px;cursor:pointer;font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.5px;color:var(--txt2);border-radius:2px;transition:all .15s;text-align:center}
.heritage-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.heritage-btn.active{background:var(--amber-x);border-color:var(--amber-b);color:var(--amber-b)}
.heritage-civ{padding:5px 0;border-bottom:1px solid var(--bdr2);font-size:12.5px;cursor:pointer;transition:color .15s}
.heritage-civ:hover{color:var(--amber-b)}
.heritage-civ-nm{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);display:block;margin-bottom:2px}
.heritage-civ-why{font-size:11px;color:var(--txt3)}

/* ── CLUSTER PICKER ── */
#cluster-picker{
  position:fixed;z-index:900;background:var(--panel);
  border:1px solid var(--bdr);border-radius:6px;
  min-width:180px;max-width:260px;max-height:320px;overflow-y:auto;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  display:none;
}
#cluster-picker.open{display:block}
#cluster-picker-hdr{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;
  color:var(--txt3);padding:8px 12px 6px;
  border-bottom:1px solid var(--bdr2);text-transform:uppercase;
  display:flex;justify-content:space-between;align-items:center;
}
.cluster-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;
  cursor:pointer;border-bottom:1px solid var(--bdr2);
  transition:background .12s;
}
.cluster-item:last-child{border-bottom:none}
.cluster-item:hover,.cluster-item:active{background:var(--panel2)}
.cluster-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#c8a8e8}
.cluster-item-nm{font-family:'Cinzel',serif;font-size:13px;color:var(--txt);flex:1}
.cluster-item-sb{font-size:11px;color:var(--txt3);margin-top:1px}

/* ── BURGER MENU ── */
.burger-wrap{position:relative}
.burger-btn{background:none;border:1px solid var(--bdr);color:var(--amber-b);cursor:pointer;
  width:34px;height:34px;border-radius:3px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;padding:0}
.burger-btn:hover{background:var(--panel2);border-color:var(--amber)}
.burger-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--panel);
  border:1px solid var(--bdr);border-radius:4px;min-width:196px;
  box-shadow:0 8px 32px var(--shadow);z-index:800;
  display:none;flex-direction:column;overflow:hidden}
.burger-menu.open{display:flex}
.burger-item{display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:none;border:none;color:var(--txt2);cursor:pointer;text-align:left;
  font-family:'Cinzel',serif;font-size:12px;letter-spacing:.5px;width:100%;
  transition:background .12s;white-space:nowrap}
.burger-item:hover,.burger-item:active{background:var(--panel2);color:var(--txt)}
.burger-item.active,.burger-item.burger-mode.active{background:var(--amber-x);color:var(--amber-b)}
.burger-item-badge{margin-left:auto;font-size:9px;color:var(--amber-b);
  font-family:'Cinzel',serif;letter-spacing:1px;display:none}
.burger-item-badge.on{display:inline}
.burger-divider{height:1px;background:var(--bdr2);margin:2px 0}

/* ── MAP ZOOM/PAN ── */
#wsvg{touch-action:none;user-select:none;-webkit-user-select:none;transition:none}
.map-zoom-ctrl{position:absolute;bottom:8px;right:8px;display:flex;flex-direction:column;gap:3px;z-index:50}
.map-zoom-btn{width:28px;height:28px;background:var(--panel);border:1px solid var(--bdr);color:var(--amber-b);
  font-size:16px;cursor:pointer;border-radius:3px;display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;transition:all .15s}
.map-zoom-btn:hover{background:var(--panel2);border-color:var(--amber)}
.cluster-hint{position:absolute;bottom:44px;left:50%;transform:translateX(-50%);
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--amber-b);
  background:var(--panel);border:1px solid var(--bdr);padding:4px 12px;border-radius:20px;
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:51}
.cluster-hint.show{opacity:1}

/* ── FAMILY COLOR MARKERS ── */
.family-abrahamic{fill:#4a8ec8}
.family-dharmic{fill:#e89820}
.family-eastasian{fill:#e8251a}
.family-indigenous{fill:#4a9e3f}
.family-iranian{fill:#9b6fd4}
.family-classical{fill:#c8881c}
.family-modern{fill:#c060a0}

/* ── PULL TO REFRESH ── */
#ptr-indicator{
  position:fixed;top:0;left:0;right:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;gap:10px;
  height:0;overflow:hidden;background:var(--panel);
  border-bottom:1px solid var(--bdr);
  transition:height .2s ease,opacity .2s ease;
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;
  color:var(--txt3);text-transform:uppercase;opacity:0;
  pointer-events:none;
}
#ptr-indicator.pulling{height:52px;opacity:1}
#ptr-indicator.ready{color:var(--amber-b)}
#ptr-indicator.refreshing{height:52px;opacity:1}
#ptr-spinner{
  width:16px;height:16px;border:2px solid var(--bdr);
  border-top-color:var(--amber-b);border-radius:50%;
  transition:transform .25s ease;flex-shrink:0;
}
#ptr-indicator.refreshing #ptr-spinner{
  animation:ptr-spin .7s linear infinite;
}
@keyframes ptr-spin{to{transform:rotate(360deg)}}
</style>
</head>

<script>
// ── LENSES ──
const LENSES=[
  {id:'overview',    ico:'◎', lbl:'Belief Arc',              col:'#9070c0'},
  {id:'theology',    ico:'✦', lbl:'Theology & Doctrine',     col:'#7060a8'},
  {id:'texts',       ico:'◈', lbl:'Sacred Texts',            col:'#8a6020'},
  {id:'ritual',      ico:'⊕', lbl:'Ritual & Practice',       col:'#c8881c'},
  {id:'mysticism',   ico:'∞', lbl:'Mysticism & Meditation',  col:'#5a7a8a'},
  {id:'art',         ico:'◉', lbl:'Art & Architecture',       col:'#4a8870'},
  {id:'music',       ico:'♪', lbl:'Sacred Music',             col:'#b05580'},
  {id:'ethics',      ico:'⚖', lbl:'Ethics & Morality',       col:'#5a9a60'},
  {id:'conversion',  ico:'⟳', lbl:'Mission & Conversion',    col:'#b06020'},
  {id:'persecution', ico:'†', lbl:'Persecution & Martyrdom',  col:'#a04040'},
  {id:'schisms',     ico:'↯', lbl:'Schisms & Reform',         col:'#c06090'},
  {id:'women',       ico:'♀', lbl:'Women & Gender',           col:'#9b6fd4'},
  {id:'sacred',      ico:'⊗', lbl:'Sacred Places',            col:'#4a7faa'},
  {id:'afterlife',   ico:'⚑', lbl:'Afterlife & Eschatology',  col:'#906040'},
  {id:'cosmology',   ico:'◇', lbl:'Cosmology & Creation',     col:'#3a9fc0'},
  {id:'philosophy',  ico:'Ψ', lbl:'Philosophy & Thought',     col:'#7890a8'},
  {id:'politics',    ico:'⊞', lbl:'Political Influence',      col:'#606060'},
  {id:'legacy',      ico:'★', lbl:'Legacy',                   col:'#8a7040'},
  {id:'figures',     ico:'≡', lbl:'Key Figures',              col:'#d4a820'},
  {id:'dialogue',    ico:'↑', lbl:'Interfaith Dialogue',      col:'#608050'},
];

const ERAS=[
  {y:-10000,n:'ANIMISM & SHAMANISM'},
  {y:-3000, n:'POLYTHEISTIC AGE'},
  {y:-1500, n:'VEDIC PERIOD'},
  {y:-800,  n:'AXIAL AGE'},
  {y:-500,  n:'CLASSICAL RELIGIONS'},
  {y:0,     n:'RISE OF CHRISTIANITY'},
  {y:500,   n:'MEDIEVAL FAITH'},
  {y:622,   n:'RISE OF ISLAM'},
  {y:1000,  n:'HIGH MEDIEVAL RELIGION'},
  {y:1500,  n:'REFORMATION ERA'},
  {y:1700,  n:'ENLIGHTENMENT'},
  {y:1850,  n:'MODERN SPIRITUALITY'},
  {y:1950,  n:'GLOBAL INTERFAITH ERA'},
];

const FP_LABELS=['Global Reach','Philosophical Depth','Ritual Complexity','Artistic Legacy','Political Influence','Textual Tradition'];
const FP_KEYS=['reach','phil','ritual','art','pol','text'];

const TRANSMISSIONS=[
  {id:1, concept:'Monasticism', from:'buddhism', to:'christianity', year:300, desc:'Buddhist monastic traditions, transmitted via trade routes through Central Asia, influenced the development of Christian monasticism in Egypt and the Near East — communal living, celibacy, and contemplative practice.'},
  {id:2, concept:'Monotheism', from:'zoroastrianism', to:'judaism', year:-539, desc:'Zoroastrian concepts of a single supreme deity, cosmic dualism, and final judgement deeply influenced post-exilic Judaism during the Babylonian Captivity, shaping the theology Christianity and Islam later inherited.'},
  {id:3, concept:'Reincarnation', from:'hinduism', to:'buddhism', year:-500, desc:'The Hindu concept of samsara — the cycle of death and rebirth governed by karma — was adopted and reinterpreted by the Buddha, who taught liberation from the cycle through the Eightfold Path rather than Vedic ritual.'},
  {id:4, concept:'Meditation', from:'hinduism', to:'taoism', year:-300, desc:'Indian dhyana meditation practices were transmitted to China via Buddhist missionaries, blending with Taoist contemplative traditions to produce Chan Buddhism and eventually Japanese Zen.'},
  {id:5, concept:'Iconography', from:'greek', to:'buddhism', year:-100, desc:'Hellenistic sculptural traditions, brought to Central Asia by Alexander\'s conquests, inspired the first anthropomorphic representations of the Buddha in Gandhara art — before this, the Buddha was represented only by symbols.'},
  {id:6, concept:'Scriptural Canon', from:'judaism', to:'christianity', year:100, desc:'The Jewish practice of maintaining a canonical scripture — the Torah and Prophets — was directly adopted by Christianity, which retained the Hebrew Bible as its Old Testament and added its own New Testament.'},
  {id:7, concept:'Pilgrimage', from:'judaism', to:'islam', year:630, desc:'The Jewish tradition of pilgrimage to Jerusalem\'s Temple was inherited by Islam, which established the Hajj to Mecca as one of the Five Pillars — making pilgrimage a mandatory act of faith rather than a voluntary devotion.'},
  {id:8, concept:'Mystical Union', from:'islam', to:'hinduism', year:1200, desc:'Sufi mysticism, with its emphasis on direct experience of the divine through love and ecstasy, deeply influenced the Indian Bhakti movement, producing syncretic saints like Kabir who drew from both traditions.'},
  {id:9, concept:'Non-Violence', from:'jainism', to:'buddhism', year:-500, desc:'Jain ahimsa — radical non-violence extending to all living beings — influenced Buddhist ethics and, through Gandhi\'s reinterpretation, shaped modern political movements worldwide.'},
  {id:10, concept:'Religious Law', from:'judaism', to:'islam', year:700, desc:'The Jewish halakhic tradition of comprehensive religious law governing daily life directly influenced the development of Islamic Sharia, which similarly covers worship, commerce, family, and criminal matters.'},
  {id:11, concept:'Ancestor Veneration', from:'confucianism', to:'shinto', year:500, desc:'Confucian ancestor worship practices were adopted and integrated into Shinto shrine rituals when Chinese cultural influence reached Japan, merging with indigenous kami veneration.'},
  {id:12, concept:'Apocalypticism', from:'zoroastrianism', to:'christianity', year:200, desc:'Zoroastrian eschatology — a final battle between good and evil, resurrection of the dead, and a last judgement — profoundly shaped Jewish apocalypticism and, through it, Christian end-times theology in the Book of Revelation.'},
  {id:13, concept:'Religious Art', from:'christianity', to:'islam', year:700, desc:'Byzantine Christian artistic traditions — calligraphy, geometric patterns, architectural forms — were adapted by early Islamic artisans who, constrained by aniconism, developed these elements into the distinctive arabesques and geometric art of Islamic civilisation.'},
  {id:14, concept:'Mission Strategy', from:'christianity', to:'buddhism', year:250, desc:'The Ashoka-era Buddhist missionary model — sending monks along trade routes to spread the dharma peacefully — prefigured and may have influenced early Christian missionary patterns in the Roman Empire.'},
  {id:15, concept:'Philosophical Theology', from:'greek', to:'christianity', year:200, desc:'Greek philosophical concepts — Platonic Forms, Aristotelian logic, Stoic ethics — were adopted by early Church Fathers to articulate Christian theology, creating the synthesis of faith and reason that defined Western religious thought.'},
];

// ── STATE ──
let year=-10000,lenses=new Set(),sel=null,sel2=null,lensDD=false,mode="explore",activeThread=null;
const OVERVIEW_COL='#9070c0';
let _vbW=1000;

function fmt(y){return y<0?`${Math.abs(y)} BCE`:y===0?'1 CE':`${y} CE`}
function eraName(y){let n=ERAS[0].n;for(const e of ERAS){if(y>=e.y)n=e.n;}return n;}
function active(c){return year>=c.s&&year<=c.e}
function getLensCol(){
  if(!lenses.size)return OVERVIEW_COL;
  const L=LENSES.find(l=>l.id===[...lenses][0]);
  return L?L.col:OVERVIEW_COL;
}

function toggleLensDD(){
  lensDD=!lensDD;
  document.getElementById('lens-dd-list').classList.toggle('open',lensDD);
  document.getElementById('lens-dd-hdr').classList.toggle('open',lensDD);
  document.getElementById('lens-dd-arrow').classList.toggle('open',lensDD);
}

function lensLabel(){
  if(!lenses.size)return'Belief Arc';
  const names=[...lenses].map(id=>{const L=LENSES.find(l=>l.id===id);return L?L.lbl:'';});
  if(names.length===1)return names[0];
  if(names.length<=3)return names.join(' · ');
  return names.slice(0,2).join(' · ')+` +${names.length-2}`;
}

function renderLensDD(){
  const hook=document.getElementById('lens-position-hook');
  const dt=hook||document.getElementById('drawer-top');
  if(!dt)return;
  if(hook){
    hook.style.cssText='padding:8px 0 4px';
    const drawerTop=document.getElementById('drawer-top');
    if(drawerTop)drawerTop.innerHTML='';
  }
  const arcOn=!lenses.size;
  const rows=LENSES.map(l=>{
    const on=lenses.has(l.id);
    return`<div class="lens-row${on?' on':''}" onclick="toggleLens('${l.id}')">
      <div class="lens-row-chk${on?' on':''}">${on?'✓':''}</div>
      <span class="lens-row-ico">${l.ico}</span>
      <span class="lens-row-lbl">${l.lbl}</span>
    </div>`;
  }).join('');
  dt.innerHTML=`<div class="lens-dd-wrap">
    <div class="lens-dd-hdr${lensDD?' open':''}" id="lens-dd-hdr" onclick="toggleLensDD()">
      <span class="lens-dd-title">Lens</span>
      <span class="lens-dd-summary">${lensLabel()}</span>
      <span class="lens-dd-arrow${lensDD?' open':''}" id="lens-dd-arrow">▾</span>
    </div>
    <div class="lens-dd-list${lensDD?' open':''}" id="lens-dd-list">
      <div class="lens-row${arcOn?' on':''}" onclick="toggleLens('__arc__')">
        <div class="lens-row-chk${arcOn?' on':''}">${arcOn?'✓':''}</div>
        <span class="lens-row-ico">◎</span>
        <span class="lens-row-lbl">Belief Arc</span>
      </div>
      <div class="lens-row-sep"></div>
      ${rows}
      <div class="lens-dd-close-btn" onclick="toggleLensDD()">Done ▴</div>
    </div>
  </div>`;
}

function toggleLens(id){
  if(id==='__arc__'){lenses.clear();}
  else{
    if(lenses.has(id))lenses.delete(id);
    else lenses.add(id);
  }
  renderLensDD();
  if(sel){
    const c=sel;
    let body='';
    if(!lenses.size){
      body=`<div class="overview-arc"><p>${c.overview||c.d.legacy}</p></div>${renderEnhancedSpanBar(c)}`;
    } else {
      body=[...lenses].map(lid=>{
        const L=LENSES.find(l=>l.id===lid);
        if(!L)return'';
        return`<div class="lens-section">
          <div class="lens-section-hdr">
            <span class="lens-section-ico">${L.ico}</span>
            <span class="lens-section-lbl">${L.lbl}</span>
          </div>
          <div class="info-txt">${c.d[lid]||'No data for this lens.'}</div>
        </div>`;
      }).join('');
    }
    const col=lenses.size?getLensCol():OVERVIEW_COL;
    const actIds=new Set(ITEMS.filter(x=>active(x)).map(x=>x.id));
    const connHTML=c.conns.length?`<div class="conn-hdr" id="conn-hdr">Historical connections</div>`+c.conns.map(cid=>{
      const o=ITEMS.find(x=>x&&x.id===cid);if(!o)return'';
      const isA=actIds.has(cid);
      const badge=isA?'ACTIVE':'→ JUMP';
      const tip=isA?`View ${o.nm} (active in this era)`:`Jump to ${o.nm} (${fmt(o.s)} – ${fmt(o.e)})`;
      return`<button class="conn-item" tabindex="0"
          aria-label="${tip}"
          onclick="navigateToItem('${cid}')"
          style="width:100%;background:none;border:none;border-bottom:1px solid var(--conn-bdr);text-align:left;cursor:pointer;opacity:${isA?1:.7}">
        <div class="conn-dot" style="background:${isA?col:'var(--txt3)'}"></div>
        <span style="flex:1;color:var(--txt${isA?'':'3'})">${o.nm}</span>
        <span style="font-size:9px;font-family:'Cinzel',serif;letter-spacing:1px;color:${isA?'var(--amber-b)':'var(--amber)'};white-space:nowrap">${badge}</span>
      </button>`;
    }).join(''):'';
    const lensDiv=document.getElementById('drawer-lens-body');
    if(lensDiv) lensDiv.innerHTML=body+connHTML;
  }
  renderMap();
}

// ── NON-LINEAR TIMELINE ──
// Slider 0-1000 maps to year via two segments:
// 0-100   → -10000 to -3000 (deep prehistory, 10% of slider)
// 100-1000 → -3000 to 2024  (recorded history, 90% of slider)
function sliderToYear(v){
  v=parseInt(v);
  if(v<=100){
    return Math.round(-10000+((-3000-(-10000))*(v/100)));
  } else {
    return Math.round(-3000+((2024-(-3000))*((v-100)/900)));
  }
}
function yearToSlider(yr){
  yr=parseInt(yr);
  if(yr<=-3000){
    return Math.round(100*((yr-(-10000))/(-3000-(-10000))));
  } else {
    return Math.round(100+900*((yr-(-3000))/(2024-(-3000))));
  }
}

function itemPt(c){
  if(!c)return[500,260];
  if(!window._proj)return[c.x||500,c.y||260];
  if(typeof c.lon!=='number'||typeof c.lat!=='number')return[c.x||500,c.y||260];
  try{const pt=window._proj([c.lon,c.lat]);return pt&&isFinite(pt[0])&&isFinite(pt[1])?pt:[c.x||500,c.y||260];}
  catch(e){return[c.x||500,c.y||260];}
}

function renderMap(){
  const ids=new Set(ITEMS.filter(c=>active(c)).map(c=>c.id));
  window.ids_cache=ids;
  const col=lenses.size?getLensCol():OVERVIEW_COL;

  const drawn=new Set();
  let cl='';
  ITEMS.forEach(c=>{
    if(!ids.has(c.id))return;
    c.conns.forEach(id=>{
      const k=[c.id,id].sort().join('-');
      if(drawn.has(k)||!ids.has(id))return;
      drawn.add(k);
      const o=ITEMS.find(x=>x&&x.id===id);
      if(!o)return;
      const [cx,cy]=itemPt(c),[ox,oy]=itemPt(o);
      const mx=(cx+ox)/2,my=Math.min(cy,oy)-28;
      cl+=`<path d="M${cx},${cy} Q${mx},${my} ${ox},${oy}" stroke="${OVERVIEW_COL}" stroke-width=".8" fill="none" stroke-dasharray="3,5" opacity="${sel?0.1:0.25}"/>`;
    });
  });
  document.getElementById('conn-layer').innerHTML=cl;

  let rings='', dots='', ll='';
  const itemData=ITEMS.map(c=>{
    const on=ids.has(c.id);
    const isSel=sel&&sel.id===c.id;
    const mcol=isSel?'#f0d060':OVERVIEW_COL;
    const op=on?1:0.06;
    const [cx,cy]=itemPt(c);
    return {c,on,isSel,mcol,op,cx,cy};
  });
  // Pass 1: decorative rings
  itemData.filter(Boolean).forEach(({c,on,isSel,mcol,op,cx,cy})=>{
    const _zr=1000/_vbW;
    const _rR=Math.max(4,(16/_zr)).toFixed(1);
    const _pR=Math.max(2,(6/_zr)).toFixed(1);
    const _pMax=Math.max(5,(16/_zr)).toFixed(1);
    rings+=`<g opacity="${op}" pointer-events="none">
      <circle cx="${cx}" cy="${cy}" r="${_rR}" fill="none" stroke="${mcol}" stroke-width=".5" opacity=".15"/>
      <circle cx="${cx}" cy="${cy}" r="${(Math.max(3,10/_zr)).toFixed(1)}" fill="${mcol}" fill-opacity=".06"/>
      ${on?`<circle cx="${cx}" cy="${cy}" r="${_pR}" fill="${mcol}" opacity=".45">
        <animate attributeName="r" values="${_pR};${_pMax};${_pR}" dur="2.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".45;0;.45" dur="2.8s" repeatCount="indefinite"/>
      </circle>`:''}
    </g>`;
  });
  // Pass 2: clickable dots
  const sorted=[...itemData].filter(Boolean).sort((a,b)=>a.isSel?1:b.isSel?-1:0);
  sorted.forEach(({c,on,isSel,mcol,op,cx,cy})=>{
    if(on){
      const zr=1000/_vbW;
      const dotR=Math.max(2, (isSel?9:7)/zr);
      const ringR=Math.max(3, 16/zr);
      const pulseMax=Math.max(8, 16/zr);
      dots+=`<g role="button" tabindex="0" data-item="${c.id}"
          aria-label="${c.nm} — click to explore"
          onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();itemClick('${c.id}')}"
          opacity="${op}" pointer-events="none">
          <circle cx="${cx}" cy="${cy}" r="${dotR.toFixed(1)}"
            fill="${mcol}" filter="url(#glow${isSel?'2':''})"
          />
        </g>`;
      ll+=`<text x="${cx}" y="${cy+26}" font-family="Cinzel,serif" font-size="11"
        letter-spacing="1" fill="${isSel?'#f0d060':OVERVIEW_COL}"
        text-anchor="middle" pointer-events="none">${c.nm}</text>`;
    } else {
      dots+=`<circle cx="${cx}" cy="${cy}" r="4" fill="${mcol}" opacity=".12" pointer-events="none"/>`;
    }
  });
  document.getElementById('mark-layer').innerHTML=rings+dots;
  document.getElementById('label-layer').innerHTML=ll;
}

function navigateToItem(id){
  const c=ITEMS.find(x=>x&&x.id===id);
  if(!c)return;
  if(mode==='compare'){
    if(!sel){sel=c;}
    else if(!sel2&&sel.id!==c.id){sel2=c;}
    else{sel=c;sel2=null;}
    renderDrawer();renderMap();updateURL();
    openMobileSheet();
    return;
  }
  if(!active(c)){
    const targetYear=c.s;
    document.getElementById('tl').value=yearToSlider(targetYear);
    setYear(targetYear);
  }
  sel=c;lensDD=false;
  renderDrawer();renderMap();updateURL();
  openMobileSheet();
  document.getElementById('info-panel').scrollTo({top:0,behavior:'smooth'});
}

function itemClick(id){
  navigateToItem(id);
}
