persecution:'Roman conquest brought suppression of druids in Gaul and Britain, with the destruction of the druid center on Anglesey in 60 CE representing a deliberate attack on Celtic religious authority. The gradual Christianization of Celtic lands involved the suppression of pagan practices, though Celtic Christianity often incorporated and transformed rather than destroyed indigenous traditions. Modern neo-druid and Celtic pagan movements represent attempts to recover traditions disrupted by Romanization and Christianization.',
schisms:'Celtic religion lacked the centralized authority that produces formal schisms, though regional variation in deity worship and ritual practice was significant. The tension between druidic learning and warrior aristocratic culture represented a social rather than theological division. Modern Celtic reconstructionism encompasses diverse approaches from historically-grounded scholarship to eclectic neo-pagan practice.',
women:'Celtic women held higher social status than their Roman or Greek counterparts, with rights to property, divorce, and political leadership. Female druids and prophetesses are attested in both classical and medieval sources, and powerful goddesses like Brigit and the Morrigan held central positions in the pantheon. The legendary warrior queen Boudicca embodied the Celtic tradition of female martial and political leadership.',
sacred:'Celtic sacred sites included natural features invested with spiritual significance — springs, groves, hilltops, and river confluences — as well as constructed ritual sites. The nemeton (sacred grove) was the quintessential Celtic sacred space, with the natural canopy serving as the temple. Many Celtic sacred sites were later Christianized, with holy wells and church sites preserving the memory of pre-Christian sanctity.',
afterlife:'Celtic afterlife concepts centered on the Otherworld, a realm of beauty, youth, and abundance that coexisted with the mortal world rather than being reached only after death. Classical sources report that the druids taught the immortality of the soul and its passage to another body, a doctrine compared to Pythagorean metempsychosis. The ease of passage between this world and the next, particularly at Samhain, reflects a Celtic worldview in which death was a transition rather than an ending.',
cosmology:'Celtic cosmology emphasized the cyclical nature of time, with the annual cycle of festivals reflecting cosmic patterns of death and rebirth. The tripartite division of land, sea, and sky structured cosmic geography, with the Otherworld accessible through caves, lakes, mist, and western horizons. The Celtic world tree, like the Norse Yggdrasil, connected the realms of existence in a cosmic architecture of roots and branches.',
philosophy:'Celtic philosophical thought, preserved primarily through mythological narrative rather than systematic exposition, addressed questions of cosmic order, fate, and the nature of knowledge. The druidic emphasis on memory, oral transmission, and direct experience of nature represents a distinctive epistemological approach. The Celtic concept of the thin places where the veil between worlds grows transparent expresses a philosophical intuition about the layered nature of reality.',
politics:'Druids served political functions as advisors, judges, and mediators, with the power to intervene in conflicts and legitimize or delegitimize rulers. The tribal nature of Celtic political organization meant that religion and politics were inseparable at the local level. The druids\' role as a pan-tribal intellectual class provided a unifying cultural institution across the politically fragmented Celtic world.',
legacy:'Celtic religion\'s legacy survives in folklore, festival customs, holy well traditions, and the distinctive character of Celtic Christianity that preserved pre-Christian sensibilities. The modern Celtic revival, from Yeats and the Irish Literary Renaissance to contemporary neo-druidism, draws inspiration from Celtic spiritual traditions. Celtic artistic traditions, particularly in manuscript illumination and metalwork, remain among the most admired achievements of European civilization.',
figures:'The druids, though unnamed individuals remain largely unknown, collectively represent one of antiquity\'s most intriguing intellectual classes. Boudicca, the warrior queen who led a devastating revolt against Roman occupation, embodied Celtic values of courage and resistance. The legendary figures of Cu Chulainn, Fionn mac Cumhaill, and the Tuatha De Danann preserve mythological archetypes that continue to inspire.',
dialogue:'Celtic religion\'s encounter with Roman religion produced creative syncretism, with Celtic deities identified with Roman equivalents while maintaining distinctive characteristics. The Celtic Christian tradition, particularly in its monastic form, created a uniquely Celtic expression of Christianity that preserved elements of pre-Christian sensibility. Modern Celtic spiritual movements engage in dialogue with other indigenous and earth-based traditions, finding common ground in reverence for nature and ancestral connection.'
}},
{id:'animism',nm:'Animism & Shamanism',sb:'Global · Spirit World',s:-10000,e:2024,lon:90.0,lat:55.0,
fp:{reach:8,phil:5,ritual:10,art:7,pol:3,text:2},conns:['shinto','norse','celtic','vodou','tengri','aboriginal'],
overview:'Animism, the belief that all things — animals, plants, rivers, mountains, storms — possess spiritual essence, represents humanity\'s oldest and most widespread spiritual framework, with shamanic practices stretching back at least 40,000 years. Shamans serve as intermediaries between the human community and the spirit world, entering altered states of consciousness through drumming, chanting, fasting, or entheogens to heal, guide the dead, and maintain cosmic balance. Found on every inhabited continent, animist and shamanic traditions are not a single religion but a vast family of localized practices united by the conviction that the natural world is alive, aware, and in constant dialogue with human beings.',
d:{
overview:'Animism encompasses the world\'s oldest spiritual traditions, predating organized religion by tens of thousands of years and persisting in indigenous cultures across every continent. Shamanism, the practice of entering altered states to interact with the spirit world, represents the most common form of animist religious specialization. These traditions share core beliefs in the spiritual aliveness of nature, the reciprocal relationship between humans and the more-than-human world, and the necessity of maintaining cosmic balance through ritual practice.',
theology:'Animist theology, if the term applies, recognizes spiritual agency in all aspects of the natural world, from animals and plants to rivers, mountains, and weather phenomena. Most animist traditions recognize a supreme being or creative force alongside a complex ecology of spirits, ancestors, and nature beings. The fundamental theological insight of animism — that the world is populated by persons, only some of whom are human — challenges Western assumptions about the boundary between subject and object.',
texts:'Animist traditions are primarily oral, preserving sacred knowledge through myth, song, ritual, and the apprenticeship relationship between master shamans and their students. The oral nature of these traditions makes them vulnerable to disruption but also adaptable, with living practitioners continuously updating their knowledge. Some traditions have been documented by anthropologists and indigenous scholars, though the translation of oral performance into written text inevitably transforms the material.',
ritual:'Animist ritual encompasses an extraordinary diversity of practices, from shamanic healing ceremonies and vision quests to seasonal celebrations and rites of passage. Sacrifice, offering, and reciprocal exchange with the spirit world maintain the balance between human communities and the broader cosmos. Ritual specialists — shamans, medicine people, diviners — undergo rigorous training and initiatory experiences that qualify them to mediate between worlds.',
mysticism:'Shamanic trance represents one of humanity\'s oldest mystical practices, with the shaman\'s soul journey to upper or lower worlds providing direct experience of spiritual reality. Altered states of consciousness, achieved through drumming, dancing, fasting, sensory deprivation, or entheogens, serve as vehicles for mystical experience. The shamanic experience of death and rebirth during initiation represents a universal pattern of mystical transformation found across cultures.',
art:'Animist art encompasses cave paintings dating back 40,000 years, carved spirit figures, ritual masks, body painting, and the elaborate visual culture of indigenous peoples worldwide. The art is typically functional rather than decorative, serving as a medium for communicating with the spirit world, recording sacred knowledge, and marking ritual transformation. The power and beauty of indigenous sacred art has profoundly influenced modern Western art.',
music:'Drumming, chanting, and singing are central to animist practice worldwide, serving as vehicles for entering altered states and communicating with the spirit world. The shaman\'s drum is often considered a living being, a vehicle for soul flight, and a map of the cosmos. Indigenous musical traditions encompass extraordinary diversity, from Australian Aboriginal didgeridoo playing to Siberian throat singing to Amazonian plant-spirit songs.',
ethics:'Animist ethics emphasize reciprocity, respect, and responsibility in relationships with all beings, human and non-human. The concept of taking only what is needed and giving back through offering and ceremony reflects an ecological ethic grounded in spiritual relationship. The communal nature of animist societies tends to emphasize sharing, cooperation, and the subordination of individual desire to community well-being.',
conversion:'Animist traditions do not seek converts, as their practices are tied to specific places, peoples, and ecological relationships. Colonial and missionary pressure has led to the decline of many animist traditions, though others have shown remarkable resilience and adaptability. The modern neo-shamanic movement represents Western adoption of shamanic techniques, though indigenous practitioners often view this as cultural appropriation.',
persecution:'Indigenous animist traditions have been systematically persecuted by colonial powers, missionaries, and modernizing governments worldwide. Policies of forced assimilation, including residential schools and the prohibition of traditional practices, devastated indigenous spiritual traditions across the Americas, Australasia, and Africa. The contemporary recognition of indigenous rights and the revival of traditional practices represent a partial recovery from centuries of suppression.',
schisms:'Animist traditions lack the institutional structure that produces schisms, instead encompassing enormous local diversity within shared frameworks. Regional variations in practice reflect ecological adaptation, cultural exchange, and historical development rather than doctrinal disagreement. The tension between traditional practitioners and neo-shamanic adaptations represents a contemporary source of controversy.',
women:'Women hold significant spiritual authority in many animist traditions, serving as healers, diviners, and custodians of plant medicine and ceremonial knowledge. The gendered division of spiritual labor varies across cultures, with some traditions restricting shamanic practice by gender while others recognize two-spirit individuals as particularly powerful spiritual specialists. The association of women with plant knowledge, birth, and death gives them distinctive roles in animist cosmological systems.',
sacred:'Sacred sites in animist traditions include mountains, rivers, groves, caves, and other natural features recognized as places of concentrated spiritual power. The concept of sacred landscape, where the entire environment is spiritually significant, contrasts with the built sacred spaces of organized religions. The protection of sacred natural sites has become a significant issue in indigenous rights and environmental conservation.',
afterlife:'Animist afterlife beliefs typically involve the continuation of the soul in an ancestral realm from which the dead continue to influence and interact with the living. Ancestor veneration, maintaining relationships with the dead through offering and ceremony, is a near-universal feature of animist traditions. Some traditions include reincarnation concepts, with souls cycling through human, animal, and spirit existences.',
cosmology:'Animist cosmology typically describes a layered universe with upper, middle, and lower worlds connected by an axis mundi — a world tree, mountain, or river — through which the shaman travels. The cosmos is understood as alive and responsive, with events in one realm affecting all others. The distinction between natural and supernatural is absent in animist worldviews, where the spiritual dimension is an integral aspect of ordinary reality.',
philosophy:'Animist philosophical contributions, though rarely systematized in Western terms, include sophisticated ecological knowledge, theories of consciousness, and frameworks for understanding the relationship between humans and the natural world. The animist insight that the world is composed of relational persons rather than inert objects has gained new philosophical currency in the context of ecological crisis. Indigenous knowledge systems, developed over millennia of careful observation, represent philosophical traditions of immense depth and practical value.',
politics:'Animist traditions are typically embedded in egalitarian or chieftain-level political structures, with spiritual authority distributed among various specialists rather than concentrated in a priestly class. The shaman\'s political role varies from community advisor to feared power broker, depending on the cultural context. Contemporary indigenous political movements often draw on traditional spiritual authority and cosmological frameworks to resist displacement and environmental destruction.',
legacy:'Animism\'s legacy is immense yet often unrecognized: the oldest spiritual traditions of humanity have shaped art, language, medicine, and ecological knowledge across every culture. The current ecological crisis has renewed interest in animist worldviews that treat the natural world as a community of beings deserving respect and reciprocity. The persistence of animist practices within world religions — from Catholic saint veneration to Japanese kami worship — testifies to the enduring power of humanity\'s original spiritual framework.',
figures:'Shamanic traditions are inherently local, with authority deriving from direct spiritual experience rather than institutional lineage, making individual shamans famous primarily within their own communities. Anthropologists like Mircea Eliade and Michael Harner have popularized shamanic concepts in the West, though their interpretations are debated by indigenous practitioners and scholars. Contemporary indigenous leaders like David Kopenawa of the Yanomami have brought animist perspectives to global environmental and human rights discourse.',
dialogue:'Animist traditions\' emphasis on the spiritual significance of the natural world provides important perspectives for interfaith dialogue in the age of environmental crisis. The encounter between animist traditions and world religions has produced both conflict and creative synthesis, with many indigenous communities maintaining dual religious identities. Contemporary dialogue between animist practitioners and ecological scientists reveals surprising convergences in understanding the interconnection and agency of natural systems.'
}},
{id:'bahai',nm:'Baha\'i Faith',sb:'Global · Unity of Humanity',s:1844,e:2024,lon:51.4,lat:35.7,
fp:{reach:7,phil:8,ritual:5,art:5,pol:6,text:8},conns:['islam','christianity','zoroastrianism'],
overview:'The Baha\'i Faith, founded in nineteenth-century Persia by Baha\'u\'llah, is one of the world\'s youngest independent religions, teaching the essential unity of all religions and the oneness of humanity. With approximately five to eight million adherents in virtually every country, the Baha\'i Faith promotes universal education, the harmony of science and religion, the elimination of prejudice, and the establishment of world peace through a global governance system. The tradition\'s emphasis on progressive revelation — the idea that God sends messengers appropriate to each age — positions it as both the culmination of previous religious dispensations and the faith best suited to address humanity\'s current challenges.',
d:{
overview:'The Baha\'i Faith emerged from the Babi movement in 1840s Iran, with Baha\'u\'llah declaring himself the latest in a line of divine messengers that includes Abraham, Moses, Jesus, Muhammad, and the Buddha. The religion developed distinctive administrative institutions, including the Universal House of Justice, that combine democratic and theocratic elements. Despite severe persecution in Iran, the Baha\'i Faith has spread to virtually every country, making it one of the world\'s most geographically diverse religions.',
theology:'Baha\'i theology affirms the existence of one unknowable God who reveals divine will through a series of progressive manifestations, each suited to the needs of their age. The concept of progressive revelation positions Baha\'u\'llah as the most recent but not the last divine messenger, with future manifestations expected. The essential unity of religion, the oneness of humanity, and the harmony of science and religion constitute core theological principles.',
texts:'Baha\'u\'llah\'s extensive writings, including the Kitab-i-Aqdas (Most Holy Book), the Kitab-i-Iqan (Book of Certitude), and numerous tablets and letters, form the scriptural foundation of the faith. The writings of the Bab, Abdu\'l-Baha, and Shoghi Effendi provide additional authoritative guidance. The tradition\'s emphasis on individual study of scripture and its availability in numerous translations reflects its commitment to universal accessibility.',
ritual:'Baha\'i worship is notably simple, centering on daily obligatory prayers, the recitation of scripture, and communal devotional gatherings without clergy. The Nineteen Day Feast, combining worship, consultation, and social fellowship, serves as the community\'s primary gathering. The Baha\'i calendar of nineteen months of nineteen days, with intercalary days and a nineteen-day fast, provides the ritual framework for community life.',
mysticism:'Baha\'i mysticism is expressed through Baha\'u\'llah\'s mystical writings, particularly the Seven Valleys and the Four Valleys, which describe the soul\'s journey toward God using the imagery of Sufi tradition. The practice of daily prayer and meditation, along with the reading of scripture at dawn and dusk, cultivates a contemplative spiritual life. The tradition\'s mystical dimension emphasizes the transformation of the inner self as the foundation for social transformation.',
art:'Baha\'i architecture, exemplified by the continental Houses of Worship with their nine-sided designs open to all, represents the tradition\'s commitment to unity and accessibility. The Shrine of the Bab in Haifa, Israel, and the surrounding terraced gardens on Mount Carmel are UNESCO World Heritage Sites of striking beauty. Baha\'i artistic expression is encouraged as a form of worship, with music, visual arts, and literature serving spiritual purposes.',
music:'Music holds an important place in Baha\'i worship and community life, with Abdu\'l-Baha describing it as a ladder for the soul\'s ascent. Baha\'i devotional music draws on the diverse cultural traditions of its global community, with no single musical style predominating. The tradition\'s emphasis on the arts as vehicles for spiritual expression encourages musical creativity across cultural contexts.',
ethics:'Baha\'i ethics emphasize the elimination of all forms of prejudice, the equality of men and women, universal education, and the harmony of science and religion. The principle of independent investigation of truth encourages individual moral reasoning rather than blind adherence to authority. Baha\'i social ethics, including the abolition of extremes of wealth and poverty and the establishment of world peace, reflect the tradition\'s comprehensive vision of social justice.',
conversion:'The Baha\'i Faith actively encourages teaching (tabligh) but prohibits proselytism, insisting that conversion must result from sincere individual investigation rather than pressure or inducement. The tradition\'s inclusive theology and emphasis on unity make it appealing to seekers from diverse backgrounds. Entry by troops, a term used for the rapid expansion of the faith in developing countries, has been a goal of Baha\'i community-building efforts.',
persecution:'Baha\'is have endured severe persecution in Iran since the faith\'s inception, including executions, imprisonment, property confiscation, and denial of education and employment. The Islamic Republic of Iran has conducted systematic campaigns against the Baha\'i community, the country\'s largest religious minority. International human rights organizations have extensively documented the persecution, which continues to be one of the world\'s most sustained campaigns of religious discrimination.',
schisms:'The Baha\'i Faith has experienced relatively few schisms due to its Covenant, a system of succession and authority that clearly designated leadership after Baha\'u\'llah\'s passing. Minor heterodox groups, including followers of various claimants to leadership, exist but are extremely small. The strength of the Covenant system in maintaining unity distinguishes the Baha\'i Faith from the schism-prone history of most religions.',
women:'The Baha\'i Faith explicitly teaches the equality of men and women as a fundamental spiritual principle, with Abdu\'l-Baha stating that humanity cannot progress while this equality remains unrealized. Women serve in all administrative positions except the Universal House of Justice, a restriction that generates ongoing discussion within the community. The tradition\'s emphasis on women\'s education and empowerment has had significant social impact in developing communities.',
sacred:'The Baha\'i World Centre in Haifa, Israel, encompassing the Shrine of the Bab, the Shrine of Baha\'u\'llah at Bahji, and the administrative buildings on Mount Carmel, serves as the faith\'s spiritual and administrative center. The House of the Bab in Shiraz and the House of Baha\'u\'llah in Baghdad are additional sacred sites. Continental Houses of Worship on every continent serve as centers of devotion open to all.',
afterlife:'Baha\'i teaching describes the soul\'s continued spiritual progress after death through infinite worlds of God, understood as states of nearness to or distance from the divine. Heaven and hell are understood as spiritual conditions rather than physical places. Prayer for the dead is practiced, reflecting the belief that the living can assist the progress of departed souls.',
cosmology:'Baha\'i cosmology affirms creation as an eternal emanation from God, with the physical universe having no beginning or end in time. The tradition teaches that life exists throughout the cosmos and that creation is a continuous process of divine emanation. The Baha\'i understanding of progressive revelation implies a dynamic cosmos in which divine guidance evolves with humanity\'s developing capacity.',
philosophy:'Baha\'i philosophy emphasizes the harmony of science and religion, the independent investigation of truth, and the essential agreement of all divine religions. The tradition\'s epistemology integrates rational inquiry, scriptural authority, and consultative decision-making. Baha\'i social philosophy, including the vision of a world federal system and the abolition of extremes of wealth and poverty, represents a comprehensive program for global civilization.',
politics:'The Baha\'i Faith envisions a new world order based on collective security, a world parliament, an international tribunal, and a universal auxiliary language. Baha\'is are prohibited from partisan political involvement but encouraged to participate in constructive social action. The Baha\'i administrative order, with its elected local, national, and international institutions, serves as a model for the consultative governance the tradition envisions for humanity.',
legacy:'The Baha\'i Faith\'s legacy, still unfolding, includes its contributions to interfaith dialogue, human rights advocacy, and the vision of a unified global civilization. The tradition\'s principles of universal education, gender equality, and the elimination of prejudice have influenced broader social movements. The Baha\'i community\'s diversity and global spread demonstrate the practical possibility of unity across cultural, racial, and national boundaries.',
figures:'Baha\'u\'llah, whose title means "Glory of God," endured forty years of exile and imprisonment while producing an extraordinary body of scripture that his followers regard as divine revelation. The Bab, whose declaration in 1844 launched the movement, was executed in 1850, becoming a martyr whose shrine on Mount Carmel is the faith\'s most recognizable landmark. Abdu\'l-Baha, Baha\'u\'llah\'s eldest son and designated interpreter, traveled widely in Europe and America, spreading the faith and exemplifying its principles.',
dialogue:'The Baha\'i Faith\'s theology of progressive revelation provides a natural foundation for interfaith dialogue, affirming the divine origin of all major religions while claiming their fulfillment in Baha\'u\'llah\'s revelation. Baha\'is actively participate in interfaith organizations and initiatives worldwide. The tradition\'s emphasis on the essential unity of religion, combined with its claim to be the latest divine revelation, creates both opportunities and tensions in interfaith engagement.'
}},
{id:'manichaeism',nm:'Manichaeism',sb:'Persia to China · Kingdom of Light',s:216,e:1500,lon:44.4,lat:33.3,
fp:{reach:8,phil:9,ritual:7,art:7,pol:5,text:8},conns:['zoroastrianism','christianity','buddhism','islam'],
overview:'Manichaeism, founded by the prophet Mani in third-century Persia, was once one of the world\'s most widespread religions, stretching from the Roman Empire to Tang Dynasty China. Mani synthesized elements of Zoroastrianism, Christianity, and Buddhism into a comprehensive dualistic system explaining the cosmic battle between Light and Darkness, Spirit and Matter. Though ultimately suppressed by rival religions, Manichaeism influenced Christian theology, Islamic thought, and Chinese religion, and its dualistic worldview continues to echo in Western culture.',
d:{
overview:'Manichaeism was a deliberately universal religion, with Mani consciously building on the foundations of Zoroastrianism, Christianity, and Buddhism to create a faith intended for all humanity. At its height in the third through seventh centuries, it had adherents from North Africa to China, making it one of the most geographically widespread religions of the ancient and medieval world. Its eventual disappearance, achieved through centuries of persecution by Christian, Islamic, and Chinese authorities, represents one of history\'s most thorough suppressions of a major religion.',
theology:'Manichaean theology centered on a radical dualism between the Kingdom of Light, ruled by the Father of Greatness, and the Kingdom of Darkness, whose assault on Light created the material world as a cosmic battlefield. The human soul is a fragment of divine Light trapped in material Darkness, with salvation consisting of the gradual liberation and return of Light to its source. This comprehensive cosmic narrative explained the origin of evil, the purpose of human existence, and the ultimate destiny of the universe.',
texts:'Mani was unique among religious founders in personally writing and illustrating his faith\'s canonical scriptures, including the Shabuhragan, Living Gospel, and Book of Giants. Manichaean texts were produced in multiple languages, from Syriac and Middle Persian to Sogdian, Chinese, and Coptic. The discovery of Manichaean manuscripts at Turfan in Central Asia and Medinet Madi in Egypt has transformed scholarly understanding of this long-suppressed tradition.',
ritual:'Manichaean ritual included daily prayers, the confession of sins, fasting, and communal hymn-singing that served to release Light particles from material bondage. The ritual meal of the Elect, at which they consumed foods believed to be rich in Light particles, served a cosmic function of liberating divine substance. Manichaean liturgical texts, discovered at Turfan and elsewhere, reveal elaborate ceremonial practices adapted to diverse cultural settings.',
mysticism:'Manichaean mysticism centered on the experience of the soul\'s awakening to its divine origin, recognizing itself as a particle of Light trapped in material Darkness. Mani\'s own visionary experiences, including encounters with his celestial Twin, provided the paradigm for Manichaean spiritual experience. The contemplation of Light, both in external nature and inner consciousness, served as a meditative practice aimed at spiritual liberation.',
art:'Manichaean art, following Mani\'s own example as a skilled painter, served didactic and devotional purposes, with illustrated manuscripts and temple paintings communicating the faith\'s cosmic narrative. The Manichaean artistic tradition produced distinctive works in diverse cultural contexts, from Central Asian cave paintings to Chinese scroll paintings. Mani\'s emphasis on visual art as a tool of religious communication was unusual among ancient religious founders.',
music:'Hymn-singing was central to Manichaean worship, with extensive collections of psalms and hymns surviving in Coptic, Middle Persian, Sogdian, and Chinese. The beauty and emotional power of Manichaean hymns was noted even by hostile observers like Augustine. Musical worship served the cosmic purpose of stirring the Light particles within the singer and hearers toward their divine source.',
ethics:'Manichaean ethics distinguished between the Elect, who observed strict asceticism including vegetarianism, celibacy, and poverty, and the Hearers, who supported the Elect and observed less rigorous moral standards. The prohibition against harming living things, which contained Light particles, created an ethic of non-violence that extended to plants and animals. The Elect\'s ascetic lifestyle was understood not as mere self-denial but as active participation in the cosmic liberation of Light.',
conversion:'Manichaeism was aggressively missionary, with Mani himself sending disciples to the Roman Empire, India, and Central Asia. The religion\'s adaptability to diverse cultural contexts — presenting itself in Christian terms in the West and Buddhist terms in the East — facilitated its rapid spread. Manichaean missionaries were among the most successful in the ancient world, establishing communities across three continents.',
persecution:'Manichaeism was systematically persecuted by the Roman Empire, the Christian Church, the Zoroastrian Sasanian state, Islamic authorities, and Chinese imperial power. Augustine\'s influential anti-Manichaean writings shaped Christian opposition to the faith for centuries. The thoroughness of Manichaean persecution makes it one of history\'s most striking examples of a major religion\'s near-total suppression.',
schisms:'Manichaean communities in different cultural settings developed distinctive characteristics, with Western Manichaeism emphasizing its relationship to Christianity while Eastern Manichaeism adopted Buddhist forms. Internal disputes over leadership and interpretation led to some factional divisions, though the faith\'s hierarchical structure limited fragmentation. The adaptation of Manichaean ideas to local contexts sometimes blurred the boundary between Manichaeism and other traditions.',
women:'Women participated in Manichaeism as both Hearers and, more controversially, as members of the Elect who achieved the highest spiritual status. Manichaean communities included female monastics who observed the same ascetic disciplines as their male counterparts. The tradition\'s spiritual egalitarianism, which valued the Light particle in all humans regardless of gender, provided a basis for women\'s religious authority.',
sacred:'Manichaean sacred sites included temples and monasteries where the Elect lived and worshipped, though few archaeological remains have been identified with certainty. The discovery of Manichaean texts and artifacts at Turfan, Dunhuang, and Kellis has revealed the material culture of Manichaean communities. Mani\'s birthplace in southern Mesopotamia and the site of his imprisonment and death held particular significance for his followers.',
afterlife:'Manichaean afterlife beliefs described the soul\'s liberation from material bondage at death, with the souls of the Elect rising directly to the Kingdom of Light. Hearers who had not achieved full liberation were reincarnated in forms that offered further opportunities for spiritual progress. The ultimate cosmic eschaton would see all Light particles liberated and the material world consumed, ending the cosmic drama of Light and Darkness.',
cosmology:'Manichaean cosmology described the creation of the material world as the result of the Kingdom of Darkness\'s assault on the Kingdom of Light, with the physical universe serving as a mechanism for separating and recovering the Light particles mixed with Darkness during the initial conflict. The sun and moon served as vessels collecting purified Light, while the zodiac and stars participated in the cosmic process of liberation. This elaborate cosmological system, drawing on Iranian, Mesopotamian, and Gnostic traditions, represented one of antiquity\'s most comprehensive attempts to explain the nature of reality.',
philosophy:'Manichaean philosophy addressed the problem of evil with a radical dualism that avoided the difficulties of explaining evil\'s existence within a monistic system. The tradition\'s epistemology emphasized gnosis — direct experiential knowledge of the soul\'s divine nature — as the path to salvation. Manichaean philosophical influence on Western thought, mediated particularly through Augustine\'s early adherence and later rejection, was more significant than is generally recognized.',
politics:'Manichaeism briefly achieved state religion status in the Uighur Khaganate (762-840 CE), the only period when it held political power. The religion\'s typical political stance was quietist, with the Elect withdrawing from worldly affairs while Hearers participated in secular life. The political vulnerability of Manichaean communities, lacking state support in most contexts, contributed to their eventual suppression.',
legacy:'Manichaeism\'s legacy includes its profound influence on Christian theology through Augustine, its contribution to the development of dualistic heresies like Catharism, and its demonstration of a genuinely universal religion that bridged Eastern and Western civilizations. The religion\'s sophisticated approach to religious pluralism, incorporating elements from multiple traditions, anticipated modern comparative religion. The term "Manichaean" has entered common usage to describe any worldview that divides reality into sharply opposed forces of good and evil.',
figures:'Mani, the Apostle of Light, was one of history\'s most ambitious religious founders, deliberately creating a universal religion synthesizing existing traditions. Augustine of Hippo, Christianity\'s most influential theologian, was a Manichaean Hearer for nine years before converting, and his theology was profoundly shaped by his engagement with Manichaean ideas. The Uighur Khagan Bugu Khan\'s conversion made Manichaeism a state religion, briefly demonstrating the faith\'s political potential.',
dialogue:'Manichaeism\'s deliberate synthesis of Zoroastrian, Christian, and Buddhist elements represents one of history\'s most ambitious experiments in interfaith dialogue and religious universalism. Mani\'s claim to complete and perfect the revelations of Zoroaster, Jesus, and the Buddha raised fundamental questions about the relationship between religious traditions. The Manichaean approach to religious pluralism, while ultimately rejected by the traditions it sought to synthesize, anticipated modern efforts toward interfaith understanding.'
}},
{id:'tengri',nm:'Tengrism',sb:'Central Asia · Eternal Blue Sky',s:-1000,e:1500,lon:90.0,lat:47.0,
fp:{reach:6,phil:5,ritual:7,art:5,pol:8,text:3},conns:['animism','shamanism','buddhism','islam'],
overview:'Tengrism, the indigenous spiritual tradition of the Turkic and Mongol peoples of Central Asia, centers on the worship of Tengri, the Eternal Blue Sky, as the supreme deity governing all existence. For millennia, Tengrism shaped the religious, political, and cultural life of the steppe nomads, providing divine legitimation for rulers from the ancient Xiongnu to Genghis Khan and the Mongol Empire. Though largely supplanted by Buddhism and Islam, Tengrist concepts of sacred landscape, divine kingship, and cosmic harmony persist in Central Asian culture and are experiencing a modern revival.',
d:{
overview:'Tengrism encompasses the spiritual traditions of the Turkic and Mongol peoples, centered on the worship of Tengri (Eternal Blue Sky) alongside a complex cosmology of earth spirits, ancestors, and natural forces. The tradition provided the ideological framework for the great steppe empires, with rulers claiming the Mandate of Heaven from Tengri to justify their rule. Despite centuries of Buddhist and Islamic influence, Tengrist elements persist in Central Asian folk religion and cultural identity.',
theology:'Tengrist theology recognizes Tengri, the Eternal Blue Sky, as the supreme deity, while Umay (Earth Mother) represents the complementary feminine divine principle. The cosmos is populated by a hierarchy of spirits associated with mountains, rivers, trees, and other natural features. Tengri\'s will determines the fate of nations and individuals, with the khan\'s authority derived from divine mandate.',
texts:'Tengrism is primarily an oral tradition, with no canonical scriptures comparable to those of book religions. The Orkhon inscriptions of the eighth century CE provide the earliest written evidence of Tengrist beliefs, recording the Turkic khans\' relationship with Tengri. Later sources, including the Secret History of the Mongols and observations by Chinese, Persian, and European travelers, supplement the limited textual record.',
ritual:'Tengrist ritual includes sacrifice (particularly of horses), libation offerings to the sky, earth, and cardinal directions, and the erection of ovoo (stone cairns) at sacred sites. Shamanistic practices of trance, divination, and spirit communication complement the worship of Tengri within the broader Tengrist framework. Seasonal ceremonies marking solstices, the new year (Nauryz), and pastoral transitions structure the ritual year.',
mysticism:'Shamanic trance represents the primary mystical practice within Tengrism, with shamans (called kam or bo) serving as intermediaries between the human and spirit worlds. The shaman\'s journey through the cosmic levels, aided by spirit helpers and carried on the rhythm of the drum, provides direct access to supernatural knowledge. The experience of the open steppe beneath the eternal sky itself carries mystical significance, embodying the Tengrist sense of human existence within a vast, spiritually charged cosmos.',
art:'Tengrist artistic expression includes the animal style art of the steppe peoples, with its dynamic representations of horses, deer, and predatory animals. Decorative traditions in felt, leather, metalwork, and textile arts incorporate spiritual symbolism. Petroglyphs found across Central Asia depict scenes of hunting, shamanic practice, and cosmic symbolism spanning millennia of steppe culture.',
music:'Tengrist musical traditions include throat singing (khoomei), long songs, and the music of the morin khuur (horse-head fiddle) that evoke the vast steppe landscape. Shamanic drumming serves ritual purposes, with the drum representing the shaman\'s mount for spirit journeys. Epic oral poetry, performing the deeds of heroes and the will of Tengri, combines musical and spiritual functions.',
ethics:'Tengrist ethics emphasize courage, honor, hospitality, and respect for the natural world, reflecting the values of nomadic pastoral life. The Yasa of Genghis Khan, influenced by Tengrist principles, codified ethical and legal norms governing the Mongol Empire. Environmental ethics in Tengrism derive from the belief that the earth and its features are sacred and spiritually alive.',
conversion:'Tengrism did not actively seek converts, spreading through the cultural influence and political domination of Turkic and Mongol peoples. The tradition\'s compatibility with other spiritual practices allowed it to coexist with Buddhism, Christianity, and Islam for extended periods. Modern Tengrist revivals in Central Asian countries represent a deliberate recovery of pre-Islamic and pre-Buddhist indigenous identity.',
persecution:'Tengrism was gradually displaced by Buddhism and Islam through both peaceful conversion and political pressure, with khanates adopting world religions for diplomatic and commercial advantages. Soviet-era atheist policies suppressed all forms of religious practice in Central Asia, including surviving Tengrist elements. The post-Soviet revival of Tengrism has sometimes faced opposition from established Islamic authorities.',
schisms:'Tengrism\'s decentralized nature precludes formal schisms, though significant variations exist between Turkic and Mongol forms of the tradition. The integration of Buddhist, Islamic, or Christian elements into local Tengrist practice created diverse syncretistic traditions. Modern Tengrist movements disagree about the degree to which the tradition should incorporate or reject later religious influences.',
women:'Women held significant roles in Tengrist society, with female shamans recognized as powerful spiritual practitioners. Mongol women enjoyed greater social freedom than their contemporaries in sedentary civilizations, managing households and herds during men\'s absences. Umay, the Earth Mother goddess, held a central position in the Tengrist pantheon, reflecting the tradition\'s recognition of feminine spiritual power.',
sacred:'Sacred sites in Tengrism include mountains, particularly Burkhan Khaldun (the probable birthplace of Genghis Khan), rivers, springs, and unusual natural formations recognized as dwelling places of spirits. Ovoo, stone cairns marking sacred locations, serve as focal points for offering and prayer across the Mongol and Turkic world. The sky itself, as the dwelling of Tengri, is the ultimate sacred space.',
afterlife:'Tengrist afterlife beliefs describe the soul\'s journey to the spirit world, where ancestors continue to exist and interact with the living. Elaborate burial practices, including horse sacrifices and grave goods, reflect beliefs about continued existence after death. The ancestral realm is understood as coexisting with the visible world rather than being radically separated from it.',
cosmology:'Tengrist cosmology describes a three-tiered universe: the upper realm of Tengri and celestial spirits, the middle world of humans and nature spirits, and the lower world of subterranean forces. A world tree or cosmic mountain connects these levels, with the shaman traveling between them during trance. The directional symbolism of the four cardinal points, associated with specific colors and attributes, organizes sacred space.',
philosophy:'Tengrist philosophical thought emphasizes the harmony of human life with the cycles of nature, the vastness of the cosmos, and the moral order guaranteed by Tengri\'s oversight. The concept of the Mandate of Heaven (kut), which legitimizes political authority while holding rulers accountable to divine standards, represents a sophisticated political philosophy. The steppe nomad\'s philosophical orientation, valuing freedom, mobility, and direct relationship with nature, contrasts markedly with sedentary civilizations\' emphasis on accumulation and control.',
politics:'Tengrism provided the ideological foundation for the great steppe empires, with rulers from the Xiongnu to the Mongols claiming their authority from Tengri\'s mandate. The concept of world conquest as divinely ordained mission drove the expansion of Turkic and Mongol empires across Eurasia. The integration of Tengrist political theology with practical governance produced the Yasa and similar legal codes that administered vast multiethnic empires.',
legacy:'Tengrism\'s legacy includes its influence on the political culture of Central Asia, the concept of the Mandate of Heaven adopted by Chinese civilization, and the steppe warrior traditions that shaped Eurasian history. The tradition\'s emphasis on the sacredness of nature and the open landscape resonates with modern environmental consciousness. Modern Tengrist revival movements in Turkey, Mongolia, Kazakhstan, and Kyrgyzstan seek to recover this indigenous spiritual heritage.',
figures:'Genghis Khan, who invoked Tengri\'s mandate to justify the Mongol conquests, was the tradition\'s most powerful political exponent. Bilge Khan of the Gokturks, whose Orkhon inscriptions provide the earliest written evidence of Tengrist belief, established the literary record of the tradition. Modern figures like the Kyrgyz writer Chingiz Aitmatov drew on Tengrist themes to explore Central Asian identity.',
dialogue:'Tengrism\'s historical coexistence with Buddhism, Islam, and Christianity in Central Asia demonstrates the tradition\'s capacity for interfaith accommodation. The Mongol Empire\'s famous religious tolerance, rooted in Tengrist cosmopolitanism, created one of history\'s most remarkable experiments in religious pluralism. Contemporary Tengrist movements engage in dialogue with both indigenous traditions worldwide and the world religions that now predominate in Central Asia.'
}},
{id:'vodou',nm:'Vodou',sb:'West Africa & Caribbean · Spirit Service',s:1600,e:2024,lon:-72.3,lat:18.5,
fp:{reach:5,phil:5,ritual:10,art:8,pol:4,text:3},conns:['animism','christianity','islam'],
overview:'Vodou (also Voodoo or Vodun), a vibrant spiritual tradition blending West African religious practices with Catholic elements, emerged among enslaved Africans in the Caribbean, particularly Haiti, as a means of preserving ancestral spirituality under the brutal conditions of plantation slavery. The tradition centers on the service of the lwa (spirits), who serve as intermediaries between the Supreme God (Bondye) and humanity, channeled through elaborate ceremonies involving drumming, dance, possession, and offering. Despite centuries of demonization and misrepresentation, Vodou remains a living religion of profound theological sophistication, artistic beauty, and community resilience.',
d:{
overview:'Vodou is a syncretic tradition drawing primarily on the religious practices of the Fon, Ewe, and Yoruba peoples of West Africa, transformed through the experience of slavery and interaction with French Catholicism in Haiti. The religion served as a spiritual lifeline for enslaved people, preserving African cultural identity and providing the ideological framework for the Haitian Revolution of 1791-1804. Today Vodou is practiced by millions in Haiti, the Caribbean, and diaspora communities worldwide.',
theology:'Vodou theology recognizes a supreme but distant creator God (Bondye) who interacts with humanity through the lwa, a vast pantheon of spirits associated with natural forces, ancestors, and human activities. The lwa are organized into nanchon (nations) reflecting different African ethnic origins, principally the Rada (cool, benevolent) and Petwo (hot, fierce) families. The relationship between humans and lwa is one of mutual service and reciprocity, with the lwa providing guidance, healing, and protection in exchange for devotion and offering.',
texts:'Vodou is primarily an oral tradition, transmitted through the liturgical songs, ritual practices, and oral teachings of houngans (priests) and mambos (priestesses). Written elements include the elaborate symbolic drawings (veve) that serve as invocations for specific lwa. Academic documentation by Haitian and international scholars has created a growing textual record of Vodou\'s beliefs and practices.',
ritual:'Vodou ceremonies are elaborate multi-sensory events combining drumming, singing, dance, prayer, and the drawing of veve to invoke the lwa\'s presence. Spirit possession (being "mounted" by a lwa) is the ceremony\'s climactic event, with the possessed person embodying the spirit\'s personality and receiving their guidance. Rituals also include healing ceremonies, initiation rites, and ceremonies for the dead that maintain the bond between the living and ancestral communities.',
mysticism:'Vodou mysticism centers on the experience of spirit possession, in which the lwa enters and animates the devotee\'s body, providing a direct encounter with the divine. The initiation process (kanzo) involves a transformative experience of symbolic death and rebirth that deepens the practitioner\'s spiritual capacity. Dream communication with the lwa and the cultivation of spiritual sight represent additional dimensions of Vodou mystical practice.',
art:'Vodou art encompasses the intricate veve drawings, beaded flags (drapo), sequined bottles, and sculpture that serve both ritual and aesthetic functions. The visual richness of Vodou sacred art has influenced Haitian painting and sculpture, which have gained international recognition. Vodou artistic traditions demonstrate extraordinary creativity in transforming everyday materials into objects of spiritual power and beauty.',
music:'Drumming is the heartbeat of Vodou ceremony, with specific rhythmic patterns associated with particular lwa and serving to invoke their presence. The three drums of the Rada ceremony (manman, segond, boula) create interlocking polyrhythmic patterns rooted in West African musical traditions. Vodou musical influence pervades Haitian popular music, Caribbean musical styles, and through them, much of contemporary world music.',
ethics:'Vodou ethics emphasize community solidarity, reciprocity with the spirit world, and the moral obligation to maintain balance between the visible and invisible realms. The tradition distinguishes between serving the lwa for healing and community benefit (white magic) and manipulation for personal gain (sorcery). The communal ethical framework of Vodou sustained enslaved communities and continues to provide moral guidance in impoverished communities where formal institutions offer little support.',
conversion:'Vodou does not actively seek converts, as participation typically grows from community ties, family tradition, and the personal experience of the lwa\'s presence. The tradition\'s openness to incorporating elements from other religions, particularly Catholicism, reflects an inclusive rather than exclusive approach to spiritual truth. Many Vodou practitioners simultaneously identify as Catholic, seeing no contradiction between the two traditions.',
persecution:'Vodou has endured centuries of persecution, demonization, and misrepresentation, beginning with slaveholders\' attempts to suppress African religious practices. The Catholic Church, the American occupation of Haiti (1915-34), and Haitian political authorities have all campaigned against Vodou at various times. Hollywood depictions of "voodoo" as evil sorcery have perpetuated harmful stereotypes that continue to affect popular perceptions of the tradition.',
schisms:'Vodou\'s decentralized nature, with individual temples (peristyles) led by autonomous houngans and mambos, precludes formal schisms. Regional variations between Haitian, Dominican, Cuban (Santeria), and Brazilian (Candomble) expressions of African-derived religion represent distinct but related traditions. Internal diversity in practice and emphasis is considered natural rather than problematic within the tradition.',
women:'Women hold positions of supreme spiritual authority in Vodou as mambos (priestesses), exercising power equal to or greater than their male counterparts. The lwa include powerful female spirits like Erzulie Freda and Erzulie Dantor, whose fierce and loving natures model feminine spiritual power. Vodou\'s recognition of women\'s spiritual authority contrasts sharply with the patriarchal traditions of the Catholic Church with which it coexists.',
sacred:'Vodou sacred sites include peristyles (temples), natural features like waterfalls and crossroads associated with specific lwa, and the historical sites of the Haitian Revolution. The potomitan (center post) of the peristyle represents the axis mundi connecting the human world with the spirit realm below. Cemeteries hold particular sacred significance as the domain of the Gede lwa who govern death and the ancestors.',
afterlife:'Vodou teaches that the soul has multiple components, some of which return to the ancestral realm after death while others may be recaptured by the living through ritual. Ancestor veneration is central to Vodou practice, with the dead continuing to influence and communicate with the living. The ceremony of "reclaiming" the dead (desounin) releases the soul from the body and guides it to its proper spiritual destination.',
cosmology:'Vodou cosmology describes a universe divided between the visible world of the living and the invisible world of the spirits, connected through the cosmic waters (anba dlo) beneath the earth. The mirror relationship between these worlds means that actions in one realm affect the other. The crossroads, where the visible and invisible worlds meet, is the domain of Papa Legba, the gatekeeper lwa who must be saluted before any ceremony can begin.',
philosophy:'Vodou philosophy emphasizes the interconnection of all things, the reciprocal relationship between humans and spirits, and the continuous influence of the dead on the living. The tradition\'s pragmatic orientation focuses on solving problems, healing illness, and maintaining community well-being rather than abstract speculation. Vodou\'s philosophical framework, developed under conditions of extreme oppression, demonstrates the human spirit\'s capacity to create meaning and community in the most adverse circumstances.',
politics:'Vodou played a crucial political role in the Haitian Revolution, with the ceremony at Bois Caiman in 1791 traditionally regarded as the spiritual catalyst for the slave uprising that created the world\'s first Black republic. Haitian political leaders have alternately suppressed and exploited Vodou, with the Duvalier regime notoriously using Vodou symbolism to consolidate power. The formal recognition of Vodou as a national religion in 2003 marked an important step toward ending centuries of political marginalization.',
legacy:'Vodou\'s legacy includes its role in inspiring the Haitian Revolution, its preservation of African cultural traditions in the Americas, and its influence on Caribbean and global popular culture. The tradition\'s artistic, musical, and ritual creativity has enriched world culture far beyond its Caribbean homeland. Vodou\'s survival through centuries of persecution testifies to the resilience of African spiritual traditions and their capacity to sustain communities under the most extreme conditions.',
figures:'Dutty Boukman, the houngan who led the Bois Caiman ceremony that sparked the Haitian Revolution, is Vodou\'s most historically significant figure. Cecile Fatiman, the mambo who participated in the Bois Caiman ceremony, represents the tradition\'s recognition of women\'s spiritual authority. Max Beauvoir, appointed Supreme Servitor of Vodou in 2008, worked to gain international recognition and respect for the tradition.',
dialogue:'Vodou\'s syncretic nature, incorporating Catholic saints as manifestations of the lwa, demonstrates one model of interfaith relationship, though some practitioners prefer to emphasize the tradition\'s African roots. Dialogue with other African diaspora religions — Santeria, Candomble, Obeah — reveals common ancestry and shared concerns. Vodou\'s engagement with Christianity and its own African heritage models the complex negotiations of religious identity in the post-colonial world.'
}},
{id:'aboriginal',nm:'Aboriginal Dreamtime',sb:'Australia · Tjukurpa / The Dreaming',s:-50000,e:2024,lon:134.0,lat:-25.0,
fp:{reach:3,phil:7,ritual:10,art:9,pol:3,text:2},conns:['animism'],
overview:'Aboriginal Australian spirituality, centered on the Dreaming (Tjukurpa), represents one of the world\'s oldest continuous religious traditions, with roots stretching back at least 50,000 years. The Dreaming describes both the creative epoch when ancestral beings shaped the land and a timeless spiritual dimension that continues to permeate the present, connecting people, land, and law in an inseparable web of meaning. With hundreds of distinct language groups maintaining their own Dreaming stories and ceremonial traditions, Aboriginal spirituality encompasses extraordinary diversity unified by common themes of ancestral connection, land custodianship, and ceremonial obligation.',
d:{
overview:'Aboriginal Australian spiritual traditions are among the oldest on Earth, maintained through continuous oral and ceremonial transmission for tens of thousands of years. The Dreaming (known by various names in different languages, including Tjukurpa, Jukurrpa, and Altjeringa) describes the creative journeys of ancestral beings who shaped the landscape, established social laws, and continue to inhabit the land. Each Aboriginal group maintains responsibility for specific Dreaming stories and sites, creating a continental network of interconnected sacred narratives.',
theology:'Aboriginal theology centers on the Dreaming ancestors — supernatural beings who traveled across a formless landscape, creating its features through their actions and leaving their spiritual essence in specific places. These ancestors are not dead gods but ongoing presences, accessible through ceremony, song, and proper relationship with the land. The concept of the Dreaming transcends the Western distinction between past and present, describing a dimension of reality that is both primordial and eternally contemporary.',
texts:'Aboriginal spiritual knowledge is transmitted orally through song cycles, stories, ceremonial performance, and direct instruction from elders to initiated individuals. The song lines (dreaming tracks) that cross the continent serve as both navigational aids and repositories of sacred knowledge, encoding geographical, ecological, and spiritual information. Rock art sites, some dating back tens of thousands of years, represent the longest continuous artistic and spiritual tradition on Earth.',
ritual:'Aboriginal ceremony includes corroborees (communal song and dance performances), increase ceremonies to ensure the abundance of plant and animal species, and elaborate initiation rites that introduce young people to sacred knowledge. Ceremonies are often performed at specific Dreaming sites where ancestral power is concentrated. The ceremonial life is highly structured, with access to knowledge carefully regulated according to age, gender, and initiation status.',
mysticism:'Aboriginal mystical experience centers on the direct encounter with Dreaming reality through ceremony, vision, and the cultivation of heightened awareness of the spiritual dimension of the landscape. The concept of "entering the Dreaming" describes experiences of expanded consciousness in which the boundary between ordinary and sacred reality dissolves. Clever people (traditional healers) possess particular abilities to perceive and interact with the spiritual dimension.',
art:'Aboriginal art, from ancient rock paintings to contemporary acrylic canvas works, represents the world\'s longest continuous artistic tradition. Dot paintings, bark paintings, and rock art encode Dreaming narratives using sophisticated symbolic systems that communicate on multiple levels depending on the viewer\'s initiation status. Aboriginal art\'s international recognition has brought attention to the tradition\'s depth and sophistication while raising complex questions about sacred knowledge and cultural ownership.',
music:'The didgeridoo, one of the world\'s oldest wind instruments, produces the droning soundscape that accompanies ceremony and storytelling. Song cycles, which can take days to perform, narrate ancestral journeys across the landscape, with each song corresponding to a specific location. The clapping sticks and vocal techniques of Aboriginal musical tradition maintain performance practices of extraordinary antiquity.',
ethics:'Aboriginal ethics are grounded in kinship obligations, land custodianship, and the reciprocal relationships established by the Dreaming ancestors. The concept of "caring for country" encompasses ecological, spiritual, and social responsibilities that bind people to their ancestral lands. The elaborate kinship systems of Aboriginal societies define social obligations and behavioral norms with remarkable precision.',
conversion:'Aboriginal spiritual traditions do not seek converts, as religious knowledge and obligation are tied to specific land, kinship, and initiation relationships. The imposition of Christianity by missionaries and colonial authorities disrupted but did not destroy Aboriginal spiritual practices. Many Aboriginal people today maintain dual religious identities, participating in both Christian worship and traditional ceremony.',
persecution:'Aboriginal spiritual traditions have endured severe persecution since European colonization, including the destruction of sacred sites, prohibition of ceremonies, and removal of children from their communities (the Stolen Generations). Missionary activity deliberately targeted Aboriginal religion for elimination, while pastoral and mining operations desecrated sacred sites. The ongoing struggle to protect sacred sites and maintain ceremonial traditions reflects the continuing impact of colonialism.',
schisms:'Aboriginal spirituality has no institutional structure that produces schisms, with the diversity of hundreds of language groups representing natural variation rather than doctrinal division. The tension between maintaining traditional secrecy around sacred knowledge and the need to communicate with non-Aboriginal authorities about land rights creates ongoing challenges. The integration of Christian and traditional beliefs in some communities represents adaptation rather than schism.',
women:'Aboriginal women hold significant spiritual authority, with women\'s business (ceremonies and knowledge restricted to women) representing an essential dimension of the tradition. Women\'s Dreaming stories and ceremonial obligations complement men\'s, creating a complete spiritual system that requires both genders\' participation. The scholarly emphasis on men\'s ceremonial life has sometimes obscured the depth and importance of women\'s spiritual traditions.',
sacred:'The entire Australian landscape is sacred in Aboriginal understanding, with specific sites of concentrated ancestral power requiring particular forms of respect and ceremonial attention. Sacred sites include rock formations, waterholes, caves, and other landscape features created or inhabited by Dreaming ancestors. The protection of sacred sites from mining, development, and unauthorized access remains a critical issue in Aboriginal rights.',
afterlife:'Aboriginal beliefs about death and the afterlife vary across groups but generally involve the soul\'s return to its Dreaming place, the ancestral source from which it came. Elaborate funeral ceremonies ensure the proper transition of the spirit and its reintegration with the ancestral landscape. The continued presence of the dead in the landscape and their influence on the living reflect the Dreaming\'s dissolution of the boundary between past and present.',
cosmology:'Aboriginal cosmology describes the Dreaming as both the creative period when the world took its present form and an ongoing dimension of reality that coexists with the everyday world. The landscape itself is the primary cosmological text, with every feature recording ancestral creation. The song lines that cross the continent create a comprehensive cosmological map linking local Dreaming narratives into a continental system.',
philosophy:'Aboriginal philosophical contributions include sophisticated ecological knowledge accumulated over tens of thousands of years, theories of time that challenge Western linear assumptions, and frameworks for understanding the relationship between humans and the natural world. The concept of the Dreaming as a dimension of reality that is simultaneously past, present, and eternal represents a philosophical achievement of remarkable originality. Aboriginal epistemology, grounded in direct relationship with country and transmitted through story and ceremony, offers an alternative to Western abstract rationalism.',
politics:'Traditional Aboriginal political structures were decentralized, with authority distributed among elders, ceremonial leaders, and holders of specific Dreaming knowledge. The struggle for land rights and self-determination in modern Australia has drawn on spiritual authority and the Dreaming\'s connection to specific territories. The recognition of native title and the protection of sacred sites represent ongoing political struggles that link spiritual tradition to legal and political action.',
legacy:'Aboriginal Australian spirituality represents humanity\'s oldest continuous religious tradition, preserving knowledge systems and ceremonial practices of incomparable antiquity. The tradition\'s sophisticated understanding of ecological relationships, developed over tens of thousands of years, offers vital perspectives for addressing environmental crises. Aboriginal art, music, and storytelling have gained global recognition, bringing attention to cultures that maintain living connections to the deepest human past.',
figures:'Aboriginal spiritual authority is distributed rather than concentrated in individual figures, with elders and ceremonial leaders exercising authority within their specific Dreaming traditions. Historical figures like David Unaipon brought Aboriginal intellectual traditions to wider attention, while activists like Eddie Mabo fought for the legal recognition of Aboriginal spiritual connection to land. Contemporary Aboriginal leaders, artists, and scholars work to preserve and communicate their traditions to new generations and global audiences.',
dialogue:'Aboriginal spiritual traditions\' emphasis on the sacredness of the natural world and the interconnection of all life provides important perspectives for global interfaith dialogue, particularly on environmental issues. The encounter between Aboriginal spirituality and Christianity has produced complex negotiations of identity and meaning. Aboriginal elders\' participation in international indigenous forums creates dialogue with other first peoples worldwide, discovering shared themes of land connection, ancestral obligation, and ecological responsibility.'
}},

let year=-10000,lenses=new Set(),sel=null,sel2=null,lensDD=false,mode="explore",activeThread=null;
const OVERVIEW_COL='#9070c0';
let _vbW=1000;

function fmt(y){return y<0?`${Math.abs(y)} BCE`:y===0?'1 CE':`${y} CE`}
function eraName(y){let n=ERAS[0].n;for(const e of ERAS){if(y>=e.y)n=e.n;}return n;}
function active(c){return year>=c.s&&year<=c.e}
function getLensCol(){
  if(!lenses.size)return OVERVIEW_COL;
  const L=LENSES.find(l=>l.id===[...lenses][0]);
  return L?L.col:OVERVIEW_COL;
}

function toggleLensDD(){
  lensDD=!lensDD;
  document.getElementById('lens-dd-list').classList.toggle('open',lensDD);
  document.getElementById('lens-dd-hdr').classList.toggle('open',lensDD);
  document.getElementById('lens-dd-arrow').classList.toggle('open',lensDD);
}

function lensLabel(){
  if(!lenses.size)return'Belief Arc';
  const names=[...lenses].map(id=>{const L=LENSES.find(l=>l.id===id);return L?L.lbl:'';});
  if(names.length===1)return names[0];
  if(names.length<=3)return names.join(' · ');
  return names.slice(0,2).join(' · ')+` +${names.length-2}`;
}

function renderLensDD(){
  const hook=document.getElementById('lens-position-hook');
  const dt=hook||document.getElementById('drawer-top');
  if(!dt)return;
  if(hook){
    hook.style.cssText='padding:8px 0 4px';

  const rows=LENSES.map(l=>{
    const on=lenses.has(l.id);
    return`<div class="lens-row${on?' on':''}" onclick="toggleLens('${l.id}')">
      <div class="lens-row-chk${on?' on':''}">${on?'✓':''}</div>
      <span class="lens-row-ico">${l.ico}</span>
      <span class="lens-row-lbl">${l.lbl}</span>

  }).join('');
  dt.innerHTML=`<div class="lens-dd-wrap">
    <div class="lens-dd-hdr${lensDD?' open':''}" id="lens-dd-hdr" onclick="toggleLensDD()">
      <span class="lens-dd-title">Lens</span>
      <span class="lens-dd-summary">${lensLabel()}</span>
      <span class="lens-dd-arrow${lensDD?' open':''}" id="lens-dd-arrow">▾</span>
    </div>
    <div class="lens-dd-list${lensDD?' open':''}" id="lens-dd-list">
      <div class="lens-row${arcOn?' on':''}" onclick="toggleLens('__arc__')">
        <div class="lens-row-chk${arcOn?' on':''}">${arcOn?'✓':''}</div>
        <span class="lens-row-ico">◎</span>
        <span class="lens-row-lbl">Belief Arc</span>
      </div>
      <div class="lens-row-sep"></div>
      ${rows}
      <div class="lens-dd-close-btn" onclick="toggleLensDD()">Done ▴</div>
    </div>
  </div>`;
}

function toggleLens(id){
  if(id==='__arc__'){lenses.clear();}
  else{
    if(lenses.has(id))lenses.delete(id);
    else lenses.add(id);
  }
  renderLensDD();
  if(sel){
    const c=sel;
    let body='';
    if(!lenses.size){
      body=`<div class="overview-arc"><p>${c.overview||c.d.legacy}</p></div>${renderEnhancedSpanBar(c)}`;
    } else {
      body=[...lenses].map(lid=>{
        const L=LENSES.find(l=>l.id===lid);
        if(!L)return'';
        return`<div class="lens-section">
          <div class="lens-section-hdr">
            <span class="lens-section-ico">${L.ico}</span>
            <span class="lens-section-lbl">${L.lbl}</span>
          </div>
          <div class="info-txt">${c.d[lid]||'No data for this lens.'}</div>
        </div>`;
      }).join('');
    }
    const col=lenses.size?getLensCol():OVERVIEW_COL;
    const actIds=new Set(ITEMS.filter(x=>active(x)).map(x=>x.id));
    const connHTML=c.conns.length?`<div class="conn-hdr" id="conn-hdr">Historical connections</div>`+c.conns.map(cid=>{
      const o=ITEMS.find(x=>x&&x.id===cid);if(!o)return'';
      const isA=actIds.has(cid);
      const badge=isA?'ACTIVE':'→ JUMP';
      const tip=isA?`View ${o.nm} (active in this era)`:`Jump to ${o.nm} (${fmt(o.s)} – ${fmt(o.e)})`;
      return`<button class="conn-item" tabindex="0"
          aria-label="${tip}"
          onclick="navigateToItem('${cid}')"
          style="width:100%;background:none;border:none;border-bottom:1px solid var(--conn-bdr);text-align:left;cursor:pointer;opacity:${isA?1:.7}">
        <div class="conn-dot" style="background:${isA?col:'var(--txt3)'}"></div>
        <span style="flex:1;color:var(--txt${isA?'':'3'})">${o.nm}</span>
        <span style="font-size:9px;font-family:'Cinzel',serif;letter-spacing:1px;color:${isA?'var(--amber-b)':'var(--amber)'};white-space:nowrap">${badge}</span>
      </button>`;
    }).join(''):'';
    const lensDiv=document.getElementById('drawer-lens-body');
    if(lensDiv) lensDiv.innerHTML=body+connHTML;
  }
  renderMap();
}

// Slider 0-1000 maps to year via two segments:
// 0-100   → -10000 to -3000 (deep prehistory, 10% of slider)
// 100-1000 → -3000 to 2024  (recorded history, 90% of slider)
function sliderToYear(v){
  v=parseInt(v);
  if(v<=100){
    return Math.round(-10000+((-3000-(-10000))*(v/100)));
  } else {
    return Math.round(-3000+((2024-(-3000))*((v-100)/900)));
  }
}
function yearToSlider(yr){
  yr=parseInt(yr);
  if(yr<=-3000){
    return Math.round(100*((yr-(-10000))/(-3000-(-10000))));
  } else {
    return Math.round(100+900*((yr-(-3000))/(2024-(-3000))));
  }
}

function itemPt(c){
  if(!c)return[500,260];
  if(!window._proj)return[c.x||500,c.y||260];
  if(typeof c.lon!=='number'||typeof c.lat!=='number')return[c.x||500,c.y||260];
  try{const pt=window._proj([c.lon,c.lat]);return pt&&isFinite(pt[0])&&isFinite(pt[1])?pt:[c.x||500,c.y||260];}
  catch(e){return[c.x||500,c.y||260];}
}

function renderMap(){
  const ids=new Set(ITEMS.filter(c=>active(c)).map(c=>c.id));
  window.ids_cache=ids;
  const col=lenses.size?getLensCol():OVERVIEW_COL;

  const drawn=new Set();
  let cl='';
  ITEMS.forEach(c=>{
    if(!ids.has(c.id))return;
    c.conns.forEach(id=>{
      const k=[c.id,id].sort().join('-');
      if(drawn.has(k)||!ids.has(id))return;
      drawn.add(k);
      const o=ITEMS.find(x=>x&&x.id===id);
      if(!o)return;
      const [cx,cy]=itemPt(c),[ox,oy]=itemPt(o);
      const mx=(cx+ox)/2,my=Math.min(cy,oy)-28;
      cl+=`<path d="M${cx},${cy} Q${mx},${my} ${ox},${oy}" stroke="${OVERVIEW_COL}" stroke-width=".8" fill="none" stroke-dasharray="3,5" opacity="${sel?0.1:0.25}"/>`;
    });
  });
  document.getElementById('conn-layer').innerHTML=cl;

  let rings='', dots='', ll='';
  const itemData=ITEMS.map(c=>{
    const on=ids.has(c.id);
    const isSel=sel&&sel.id===c.id;
    const mcol=isSel?'#f0d060':OVERVIEW_COL;
    const op=on?1:0.06;
    const [cx,cy]=itemPt(c);
    return {c,on,isSel,mcol,op,cx,cy};
  });
  // Pass 1: decorative rings
  itemData.filter(Boolean).forEach(({c,on,isSel,mcol,op,cx,cy})=>{
    const _zr=1000/_vbW;
    const _rR=Math.max(4,(16/_zr)).toFixed(1);
    const _pR=Math.max(2,(6/_zr)).toFixed(1);
    const _pMax=Math.max(5,(16/_zr)).toFixed(1);
    rings+=`<g opacity="${op}" pointer-events="none">
      <circle cx="${cx}" cy="${cy}" r="${_rR}" fill="none" stroke="${mcol}" stroke-width=".5" opacity=".15"/>
      <circle cx="${cx}" cy="${cy}" r="${(Math.max(3,10/_zr)).toFixed(1)}" fill="${mcol}" fill-opacity=".06"/>
      ${on?`<circle cx="${cx}" cy="${cy}" r="${_pR}" fill="${mcol}" opacity=".45">
        <animate attributeName="r" values="${_pR};${_pMax};${_pR}" dur="2.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".45;0;.45" dur="2.8s" repeatCount="indefinite"/>
      </circle>`:''}
    </g>`;
  });
  // Pass 2: clickable dots
  const sorted=[...itemData].filter(Boolean).sort((a,b)=>a.isSel?1:b.isSel?-1:0);
  sorted.forEach(({c,on,isSel,mcol,op,cx,cy})=>{
    if(on){
      const zr=1000/_vbW;
      const dotR=Math.max(2, (isSel?9:7)/zr);
      const ringR=Math.max(3, 16/zr);
      const pulseMax=Math.max(8, 16/zr);
      dots+=`<g role="button" tabindex="0" data-item="${c.id}"
          aria-label="${c.nm} — click to explore"
          onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();itemClick('${c.id}')}"
          opacity="${op}" pointer-events="none">
          <circle cx="${cx}" cy="${cy}" r="${dotR.toFixed(1)}"
            fill="${mcol}" filter="url(#glow${isSel?'2':''})"
          />
        </g>`;
      ll+=`<text x="${cx}" y="${cy+26}" font-family="Cinzel,serif" font-size="11"
        letter-spacing="1" fill="${isSel?'#f0d060':OVERVIEW_COL}"
        text-anchor="middle" pointer-events="none">${c.nm}</text>`;
    } else {
      dots+=`<circle cx="${cx}" cy="${cy}" r="4" fill="${mcol}" opacity=".12" pointer-events="none"/>`;
    }
  });
  document.getElementById('mark-layer').innerHTML=rings+dots;
  document.getElementById('label-layer').innerHTML=ll;
}

function navigateToItem(id){
  const c=ITEMS.find(x=>x&&x.id===id);
  if(!c)return;
  if(mode==='compare'){
    if(!sel){sel=c;}
    else if(!sel2&&sel.id!==c.id){sel2=c;}
    else{sel=c;sel2=null;}
    renderDrawer();renderMap();updateURL();
    openMobileSheet();
    return;
  }
  if(!active(c)){
    const targetYear=c.s;
    document.getElementById('tl').value=yearToSlider(targetYear);
    setYear(targetYear);
  }
  sel=c;lensDD=false;
  renderDrawer();renderMap();updateURL();
  openMobileSheet();
  document.getElementById('info-panel').scrollTo({top:0,behavior:'smooth'});
}

function itemClick(id){
  navigateToItem(id);
}
