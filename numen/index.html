<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── DARK THEME (default) ── */
:root{
  --bg:#02040a;
  --panel:#070b12;
  --panel2:#0c1018;
  --ocean-start:#0a1628;--ocean-end:#061020;
  --land:#2a4a18;--land-s:#3a6020;
  --amber:#e89820;--amber-b:#f0b040;--amber-d:#3a2204;
  --amber-x:rgba(232,152,32,0.14);--amber-xx:rgba(232,152,32,0.08);
  --txt:#f2e8d5;--txt2:#e0d4b4;--txt3:#c8aa78;
  --bdr:rgba(232,152,32,0.22);--bdr2:rgba(232,152,32,0.10);
  --hint:rgba(224,212,180,0.65);
  --tl-bg:rgba(2,4,10,0.99);
  --hdr-bg:rgba(2,4,10,0.97);
  --conn-bdr:rgba(232,152,32,0.10);
  --shadow:rgba(0,0,0,0.6);
}

/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#f0ebe0;
  --panel:#e8e0d0;
  --panel2:#ddd4c0;
  --ocean-start:#b8cce0;--ocean-end:#a8bcd4;
  --land:#8ca860;--land-s:#7a9850;
  --amber:#4a2c00;--amber-b:#5a3800;--amber-d:#f0d8a0;
  --amber-x:rgba(122,78,0,0.10);--amber-xx:rgba(122,78,0,0.06);
  --txt:#1a1206;--txt2:#1a1206;--txt3:#2e2010;
  --bdr:rgba(122,78,0,0.28);--bdr2:rgba(122,78,0,0.14);
  --hint:rgba(30,18,6,0.6);
  --tl-bg:rgba(236,228,214,0.99);
  --hdr-bg:rgba(236,228,214,0.97);
  --conn-bdr:rgba(122,78,0,0.12);
  --shadow:rgba(0,0,0,0.18);
}

@media(prefers-color-scheme:light){
  :root:not([data-theme="dark"]){
    --bg:#f0ebe0;--panel:#e8e0d0;--panel2:#ddd4c0;
    --ocean-start:#b8cce0;--ocean-end:#a8bcd4;
    --land:#8ca860;--land-s:#7a9850;
    --amber:#4a2c00;--amber-b:#5a3800;--amber-d:#f0d8a0;
    --amber-x:rgba(122,78,0,0.10);--amber-xx:rgba(122,78,0,0.06);
    --txt:#1a1206;--txt2:#1a1206;--txt3:#2e2010;
    --bdr:rgba(122,78,0,0.28);--bdr2:rgba(122,78,0,0.14);
    --hint:rgba(30,18,6,0.6);
    --tl-bg:rgba(236,228,214,0.99);
    --hdr-bg:rgba(236,228,214,0.97);
    --conn-bdr:rgba(122,78,0,0.12);
    --shadow:rgba(0,0,0,0.18);
  }
}

html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Crimson Pro',serif}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--hdr-bg);gap:12px}
.hdr-left{display:flex;align-items:baseline;gap:0;min-width:0}
.logo-t{font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:700;color:var(--amber-b);letter-spacing:3px;white-space:nowrap}
.logo-s{font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin-left:10px;white-space:nowrap}
.era-disp{text-align:center;font-family:'Cinzel',serif;flex-shrink:0}
.era-y{font-size:22px;font-weight:600;color:var(--amber-b);letter-spacing:1px}
.era-n{font-size:12px;letter-spacing:1.5px;color:var(--txt2);margin-top:1px;text-transform:uppercase;font-weight:600}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.cnt-disp{text-align:right;font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;color:var(--txt3)}
.cnt-n{font-size:22px;font-weight:600;color:var(--amber);display:block;line-height:1}
.theme-btn{background:none;border:1px solid var(--bdr);padding:4px 8px;cursor:pointer;font-size:13px;color:var(--txt2);border-radius:3px;transition:all .15s;flex-shrink:0}
.theme-btn:hover{background:var(--amber-x);color:var(--amber-b)}

/* ── MAIN LAYOUT ── */
.main{position:fixed;top:52px;left:0;right:0;bottom:0;display:flex}
.map-c{flex:1;position:relative;overflow:hidden;min-width:0;min-height:0}
.map-tl-col{display:flex;flex-direction:column;flex:1;min-width:0}
#wsvg{width:100%;height:100%}

/* ── DESKTOP PANEL ── */
.info-panel{width:320px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--bdr);overflow-y:auto;padding:18px 18px 28px;position:relative}
.info-close{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:16px;line-height:1;padding:4px;float:right;margin:-2px -2px 0 0}
.info-close:hover{color:var(--amber-b)}
.info-nm{font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:700;color:var(--amber-b);margin-bottom:3px;clear:both}
.info-sb{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1.5px;color:var(--txt2);text-transform:uppercase;margin-bottom:10px}
.info-dates{display:flex;gap:6px;margin-bottom:14px;align-items:center}
.info-dt{padding:5px 12px;border:1px solid var(--bdr);font-family:'Cinzel',serif;font-size:13.5px;color:var(--amber-b)}
.info-arr{color:var(--txt2);font-size:12px}

/* ── LENS DROPDOWN ── */
.lens-dd-wrap{border:1px solid var(--bdr);margin-bottom:14px}
.lens-dd-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;cursor:pointer;user-select:none;background:var(--amber-xx);border-bottom:1px solid transparent;transition:background .15s}
.lens-dd-hdr:hover{background:var(--amber-x)}
.lens-dd-hdr.open{border-bottom-color:var(--bdr)}
.lens-dd-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:2.5px;color:var(--txt2);text-transform:uppercase;flex-shrink:0}
.lens-dd-summary{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.5px;color:var(--amber-b);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;padding:0 6px}
.lens-dd-arrow{color:var(--txt2);font-size:10px;transition:transform .18s;flex-shrink:0}
.lens-dd-arrow.open{transform:rotate(180deg)}
.lens-dd-list{display:none;max-height:260px;overflow-y:auto}
.lens-dd-list.open{display:block}
.lens-row{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--bdr2);transition:background .15s}
.lens-row:last-child{border-bottom:none}
.lens-row:hover{background:var(--amber-x)}
.lens-row-chk{width:13px;height:13px;border:1px solid var(--bdr);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--amber-b);line-height:1}
.lens-row-chk.on{background:var(--amber-x);border-color:var(--amber-b)}
.lens-row-ico{font-size:14px;width:16px;text-align:center;flex-shrink:0;color:var(--txt2)}
.lens-row-lbl{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.5px;color:var(--txt2)}
.lens-row.on .lens-row-lbl{color:var(--amber-b);font-weight:600}
.lens-row-sep{border-bottom:1px solid var(--bdr);margin-bottom:2px}
.lens-dd-close-btn{text-align:center;padding:10px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;color:var(--amber-b);border-top:1px solid var(--bdr);cursor:pointer;text-transform:uppercase;transition:background .15s}
.lens-dd-close-btn:hover{background:var(--amber-x)}

/* ── DRAWER CONTENT ── */
.lens-section{margin-bottom:18px}
.lens-section-hdr{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.lens-section-ico{font-size:12px;color:var(--txt2)}
.lens-section-lbl{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;color:var(--amber-b);text-transform:uppercase;font-weight:600}
.info-div{border:none;border-top:1px solid var(--bdr);margin:12px 0}
.info-txt{font-size:17.5px;line-height:1.95;color:var(--txt);font-style:italic}
.overview-arc{font-size:17.5px;line-height:1.95;color:var(--txt)}
.overview-arc p{margin-bottom:14px}
.civ-span-bar{height:3px;background:var(--bdr2);position:relative;margin:14px 0 6px;border-radius:2px}
.civ-span-fill{position:absolute;top:0;height:100%;background:var(--amber-b);border-radius:2px;opacity:.8}
.civ-span-lbls{display:flex;justify-content:space-between;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--txt3)}
.conn-hdr{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1.5px;color:var(--txt3);text-transform:uppercase;margin:18px 0 8px;font-weight:600}
.conn-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--conn-bdr);font-size:16px;color:var(--txt2);cursor:pointer;transition:color .15s}
.conn-item:hover{color:var(--amber-b)}
.conn-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── TIMELINE ── */
.tl-wrap{position:relative;height:88px;background:var(--tl-bg);border-top:1px solid var(--bdr);padding:8px 20px 14px;flex-shrink:0}
.tl-lbls{display:flex;justify-content:space-between;margin-bottom:5px}
.tl-lbl{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.8px;color:var(--txt3);text-transform:uppercase;font-weight:600}
.tl-trk{position:relative;height:5px;background:var(--bdr);border-radius:3px}
.tl-fill{position:absolute;top:0;left:0;height:5px;background:var(--amber-b);border-radius:3px;pointer-events:none;opacity:.7}
.tl-thumb{position:absolute;top:50%;width:20px;height:20px;background:var(--amber-b);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--amber),0 0 20px rgba(232,152,32,.3);pointer-events:none;transition:left .04s linear}
input.tl-range{position:absolute;top:50%;left:0;width:100%;height:28px;opacity:0;cursor:pointer;transform:translateY(-50%);margin:0;z-index:2}
.hint{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;color:var(--hint);display:flex;align-items:center;justify-content:center;padding:0 8px;white-space:nowrap;overflow:hidden}
#map-hint-text{pointer-events:none;overflow:hidden;text-overflow:ellipsis}

/* ── MOB MAP BUTTON ── */
.mob-map-btn{display:none}

/* ── PORTRAIT MOBILE ── */
@media(max-width:768px) and (orientation:portrait){
  .logo-s{display:none}
  .cnt-disp{display:none}
  .hdr{padding:8px 12px}
  .logo-t{font-size:16px;letter-spacing:2px}
  .era-y{font-size:18px}
  .era-n{font-size:10px;letter-spacing:1.5px}
  .main{top:52px!important}
  .main{bottom:0;flex-direction:column}
  .map-tl-col{width:100%}
  .map-c{flex:0 0 42vh;width:100%}
  .info-panel{flex:1;width:100%;border-left:none;border-top:1px solid var(--bdr);overflow-y:auto;padding:0 16px 16px;border-radius:0}
  .tl-wrap{height:76px;padding:6px 14px 10px}
  .tl-lbl{font-size:9px;letter-spacing:.8px}
  .hint{font-size:8px;letter-spacing:.8px}
  .lens-dd-list{max-height:180px}
  .info-txt,.overview-arc{font-size:16px;line-height:1.82}
  .lens-row-lbl{font-size:13px}
}

/* ── LANDSCAPE MOBILE ── */
@media(max-width:900px) and (orientation:landscape){
  .logo-s{display:none}
  .hdr{padding:6px 14px}
  .logo-t{font-size:15px;letter-spacing:2px}
  .era-y{font-size:15px}
  .hint{font-size:7px;letter-spacing:.5px;white-space:normal;text-align:center;line-height:1.4}
  .tl-wrap{height:68px;padding:4px 12px 8px}
  .tl-lbl{font-size:8px}
  .info-panel{width:280px}
}

@keyframes ring-pulse{0%{r:5;opacity:.7}100%{r:26;opacity:0}}

@media(pointer:coarse){
  #mark-layer g[role="button"]{cursor:pointer}
}

/* ── ACCESSIBILITY ── */
:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px;border-radius:2px}
.conn-item:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px}
.lens-row:focus-visible{outline:2px solid var(--amber-b);outline-offset:-2px}
button:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px}
.skip-link{position:absolute;top:-40px;left:0;background:var(--amber-b);color:var(--bg);padding:8px 16px;z-index:9999;font-family:'Cinzel',serif;font-size:11px;text-decoration:none}
.skip-link:focus{top:0}

/* ── THREAD PANEL ── */
.thread-panel{
  position:fixed;top:52px;left:0;right:0;z-index:400;
  background:var(--panel);
  max-height:0;overflow:hidden;
  transition:max-height .32s cubic-bezier(.4,0,.2,1);
}
.thread-panel.open{border-bottom:1px solid var(--bdr);box-shadow:0 6px 24px var(--shadow)}
.thread-panel.open{max-height:70vh}
.thread-panel-inner{padding:16px 20px 20px;overflow-y:auto;max-height:calc(70vh - 1px)}
.thread-panel-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bdr)}
.thread-panel-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase}
.thread-close-btn{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:18px;line-height:1;padding:4px;transition:color .15s}
.thread-close-btn:hover{color:var(--amber-b)}
.thread-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.thread-concept-btn{width:100%;background:none;border:1px solid var(--bdr2);padding:9px 12px;text-align:left;cursor:pointer;border-radius:3px;transition:all .15s}
.thread-concept-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.thread-concept-name{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.8px;color:var(--txt2);display:block;margin-bottom:4px}
.thread-concept-chain{font-size:11px;color:var(--txt3);line-height:1.5}
.thread-back-btn{background:none;border:none;padding:0;cursor:pointer;font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--amber-b);text-transform:uppercase;transition:opacity .15s}
.thread-back-btn:hover{opacity:.7}
.thread-active-title{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--amber-b);margin:10px 0 14px}
.thread-steps-grid{display:flex;flex-direction:column;align-items:center;padding:4px 0 16px}
.thread-step{width:min(360px,90%);text-align:center;padding:10px 14px;border:1px solid var(--bdr2);border-radius:4px;font-size:12.5px;color:var(--txt2);background:var(--panel2)}
.thread-step-yr{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);margin-bottom:4px}
.thread-step-txt{line-height:1.6;color:var(--txt2)}
.thread-step-civ{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);margin-bottom:4px}
.thread-chain-link{display:flex;flex-direction:column;align-items:center;padding:2px 0;color:var(--amber-b);opacity:.6}
.thread-chain-line{width:1px;height:8px;background:var(--amber-b);opacity:.4}

/* ── COMPARE MODE ── */
.compare-wrap{display:flex;gap:0;height:100%;width:100%}
.compare-col{flex:1;min-width:0;overflow-y:auto;padding:16px;border-right:1px solid var(--bdr)}
.compare-col:last-child{border-right:none}
.compare-col-hdr{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--amber-b);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.compare-remove{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:14px;padding:2px}
.compare-remove:hover{color:var(--amber-b)}
.compare-prompt{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--txt3);font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:20px;opacity:.6}
.compare-diff{background:var(--amber-xx);border-left:2px solid var(--amber-b);padding:6px 8px;margin-bottom:2px}

/* ── SHARE TOAST ── */
.share-toast{position:fixed;bottom:108px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--panel);border:1px solid var(--bdr);padding:8px 18px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1.5px;color:var(--amber-b);text-transform:uppercase;border-radius:20px;opacity:0;transition:all .3s;pointer-events:none;z-index:500;white-space:nowrap}
.share-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── FINGERPRINT CHART ── */
.fp-wrap{margin:14px 0 6px}
.fp-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--txt3);text-transform:uppercase;margin-bottom:8px}
.fp-svg{display:block;margin:0 auto}
.fp-label{font-family:'Cinzel',serif;font-size:8px;fill:var(--txt3)}
.fp-poly{fill:rgba(200,168,232,.18);stroke:#c8a8e8;stroke-width:1.2}
.fp-grid{fill:none;stroke:var(--bdr);stroke-width:.5}

/* ── CONTEMPORARY BAR ── */
.contemp-wrap{margin:12px 0 4px}
.contemp-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;cursor:pointer;transition:opacity .15s}
.contemp-bar-row:hover{opacity:.75}
.contemp-bar-nm{font-family:'Cinzel',serif;font-size:8.5px;color:var(--txt3);width:80px;flex-shrink:0;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.contemp-bar-track{flex:1;height:5px;background:var(--bdr2);border-radius:2px;position:relative}
.contemp-bar-fill{position:absolute;top:0;height:100%;border-radius:2px;opacity:.7}
.contemp-bar-yr{font-family:'Cinzel',serif;font-size:7.5px;color:var(--txt3);white-space:nowrap;width:60px;text-align:right;flex-shrink:0}

/* ── DENSITY SPARKLINE ── */
#density-bar{height:18px;width:100%;display:block;margin-bottom:1px}

/* ── WHAT-IF MODE ── */
.whatif-civ-btn{width:100%;background:none;border:1px solid var(--bdr2);padding:7px 10px;text-align:left;cursor:pointer;font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:.5px;color:var(--txt2);margin-bottom:3px;border-radius:2px;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.whatif-civ-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.whatif-civ-btn.selected{background:rgba(200,168,232,.12);border-color:#c8a8e8;color:#c8a8e8}
.whatif-result{margin-top:12px;padding:12px;border:1px solid var(--bdr);border-radius:3px;background:var(--panel2)}

<script>
// ── LENSES ──
const LENSES=[
  {id:'overview',    ico:'◎', lbl:'Belief Arc',              col:'#9070c0'},
  {id:'theology',    ico:'✦', lbl:'Theology & Doctrine',     col:'#7060a8'},
  {id:'texts',       ico:'◈', lbl:'Sacred Texts',            col:'#8a6020'},
  {id:'ritual',      ico:'⊕', lbl:'Ritual & Practice',       col:'#c8881c'},
  {id:'mysticism',   ico:'∞', lbl:'Mysticism & Meditation',  col:'#5a7a8a'},
  {id:'art',         ico:'◉', lbl:'Art & Architecture',       col:'#4a8870'},
  {id:'music',       ico:'♪', lbl:'Sacred Music',             col:'#b05580'},
  {id:'ethics',      ico:'⚖', lbl:'Ethics & Morality',       col:'#5a9a60'},
  {id:'conversion',  ico:'⟳', lbl:'Mission & Conversion',    col:'#b06020'},
  {id:'persecution', ico:'†', lbl:'Persecution & Martyrdom',  col:'#a04040'},
  {id:'schisms',     ico:'↯', lbl:'Schisms & Reform',         col:'#c06090'},
  {id:'women',       ico:'♀', lbl:'Women & Gender',           col:'#9b6fd4'},
  {id:'sacred',      ico:'⊗', lbl:'Sacred Places',            col:'#4a7faa'},
  {id:'afterlife',   ico:'⚑', lbl:'Afterlife & Eschatology',  col:'#906040'},
  {id:'cosmology',   ico:'◇', lbl:'Cosmology & Creation',     col:'#3a9fc0'},
  {id:'philosophy',  ico:'Ψ', lbl:'Philosophy & Thought',     col:'#7890a8'},
  {id:'politics',    ico:'⊞', lbl:'Political Influence',      col:'#606060'},
  {id:'legacy',      ico:'★', lbl:'Legacy',                   col:'#8a7040'},
  {id:'figures',     ico:'≡', lbl:'Key Figures',              col:'#d4a820'},
  {id:'dialogue',    ico:'↑', lbl:'Interfaith Dialogue',      col:'#608050'},
];

const ERAS=[
  {y:-10000,n:'ANIMISM & SHAMANISM'},
  {y:-3000, n:'POLYTHEISTIC AGE'},
  {y:-1500, n:'VEDIC PERIOD'},
  {y:-800,  n:'AXIAL AGE'},
  {y:-500,  n:'CLASSICAL RELIGIONS'},
  {y:0,     n:'RISE OF CHRISTIANITY'},
  {y:500,   n:'MEDIEVAL FAITH'},
  {y:622,   n:'RISE OF ISLAM'},
  {y:1000,  n:'HIGH MEDIEVAL RELIGION'},
  {y:1500,  n:'REFORMATION ERA'},
  {y:1700,  n:'ENLIGHTENMENT'},
  {y:1850,  n:'MODERN SPIRITUALITY'},
  {y:1950,  n:'GLOBAL INTERFAITH ERA'},
];

const FP_LABELS=['Global Reach','Philosophical Depth','Ritual Complexity','Artistic Legacy','Political Influence','Textual Tradition'];
const FP_KEYS=['reach','phil','ritual','art','pol','text'];

const ITEMS=[
  {id:'animism',fp:{reach:8,phil:5,ritual:10,art:7,pol:3,text:2},lon:90.0,lat:55.0,nm:'Animism & Shamanism',sb:'Global \u00b7 Spirit World',s:-10000,e:2024,
   conns:['shinto','norse','celtic','vodou'],
   overview:'Animism is humanity\'s oldest spiritual framework, rooted in the perception that all things \u2014 animals, plants, rivers, mountains, storms \u2014 possess spiritual essence or souls. Shamans serve as intermediaries between the human community and the spirit world, entering altered states of consciousness through drumming, chanting, fasting, or entheogens to heal the sick, guide the dead, and maintain cosmic balance. Found on every inhabited continent, animist traditions are not a single religion but a vast family of localised practices united by the conviction that the natural world is alive, aware, and in constant dialogue with human beings. Archaeological evidence from Upper Palaeolithic cave art suggests shamanistic practices stretching back at least 40,000 years, making this the deepest taproot of all religious experience.',
   d:{
    overview:'Animism is humanity\'s oldest spiritual framework, rooted in the perception that all things possess spiritual essence or souls. Shamans serve as intermediaries between the human community and the spirit world, entering altered states through drumming, chanting, or entheogens to heal, guide the dead, and maintain cosmic balance. Found on every inhabited continent, animist traditions are united by the conviction that the natural world is alive, aware, and in constant dialogue with human beings.',
    theology:'Animism does not distinguish between sacred and secular \u2014 all reality is infused with spirit. Rather than a transcendent creator god, animist cosmologies typically feature a web of spirits inhabiting specific places, animals, and natural phenomena. Power is distributed and relational: spirits must be negotiated with, appeased, or honored through reciprocal exchange. This theology of radical immanence stands in stark contrast to the transcendent monotheisms that later emerged.',
    texts:'Animist traditions are overwhelmingly oral, transmitted through chanting, storytelling, song, and ritual performance rather than written scripture. This orality is not a deficiency but a theological choice: sacred knowledge is living, embodied, and contextual, not fixed in text. Some traditions, like the Norse Eddas or Siberian epic poetry, were eventually transcribed, but these written forms are understood as incomplete echoes of living oral performance.',
    ritual:'Ritual is the beating heart of animist practice \u2014 offerings to spirits, seasonal ceremonies marking solstices and harvests, rites of passage for birth, puberty, marriage, and death. The shamanic journey \u2014 an ecstatic trance in which the practitioner travels to spirit realms \u2014 is perhaps the oldest ritual form in human history. Drumming, dancing, sweat lodges, vision quests, and the use of sacred plants all serve to open channels between human and spirit worlds.',
    mysticism:'The shamanic trance is one of humanity\'s earliest mystical technologies. Through rhythmic drumming, sensory deprivation, fasting, or entheogenic plants, shamans enter non-ordinary states of consciousness to commune with spirits, retrieve lost souls, and gain prophetic knowledge. This direct experiential encounter with the numinous prefigures and arguably underlies all later mystical traditions, from Hindu yogic states to Christian contemplative prayer.',
    art:'Animist art is among the oldest on Earth \u2014 the cave paintings of Lascaux and Altamira, dating to 17,000 BCE, likely depict shamanic visions and hunting magic. Masks, totem poles, rock art, body painting, and ritual costumes serve not as decoration but as spiritual technology, embodying and invoking the spirits they represent. The animist aesthetic \u2014 organic forms, animal imagery, dreamlike transformation \u2014 has profoundly influenced modern art from Picasso to contemporary indigenous artists.',
    music:'Sacred drumming is virtually universal in animist traditions \u2014 the drum is often called the shaman\'s horse, carrying the practitioner to the spirit world. Chanting, overtone singing (as in Tuvan throat singing), rattles, bullroarers, and didgeridoos all serve as sonic bridges between worlds. Animist sacred music is typically participatory rather than performative, dissolving the boundary between musician and audience in collective rhythmic experience.',
    ethics:'Animist ethics center on reciprocity with the natural world \u2014 taking only what is needed, offering gratitude and sacrifice in return, and maintaining balance between human communities and the ecosystems they inhabit. Hunting rituals ask forgiveness of prey animals; agricultural ceremonies honor the spirits of the land. This ecological ethic, dismissed as primitive by colonial powers, is now recognized as sophisticated environmental philosophy.',
    conversion:'Animist traditions generally do not proselytize \u2014 they are tied to specific places, peoples, and ecosystems. Conversion typically occurs through colonial pressure, missionary activity, or syncretism rather than animist outreach. Many animist communities have absorbed elements of world religions while maintaining core shamanic practices, creating syncretic traditions like Afro-Caribbean Vodou or Korean shamanism blended with Buddhism and Christianity.',
    persecution:'Animist practitioners have faced systematic persecution from virtually every expanding world religion and colonial power. Christian missionaries destroyed sacred groves, banned drumming, and demonized shamans as agents of Satan. Colonial governments criminalized indigenous ceremonies \u2014 the U.S. banned the Sun Dance in 1883, Canada\'s potlatch ban lasted from 1885 to 1951. Soviet authorities persecuted Siberian shamans, and Islamic expansion suppressed animist practices across Africa and Central Asia.',
    schisms:'Animist traditions, being localised and non-institutional, do not experience schisms in the way organized religions do. However, tensions between traditionalists and those who syncretize with world religions create ongoing internal debates. The modern neo-shamanic movement \u2014 drawing selectively from multiple indigenous traditions \u2014 is controversial, with many indigenous practitioners viewing it as cultural appropriation that decontextualizes sacred practices.',
    women:'Women serve as shamans, healers, and spiritual leaders in many animist traditions \u2014 Korean mudang, Mongolian female shamans, and Amazonian curanderas hold positions of spiritual authority. Some scholars argue that the earliest shamanic practitioners were predominantly women. However, gender roles vary enormously across animist cultures, and some traditions reserve certain rituals exclusively for men or women.',
    sacred:'The entire natural world is potentially sacred in animist worldviews \u2014 specific mountains, rivers, groves, caves, and rock formations are recognized as places of concentrated spiritual power. Uluru in Australia, Mount Kailash in Tibet, sacred groves across West Africa, and vision quest sites across the Americas all represent places where the boundary between human and spirit worlds is understood to be especially thin.',
    afterlife:'Animist afterlife beliefs are extraordinarily diverse but commonly involve the soul journeying to an ancestral realm, being guided by the shaman, and maintaining ongoing relationships with the living through ancestor veneration. Many traditions believe in multiple souls \u2014 one that stays with the body, one that travels to the spirit world, and one that may reincarnate. The dead are not gone but transformed, requiring ongoing ritual attention.',
    cosmology:'Animist cosmologies typically feature multiple layered worlds \u2014 an upper world of celestial spirits, a middle world of everyday reality, and a lower world of ancestors and chthonic powers \u2014 connected by a world tree, cosmic mountain, or river. The shaman travels between these layers. Creation stories vary enormously but commonly involve a primordial unity that differentiates into the multiplicity of the natural world through the actions of culture heroes or trickster figures.',
    philosophy:'Animism represents a fundamentally relational ontology \u2014 the world is not composed of inert objects but of persons (human and non-human) in dynamic relationship. This perspective, long dismissed as primitive, is now taken seriously by philosophers like Graham Harvey and anthropologists like Eduardo Viveiros de Castro, who argue that animist ontologies offer genuine alternatives to the subject-object dualism of Western philosophy.',
    politics:'Animist societies typically organize political authority around spiritual power \u2014 chiefs, elders, or shamans derive legitimacy from their relationship with spirits rather than from hereditary right or military force. Colonial powers systematically undermined these political structures, replacing spirit-sanctioned leadership with appointed administrators. The modern indigenous rights movement seeks to restore political recognition to animist communities and their traditional governance systems.',
    legacy:'Animism\'s legacy pervades all subsequent religions \u2014 ancestor veneration, sacred places, ritual offerings, the concept of the soul, and the figure of the spiritual specialist all originate in animist practice. Modern environmentalism, ecopsychology, and the Gaia hypothesis echo animist understandings of nature as alive and interconnected. The growing interest in indigenous knowledge systems suggests that animism\'s deepest insights may be more relevant now than at any time since the agricultural revolution.',
    figures:'Specific historical shamans are rarely recorded due to the oral nature of these traditions, but figures like the Siberian shaman Dyrenkova documented by early ethnographers, the Korean mudang tradition\'s great practitioners, and the Amazonian ayahuasceros represent lineages of spiritual mastery stretching back millennia. Modern figures like Mircea Eliade, who popularized the academic study of shamanism, and Michael Harner, who founded core shamanism, have shaped Western understanding of these traditions.',
    dialogue:'Animist traditions have increasingly entered interfaith dialogue, particularly around environmental ethics and indigenous rights. The 2015 papal encyclical Laudato Si\' echoed animist concerns about humanity\'s relationship with nature. Indigenous spiritual leaders have addressed the United Nations and participated in global climate summits, bringing animist perspectives on ecological reciprocity to international attention. However, tensions remain between animist holism and the exclusivist claims of monotheistic traditions.',
   }},
  {id:'bahai',fp:{reach:5,phil:8,ritual:5,art:4,pol:3,text:7},lon:51.4,lat:35.7,nm:'Bah\u00e1\'\u00ed Faith',sb:'Persia \u00b7 Unity of Religion',s:1844,e:2024,
   conns:['islam','christianity','zoroastrianism'],
   overview:'The Bah\u00e1\'\u00ed Faith emerged in 19th-century Persia from the millenarian B\u00e1b\u00ed movement when Bah\u00e1\'u\'ll\u00e1h (1817\u20131892) declared himself the latest in a succession of divine messengers that includes Abraham, Moses, Buddha, Jesus, and Muhammad. Its central teachings \u2014 the oneness of God, the oneness of religion, and the oneness of humanity \u2014 represent perhaps the most systematic attempt in religious history to create a genuinely universal faith. With adherents in virtually every country and territory, the Bah\u00e1\'\u00ed Faith has achieved remarkable global reach despite persistent persecution in its Iranian homeland.',
   d:{
    overview:'The Bah\u00e1\'\u00ed Faith emerged in 19th-century Persia when Bah\u00e1\'u\'ll\u00e1h declared himself the latest in a succession of divine messengers including Abraham, Moses, Buddha, Jesus, and Muhammad. Its central teachings \u2014 the oneness of God, the oneness of religion, and the oneness of humanity \u2014 represent perhaps the most systematic attempt in religious history to create a genuinely universal faith. Despite persistent persecution in Iran, the faith has spread to virtually every country on Earth.',
    theology:'Bah\u00e1\'\u00ed theology centers on progressive revelation \u2014 the belief that God sends messengers (Manifestations of God) in every age to guide humanity, each building upon the teachings of predecessors. God is understood as an unknowable essence, accessible only through these Manifestations. This theology elegantly resolves inter-religious conflict by declaring all major religions to be successive chapters of a single unfolding divine plan, though this inclusivism is itself a theological claim that other traditions may reject.',
    texts:'The Bah\u00e1\'\u00ed Faith possesses an unusually large scriptural corpus \u2014 Bah\u00e1\'u\'ll\u00e1h alone authored over 100 volumes, including the Kit\u00e1b-i-Aqdas (Most Holy Book), the Kit\u00e1b-i-\u00cdq\u00e1n (Book of Certitude), and thousands of letters and tablets. His son \'Abdu\'l-Bah\u00e1 and great-grandson Shoghi Effendi provided authoritative interpretations. The existence of authenticated original manuscripts in the prophet\'s own hand makes the Bah\u00e1\'\u00ed scriptures among the most textually secure in religious history.',
    ritual:'Bah\u00e1\'\u00ed ritual life is relatively simple compared to older traditions \u2014 obligatory daily prayer (three options of varying length), annual fasting during the Nineteen Day Fast (March 2\u201320), and participation in Nineteen Day Feasts that combine worship, consultation, and socializing. The faith deliberately minimizes ritual elaboration, emphasizing instead the transformation of daily life into an act of worship through service to humanity.',
    mysticism:'Bah\u00e1\'u\'ll\u00e1h\'s early writings, particularly the Seven Valleys and the Four Valleys, draw deeply on Sufi mystical tradition, describing the soul\'s journey through stages of search, love, knowledge, unity, contentment, wonderment, and true poverty. However, the Bah\u00e1\'\u00ed Faith channels mystical impulse toward social engagement rather than monastic withdrawal. Meditation is encouraged but not systematized; the mystical experience is understood as a catalyst for service rather than an end in itself.',
    art:'Bah\u00e1\'\u00ed architecture is the faith\'s most visible artistic achievement \u2014 the nine-sided Houses of Worship (Mashriqu\'l-Adhk\u00e1r) on each continent feature stunning designs that synthesize architectural traditions from multiple cultures. The Lotus Temple in New Delhi (1986) is one of the most visited buildings in the world. Bah\u00e1\'\u00ed arts emphasize unity in diversity, drawing from multiple cultural traditions while creating a distinctive aesthetic of luminous simplicity.',
    music:'The Bah\u00e1\'\u00ed Faith has no liturgical music tradition comparable to Christian hymnody or Islamic chanting \u2014 worship services typically feature prayers read or chanted simply. However, Bah\u00e1\'\u00ed communities worldwide have developed diverse musical traditions reflecting their cultural contexts, from Persian devotional songs to African-inspired worship music. The faith\'s emphasis on arts as worship has produced notable musicians, though no distinctively Bah\u00e1\'\u00ed musical form has emerged.',
    ethics:'Bah\u00e1\'\u00ed ethics emphasize the elimination of all forms of prejudice (racial, religious, national, gender), the harmony of science and religion, universal education, the elimination of extremes of wealth and poverty, and the equality of women and men. These principles, articulated in the 19th century, anticipated many 20th-century social movements. The Bah\u00e1\'\u00ed ethical system is distinctive in treating social justice not as a political programme but as a spiritual obligation.',
    conversion:'The Bah\u00e1\'\u00ed Faith encourages sharing its message (teaching) but prohibits proselytization through pressure or inducement. Growth has come through personal contact, travel teaching, and systematic community-building plans. The faith experienced rapid expansion in parts of Africa, India, and the Pacific Islands in the mid-20th century. The emphasis on independent investigation of truth means potential converts are expected to study and choose freely rather than accept on authority.',
    persecution:'Bah\u00e1\'\u00eds have faced severe persecution since the faith\'s inception \u2014 the B\u00e1b was executed in 1850, Bah\u00e1\'u\'ll\u00e1h was exiled and imprisoned for 40 years, and over 20,000 Bah\u00e1\'\u00eds were killed in 19th-century Iran. Since the 1979 Islamic Revolution, Iranian Bah\u00e1\'\u00eds have been systematically persecuted: over 200 executed, thousands imprisoned, and all barred from university education. The faith is banned in several countries and faces restrictions in many others.',
    schisms:'The Bah\u00e1\'\u00ed Faith has experienced remarkably few schisms relative to its age, largely due to Bah\u00e1\'u\'ll\u00e1h\'s explicit succession plan \u2014 a written covenant designating \'Abdu\'l-Bah\u00e1 as successor, who designated Shoghi Effendi, who guided the establishment of the Universal House of Justice. Small breakaway groups exist but have attracted negligible followings. This institutional stability is one of the faith\'s most distinctive features.',
    women:'The Bah\u00e1\'\u00ed Faith was among the first religions to explicitly affirm the equality of women and men as a core principle. T\u00e1hirih, a female leader of the B\u00e1b\u00ed movement, dramatically unveiled herself in 1848 as a symbol of women\'s liberation. Women serve on all Bah\u00e1\'\u00ed institutions except the Universal House of Justice \u2014 a restriction Bah\u00e1\'\u00eds explain will be understood in time but which critics identify as a significant contradiction of equality principles.',
    sacred:'The Bah\u00e1\'\u00ed World Centre in Haifa, Israel \u2014 including the Shrine of the B\u00e1b with its golden dome on Mount Carmel and the surrounding terraced gardens \u2014 is the faith\'s holiest site and a UNESCO World Heritage Site. The Shrine of Bah\u00e1\'u\'ll\u00e1h near Acre is the qiblih (point of adoration) toward which Bah\u00e1\'\u00eds face in prayer. The House of the B\u00e1b in Shiraz, destroyed by Iranian authorities in 1979, remains a revered site.',
    afterlife:'The Bah\u00e1\'\u00ed understanding of afterlife rejects physical resurrection and bodily heaven or hell in favor of the soul\'s continued spiritual development through infinite worlds of God. Heaven and hell are understood as states of nearness to or distance from God rather than physical locations. Prayer for the dead is encouraged, suggesting the living can aid the spiritual progress of the departed \u2014 a belief with parallels in Catholic and Buddhist traditions.',
    cosmology:'Bah\u00e1\'\u00ed cosmology affirms the essential harmony of science and religion \u2014 the universe is understood as a purposeful creation reflecting divine attributes, but its physical mechanisms are the proper domain of science. The faith rejects young-earth creationism and embraces evolution, though it maintains that human spiritual nature is not reducible to material processes. The cosmos is understood as eternal \u2014 creation had no beginning and will have no end.',
    philosophy:'Bah\u00e1\'\u00ed philosophy synthesizes elements of Islamic Neoplatonism, Enlightenment rationalism, and progressive social thought. The concept of progressive revelation \u2014 that truth is relative to humanity\'s evolving capacity \u2014 anticipates aspects of pragmatist and process philosophy. \'Abdu\'l-Bah\u00e1\'s philosophical writings address epistemology, the mind-body problem, and the relationship between individual and society with considerable sophistication.',
    politics:'The Bah\u00e1\'\u00ed Faith advocates for a world federal system with an international legislature, executive, and tribunal, anticipating and going beyond the United Nations structure. Bah\u00e1\'\u00eds are prohibited from partisan political involvement but encouraged to participate in non-partisan governance. The faith\'s administrative order \u2014 with elected councils at local, national, and international levels \u2014 functions as a model of consultative governance distinct from both democratic majoritarianism and autocratic rule.',
    legacy:'The Bah\u00e1\'\u00ed Faith has influenced international discourse on human rights, gender equality, racial justice, and global governance disproportionate to its relatively small membership (approximately 5\u20138 million worldwide). Its emphasis on the unity of humanity, the harmony of science and religion, and the elimination of prejudice anticipated major currents in 20th and 21st-century thought. The faith\'s organizational model of elected consultative bodies without clergy offers a distinctive contribution to religious governance.',
    figures:'The B\u00e1b (1819\u20131850) founded the B\u00e1b\u00ed movement and prophesied "He Whom God Shall Make Manifest." Bah\u00e1\'u\'ll\u00e1h (1817\u20131892) claimed that station and authored the faith\'s scriptures. \'Abdu\'l-Bah\u00e1 (1844\u20131921) led the faith and traveled to Europe and America. Shoghi Effendi (1897\u20131957) guided global expansion. T\u00e1hirih (c.1814\u20131852), the poet and women\'s rights advocate, remains one of the faith\'s most compelling figures.',
    dialogue:'The Bah\u00e1\'\u00ed Faith is inherently interfaith in orientation \u2014 its theology of progressive revelation affirms the divine origin of all major religions. Bah\u00e1\'\u00eds actively participate in interfaith organizations worldwide and the faith has consultative status with the United Nations. However, the Bah\u00e1\'\u00ed claim to supersede all previous dispensations can create tension in dialogue with traditions that reject the premise of progressive revelation.',
   }},
  {id:'manichaeism',fp:{reach:7,phil:8,ritual:7,art:6,pol:5,text:6},lon:44.4,lat:33.3,nm:'Manichaeism',sb:'Mesopotamia \u00b7 Light vs Dark',s:240,e:1400,
   conns:['zoroastrianism','christianity','buddhism'],
   overview:'Manichaeism, founded by the prophet Mani (216\u2013274 CE) in Sasanian Mesopotamia, was one of the most successful missionary religions in history, spreading from Roman North Africa to Tang Dynasty China within three centuries. Mani conceived his faith as the ultimate synthesis of Zoroastrianism, Christianity, and Buddhism \u2014 a universal religion that would supersede all others. Its elaborate cosmology of Light trapped in Darkness, its strict ascetic hierarchy of Elect and Hearers, and its stunningly beautiful illuminated manuscripts made it a formidable competitor to Christianity, Islam, and Buddhism for over a millennium before sustained persecution drove it to extinction.',
   d:{
    overview:'Manichaeism, founded by the prophet Mani in Sasanian Mesopotamia, was one of history\'s most successful missionary religions, spreading from Roman North Africa to Tang Dynasty China within three centuries. Mani conceived his faith as the ultimate synthesis of Zoroastrianism, Christianity, and Buddhism. Its elaborate cosmology of Light trapped in Darkness and its strict ascetic hierarchy made it a formidable competitor to Christianity, Islam, and Buddhism for over a millennium.',
    theology:'Manichaean theology is radically dualist \u2014 two co-eternal principles, Light (spirit, goodness) and Darkness (matter, evil), are locked in cosmic struggle. The material world exists because particles of Light became trapped in Darkness during a primordial battle. Salvation consists in liberating these Light particles through ascetic practice and gnosis. This absolute dualism provided an intellectually compelling answer to the problem of evil that monotheistic theodicies have never fully resolved.',
    texts:'Mani was unique among religious founders in personally creating a written canon \u2014 seven major works including the Shabuhragan (dedicated to the Sasanian emperor), the Living Gospel, and the Treasure of Life. He also created the Picture Book (Ardahang), an illustrated text designed to convey his teaching visually. Most Manichaean texts were destroyed by persecutors, but stunning discoveries at Turfan (China) and Medinet Madi (Egypt) in the 20th century recovered significant fragments.',
    ritual:'Manichaean worship centered on daily prayers facing the sun and moon (vessels of Light), confession of sins, hymn singing, and communal meals where the Elect consumed vegetarian food believed to release trapped Light particles through their purified digestion. The Bema festival commemorated Mani\'s death with an empty chair symbolizing his spiritual presence. Ritual fasting, celibacy for the Elect, and avoidance of harming any living thing structured daily religious life.',
    mysticism:'Manichaean mysticism centered on the direct experience of the Light within \u2014 the divine spark trapped in the material body. Through meditation, hymn singing, and ascetic purification, practitioners sought to awaken and liberate their inner Light. The Manichaean Psalm-Book contains ecstatic mystical poetry describing the soul\'s longing for reunion with the Light. This interior mysticism influenced both Sufi and Christian contemplative traditions.',
    art:'Manichaean art was celebrated throughout the ancient world for its extraordinary beauty. Mani himself was renowned as a painter, and the Manichaean illuminated manuscript tradition produced some of the finest religious art of late antiquity. Fragments recovered from Turfan show exquisite miniatures with Persian, Buddhist, and Chinese artistic elements synthesized into a distinctive Manichaean style. The religion\'s emphasis on beauty as a manifestation of Light made art a theological imperative.',
    music:'Manichaean hymn singing was central to worship and conversion \u2014 the beauty of Manichaean choral music was acknowledged even by hostile Church Fathers. The Manichaean Psalm-Book, preserved in Coptic, contains over 300 hymns of remarkable literary and musical sophistication. Hymns were sung in daily liturgies, at the Bema festival, and during communal meals. The musical tradition drew on Persian, Syriac, and eventually Central Asian musical forms as the religion spread eastward.',
    ethics:'Manichaean ethics divided adherents into two classes: the Elect (who practiced strict vegetarianism, celibacy, poverty, and non-violence) and the Hearers (who supported the Elect materially while following a less rigorous moral code). This two-tier ethical system allowed the religion to maintain high ascetic ideals while accommodating ordinary life. The prohibition against harming any living thing \u2014 including plants \u2014 was more radical than any other ancient ethic except Jainism.',
    conversion:'Manichaeism was aggressively missionary \u2014 Mani himself sent disciples in all directions and adapted his message to local religious cultures. In the Roman world, Mani presented himself as the Apostle of Jesus Christ; in Iran, as the successor to Zarathustra; in Central Asia, as a Buddha. This systematic inculturation made Manichaeism the most successful missionary religion of late antiquity, reaching from Britain to China.',
    persecution:'Manichaeism was persecuted by virtually every political and religious authority it encountered. The Sasanian Empire executed Mani in 274 CE. The Roman Empire banned it repeatedly from 297 CE onward. The Christian Church produced voluminous anti-Manichaean literature \u2014 Augustine\'s entire theology of grace was shaped by his rejection of his former Manichaean faith. Islamic, Buddhist, and Chinese authorities all persecuted Manichaeans, ultimately driving the religion to extinction.',
    schisms:'After Mani\'s death, the religion split into eastern and western branches with somewhat different practices and emphases. The eastern branch, centered in Central Asia and China, incorporated more Buddhist elements, while the western branch, in the Roman world and North Africa, engaged more with Christianity. Internal disputes over leadership and doctrine weakened the faith\'s ability to resist external persecution.',
    women:'Manichaean evidence suggests women served as Elect members alongside men, practicing the same ascetic disciplines. Female Manichaean scribes and teachers are attested in Central Asian documents. However, the religion\'s strict dualism \u2014 associating matter and procreation with Darkness \u2014 created an ambivalent attitude toward femininity. The Elect\'s celibacy requirement meant that women who joined the inner circle permanently renounced motherhood.',
    sacred:'Mani\'s death site in Gundeshapur (Iran) was a pilgrimage center until destroyed by persecutors. Manichaean monasteries in Central Asia, particularly at Turfan and Dunhuang on the Silk Road, served as major religious centers for centuries. The religion\'s theology held that the entire material world was a prison for Light rather than a sacred space, creating an unusual relationship with place \u2014 no site was inherently holy, but places of worship facilitated Light\'s liberation.',
    afterlife:'Manichaean eschatology described the gradual liberation of all Light particles from material entrapment, culminating in a final cosmic separation where Light returns to the Realm of Light and Darkness is sealed forever in a cosmic prison (the b\u014dlos). Individual souls were understood to be recycled through reincarnation until sufficiently purified \u2014 the Elect might achieve liberation at death, while Hearers faced further incarnations.',
    cosmology:'Manichaean cosmology was elaborately mythological \u2014 a primordial attack by Darkness on the Realm of Light led to the entrapment of Light particles in matter. The physical world was created as a mechanism for liberating this trapped Light through the sun and moon (conceived as vessels collecting purified Light). This cosmology, though rejected by science, provided a comprehensive framework explaining the existence of evil, suffering, and the meaning of human life.',
    philosophy:'Mani addressed the problem of evil more directly than any other religious founder \u2014 evil is not the absence of good or a divine punishment but an independent cosmic principle. This radical dualism influenced Western philosophy through Augustine (who struggled to refute his former Manichaean beliefs), medieval Catharism, and the ongoing philosophical debate about whether evil is substantive or privative. Leibniz\'s theodicy is partly a response to the Manichaean challenge.',
    politics:'Manichaeism\'s relationship with political power was complex \u2014 Mani initially enjoyed Sasanian royal patronage before being executed. The Uyghur Khaganate (762\u2013840 CE) adopted Manichaeism as its state religion \u2014 the only major state to do so \u2014 demonstrating that the religion could function as an imperial faith. Generally, however, Manichaeans were politically marginal and persecuted, surviving through networks of hidden communities rather than state support.',
    legacy:'Manichaeism\'s legacy is paradoxically enormous despite its extinction. Augustine\'s rejection of Manichaeism shaped Christian theology for a millennium. The medieval Cathars and Bogomils may have been influenced by surviving Manichaean ideas. The term "Manichaean" survives in everyday language to describe black-and-white moral thinking. Mani\'s vision of a universal religion synthesizing all traditions anticipated modern interfaith aspirations by 1,700 years.',
    figures:'Mani (216\u2013274 CE) was the prophet-founder \u2014 painter, physician, and visionary who claimed to complete the revelations of Zoroaster, Buddha, and Jesus. Mar Ammo carried the faith eastward to Central Asia. Augustine of Hippo (354\u2013430 CE) was a Manichaean Hearer for nine years before converting to Christianity. The Uyghur khagan B\u00f6g\u00fc (r. 759\u2013780) made Manichaeism the state religion of his empire.',
    dialogue:'Manichaeism was itself an interfaith project \u2014 Mani explicitly sought to synthesize Zoroastrianism, Christianity, and Buddhism into a universal faith. This grand synthetic vision, while rejected by each tradition it sought to incorporate, anticipated modern comparative theology by recognizing structural similarities across religious boundaries. The Manichaean approach of finding common truth across traditions, rather than defending exclusivist claims, remains relevant to contemporary interfaith methodology.',
   }},
  {id:'tengri',fp:{reach:5,phil:5,ritual:7,art:5,pol:7,text:2},lon:90.0,lat:47.0,nm:'Tengrism',sb:'Central Asia \u00b7 Eternal Blue Sky',s:-1000,e:2024,
   conns:['animism','buddhism','islam'],
   overview:'Tengrism \u2014 the veneration of the Eternal Blue Sky (Tengri) \u2014 was the dominant spiritual system of the Turkic and Mongol peoples of the Central Asian steppe for over two millennia. More than a personal religion, Tengrism was the ideological foundation of the greatest contiguous land empire in history: Genghis Khan derived his mandate to conquer from Tengri, and the Mongol Empire\'s remarkable religious tolerance was rooted in Tengrist pluralism. Though largely supplanted by Islam and Buddhism among Central Asian peoples, Tengrism is experiencing a modern revival in Mongolia, Kazakhstan, Kyrgyzstan, and among Turkic diaspora communities as a marker of pre-Islamic cultural identity.',
   d:{
    overview:'Tengrism \u2014 the veneration of the Eternal Blue Sky (Tengri) \u2014 was the dominant spiritual system of the Turkic and Mongol peoples of the Central Asian steppe for over two millennia. More than a personal religion, it was the ideological foundation of the Mongol Empire. Though largely supplanted by Islam and Buddhism, Tengrism is experiencing a modern revival across Central Asia as a marker of pre-Islamic cultural identity.',
    theology:'Tengri \u2014 the Eternal Blue Sky \u2014 is the supreme deity of Tengrist theology, understood not as a personal god but as the overarching cosmic order itself. Below Tengri exists a complex pantheon including Eje (Mother Earth), Erlik (lord of the underworld), and numerous nature spirits. Tengrist theology is neither monotheist nor polytheist but hierarchically structured: Tengri encompasses all, while lesser spirits govern specific domains. The sky\'s vastness mirrors the divine \u2014 limitless, omnipresent, and beyond human comprehension.',
    texts:'Tengrism possesses no scriptural canon \u2014 its traditions were transmitted orally through epic poetry, genealogical recitations, and ritual practice. The Orkhon inscriptions (8th century CE) contain the earliest written references to Tengri, declaring that the Turkic khagan rules "by the grace of Tengri." The Secret History of the Mongols (1228) preserves Tengrist cosmological and ritual elements. Modern Tengrist revivalists draw on these historical sources and ethnographic recordings of surviving practices.',
    ritual:'Tengrist ritual centers on offerings to Tengri and nature spirits \u2014 libations of mare\'s milk (kumis), burning of juniper incense, and the tying of prayer ribbons to sacred trees and ovoo (stone cairns marking spiritually significant places). The shamanic ritual of the b\u00f6\u00f6 (shaman) involves drumming, chanting, and trance journeys to communicate with spirits. Seasonal festivals mark the solstices and the cycles of pastoral nomadic life.',
    mysticism:'Tengrist mysticism centers on the shaman\'s ecstatic journey between the three cosmic levels \u2014 sky, earth, and underworld. Through drumming, chanting, and sometimes the use of entheogens, the shaman enters trance states to communicate with Tengri, negotiate with spirits, and retrieve lost souls. The vast emptiness of the steppe itself induces contemplative states \u2014 the nomad\'s daily experience of infinite sky and horizon cultivates a natural mysticism of immensity.',
    art:'Tengrist artistic expression is closely tied to nomadic material culture \u2014 elaborate felt appliqu\u00e9, animal-style metalwork, carved wooden idols (ongon), and decorated horse equipment. The Scythian and Xiongnu animal style \u2014 dynamic depictions of horses, deer, eagles, and predatory animals in gold and bronze \u2014 reflects Tengrist spiritual connections with the animal world. Modern Tengrist revival has inspired contemporary Central Asian artists exploring pre-Islamic visual traditions.',
    music:'The Central Asian musical traditions associated with Tengrism include Mongolian khoomii (throat singing), which produces multiple simultaneous pitches mimicking natural sounds, and the morin khuur (horse-head fiddle), whose music is believed to carry prayers to Tengri. Epic recitation \u2014 the performance of vast oral poems like the Manas of the Kyrgyz \u2014 served both entertainment and spiritual functions, connecting communities to ancestral wisdom.',
    ethics:'Tengrist ethics emphasize harmony with nature, loyalty to family and clan, hospitality to travelers, and courage in battle. The Yasa \u2014 the legal code attributed to Genghis Khan \u2014 encoded Tengrist ethical principles into imperial law: religious tolerance, meritocratic advancement, protection of diplomats, and severe punishment for theft, lying, and adultery. Tengrist ethics are fundamentally communal rather than individual, oriented toward the survival and prosperity of the group.',
    conversion:'Tengrism has historically not been a missionary religion \u2014 it is tied to the steppe environment and nomadic lifestyle. The conversion of Tengrist peoples to Islam and Buddhism occurred over centuries through trade contact, intermarriage, Sufi missionary activity, and political alliance. Modern Tengrist revivalism represents a reverse conversion \u2014 a return to pre-Islamic identity \u2014 driven by post-Soviet nationalism and the search for authentic cultural roots.',
    persecution:'Tengrism was suppressed by multiple forces \u2014 Islamic expansion gradually converted Turkic peoples from the 10th century onward, often through political pressure and Sufi missionary activity. Buddhist institutions displaced Tengrist shamanism in Mongolia. Soviet atheist policies delivered the most devastating blow, executing shamans, destroying sacred sites, and criminalizing traditional practices across Central Asia. The post-Soviet revival is partly a recovery from this systematic destruction.',
    schisms:'Tengrism, as a decentralized and orally transmitted tradition, does not experience formal schisms. However, significant regional variations exist between Turkic and Mongol forms, and the modern revival has produced competing interpretations. Some revivalists seek to reconstruct ancient practices faithfully; others create modernized, nationalistic versions; still others syncretize Tengrism with Buddhism or Islam. The absence of scriptural authority means no one can definitively adjudicate these differences.',
    women:'Women held significant spiritual roles in Tengrist societies \u2014 female shamans (udagan) were often considered more powerful than male shamans among the Mongols. Mongol royal women like T\u00f6regene Khatun and Sorghaghtani Beki wielded enormous political and religious influence. However, Tengrist societies were also patriarchal in structure, with inheritance, leadership, and military authority primarily male.',
    sacred:'The entire sky is sacred in Tengrism \u2014 Tengri is the sky. Specific sacred sites include Burkhan Khaldun (the mountain where Genghis Khan communed with Tengri), ovoo cairns marking spiritually potent locations, and sacred springs and rivers. The Orkhon Valley in Mongolia, site of the ancient Turkic and Mongol capitals, holds deep spiritual significance. Trees, particularly the World Tree connecting the three cosmic levels, are objects of veneration across Tengrist cultures.',
    afterlife:'Tengrist afterlife beliefs involve the soul\'s journey to the sky realm of Tengri or the underworld ruled by Erlik Khan. The dead were traditionally buried with horses, weapons, and provisions for the journey. Elite burials \u2014 including the frozen tombs of Pazyryk \u2014 reveal elaborate preparation for afterlife existence. The shaman guides the dead to their destination, ensuring safe passage between worlds.',
    cosmology:'Tengrist cosmology divides the universe into three realms: the upper world of Tengri and celestial spirits, the middle world of humans and nature spirits, and the lower world of Erlik Khan and the dead. These realms are connected by a World Tree or cosmic mountain. The cosmos operates through a balance of complementary forces \u2014 sky and earth, male and female, light and dark \u2014 rather than the absolute dualism of good versus evil found in Zoroastrianism or Manichaeism.',
    philosophy:'Tengrist philosophy is ecological and relational \u2014 humans are not masters of nature but participants in a cosmic community of beings, all under the vast canopy of Tengri. This philosophical worldview privileges harmony, balance, and reciprocity over domination and exploitation. Modern Tengrist thinkers argue that steppe philosophy offers an alternative to both Western individualism and Eastern collectivism \u2014 a nomadic third way rooted in mobility, adaptability, and respect for the natural world.',
    politics:'Tengrism provided the ideological foundation for the greatest empires of the medieval world. The concept of Tengri\'s mandate \u2014 that the khagan rules by divine appointment of the Eternal Sky \u2014 legitimized Turkic and Mongol imperial authority. Genghis Khan\'s universal mandate from Tengri justified world conquest. The Mongol Empire\'s remarkable religious tolerance derived from Tengrist pluralism: if Tengri encompasses all, no single religion can claim exclusive truth.',
    legacy:'Tengrism\'s political legacy \u2014 the concept of heaven-mandated universal rule \u2014 influenced Chinese, Islamic, and Russian imperial ideology. The Mongol Empire\'s religious tolerance anticipated modern secularism by centuries. The modern Tengrist revival in Turkey, Kazakhstan, Mongolia, and Kyrgyzstan connects ancient spiritual traditions with contemporary identity politics, environmentalism, and post-colonial cultural recovery.',
    figures:'Genghis Khan (c.1162\u20131227) derived his mandate from Tengri and established religious tolerance as imperial policy. Teb Tengeri, his chief shaman, wielded enormous political-spiritual influence before his execution. Bilge Khagan (8th century) left the Orkhon inscriptions invoking Tengri. Modern figures include the Mongolian shaman Byambadorj, who has helped revive traditional practices, and Kazakh intellectuals promoting Tengrism as cultural heritage.',
    dialogue:'Tengrism\'s inherent pluralism makes it naturally open to interfaith engagement \u2014 if Tengri encompasses all spiritual truths, other religions are not wrong but partial. Modern Tengrist revivalists participate in indigenous peoples\' forums and environmental movements, finding common ground with animist traditions worldwide. However, tensions exist with Islam and Buddhism, which historically displaced Tengrism, and with scholars who question whether modern Tengrism faithfully represents ancient practice.',
   }},
  {id:'vodou',fp:{reach:5,phil:6,ritual:10,art:8,pol:4,text:3},lon:2.6,lat:6.5,nm:'Vodou & Yoruba',sb:'West Africa \u00b7 The Orishas',s:-1000,e:2024,
   conns:['animism','christianity','islam'],
   overview:'The Yoruba religious tradition of West Africa \u2014 centered on the veneration of orishas (divine spirits embodying natural and cosmic forces) \u2014 is one of the most influential spiritual systems in human history, not because of its original geographic reach but because the Atlantic slave trade carried it to the Americas, where it gave birth to Haitian Vodou, Cuban Santer\u00eda, Brazilian Candombl\u00e9, and Trinidad\'s Shango. These diasporic traditions represent one of the most remarkable acts of cultural survival in recorded history: enslaved Africans, stripped of everything, reconstituted their spiritual world under conditions of unspeakable brutality, creating vibrant living religions that now claim over 100 million adherents worldwide.',
   d:{
    overview:'The Yoruba religious tradition \u2014 centered on the veneration of orishas, divine spirits embodying natural and cosmic forces \u2014 is one of the most influential spiritual systems in human history. The Atlantic slave trade carried it to the Americas, where it gave birth to Haitian Vodou, Cuban Santer\u00eda, Brazilian Candombl\u00e9, and other diasporic traditions representing one of the most remarkable acts of cultural survival in recorded history.',
    theology:'Yoruba theology posits a supreme creator deity, Olodumare (or Olorun), who is remote and inaccessible, delegating governance of the world to the orishas \u2014 divine beings associated with natural forces, human activities, and cosmic principles. Obatala shapes human bodies, Ogun governs iron and war, Yemoja rules the seas, Shango commands thunder. This theology is neither monotheist nor polytheist but something distinct: a single source generating a multiplicity of divine powers, each accessible through specific rituals.',
    texts:'The Yoruba sacred corpus is primarily oral \u2014 the Odu If\u00e1 comprises 256 chapters of verse, proverb, myth, and prescription memorized and interpreted by babalawo (divination priests) through the If\u00e1 divination system. This corpus, described by UNESCO as a Masterpiece of the Oral and Intangible Heritage of Humanity (2005), constitutes one of the largest bodies of oral literature in the world. Each odu contains hundreds of verses (ese) addressing virtually every human situation.',
    ritual:'Yoruba and Vodou ritual is extraordinarily elaborate \u2014 animal sacrifice, spirit possession, divination, drumming, dancing, herbal healing, and the preparation of sacred objects. Spirit possession is the central ritual event: the orisha or lwa "mounts" the devotee, temporarily displacing ordinary consciousness. This is not understood as pathology but as divine communion \u2014 the most intimate possible contact between human and divine. Initiation rituals can last days or weeks.',
    mysticism:'Mystical experience in Yoruba-derived traditions occurs primarily through spirit possession \u2014 the direct embodiment of divine power in the human person. Unlike contemplative mysticism, this is ecstatic, physical, and communal rather than quiet, mental, and solitary. The possessed devotee dances, speaks, heals, and prophesies with the orisha\'s power. If\u00e1 divination also provides mystical access to divine knowledge, with the babalawo interpreting the cosmic patterns encoded in the odu.',
    art:'Yoruba art is among the most celebrated in the world \u2014 the bronze and terracotta sculptures of Ife (12th\u201314th centuries) astonished European scholars with their naturalistic sophistication. Ritual objects \u2014 carved figures, beaded crowns, iron staffs, elaborately decorated drums \u2014 are not merely decorative but spiritually charged repositories of \u00e0\u1e63\u1eb9 (divine power). Diasporic traditions have created distinctive visual cultures: Vodou drapo (sequined flags), Candombl\u00e9 altars, and Santer\u00eda bead and color symbolism.',
    music:'Sacred drumming is central to Yoruba-derived worship \u2014 the bat\u00e1 drums of the Yoruba, the rada and petro drums of Vodou, and the atabaques of Candombl\u00e9 are instruments of divine communication, their rhythms calling specific orishas or lwa to possess devotees. Each deity has signature rhythms and songs. This sacred percussion tradition profoundly influenced secular music: jazz, blues, salsa, samba, and hip-hop all carry rhythmic DNA traceable to Yoruba religious drumming.',
    ethics:'Yoruba ethics center on the concept of iwa pele (gentle character) \u2014 the cultivation of patience, generosity, honesty, and respect for elders and community. If\u00e1 divination provides ethical guidance for specific situations. The concept of or\u00ed (personal destiny or inner head) holds individuals responsible for fulfilling their chosen life path. Evil is understood not as cosmic dualism but as the result of character failure, spiritual imbalance, or neglect of ritual obligations.',
    conversion:'Yoruba religion does not proselytize in the missionary sense but has spread through initiation \u2014 individuals are called by specific orishas and undergo intensive ritual training. The diasporic traditions grew through the forced migration of the slave trade and subsequent cultural resilience rather than evangelism. In recent decades, African-Americans, Latinos, and others have sought initiation into Santer\u00eda, Candombl\u00e9, and If\u00e1 as a form of spiritual and cultural reconnection.',
    persecution:'Yoruba-derived traditions have faced persistent persecution \u2014 colonial authorities banned traditional practices in West Africa, while slave owners in the Americas prohibited African religious expression. Practitioners disguised their worship by syncretizing orishas with Catholic saints, creating the characteristic double identity of traditions like Santer\u00eda. Haitian Vodou has been demonized by Western media and condemned by Christian missionaries, while practitioners in many countries still face legal discrimination and social stigma.',
    schisms:'The dispersal of Yoruba religion through the slave trade created distinct regional traditions \u2014 Haitian Vodou, Cuban Santer\u00eda/Lucum\u00ed, Brazilian Candombl\u00e9, Trinidadian Shango \u2014 each incorporating different local elements while maintaining core Yoruba theological structures. Debates between these branches about authenticity, the role of Catholic syncretism, and the authority of African versus diasporic practice constitute ongoing creative tensions rather than formal schisms.',
    women:'Women hold powerful positions across Yoruba-derived traditions \u2014 the iyalorisha (mother of the orisha) is a central leadership role in Candombl\u00e9, and female mambos (priestesses) are prominent in Haitian Vodou. The orisha Oshun and Yemoja represent powerful feminine divine principles. However, certain ritual roles and knowledge are gender-restricted in traditional Yoruba practice \u2014 the babalawo (If\u00e1 divination priest) is traditionally male, though this restriction is contested in some diasporic communities.',
    sacred:'Sacred spaces in Yoruba tradition include the Osun-Osogbo Sacred Grove (UNESCO World Heritage Site), a forest sanctuary in Nigeria dedicated to the goddess Oshun. Ile-Ife, regarded as the cradle of Yoruba civilization and the place where Olodumare created the world, is the tradition\'s holiest city. In the diaspora, sacred spaces are typically domestic \u2014 altars, shrines, and ritual rooms within homes and il\u00e9 (houses of worship) rather than grand public temples.',
    afterlife:'Yoruba afterlife beliefs center on the cycle of reincarnation within the family lineage \u2014 ancestors return through their descendants, and the name given to a child often indicates which ancestor has returned. The dead join the community of ancestors (egungun), who remain actively involved in family affairs and are honored through elaborate masquerade festivals. Those who lived badly may become wandering spirits, unable to reincarnate \u2014 a fate worse than death.',
    cosmology:'Yoruba cosmology describes a universe created by Olodumare, who sent Obatala (or Oduduwa) to shape the earth from primordial waters using a chain, a calabash of earth, and a five-toed hen. The cosmos is structured in two interpenetrating realms: ay\u00e9 (the visible world) and orun (the invisible world of spirits and ancestors). These realms are not separate but coexistent, constantly interacting through ritual, divination, and spirit possession.',
    philosophy:'Yoruba philosophy is sophisticated and systematic \u2014 the concept of \u00e0\u1e63\u1eb9 (cosmic power or vital force flowing through all things) parallels Chinese qi and Hindu prana. The If\u00e1 divination system encodes a binary mathematical structure that anticipates aspects of computer science. The philosophical framework of ori (personal destiny), iwa (character), and ayanmo (fate) addresses free will, determinism, and moral responsibility with nuance comparable to any Western philosophical tradition.',
    politics:'Vodou played a decisive political role in the Haitian Revolution (1791\u20131804) \u2014 the Bois Ca\u00efman ceremony, a Vodou ritual led by the houngan Dutty Boukman, is traditionally credited with launching the only successful slave revolution in history. In Nigeria, traditional Yoruba political authority derives from spiritual legitimacy confirmed through If\u00e1 divination. Brazilian Candombl\u00e9 communities served as centers of Black political organization and cultural resistance throughout the era of slavery and beyond.',
    legacy:'The Yoruba-Vodou tradition\'s global cultural impact is immeasurable \u2014 it shaped the music, dance, cuisine, language, and spirituality of the entire Atlantic world. Samba, jazz, blues, salsa, and hip-hop all carry Yoruba rhythmic and aesthetic DNA. The tradition\'s survival through the Middle Passage represents one of humanity\'s greatest triumphs of cultural resilience. Today, with over 100 million adherents across Africa and the Americas, these traditions are experiencing unprecedented growth and scholarly recognition.',
    figures:'Orunmila, the orisha of wisdom and divination, is central to If\u00e1 tradition. Historical figures include Dutty Boukman, who led the Bois Ca\u00efman ceremony launching the Haitian Revolution, and Marie Laveau (1801\u20131881), the legendary Voodoo Queen of New Orleans. M\u00e3e Menininha do Gantois (1894\u20131986) was a towering figure in Brazilian Candombl\u00e9. Wande Abimbola, former Awise Awo Agbaye (spokesperson of If\u00e1 worldwide), has been instrumental in gaining international recognition for the tradition.',
    dialogue:'Yoruba-derived traditions have increasingly engaged in interfaith dialogue, particularly with Christianity and Islam, both of which have significant overlap in West Africa. The 2005 UNESCO recognition of If\u00e1 as intangible cultural heritage marked a milestone in international legitimacy. Academic study of Yoruba philosophy and theology has challenged assumptions about African religions as "primitive," revealing sophisticated intellectual traditions. However, persistent demonization by evangelical Christianity remains a significant obstacle to genuine dialogue.',
   }},
];

let year=-10000,lenses=new Set(),sel=null,sel2=null,lensDD=false,mode="explore",activeThread=null;
const OVERVIEW_COL='#9070c0';
let _vbW=1000;

function fmt(y){return y<0?`${Math.abs(y)} BCE`:y===0?'1 CE':`${y} CE`}
function eraName(y){let n=ERAS[0].n;for(const e of ERAS){if(y>=e.y)n=e.n;}return n;}
function active(c){return year>=c.s&&year<=c.e}
function getLensCol(){
  if(!lenses.size)return OVERVIEW_COL;
  const L=LENSES.find(l=>l.id===[...lenses][0]);
  return L?L.col:OVERVIEW_COL;
}

function toggleLensDD(){
  lensDD=!lensDD;
  document.getElementById('lens-dd-list').classList.toggle('open',lensDD);
  document.getElementById('lens-dd-hdr').classList.toggle('open',lensDD);
  document.getElementById('lens-dd-arrow').classList.toggle('open',lensDD);
}

function lensLabel(){
  if(!lenses.size)return'Belief Arc';
  const names=[...lenses].map(id=>{const L=LENSES.find(l=>l.id===id);return L?L.lbl:'';});
  if(names.length===1)return names[0];
  if(names.length<=3)return names.join(' · ');
  return names.slice(0,2).join(' · ')+` +${names.length-2}`;
}

    <div class="lens-dd-hdr${lensDD?' open':''}" id="lens-dd-hdr" onclick="toggleLensDD()">
      <span class="lens-dd-title">Lens</span>
      <span class="lens-dd-summary">${lensLabel()}</span>
      <span class="lens-dd-arrow${lensDD?' open':''}" id="lens-dd-arrow">▾</span>
    </div>
    <div class="lens-dd-list${lensDD?' open':''}" id="lens-dd-list">
      <div class="lens-row${arcOn?' on':''}" onclick="toggleLens('__arc__')">
        <div class="lens-row-chk${arcOn?' on':''}">${arcOn?'✓':''}</div>

        <span class="lens-row-lbl">Belief Arc</span>
      </div>
      <div class="lens-row-sep"></div>

function toggleLens(id){
  if(id==='__arc__'){lenses.clear();}
  else{
    if(lenses.has(id))lenses.delete(id);
    else lenses.add(id);
  }
  renderLensDD();
  if(sel){
    const c=sel;
    let body='';
    if(!lenses.size){
      body=`<div class="overview-arc"><p>${c.overview||c.d.legacy}</p></div>${renderEnhancedSpanBar(c)}`;
    } else {
      body=[...lenses].map(lid=>{
        const L=LENSES.find(l=>l.id===lid);
        if(!L)return'';
        return`<div class="lens-section">
          <div class="lens-section-hdr">
            <span class="lens-section-ico">${L.ico}</span>
            <span class="lens-section-lbl">${L.lbl}</span>
          </div>
          <div class="info-txt">${c.d[lid]||'No data for this lens.'}</div>
        </div>`;
      }).join('');
    }
    const col=lenses.size?getLensCol():OVERVIEW_COL;
    const actIds=new Set(ITEMS.filter(x=>active(x)).map(x=>x.id));
    const connHTML=c.conns.length?`<div class="conn-hdr" id="conn-hdr">Historical connections</div>`+c.conns.map(cid=>{
      const o=ITEMS.find(x=>x&&x.id===cid);if(!o)return'';
      const isA=actIds.has(cid);
      const badge=isA?'ACTIVE':'→ JUMP';
      const tip=isA?`View ${o.nm} (active in this era)`:`Jump to ${o.nm} (${fmt(o.s)} – ${fmt(o.e)})`;
      return`<button class="conn-item" tabindex="0"
          aria-label="${tip}"
          onclick="navigateToItem('${cid}')"
          style="width:100%;background:none;border:none;border-bottom:1px solid var(--conn-bdr);text-align:left;cursor:pointer;opacity:${isA?1:.7}">
        <div class="conn-dot" style="background:${isA?col:'var(--txt3)'}"></div>
        <span style="flex:1;color:var(--txt${isA?'':'3'})">${o.nm}</span>
        <span style="font-size:9px;font-family:'Cinzel',serif;letter-spacing:1px;color:${isA?'var(--amber-b)':'var(--amber)'};white-space:nowrap">${badge}</span>
      </button>`;
    }).join(''):'';
    const lensDiv=document.getElementById('drawer-lens-body');
    if(lensDiv) lensDiv.innerHTML=body+connHTML;
  }
  renderMap();
}
