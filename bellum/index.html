<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bellum — War & Conflict Atlas</title>

<meta name="description" content="Explore 50 wars and conflicts across human history on an interactive world map. Navigate a continuous timeline with 20 interpretive lenses, military transmissions, What-If scenarios, and Heritage mode.">
<meta name="keywords" content="war history, battles, military history, conflicts, interactive map, timeline, world wars, strategy">
<meta name="author" content="Polyglyph Analytica">
<meta name="robots" content="index, follow">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── DARK THEME (default) ── */
:root{
  --bg:#02040a;
  --panel:#070b12;
  --panel2:#0c1018;
  --ocean-start:#0a1628;--ocean-end:#061020;
  --land:#2a4a18;--land-s:#3a6020;
  --amber:#e89820;--amber-b:#f0b040;--amber-d:#3a2204;
  --amber-x:rgba(232,152,32,0.14);--amber-xx:rgba(232,152,32,0.08);
  --txt:#f2e8d5;--txt2:#e0d4b4;--txt3:#c8aa78;
  --bdr:rgba(232,152,32,0.22);--bdr2:rgba(232,152,32,0.10);
  --hint:rgba(224,212,180,0.65);
  --tl-bg:rgba(2,4,10,0.99);
  --hdr-bg:rgba(2,4,10,0.97);
  --conn-bdr:rgba(232,152,32,0.10);
  --shadow:rgba(0,0,0,0.6);
}

/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#f0ebe0;
  --panel:#e8e0d0;
  --panel2:#ddd4c0;
  --ocean-start:#b8cce0;--ocean-end:#a8bcd4;
  --land:#8ca860;--land-s:#7a9850;
  --amber:#4a2c00;--amber-b:#5a3800;--amber-d:#f0d8a0;
  --amber-x:rgba(122,78,0,0.10);--amber-xx:rgba(122,78,0,0.06);
  --txt:#1a1206;--txt2:#1a1206;--txt3:#2e2010;
  --bdr:rgba(122,78,0,0.28);--bdr2:rgba(122,78,0,0.14);
  --hint:rgba(30,18,6,0.6);
  --tl-bg:rgba(236,228,214,0.99);
  --hdr-bg:rgba(236,228,214,0.97);
  --conn-bdr:rgba(122,78,0,0.12);
  --shadow:rgba(0,0,0,0.18);
}

@media(prefers-color-scheme:light){
  :root:not([data-theme="dark"]){
    --bg:#f0ebe0;--panel:#e8e0d0;--panel2:#ddd4c0;
    --ocean-start:#b8cce0;--ocean-end:#a8bcd4;
    --land:#8ca860;--land-s:#7a9850;
    --amber:#4a2c00;--amber-b:#5a3800;--amber-d:#f0d8a0;
    --amber-x:rgba(122,78,0,0.10);--amber-xx:rgba(122,78,0,0.06);
    --txt:#1a1206;--txt2:#1a1206;--txt3:#2e2010;
    --bdr:rgba(122,78,0,0.28);--bdr2:rgba(122,78,0,0.14);
    --hint:rgba(30,18,6,0.6);
    --tl-bg:rgba(236,228,214,0.99);
    --hdr-bg:rgba(236,228,214,0.97);
    --conn-bdr:rgba(122,78,0,0.12);
    --shadow:rgba(0,0,0,0.18);
  }
}

html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Crimson Pro',serif}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--hdr-bg);gap:12px}
.hdr-left{display:flex;align-items:baseline;gap:0;min-width:0}
.logo-t{font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:700;color:var(--amber-b);letter-spacing:3px;white-space:nowrap}
.logo-s{font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin-left:10px;white-space:nowrap}
.era-disp{text-align:center;font-family:'Cinzel',serif;flex-shrink:0}
.era-y{font-size:22px;font-weight:600;color:var(--amber-b);letter-spacing:1px}
.era-n{font-size:12px;letter-spacing:1.5px;color:var(--txt2);margin-top:1px;text-transform:uppercase;font-weight:600}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.cnt-disp{text-align:right;font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;color:var(--txt3)}
.cnt-n{font-size:22px;font-weight:600;color:var(--amber);display:block;line-height:1}
.theme-btn{background:none;border:1px solid var(--bdr);padding:4px 8px;cursor:pointer;font-size:13px;color:var(--txt2);border-radius:3px;transition:all .15s;flex-shrink:0}
.theme-btn:hover{background:var(--amber-x);color:var(--amber-b)}

/* ── MAIN LAYOUT ── */
.main{position:fixed;top:52px;left:0;right:0;bottom:0;display:flex}
.map-c{flex:1;position:relative;overflow:hidden;min-width:0;min-height:0}
.map-tl-col{display:flex;flex-direction:column;flex:1;min-width:0}
#wsvg{width:100%;height:100%}

/* ── DESKTOP PANEL ── */
.info-panel{width:320px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--bdr);overflow-y:auto;padding:18px 18px 28px;position:relative}
.info-close{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:16px;line-height:1;padding:4px;float:right;margin:-2px -2px 0 0}
.info-close:hover{color:var(--amber-b)}
.info-nm{font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:700;color:var(--amber-b);margin-bottom:3px;clear:both}
.info-sb{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1.5px;color:var(--txt2);text-transform:uppercase;margin-bottom:10px}
.info-dates{display:flex;gap:6px;margin-bottom:14px;align-items:center}
.info-dt{padding:5px 12px;border:1px solid var(--bdr);font-family:'Cinzel',serif;font-size:13.5px;color:var(--amber-b)}
.info-arr{color:var(--txt2);font-size:12px}

/* ── LENS DROPDOWN ── */
.lens-dd-wrap{border:1px solid var(--bdr);margin-bottom:14px}
.lens-dd-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;cursor:pointer;user-select:none;background:var(--amber-xx);border-bottom:1px solid transparent;transition:background .15s}
.lens-dd-hdr:hover{background:var(--amber-x)}
.lens-dd-hdr.open{border-bottom-color:var(--bdr)}
.lens-dd-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:2.5px;color:var(--txt2);text-transform:uppercase;flex-shrink:0}
.lens-dd-summary{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.5px;color:var(--amber-b);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;padding:0 6px}
.lens-dd-arrow{color:var(--txt2);font-size:10px;transition:transform .18s;flex-shrink:0}
.lens-dd-arrow.open{transform:rotate(180deg)}
.lens-dd-list{display:none;max-height:260px;overflow-y:auto}
.lens-dd-list.open{display:block}
.lens-row{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--bdr2);transition:background .15s}
.lens-row:last-child{border-bottom:none}
.lens-row:hover{background:var(--amber-x)}
.lens-row-chk{width:13px;height:13px;border:1px solid var(--bdr);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--amber-b);line-height:1}
.lens-row-chk.on{background:var(--amber-x);border-color:var(--amber-b)}
.lens-row-ico{font-size:14px;width:16px;text-align:center;flex-shrink:0;color:var(--txt2)}
.lens-row-lbl{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.5px;color:var(--txt2)}
.lens-row.on .lens-row-lbl{color:var(--amber-b);font-weight:600}
.lens-row-sep{border-bottom:1px solid var(--bdr);margin-bottom:2px}
.lens-dd-close-btn{text-align:center;padding:10px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;color:var(--amber-b);border-top:1px solid var(--bdr);cursor:pointer;text-transform:uppercase;transition:background .15s}
.lens-dd-close-btn:hover{background:var(--amber-x)}

/* ── DRAWER CONTENT ── */
.lens-section{margin-bottom:18px}
.lens-section-hdr{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.lens-section-ico{font-size:12px;color:var(--txt2)}
.lens-section-lbl{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;color:var(--amber-b);text-transform:uppercase;font-weight:600}
.info-div{border:none;border-top:1px solid var(--bdr);margin:12px 0}
.info-txt{font-size:17.5px;line-height:1.95;color:var(--txt);font-style:italic}
.overview-arc{font-size:17.5px;line-height:1.95;color:var(--txt)}
.overview-arc p{margin-bottom:14px}
.civ-span-bar{height:3px;background:var(--bdr2);position:relative;margin:14px 0 6px;border-radius:2px}
.civ-span-fill{position:absolute;top:0;height:100%;background:var(--amber-b);border-radius:2px;opacity:.8}
.civ-span-lbls{display:flex;justify-content:space-between;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--txt3)}
.conn-hdr{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1.5px;color:var(--txt3);text-transform:uppercase;margin:18px 0 8px;font-weight:600}
.conn-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--conn-bdr);font-size:16px;color:var(--txt2);cursor:pointer;transition:color .15s}
.conn-item:hover{color:var(--amber-b)}
.conn-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── TIMELINE ── */
.tl-wrap{position:relative;height:88px;background:var(--tl-bg);border-top:1px solid var(--bdr);padding:8px 20px 14px;flex-shrink:0}
.tl-lbls{display:flex;justify-content:space-between;margin-bottom:5px}
.tl-lbl{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.8px;color:var(--txt3);text-transform:uppercase;font-weight:600}
.tl-trk{position:relative;height:5px;background:var(--bdr);border-radius:3px}
.tl-fill{position:absolute;top:0;left:0;height:5px;background:var(--amber-b);border-radius:3px;pointer-events:none;opacity:.7}
.tl-thumb{position:absolute;top:50%;width:20px;height:20px;background:var(--amber-b);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--amber),0 0 20px rgba(232,152,32,.3);pointer-events:none;transition:left .04s linear}
input.tl-range{position:absolute;top:50%;left:0;width:100%;height:28px;opacity:0;cursor:pointer;transform:translateY(-50%);margin:0;z-index:2}
.hint{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;color:var(--hint);display:flex;align-items:center;justify-content:center;padding:0 8px;white-space:nowrap;overflow:hidden}
#map-hint-text{pointer-events:none;overflow:hidden;text-overflow:ellipsis}

/* ── MOB MAP BUTTON ── */
.mob-map-btn{display:none}

/* ── PORTRAIT MOBILE ── */
@media(max-width:768px) and (orientation:portrait){
  .logo-s{display:none}
  .cnt-disp{display:none}
  .hdr{padding:8px 12px}
  .logo-t{font-size:16px;letter-spacing:2px}
  .era-y{font-size:18px}
  .era-n{font-size:10px;letter-spacing:1.5px}
  .main{top:52px!important;bottom:0;flex-direction:column}
  .map-tl-col{width:100%}
  .map-c{flex:0 0 42vh;width:100%}
  .info-panel{flex:1;width:100%;border-left:none;border-top:1px solid var(--bdr);overflow-y:auto;padding:0 16px 16px;border-radius:0}
  .tl-wrap{height:76px;padding:6px 14px 10px}
  .tl-lbl{font-size:9px;letter-spacing:.8px}
  .hint{font-size:8px;letter-spacing:.8px}
  .lens-dd-list{max-height:180px}
  .info-txt,.overview-arc{font-size:16px;line-height:1.82}
  .lens-row-lbl{font-size:13px}
}

/* ── LANDSCAPE MOBILE ── */
@media(max-width:900px) and (orientation:landscape){
  .logo-s{display:none}
  .hdr{padding:6px 14px}
  .logo-t{font-size:15px;letter-spacing:2px}
  .era-y{font-size:15px}
  .hint{font-size:7px;letter-spacing:.5px;white-space:normal;text-align:center;line-height:1.4}
  .tl-wrap{height:68px;padding:4px 12px 8px}
  .tl-lbl{font-size:8px}
  .info-panel{width:280px}
}

@keyframes ring-pulse{0%{r:5;opacity:.7}100%{r:26;opacity:0}}

@media(pointer:coarse){
  #mark-layer g[role="button"]{cursor:pointer}
}

/* ── ACCESSIBILITY ── */
:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px;border-radius:2px}
.conn-item:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px}
.lens-row:focus-visible{outline:2px solid var(--amber-b);outline-offset:-2px}
button:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px}
.skip-link{position:absolute;top:-40px;left:0;background:var(--amber-b);color:var(--bg);padding:8px 16px;z-index:9999;font-family:'Cinzel',serif;font-size:11px;text-decoration:none}
.skip-link:focus{top:0}

/* ── THREAD PANEL ── */
.thread-panel{
  position:fixed;top:52px;left:0;right:0;z-index:400;
  background:var(--panel);
  max-height:0;overflow:hidden;
  transition:max-height .32s cubic-bezier(.4,0,.2,1);
}
.thread-panel.open{border-bottom:1px solid var(--bdr);box-shadow:0 6px 24px var(--shadow);max-height:70vh}
.thread-panel-inner{padding:16px 20px 20px;overflow-y:auto;max-height:calc(70vh - 1px)}
.thread-panel-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bdr)}
.thread-panel-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase}
.thread-close-btn{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:18px;line-height:1;padding:4px;transition:color .15s}
.thread-close-btn:hover{color:var(--amber-b)}
.thread-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.thread-concept-btn{width:100%;background:none;border:1px solid var(--bdr2);padding:9px 12px;text-align:left;cursor:pointer;border-radius:3px;transition:all .15s}
.thread-concept-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.thread-concept-name{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.8px;color:var(--txt2);display:block;margin-bottom:4px}
.thread-concept-chain{font-size:11px;color:var(--txt3);line-height:1.5}
.thread-back-btn{background:none;border:none;padding:0;cursor:pointer;font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--amber-b);text-transform:uppercase;transition:opacity .15s}
.thread-back-btn:hover{opacity:.7}
.thread-active-title{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--amber-b);margin:10px 0 14px}
.thread-steps-grid{display:flex;flex-direction:column;align-items:center;padding:4px 0 16px}
.thread-step{width:min(360px,90%);text-align:center;padding:10px 14px;border:1px solid var(--bdr2);border-radius:4px;font-size:12.5px;color:var(--txt2);background:var(--panel2)}
.thread-step-yr{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);margin-bottom:4px}
.thread-step-txt{line-height:1.6;color:var(--txt2)}
.thread-step-civ{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);margin-bottom:4px}
.thread-chain-link{display:flex;flex-direction:column;align-items:center;padding:2px 0;color:var(--amber-b);opacity:.6}
.thread-chain-line{width:1px;height:8px;background:var(--amber-b);opacity:.4}

/* ── COMPARE MODE ── */
.compare-wrap{display:flex;gap:0;height:100%;width:100%}
.compare-col{flex:1;min-width:0;overflow-y:auto;padding:16px;border-right:1px solid var(--bdr)}
.compare-col:last-child{border-right:none}
.compare-col-hdr{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--amber-b);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.compare-remove{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:14px;padding:2px}
.compare-remove:hover{color:var(--amber-b)}
.compare-prompt{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--txt3);font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:20px;opacity:.6}
.compare-diff{background:var(--amber-xx);border-left:2px solid var(--amber-b);padding:6px 8px;margin-bottom:2px}

/* ── SHARE TOAST ── */
.share-toast{position:fixed;bottom:108px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--panel);border:1px solid var(--bdr);padding:8px 18px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1.5px;color:var(--amber-b);text-transform:uppercase;border-radius:20px;opacity:0;transition:all .3s;pointer-events:none;z-index:500;white-space:nowrap}
.share-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── FINGERPRINT CHART ── */
.fp-wrap{margin:14px 0 6px}
.fp-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--txt3);text-transform:uppercase;margin-bottom:8px}
.fp-svg{display:block;margin:0 auto}
.fp-label{font-family:'Cinzel',serif;font-size:8px;fill:var(--txt3)}
.fp-poly{fill:rgba(232,37,26,.18);stroke:#e8251a;stroke-width:1.2}
.fp-grid{fill:none;stroke:var(--bdr);stroke-width:.5}

/* ── CONTEMPORARY BAR ── */
.contemp-wrap{margin:12px 0 4px}
.contemp-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;cursor:pointer;transition:opacity .15s}
.contemp-bar-row:hover{opacity:.75}
.contemp-bar-nm{font-family:'Cinzel',serif;font-size:8.5px;color:var(--txt3);width:80px;flex-shrink:0;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.contemp-bar-track{flex:1;height:5px;background:var(--bdr2);border-radius:2px;position:relative}
.contemp-bar-fill{position:absolute;top:0;height:100%;border-radius:2px;opacity:.7}
.contemp-bar-yr{font-family:'Cinzel',serif;font-size:7.5px;color:var(--txt3);white-space:nowrap;width:60px;text-align:right;flex-shrink:0}

/* ── DENSITY SPARKLINE ── */
#density-bar{height:18px;width:100%;display:block;margin-bottom:1px}

/* ── WHAT-IF MODE ── */
.whatif-civ-btn{width:100%;background:none;border:1px solid var(--bdr2);padding:7px 10px;text-align:left;cursor:pointer;font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:.5px;color:var(--txt2);margin-bottom:3px;border-radius:2px;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.whatif-civ-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.whatif-civ-btn.selected{background:rgba(232,37,26,.12);border-color:#e8251a;color:#e8251a}
.whatif-result{margin-top:12px;padding:12px;border:1px solid var(--bdr);border-radius:3px;background:var(--panel2)}
.whatif-chain{padding:6px 0;border-bottom:1px solid var(--bdr2);font-size:12px;color:var(--txt2)}
.whatif-chain:last-child{border-bottom:none}
.whatif-chain.lost{color:#e8251a;text-decoration:line-through;opacity:.6}
.whatif-intro{font-size:13px;line-height:1.7;color:var(--txt2);font-style:italic;margin-bottom:12px}

/* ── HERITAGE MODE ── */
.heritage-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.heritage-btn{background:none;border:1px solid var(--bdr2);padding:8px 6px;cursor:pointer;font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.5px;color:var(--txt2);border-radius:2px;transition:all .15s;text-align:center}
.heritage-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.heritage-btn.active{background:var(--amber-x);border-color:var(--amber-b);color:var(--amber-b)}
.heritage-civ{padding:5px 0;border-bottom:1px solid var(--bdr2);font-size:12.5px;cursor:pointer;transition:color .15s}
.heritage-civ:hover{color:var(--amber-b)}
.heritage-civ-nm{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);display:block;margin-bottom:2px}
.heritage-civ-why{font-size:11px;color:var(--txt3)}

/* ── MAP ZOOM TRANSITION ── */
#wsvg{transition:none}

/* ── HERSTORY MODE ── */
.hs-marker{fill:#c060a0}
.hs-woman{padding:10px 0;border-bottom:1px solid var(--bdr2)}

/* ── CLUSTER PICKER ── */
#cluster-picker{
  position:fixed;z-index:900;background:var(--panel);
  border:1px solid var(--bdr);border-radius:6px;
  min-width:180px;max-width:260px;max-height:320px;overflow-y:auto;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  display:none;
}
#cluster-picker.open{display:block}
#cluster-picker-hdr{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;
  color:var(--txt3);padding:8px 12px 6px;
  border-bottom:1px solid var(--bdr2);text-transform:uppercase;
  display:flex;justify-content:space-between;align-items:center;
}
.cluster-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;
  cursor:pointer;border-bottom:1px solid var(--bdr2);
  transition:background .12s;
}
.cluster-item:last-child{border-bottom:none}
.cluster-item:hover,.cluster-item:active{background:var(--panel2)}
.cluster-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#e8251a}
.cluster-item-nm{font-family:'Cinzel',serif;font-size:13px;color:var(--txt);flex:1}
.cluster-item-sb{font-size:11px;color:var(--txt3);margin-top:1px}

/* ── BURGER MENU ── */
.burger-wrap{position:relative}
.burger-btn{background:none;border:1px solid var(--bdr);color:var(--amber-b);cursor:pointer;

.burger-btn:hover{background:var(--panel2);border-color:var(--amber)}

.burger-menu.open{display:flex}
.burger-item{display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:none;border:none;color:var(--txt2);cursor:pointer;text-align:left;

.burger-item:hover,.burger-item:active{background:var(--panel2);color:var(--txt)}
.burger-item.active,.burger-item.burger-mode.active{background:var(--amber-x);color:var(--amber-b)}
.burger-item-badge{margin-left:auto;font-size:9px;color:var(--amber-b);

.burger-item-badge.on{display:inline}
.burger-divider{height:1px;background:var(--bdr2);margin:2px 0}
body.herstory .burger-item.burger-mode.active{background:rgba(192,96,160,.12);color:#c060a0}
body.herstory .hdr{border-bottom-color:rgba(192,96,160,.3)}

/* ── MAP ZOOM/PAN ── */
#wsvg{touch-action:none;user-select:none;-webkit-user-select:none}

  background:var(--panel);border:1px solid var(--bdr);padding:4px 12px;border-radius:20px;
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:51}
.cluster-hint.show{opacity:1}

/* ── PULL TO REFRESH ── */
#ptr-indicator{
  position:fixed;top:0;left:0;right:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;gap:10px;
  height:0;overflow:hidden;background:var(--panel);
  border-bottom:1px solid var(--bdr);
  transition:height .2s ease,opacity .2s ease;
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;

}

  {id:'figures',     ico:'Ψ', lbl:'Key Figures',             col:'#8a6020'},
  {id:'women',       ico:'♀', lbl:'Women in War',            col:'#9b6fd4'},
];

const ERAS=[

];

const FP_LABELS=['Scale','Duration','Innovation','Casualties','Geopolitical','Legacy'];

const ITEMS=[
{id:'kadesh',nm:'Battle of Kadesh',sb:'Orontes River \u00b7 Egypt vs Hittites',s:-1274,e:-1274,lon:36.5,lat:34.6,
conns:['persian','punic'],fp:{scale:6,dur:1,innov:7,cas:4,geo:7,leg:8},
overview:'The Battle of Kadesh in 1274 BCE was the largest chariot battle in history, pitting Ramesses II of Egypt against Muwatalli II of the Hittite Empire along the Orontes River in modern Syria. Despite an Egyptian near-disaster caused by a Hittite ambush, Ramesses rallied his forces and fought to a tactical stalemate. The conflict ultimately produced the earliest known international peace treaty, establishing a diplomatic precedent that echoed through millennia.',
d:{
overview:'The Battle of Kadesh stands as the defining military confrontation of the Bronze Age, fought between the two greatest powers of the ancient Near East. Ramesses II marched north with four divisions totaling roughly 20,000 men to reclaim the strategically vital city of Kadesh from Hittite control. The resulting clash demonstrated both the limitations of chariot warfare and the importance of intelligence in military campaigns.',
strategy:'Muwatalli II employed a brilliant deception strategy, planting false deserters who convinced Ramesses that the Hittite army was far to the north, luring the Egyptian vanguard into an exposed position. Ramesses divided his forces into four marching columns, a fatal error that allowed 2,500 Hittite chariots to strike the isolated Amun division. The Egyptian recovery depended on the timely arrival of the Ne\'arin elite troops from an unexpected direction, demonstrating how reserves could reverse a battle\'s outcome.',
weapons:'The battle showcased the apex of Bronze Age chariot technology, with Egyptian two-man chariots favoring archery while heavier Hittite three-man chariots carried a driver, shield-bearer, and spearman. Composite bows made of wood, horn, and sinew gave Egyptian charioteers a significant range advantage. Bronze khopesh swords and socketed spearheads represented the cutting edge of metallurgical achievement for the era.',
leadership:'Ramesses II displayed extraordinary personal courage, allegedly fighting his way out of encirclement with only his household guard and chariot crew. His leadership in rallying broken troops transformed a potential rout into a contested engagement. Muwatalli II showed strategic acumen in his battle plan but remained with his infantry reserve rather than personally leading the chariot charge, a decision that may have cost the Hittites a decisive victory.',
casualties:'Casualty figures remain uncertain due to the propagandistic nature of Egyptian records, but modern estimates suggest several thousand dead on each side. The Hittites reportedly lost many chariot crews to drowning when driven into the Orontes River during the Egyptian counterattack. Both armies suffered enough losses that neither could continue offensive operations, contributing to the eventual peace settlement.',
naval:'Naval warfare played no direct role in the Battle of Kadesh itself, though Egyptian maritime logistics along the Levantine coast helped sustain the campaign. Supply ships operating from Byblos and other coastal ports provided grain and equipment to the advancing Egyptian columns. The Hittites, as a predominantly land-based power, lacked comparable naval capabilities in this theater.',
siege:'Although Kadesh was fought as a field battle, the strategic objective was the fortified city of Kadesh itself, situated on a tell between the Orontes River and a tributary. Egyptian siege techniques of the period included scaling ladders, battering rams, and undermining walls, though none were employed in this engagement. The failure to capture the city meant that the broader campaign objective remained unfulfilled despite the battlefield stalemate.',
cavalry:'True cavalry did not yet exist at Kadesh; mounted warfare was conducted entirely from chariots. The Hittite force of 2,500 chariots and supporting infantry represented one of the largest mobile striking forces assembled in the Bronze Age. Chariot tactics emphasized shock action and archery rather than the sustained melee combat that would characterize later cavalry warfare.',
infantry:'Infantry at Kadesh served primarily in supporting roles, holding ground while chariots delivered the decisive blows. Egyptian infantry included Sherden mercenaries armed with long swords and round shields, among the finest foot soldiers of the era. The Hittite infantry reserve of 8,000 men under Muwatalli never fully engaged, a puzzling decision that may have prevented a complete Egyptian defeat.',
logistics:'Ramesses\' army required enormous logistical support for its march from the eastern Delta through Canaan and into Syria, covering roughly 1,500 kilometers. Water supply along the arid coastal route dictated the pace of advance and the spacing of the four divisions. The Hittites benefited from interior lines and local supply bases, giving them a significant logistical advantage in the Kadesh region.',
intelligence:'The intelligence failure at Kadesh became one of history\'s most consequential military deceptions. Two Shasu bedouin, planted by the Hittites, convinced Egyptian scouts that Muwatalli\'s army was 200 kilometers away near Aleppo when it was actually hidden behind the city of Kadesh. Only the capture and interrogation of genuine Hittite scouts revealed the true situation, but by then the Egyptian army was dangerously dispersed.',
propaganda:'Ramesses II transformed the near-defeat at Kadesh into the greatest propaganda victory of the ancient world, commissioning massive temple reliefs at Abu Simbel, Karnak, Luxor, and the Ramesseum. The Poem of Pentaur and the Bulletin present Ramesses as a superhuman warrior who single-handedly defeated the Hittite army, establishing a template for royal military propaganda. These accounts represent the most extensively documented military event of the Bronze Age.',
civilians:'The civilian population of Kadesh and surrounding settlements endured the devastation that accompanied ancient Near Eastern warfare. Agricultural lands were ravaged by foraging armies numbering in the tens of thousands, disrupting food production across the region. Captured civilians from previous campaigns served as forced laborers and were sometimes settled in Egyptian territory as agricultural workers.',
aftermath:'The battle led to sixteen years of continued low-level conflict before Ramesses II and Hattusili III negotiated the Egyptian-Hittite Peace Treaty around 1258 BCE, history\'s first known international peace agreement. The treaty established mutual non-aggression, extradition agreements, and mutual defense obligations, creating a framework for Bronze Age diplomacy. A subsequent royal marriage between Ramesses and a Hittite princess cemented the alliance that endured until the Bronze Age collapse.',
causes:'The battle arose from decades of Egyptian-Hittite competition for control of Syria and the Levantine corridor, vital trade routes connecting Mesopotamia, Anatolia, and Egypt. The Hittite seizure of the former Egyptian vassal state of Amurru directly threatened Egyptian commercial and strategic interests. Ramesses II, early in his reign and eager to prove himself, launched the campaign to reassert Egyptian dominance in the region.',
alliances:'Both empires mobilized extensive alliance networks for the Kadesh campaign, with the Hittites fielding contingents from at least sixteen allied and vassal states. Egyptian forces included Sherden, Libyan, and Nubian auxiliary troops alongside the core Egyptian divisions. The post-battle peace treaty created a formal alliance system that divided the Near East into recognized spheres of influence.',
guerrilla:'Conventional chariot and infantry warfare dominated the Kadesh campaign, with no significant guerrilla operations recorded. However, the Shasu bedouin who served as Hittite agents operated in the gray zone between irregular warfare and espionage. Local populations in contested border regions likely engaged in low-level resistance against whichever empire currently held dominance.',
legacy:'Kadesh established enduring precedents in military history, diplomacy, and propaganda that influenced civilizations for millennia. The peace treaty\'s principles of mutual recognition, non-aggression, and dispute resolution foreshadowed modern international law. The battle also demonstrated that even superpowers could fight to a standstill, making negotiated peace preferable to endless warfare.',
figures:'Ramesses II, who ruled Egypt for sixty-seven years, became one of antiquity\'s most celebrated warrior-kings largely on the basis of his Kadesh narrative. Muwatalli II commanded the Hittite Empire at its military zenith, fielding what may have been the largest chariot force ever assembled. The crown prince Hattusili, who commanded a Hittite flanking force at Kadesh, later seized the throne and negotiated the famous peace treaty.',
women:'Queen Nefertari, Ramesses II\'s principal wife, played a diplomatic role in the post-Kadesh peace process, exchanging correspondence with the Hittite queen Puduhepa. Puduhepa herself was unusually powerful for the era, co-signing the peace treaty and actively participating in negotiations as a full diplomatic partner. The Hittite princess Maathorneferure, sent to marry Ramesses as part of the peace settlement, symbolized the union of the two great Bronze Age powers.'
}},
{id:'persian',nm:'Greco-Persian Wars',sb:'Greece \u00b7 East vs West',s:-499,e:-449,lon:23.7,lat:38.0,
conns:['kadesh','peloponnesian','alexander'],fp:{scale:8,dur:6,innov:8,cas:6,geo:10,leg:10},
overview:'The Greco-Persian Wars were a series of conflicts between the Achaemenid Persian Empire and the Greek city-states spanning fifty years from 499 to 449 BCE. Beginning with the Ionian Revolt and culminating in the battles of Marathon, Thermopylae, Salamis, and Plataea, these wars determined the survival of Greek civilization and its democratic institutions. The Greek victory against overwhelming odds became the founding myth of Western civilization and established the East-versus-West narrative that persists to this day.',
d:{
overview:'The Greco-Persian Wars represent one of history\'s most consequential military conflicts, pitting the vast Achaemenid Empire against a fractious coalition of Greek city-states. Darius I and later Xerxes I sought to punish and subjugate Greece, launching invasions that tested the limits of ancient logistics and military organization. The Greek victories preserved the independent polis system and allowed the flowering of classical Greek culture that would shape Western civilization.',
strategy:'Greek strategy evolved dramatically across the wars, from the aggressive offensive tactics at Marathon to the brilliant defensive-in-depth approach combining Thermopylae and Salamis. Themistocles\' strategic vision in building Athens\' fleet and luring the Persian navy into the narrows at Salamis represents one of history\'s greatest strategic masterstrokes. The Persian strategy of overwhelming force and combined arms operations was sound in principle but repeatedly undermined by overextended supply lines and unfamiliar terrain.',
weapons:'The Greek hoplite panoply of bronze helmet, cuirass, greaves, large round aspis shield, and eight-foot dory spear proved devastatingly effective against Persian light infantry. Persian forces relied on composite bows, wicker shields, and short spears, equipment optimized for open-terrain warfare but inadequate against heavy infantry in confined spaces. The trireme warship, with its bronze ram and 170 oarsmen, emerged as the decisive weapons platform of the conflict.',
leadership:'Miltiades at Marathon demonstrated how bold offensive action could neutralize Persian numerical superiority, charging at a run to close the killing ground of Persian archery. Leonidas at Thermopylae created the archetype of heroic last-stand leadership, his sacrifice buying crucial time for Greek mobilization. Themistocles combined political cunning with strategic genius, manipulating both allies and enemies to create the conditions for victory at Salamis.',
casualties:'Persian casualties were enormous by ancient standards, with Herodotus claiming tens of thousands dead at Marathon and catastrophic losses during the retreat from Greece. At Thermopylae, the famous 300 Spartans and their allies inflicted disproportionate casualties before being overwhelmed, possibly killing 20,000 Persians. The naval battle of Salamis reportedly cost Persia 200 or more triremes and their crews, a devastating blow to imperial naval power.',
naval:'The naval dimension of the Greco-Persian Wars proved decisive, as Salamis in 480 BCE destroyed Persian naval supremacy and made the land army\'s supply situation untenable. Athens\' crash shipbuilding program, funded by the Laurion silver mines on Themistocles\' urging, created the fleet of 200 triremes that formed the backbone of Greek naval power. The subsequent Greek naval offensive liberated Ionian Greek cities and established Athenian maritime hegemony across the Aegean.',
siege:'Persian siege capabilities were formidable, incorporating techniques learned from Assyrian and Babylonian traditions, including ramp construction and mining. The siege and destruction of Athens in 480 BCE demonstrated Persian willingness to raze cities that resisted. Greek fortification at Thermopylae exploited the rebuilt Phocian Wall to channel Persian numbers into a killing zone where their advantage was neutralized.',
cavalry:'Persian cavalry was among the finest in the ancient world, with heavily armored noble horsemen supported by mounted archers from the empire\'s eastern provinces. At Marathon, the temporary absence of Persian cavalry from the battlefield may have prompted Miltiades\' decision to attack, suggesting the Greeks feared mounted troops above all else. At Plataea, Persian cavalry harassed Greek supply lines and fouled water sources, nearly winning the campaign through attrition.',
infantry:'The Greek hoplite phalanx proved its superiority in close combat throughout the wars, with densely packed formations of armored spearmen overwhelming Persian infantry in every major engagement. Persian Immortals, the 10,000-strong royal guard, were elite troops but lacked the heavy armor and formation discipline needed to break a phalanx. The integration of light troops, including Cretan archers and Greek peltasts, gradually improved Greek tactical flexibility.',
logistics:'Xerxes\' 480 BCE invasion required years of preparation, including pre-positioned supply depots, a canal cut through the Athos peninsula, and dual pontoon bridges across the Hellespont. The massive Persian army, possibly numbering 200,000 or more, consumed enormous quantities of food and water that strained even the empire\'s vast resources. Greek defensive strategy explicitly targeted Persian logistics, recognizing that the invasion force could not sustain itself indefinitely in hostile territory.',
intelligence:'Intelligence operations were critical throughout the wars, with both sides employing spies, scouts, and diplomatic agents. The Greek spy Democedes and various informants at the Persian court provided valuable strategic intelligence about invasion preparations. Xerxes\' failure to detect the mountain path at Thermopylae until a Greek traitor revealed it demonstrated the challenges of operating in unfamiliar terrain.',
propaganda:'Both sides employed propaganda extensively, with the Greeks framing the conflict as a struggle between freedom and tyranny, civilization and barbarism. The Persians presented their campaigns as righteous punishment against rebellious subjects and oath-breakers. Post-war Greek propaganda, particularly in Athenian tragedy and historiography, transformed the victories into a foundational narrative of Western identity and democratic values.',
civilians:'The civilian impact was catastrophic, with the complete evacuation of Athens before Xerxes\' arrival representing the largest population displacement in Greek history to that date. Persian policy toward conquered cities ranged from lenient treatment of those who surrendered to total destruction of those that resisted. The Ionian Greek cities endured particular suffering, caught between Persian imperial authority and the promise of Greek liberation.',
aftermath:'The Greek victory transformed the Mediterranean political landscape, establishing Athens as a major naval power and leading to the creation of the Delian League. The peace of Callias around 449 BCE formally ended hostilities, establishing a boundary between Greek and Persian spheres of influence. However, the wars also planted seeds of future conflict, as Athenian imperial ambitions eventually provoked the devastating Peloponnesian War.',
causes:'The immediate cause was the Ionian Revolt of 499 BCE, in which Greek cities in Asia Minor rebelled against Persian rule with Athenian support. Persian pride demanded punishment for Athens\' interference, while strategic concerns about Greek instability on the empire\'s western frontier motivated larger invasion plans. Deeper causes included the fundamental incompatibility between Persian imperial universalism and Greek political independence.',
alliances:'The Persian alliance system incorporated the vast resources of an empire spanning from Egypt to India, including Phoenician naval contingents and Greek collaborators like Thebes. The Greek alliance, centered on the Hellenic League formed at the Isthmus of Corinth in 481 BCE, was a fragile coalition that constantly threatened to fracture. Sparta\'s land-power leadership and Athens\' naval dominance created a dual command structure that somehow held together through the crisis.',
guerrilla:'While the major engagements were conventional battles, Greek resistance included asymmetric elements such as the Thermopylae delaying action and harassment of Persian foraging parties. After Xerxes\' withdrawal, Greek communities behind Persian lines engaged in resistance activities that complicated occupation forces\' control. The mountainous Greek terrain naturally favored defensive and irregular warfare, which the Greeks exploited throughout the conflict.',
legacy:'The Greco-Persian Wars became the foundational conflict narrative of Western civilization, establishing the idea of a free West resisting Eastern despotism. The battles of Marathon, Thermopylae, and Salamis entered the permanent cultural vocabulary as archetypes of courage, sacrifice, and strategic brilliance. Militarily, the wars demonstrated the superiority of heavy infantry and citizen-soldier motivation over conscript armies, lessons that influenced warfare for centuries.',
figures:'Xerxes I inherited his father Darius\' ambition to conquer Greece and assembled the largest invasion force the ancient world had seen. Themistocles of Athens was the strategic architect of Greek victory, whose naval policy and battlefield cunning at Salamis proved decisive. Pausanias of Sparta commanded the allied Greek army at Plataea, winning the battle that finally ended the Persian land threat to Greece.',
women:'Queen Artemisia of Halicarnassus commanded five warships in Xerxes\' fleet and was his most trusted naval advisor, famously counseling against fighting at Salamis. Gorgo of Sparta, wife of Leonidas, was renowned for her intelligence and political influence, reportedly decoding a secret message warning of the Persian invasion. The women of Athens endured the traumatic evacuation of their city, maintaining community cohesion during the crisis of 480 BCE.'
}},
{id:'peloponnesian',nm:'Peloponnesian War',sb:'Greece \u00b7 Athens vs Sparta',s:-431,e:-404,lon:22.4,lat:37.6,
conns:['persian','alexander','punic'],fp:{scale:6,dur:8,innov:5,cas:7,geo:8,leg:9},
overview:'The Peloponnesian War was a devastating twenty-seven-year conflict between Athens and its Delian League against Sparta and the Peloponnesian League, tearing apart the Greek world from 431 to 404 BCE. The war featured revolutionary strategies including Pericles\' defensive naval policy, the catastrophic Athenian expedition to Sicily, and Sparta\'s eventual alliance with Persia to build a fleet that destroyed Athenian naval supremacy. Athens\' final defeat ended the golden age of classical Greece and demonstrated how prolonged warfare could destroy even the most brilliant civilization.',
d:{
overview:'The Peloponnesian War was the great civil war of classical Greece, pitting the maritime empire of Athens against the land-based Spartan alliance in a struggle that consumed the Greek world for a generation. Thucydides, who both fought in and wrote the history of the war, created the foundational text of political realism and military history. The conflict demonstrated how fear, honor, and interest drive states into catastrophic wars that benefit no one.',
strategy:'Pericles\' grand strategy of retreating behind Athens\' Long Walls while using naval superiority to raid Peloponnesian coasts was brilliant but psychologically devastating for Athenians watching their farms burn. Sparta\'s initial strategy of annual invasions of Attica proved ineffective against a city supplied by sea, forcing a strategic adaptation that eventually led to naval warfare. The Athenian decision to invade Sicily in 415 BCE represented a catastrophic strategic overreach that destroyed the cream of Athenian military power.',
weapons:'The Peloponnesian War saw relatively little weapons innovation, with hoplite warfare remaining dominant throughout the first phase. Light troops gained increased importance, as demonstrated by the Aetolian disaster and the Athenian use of archers and peltasts at Sphacteria. Siege warfare advanced significantly, with both sides developing more sophisticated techniques for assaulting walled cities, culminating in the prolonged sieges of Plataea and Syracuse.',
leadership:'Pericles provided Athens with strategic vision and political stability until the plague killed him in 429 BCE, after which Athenian leadership became erratic and faction-ridden. Brasidas of Sparta proved that Spartans could fight brilliantly far from home, capturing Amphipolis and demonstrating strategic initiative unusual for the conservative Spartan system. Alcibiades, the most talented and destructive figure of the war, served Athens, Sparta, and Persia in succession, his brilliance matched only by his treachery.',
casualties:'The Athenian plague of 430-426 BCE killed perhaps one-third of the population, including Pericles, inflicting losses far exceeding any battle. The Sicilian Expedition destroyed approximately 40,000 Athenian and allied troops and 200 ships, a catastrophe from which Athens never fully recovered. Across the Greek world, twenty-seven years of warfare depopulated cities, devastated agriculture, and created a generation traumatized by violence.',
naval:'Naval warfare dominated the Peloponnesian War to an unprecedented degree, with Athens\' survival depending entirely on maintaining maritime superiority. The Athenian navy, the finest in the ancient world, won repeated victories through superior seamanship and the diekplous and periplous maneuvers. Sparta\'s eventual victory came only after Persian gold funded the construction of a fleet under Lysander, whose victory at Aegospotami in 405 BCE destroyed Athenian naval power.',
siege:'Siege warfare reached new levels of sophistication, with the Spartan siege of Plataea employing circumvallation, fire attacks, battering rams, and mound construction. The Athenian siege of Syracuse became one of the ancient world\'s great siege disasters, as the besiegers themselves became trapped and destroyed. Fortification and counter-fortification became standard strategic tools, as demonstrated by the Athenian fort at Pylos and Spartan responses.',
cavalry:'Cavalry played a secondary but important role, with Athenian and Boeotian horsemen providing reconnaissance and skirmish capability. The Boeotian cavalry at Delium in 424 BCE contributed significantly to the Athenian defeat, demonstrating how mounted troops could influence hoplite battles. Syracusan cavalry was instrumental in destroying the retreating Athenian army after the failure of the Sicilian Expedition.',
infantry:'The war challenged hoplite warfare orthodoxy, as light infantry proved increasingly effective against heavy troops in broken terrain. The Athenian victory at Sphacteria in 425 BCE, where peltasts and archers overwhelmed Spartan hoplites on rough ground, shocked the Greek world. Demosthenes pioneered combined-arms tactics integrating light and heavy infantry that pointed toward the future of Greek warfare under Philip and Alexander.',
logistics:'Athens\' dependence on imported grain from the Black Sea region created a critical logistical vulnerability that Sparta eventually exploited. The Long Walls connecting Athens to Piraeus ensured supply by sea but created a crowded, plague-prone environment within the city. The Sicilian Expedition\'s logistical challenges, operating 1,500 kilometers from home without secure supply lines, contributed significantly to the disaster.',
intelligence:'Thucydides\' history reveals a world of spies, double agents, and covert operations that pervaded Greek interstate relations. Alcibiades provided both Sparta and Athens with invaluable intelligence about the other side\'s plans and vulnerabilities during his multiple defections. The Spartan use of the krypteia, a secret service that terrorized the helot population, demonstrated the domestic intelligence dimension of warfare.',
propaganda:'Both sides justified the war through competing ideological narratives, with Athens championing democracy and freedom while Sparta claimed to be liberating Greece from Athenian tyranny. Pericles\' Funeral Oration, as recorded by Thucydides, became the supreme statement of democratic values and wartime sacrifice. The Mytilenean Debate and Melian Dialogue explored the moral dimensions of imperial power with unflinching honesty.',
civilians:'Civilian suffering was immense, with entire populations massacred or enslaved as warfare grew increasingly brutal. The Athenian destruction of Melos in 416 BCE, killing all men and enslaving women and children, exemplified the war\'s moral deterioration. The plague, starvation during sieges, and displacement created humanitarian catastrophes throughout the Greek world.',
aftermath:'Athens\' surrender in 404 BCE led to the installation of the oligarchic Thirty Tyrants, the demolition of the Long Walls, and the loss of the empire, though democracy was restored within a year. Sparta\'s hegemony proved short-lived, as heavy-handed domination alienated former allies and led to new conflicts. The war permanently weakened the Greek city-state system, creating the conditions for Macedonian conquest within two generations.',
causes:'Thucydides identified the fundamental cause as Spartan fear of growing Athenian power, while immediate triggers included disputes over Corcyra, Potidaea, and the Megarian Decree. Athens\' transformation of the Delian League from a voluntary alliance into an empire created resentment among both subjects and rival states. The structural tensions between a rising sea power and an established land power created what modern scholars call the Thucydides Trap.',
alliances:'The bipolar alliance system divided virtually every Greek state into Athenian or Spartan camps, with neutrality nearly impossible to maintain. Persia emerged as the decisive third party, with its financial support enabling Sparta to build the fleet that won the war. Alliance management proved crucial, as Athens\' harsh treatment of subject allies drove defections while Sparta\'s promise of liberation attracted support.',
guerrilla:'Demosthenes pioneered raiding strategies from fortified coastal positions, establishing bases like Pylos that disrupted Spartan territory and encouraged helot defections. Athenian light-armed raids on Peloponnesian coastal communities represented an early form of asymmetric maritime warfare. The extended nature of the conflict increasingly blurred lines between conventional and irregular operations.',
legacy:'The Peloponnesian War bequeathed to posterity Thucydides\' history, the foundational text of political realism and strategic studies that remains required reading in military academies. The war demonstrated how democracies could make catastrophically bad strategic decisions when driven by emotion and demagoguery. Its lessons about imperial overstretch, the dangers of prolonged conflict, and the fragility of civilization remain painfully relevant.',
figures:'Pericles guided Athens into the war with a sound defensive strategy but died of the plague before he could see it through. Lysander of Sparta was the war\'s most effective commander, combining naval skill with political ruthlessness to engineer Athens\' final defeat. Nicias, the reluctant Athenian commander of the Sicilian Expedition, exemplified how political timidity and military caution could produce catastrophic outcomes.',
women:'Aspasia of Miletus, Pericles\' companion, was reportedly influential in Athenian political circles, with some ancient sources crediting her with contributing to Pericles\' oratory. Spartan women managed estates and maintained the economy while men were on campaign, exercising more economic power than women in any other Greek state. The women of Plataea endured a brutal siege alongside their men, and those of Melos were enslaved when their city fell, emblematic of the war\'s human cost.'
}},
{id:'alexander',nm:'Wars of Alexander',sb:'Macedon to India \u00b7 Conquest',s:-334,e:-323,lon:23.7,lat:40.6,
conns:['persian','peloponnesian','punic'],fp:{scale:9,dur:4,innov:8,cas:7,geo:10,leg:10},
overview:'Alexander the Great\'s campaigns from 334 to 323 BCE created the largest empire the world had yet seen, stretching from Greece to India in just eleven years of relentless conquest. His victories at Granicus, Issus, and Gaugamela destroyed the Persian Empire, while his march through Central Asia and invasion of India pushed the boundaries of the known world. Alexander\'s military genius, combined with the superb Macedonian army inherited from his father Philip II, revolutionized warfare and spread Greek culture across the ancient world.',
d:{
overview:'Alexander III of Macedon conducted one of history\'s most extraordinary military campaigns, defeating the Persian superpower and conquering territories spanning three continents in just over a decade. His army, built on Philip II\'s revolutionary combined-arms innovations, proved unstoppable against every opponent and in every type of terrain. The campaigns permanently altered the political geography of the ancient world, inaugurating the Hellenistic era of Greek cultural dominance.',
strategy:'Alexander\'s grand strategy combined political and military objectives with remarkable sophistication, seeking not merely to defeat the Persian army but to replace the entire imperial system with Macedonian rule. His operational approach consistently sought decisive battle, using oblique attacks to create local superiority at the critical point while refusing one flank. The campaign against Darius demonstrated strategic patience in securing the Mediterranean coast before advancing inland, denying the Persian fleet its bases.',
weapons:'The Macedonian sarissa, an eighteen-foot pike wielded in dense phalanx formation, gave Alexander\'s infantry an unmatched reach advantage that no contemporary force could overcome at close quarters. The Companion cavalry combined heavy armor with xyston lances and the wedge formation, creating a shock force of unprecedented power. Siege technology reached new heights under Alexander, with massive siege towers, torsion catapults, and the famous causeway at Tyre demonstrating engineering capability that rivaled Roman achievements centuries later.',
leadership:'Alexander led from the front in every major battle, personally commanding the Companion cavalry charge at the decisive point, suffering numerous wounds that demonstrated both his courage and recklessness. His ability to inspire troops across years of campaigning thousands of miles from home represents perhaps the greatest sustained feat of military leadership in history. He combined tactical brilliance with strategic vision, political acumen, and cultural sensitivity that allowed him to hold together an increasingly diverse empire.',
casualties:'Alexander\'s battles produced heavy casualties among his opponents while Macedonian losses remained comparatively modest due to superior tactics and equipment. The siege of Tyre resulted in 8,000 defenders killed and 30,000 enslaved, while Gaugamela may have cost the Persians 40,000 or more dead. Macedonian cumulative losses from battle, disease, and exhaustion over eleven years of campaigning were severe enough to eventually erode the army\'s willingness to continue.',
naval:'Alexander\'s approach to naval warfare was characteristically unconventional: lacking fleet superiority, he defeated the Persian navy by capturing its coastal bases, a strategy of breathtaking audacity. The siege of Tyre required construction of a massive causeway to reach the island fortress, effectively creating a new form of amphibious warfare. After conquering Egypt, Alexander established Alexandria as a naval base that would dominate Mediterranean commerce for centuries.',
siege:'Alexander conducted some of the most impressive sieges in ancient history, with Tyre and Gaza demonstrating engineering capability and determination that few commanders could match. The seven-month siege of Tyre, requiring a half-mile causeway built through deep water under constant attack, ranks among the greatest engineering feats of the ancient world. At the Sogdian Rock and Aornus, Alexander\'s troops scaled cliffs thought to be impregnable, combining mountaineering skill with psychological warfare.',
cavalry:'The Companion cavalry under Alexander represented the finest heavy cavalry in the ancient world, trained to charge in wedge formation and exploit gaps in enemy lines. Alexander\'s tactical system centered on the cavalry delivering the decisive blow after the phalanx fixed the enemy in place, a combined-arms approach perfected at Gaugamela. The addition of Central Asian horse archers and mounted javelin troops diversified Macedonian cavalry capability as the campaigns progressed eastward.',
infantry:'The Macedonian phalanx, armed with the sarissa pike and organized in syntagmata of 256 men, formed the anvil against which Alexander\'s cavalry hammer struck. The hypaspists, elite infantry capable of both phalanx fighting and more flexible operations, provided the tactical link between infantry and cavalry. As campaigns extended into Asia, Alexander increasingly integrated Persian and Central Asian infantry into his forces, creating a multicultural army.',
logistics:'Alexander\'s logistical achievement in sustaining an army across 20,000 miles of campaigning through deserts, mountains, and river valleys remains one of history\'s most impressive organizational feats. The army relied on a combination of pre-positioned supplies, local requisitioning, and an efficient baggage train that Philip II had streamlined by eliminating wheeled transport. The disastrous march through the Gedrosian Desert, where thousands perished from heat and thirst, demonstrated the lethal consequences of logistical miscalculation.',
intelligence:'Alexander maintained an extensive intelligence network including scouts, local informants, and captured enemy personnel who provided crucial information about terrain, enemy dispositions, and political situations. Before Gaugamela, Alexander personally led a reconnaissance in force that located the Persian army and identified the prepared battlefield. His cultural intelligence was equally important, as understanding local power structures allowed him to co-opt regional elites throughout the empire.',
propaganda:'Alexander was a master of propaganda, cultivating a heroic image modeled on Achilles and Heracles that inspired both his troops and conquered populations. The visit to the oracle of Amun at Siwa, where Alexander was allegedly recognized as the son of Zeus, established his divine credentials in both Greek and Egyptian traditions. Court historians including Callisthenes shaped the narrative of the campaigns, creating a legend that would grow for millennia after Alexander\'s death.',
civilians:'Alexander\'s treatment of civilian populations ranged from generous accommodation to brutal mass punishment, depending on whether cities submitted or resisted. The destruction of Thebes in 335 BCE, where 6,000 were killed and 30,000 enslaved, served as a terrifying example that discouraged resistance throughout Greece. In Persia and beyond, Alexander generally preserved existing administrative structures and promoted cultural fusion, a policy that facilitated governance of diverse populations.',
aftermath:'Alexander\'s sudden death in Babylon in 323 BCE at age thirty-two plunged his empire into the Wars of the Diadochi, as his generals carved the conquests into competing kingdoms. The resulting Hellenistic states\u2014Ptolemaic Egypt, Seleucid Asia, Antigonid Macedon\u2014spread Greek culture and institutions across the Near East for three centuries. The political fragmentation, however, ultimately left these successor states vulnerable to Roman expansion from the west.',
causes:'Alexander inherited his father Philip II\'s planned invasion of Persia, motivated by Greek desire for revenge against Xerxes\' invasion 150 years earlier and Macedonian ambition for wealth and glory. The Persian Empire\'s internal weaknesses, including satrap revolts and a succession crisis, created favorable conditions for invasion. Alexander\'s personal ambition, modeled on heroic predecessors and driven by a competitive nature that accepted no limits, transformed a punitive expedition into a world-conquering campaign.',
alliances:'Alexander maintained the League of Corinth as a framework for Greek participation in the campaign, though Macedonian dominance made it effectively a tool of royal policy. As conquests expanded, Alexander incorporated Persian nobles, Central Asian chieftains, and Indian rajahs into his alliance network through marriage, appointment, and diplomacy. The mutiny at Opis in 324 BCE revealed tensions between Macedonian veterans and Alexander\'s policy of integrating conquered peoples into the military and governing elite.',
guerrilla:'Alexander faced his most prolonged and difficult campaigning against guerrilla resistance in Central Asia from 329 to 327 BCE, where Spitamenes led a mobile insurgency that frustrated conventional Macedonian tactics. The mountainous terrain of modern Afghanistan and Pakistan favored defenders who could disappear into inaccessible valleys after striking at isolated garrisons. Alexander responded with a combination of mobile columns, fortified outposts, and political co-optation that anticipated counterinsurgency strategies used in the same region two millennia later.',
legacy:'Alexander\'s conquests inaugurated the Hellenistic age, spreading Greek language, culture, and political institutions across the Near East and Central Asia in a cultural transformation that lasted centuries. His military methods, particularly the combined-arms integration of infantry, cavalry, and siege warfare, established a template studied by commanders from Hannibal to Napoleon. The legend of Alexander became the most enduring heroic narrative in world history, inspiring rulers and conquerors across cultures from Rome to the Islamic world.',
figures:'Alexander himself remains one of the most studied figures in military history, a tactical genius and inspirational leader whose ambition ultimately consumed him. Hephaestion, Alexander\'s closest companion and senior cavalry commander, played a crucial role in both military operations and the administration of conquered territories. Parmenion, the experienced veteran general inherited from Philip, commanded the left wing in major battles and provided cautious counsel that Alexander frequently overruled.',
women:'Olympias, Alexander\'s mother, was a formidable political figure who maintained Macedonian interests during his absence and played a bloody role in the succession wars after his death. Roxana, the Bactrian princess Alexander married for both love and political alliance, bore his posthumous son Alexander IV and fought desperately to protect his claim. The captured Persian royal women, including Queen Sisygambis, were treated with notable respect by Alexander, who used their status to legitimate his rule over the Persian Empire.'
}},
{id:'punic',nm:'Punic Wars',sb:'Mediterranean \u00b7 Rome vs Carthage',s:-264,e:-146,lon:10.2,lat:36.8,
conns:['alexander','gallic','peloponnesian'],fp:{scale:8,dur:9,innov:7,cas:8,geo:10,leg:9},
overview:'The Punic Wars were three conflicts fought between Rome and Carthage from 264 to 146 BCE that determined the mastery of the western Mediterranean and the trajectory of Western civilization. The wars produced Hannibal Barca, one of history\'s greatest military commanders, whose crossing of the Alps and sixteen-year campaign in Italy pushed Rome to the brink of destruction. Rome\'s ultimate victory transformed it from a regional Italian power into a Mediterranean superpower, while Carthage was utterly destroyed, its site sown with salt in a symbolic act of total annihilation.',
d:{
overview:'The Punic Wars constituted the defining struggle of the ancient western Mediterranean, a century-long contest between two fundamentally different civilizations for regional supremacy. Rome\'s agrarian republic, with its citizen-soldier legions and relentless determination, faced Carthage\'s mercantile empire, with its professional mercenary armies and maritime supremacy. The outcome permanently shaped the political, cultural, and linguistic development of Europe, North Africa, and the Middle East.',
strategy:'The First Punic War saw Rome transform itself from a land power into a naval force, while the Second Punic War featured Hannibal\'s revolutionary indirect strategy of invading Italy overland to detach Rome\'s allies. Fabius Maximus\' attrition strategy of avoiding battle while shadowing Hannibal, though initially unpopular, proved essential to Roman survival after catastrophic defeats. Scipio Africanus\' counter-invasion of Africa forced Hannibal\'s recall and demonstrated that strategic initiative could overcome tactical brilliance.',
weapons:'Roman military innovation was dramatic, with the corvus boarding bridge transforming naval warfare in the First Punic War by allowing legionaries to fight on ship decks as if on land. Hannibal\'s use of war elephants, while psychologically terrifying, proved tactically unreliable in major battles, with the animals as dangerous to their own side as to the enemy. The Roman gladius, a short stabbing sword optimized for close-quarters combat in formation, proved devastatingly effective against the longer slashing swords favored by Celtic and Iberian warriors.',
leadership:'Hannibal Barca stands among the greatest military commanders in history, maintaining an army in hostile territory for sixteen years through sheer force of personality and tactical genius. Scipio Africanus matched Hannibal\'s tactical brilliance while demonstrating superior strategic vision, recognizing that the war could only be won by striking at Carthage itself. The contrast between Roman collective leadership, which could absorb catastrophic defeats and continue fighting, and Carthage\'s reliance on individual genius, ultimately favored Rome.',
casualties:'The Battle of Cannae in 216 BCE produced approximately 50,000 Roman dead in a single day, the bloodiest day in Western military history before the Somme. The Second Punic War killed an estimated 300,000 Roman and Italian soldiers over seventeen years, along with vast civilian casualties from Hannibal\'s ravaging of the countryside. Carthage\'s final destruction in 146 BCE resulted in the death or enslavement of virtually its entire remaining population of perhaps 200,000.',
naval:'The First Punic War was primarily a naval conflict, with Rome building its first major fleet and winning decisive victories at Mylae and the Aegates Islands despite initial inexperience. Roman naval innovation, particularly the corvus boarding device, negated Carthaginian seamanship advantages by converting naval battles into infantry engagements. By the Third Punic War, Rome\'s complete naval dominance allowed the siege and destruction of Carthage without any significant maritime challenge.',
siege:'The siege of Syracuse during the Second Punic War was complicated by Archimedes\' defensive inventions, including crane-like devices that lifted Roman ships and possibly focusing mirrors. The siege of Carthage in the Third Punic War lasted three years, with house-to-house fighting through the city\'s dense urban core representing some of the most intense combat of the ancient world. Roman siege engineering advanced significantly through these wars, developing techniques that would characterize Roman military operations for centuries.',
cavalry:'Hannibal\'s Numidian light cavalry and Iberian-Celtic heavy cavalry gave him decisive superiority in the mounted arm that was instrumental in his great victories. At Cannae, Hannibal\'s cavalry envelopment of the Roman flanks created the double envelopment that destroyed eight legions, a tactical masterpiece studied to this day. Scipio\'s recruitment of Numidian cavalry under Masinissa for the Zama campaign neutralized Hannibal\'s traditional mounted advantage and proved decisive.',
infantry:'The Roman manipular legion, with its flexible three-line system of hastati, principes, and triarii, proved adaptable enough to survive catastrophic defeats and eventually prevail. Hannibal\'s multi-ethnic infantry, combining Libyan heavy foot, Celtic warriors, and Iberian swordsmen, was welded into a cohesive fighting force through training and loyalty to their commander. The evolution of Roman infantry tactics through the Punic Wars laid the groundwork for the cohort-based legion that would conquer the Mediterranean world.',
logistics:'Hannibal\'s march across the Alps with approximately 50,000 troops and war elephants remains one of history\'s most audacious logistical achievements, though it cost him nearly half his army. Roman logistical superiority ultimately proved decisive, as the ability to continuously raise, equip, and deploy new armies wore down Carthaginian resources. The Roman road system and colonial network in Italy provided strategic mobility and supply infrastructure that no opponent could match.',
intelligence:'Hannibal\'s intelligence network in Italy was extensive, with spies and sympathizers providing information about Roman troop movements and political developments. Roman intelligence failures before Trasimene and Cannae, where Hannibal achieved tactical surprise despite his army operating in hostile territory, were catastrophic. Scipio\'s intelligence operations in Africa, including the famous reconnaissance mission disguised as a diplomatic embassy, demonstrated growing Roman sophistication.',
propaganda:'Roman propaganda transformed the Punic Wars into an existential struggle between civilization and barbarism, with Carthaginian practices like child sacrifice emphasized to justify total destruction. Hannibal was simultaneously demonized as Rome\'s greatest enemy and respected as a military genius, creating a complex cultural legacy. The phrase "Carthago delenda est," attributed to Cato the Elder, became a symbol of implacable determination that echoed through Roman political discourse.',
civilians:'Civilian suffering was immense throughout all three wars, with Hannibal\'s Italian campaign devastating the agricultural heartland and displacing hundreds of thousands. Roman reprisals against Italian communities that defected to Hannibal were savage, with cities like Capua severely punished for their betrayal. The complete destruction of Carthage in 146 BCE, including the enslavement of survivors and the ritual cursing of the site, represented the ancient world\'s most thorough act of civilizational annihilation.',
aftermath:'Rome\'s victory established unchallenged dominance over the western Mediterranean, acquiring Spain, North Africa, and Sicily as provincial territories. The influx of wealth, slaves, and territory transformed Roman society, contributing to the social and political upheavals that would eventually destroy the Republic. Carthage\'s obliteration removed the only power capable of challenging Roman expansion, opening the way for the creation of a Mediterranean-wide empire.',
causes:'The First Punic War arose from Roman intervention in a Sicilian dispute that brought Roman and Carthaginian interests into direct conflict for the first time. Carthaginian expansion in Spain under the Barcid family, and Rome\'s alliance with Saguntum in Carthaginian territory, created the casus belli for the Second Punic War. The Third Punic War was driven by Roman fear and commercial jealousy of Carthage\'s economic recovery, with hawks like Cato demanding preventive destruction.',
alliances:'Hannibal\'s alliance strategy sought to detach Rome\'s Italian allies, successfully recruiting major cities like Capua and Tarentum but failing to break the core Latin alliance. Rome\'s alliance with Masinissa\'s Numidian kingdom proved crucial, providing cavalry superiority at Zama and creating a permanent threat to Carthage\'s African territories. The broader Mediterranean diplomatic context, including Macedon\'s alliance with Hannibal, demonstrated the global stakes of the conflict.',
guerrilla:'The Spanish theater of the Second Punic War featured extensive guerrilla warfare, with Iberian tribes employing hit-and-run tactics against both Roman and Carthaginian forces. Hannibal\'s later years in Italy increasingly resembled guerrilla warfare, as his weakened army relied on raids and ambushes rather than major battles. The Numidian light cavalry that served both sides were masters of irregular warfare, harassing enemies with javelin attacks and feigned retreats.',
legacy:'The Punic Wars established Rome as the dominant Mediterranean power and set the stage for the Roman Empire that would shape Western civilization for centuries. Hannibal\'s tactical innovations, particularly the double envelopment at Cannae, became the standard against which military genius was measured, influencing commanders from Scipio to Schwarzkopf. The destruction of Carthage became a cautionary tale about the consequences of total war and the ruthlessness of imperial power.',
figures:'Hannibal Barca, who swore eternal enmity to Rome as a child and spent his life fulfilling that oath, remains one of the most studied military commanders in history. Scipio Africanus matched Hannibal\'s genius and added strategic vision, earning the honorific "Africanus" for his decisive victory at Zama. Cato the Elder, whose relentless advocacy for Carthage\'s destruction shaped Roman policy, embodied the implacable determination that characterized Roman imperialism.',
women:'Sophonisba, a Carthaginian noblewoman, played a dramatic diplomatic role in the Second Punic War, marrying the Numidian king Syphax to secure his alliance with Carthage. Dido, Carthage\'s legendary founder queen, was invoked throughout the wars as a symbol of Carthaginian identity and civilization. Roman women contributed to the war effort by donating jewelry and valuables to fund new armies after catastrophic defeats like Cannae, demonstrating the total mobilization of Roman society.'
}},
{id:'roman',nm:'Roman Civil Wars',sb:'Mediterranean · Republic vs Republic',s:-49,e:-30,lon:12.5,lat:41.9,
conns:['punic','crusades'],fp:{scale:8,dur:3,innov:6,cas:7,geo:8,leg:10},
overview:'The Roman Civil Wars of the late Republic, spanning from Caesar\'s crossing of the Rubicon in 49 BCE to Octavian\'s defeat of Antony and Cleopatra at Actium in 31 BCE, destroyed the Roman Republic and gave birth to the Roman Empire. These interconnected conflicts pitted Roman legions against Roman legions in battles across the Mediterranean world, from Spain to Egypt. The wars produced some of antiquity\'s greatest military commanders and established the political template of autocratic rule that would dominate Western civilization for centuries.',
d:{
overview:'The Roman Civil Wars represented the violent transformation of the Roman Republic into the Roman Empire, driven by the ambitions of military strongmen who commanded the loyalty of professional armies. Caesar\'s campaigns against Pompey, followed by the wars of the Second Triumvirate, demonstrated that Rome\'s republican institutions could no longer contain the political power of its most successful generals. The final victory of Octavian established the Principate, a monarchical system disguised in republican forms that endured for centuries.',
strategy:'Caesar\'s strategic genius lay in his speed of movement and willingness to accept battle on unfavorable terms, repeatedly wrong-footing opponents who expected conventional approaches. His crossing of the Rubicon with a single legion demonstrated the power of decisive action over careful preparation. Octavian\'s strategy against Antony combined naval blockade, propaganda warfare, and patience, allowing his opponent\'s coalition to fragment before striking at Actium.',
weapons:'Roman legionary equipment had reached a high point of standardization, with the gladius short sword, pilum javelin, and scutum shield forming an integrated weapons system perfected over centuries of warfare. Siege technology including ballistae, onagers, and sophisticated circumvallation techniques gave besieging forces powerful tools, as demonstrated at Alesia. Naval warfare at Actium employed the harpax grappling device and incendiary weapons alongside traditional ramming tactics.',
leadership:'Julius Caesar combined tactical brilliance with extraordinary personal charisma, inspiring fierce loyalty in troops who followed him against the legitimate government of Rome. Pompey the Great, despite vast experience and resources, proved unable to match Caesar\'s audacity and speed of decision. Octavian compensated for limited military talent by surrounding himself with brilliant subordinates, particularly Marcus Agrippa, whose naval genius proved decisive at Actium.',
casualties:'The civil wars inflicted staggering losses on Rome\'s military manpower, with battles like Pharsalus, Philippi, and Actium each producing tens of thousands of casualties among Rome\'s best-trained soldiers. The proscriptions that accompanied each phase of conflict killed thousands of Roman citizens, including senators and equestrians, devastating the Republic\'s political class. Total military and civilian deaths across the civil war period likely exceeded several hundred thousand.',
naval:'Naval warfare played a crucial role in the civil wars, from Caesar\'s contested crossing to Africa to the decisive Battle of Actium in 31 BCE. Sextus Pompeius established a powerful pirate fleet that threatened Rome\'s grain supply until Agrippa\'s naval innovations destroyed it at Naulochus. Actium, where Agrippa\'s fleet trapped and defeated Antony and Cleopatra\'s combined navy, was one of the most consequential naval battles in Western history.',
siege:'Caesar\'s siege of Massilia demonstrated Roman siege engineering at its finest, with multiple siege towers and a massive earthen ramp constructed despite fierce resistance. The siege of Alesia during the Gallic Wars showcased Caesar\'s signature technique of double circumvallation, building walls facing both inward and outward. At Perusia, Octavian besieged Lucius Antonius with brutal efficiency, starving the garrison into surrender.',
cavalry:'Cavalry played an increasingly important role in the civil wars, with both sides employing Gallic, Germanic, and Eastern horsemen as auxiliaries. Caesar\'s cavalry was initially inferior to Pompey\'s at Pharsalus, leading him to create an improvised fourth line of infantry to counter the mounted threat. The Parthian-style mounted archers that Antony employed proved formidable but could not overcome the disciplined Roman infantry tactics of Octavian\'s forces.',
infantry:'The Roman legionary remained the dominant combat arm, with civil war battles essentially pitting identical military systems against each other. Veterans of Caesar\'s Gallic campaigns formed the core of his army, their experience and esprit de corps giving them a qualitative edge over hastily raised legions. The professionalization of the legions under Marius had created armies loyal to their commanders rather than the state, the fundamental cause of the civil wars.',
logistics:'Caesar\'s campaigns demonstrated extraordinary logistical capability, moving armies rapidly across vast distances while maintaining combat effectiveness. The control of Egypt\'s grain supply became a critical strategic factor, as whoever held Egypt could threaten Rome\'s food security. Octavian\'s ability to maintain large armies in the field for extended periods while simultaneously funding a naval building program reflected the superior economic resources he controlled.',
