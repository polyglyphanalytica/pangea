<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bellum — War & Conflict Atlas</title>

<meta name="description" content="Explore 50 wars and conflicts across human history on an interactive world map. Navigate a continuous timeline with 20 interpretive lenses, military transmissions, What-If scenarios, and Heritage mode.">
<meta name="keywords" content="war history, battles, military history, conflicts, interactive map, timeline, world wars, strategy">
<meta name="author" content="Polyglyph Analytica">
<meta name="robots" content="index, follow">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── DARK THEME (default) ── */
:root{
  --bg:#02040a;
  --panel:#070b12;
  --panel2:#0c1018;
  --ocean-start:#0a1628;--ocean-end:#061020;
  --land:#2a4a18;--land-s:#3a6020;
  --amber:#e89820;--amber-b:#f0b040;--amber-d:#3a2204;
  --amber-x:rgba(232,152,32,0.14);--amber-xx:rgba(232,152,32,0.08);
  --txt:#f2e8d5;--txt2:#e0d4b4;--txt3:#c8aa78;
  --bdr:rgba(232,152,32,0.22);--bdr2:rgba(232,152,32,0.10);
  --hint:rgba(224,212,180,0.65);
  --tl-bg:rgba(2,4,10,0.99);
  --hdr-bg:rgba(2,4,10,0.97);
  --conn-bdr:rgba(232,152,32,0.10);
  --shadow:rgba(0,0,0,0.6);
}

/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#f0ebe0;
  --panel:#e8e0d0;
  --panel2:#ddd4c0;
  --ocean-start:#b8cce0;--ocean-end:#a8bcd4;
  --land:#8ca860;--land-s:#7a9850;
  --amber:#4a2c00;--amber-b:#5a3800;--amber-d:#f0d8a0;
  --amber-x:rgba(122,78,0,0.10);--amber-xx:rgba(122,78,0,0.06);
  --txt:#1a1206;--txt2:#1a1206;--txt3:#2e2010;
  --bdr:rgba(122,78,0,0.28);--bdr2:rgba(122,78,0,0.14);
  --hint:rgba(30,18,6,0.6);
  --tl-bg:rgba(236,228,214,0.99);
  --hdr-bg:rgba(236,228,214,0.97);
  --conn-bdr:rgba(122,78,0,0.12);
  --shadow:rgba(0,0,0,0.18);
}

@media(prefers-color-scheme:light){
  :root:not([data-theme="dark"]){
    --bg:#f0ebe0;--panel:#e8e0d0;--panel2:#ddd4c0;
    --ocean-start:#b8cce0;--ocean-end:#a8bcd4;
    --land:#8ca860;--land-s:#7a9850;
    --amber:#4a2c00;--amber-b:#5a3800;--amber-d:#f0d8a0;
    --amber-x:rgba(122,78,0,0.10);--amber-xx:rgba(122,78,0,0.06);
    --txt:#1a1206;--txt2:#1a1206;--txt3:#2e2010;
    --bdr:rgba(122,78,0,0.28);--bdr2:rgba(122,78,0,0.14);
    --hint:rgba(30,18,6,0.6);
    --tl-bg:rgba(236,228,214,0.99);
    --hdr-bg:rgba(236,228,214,0.97);
    --conn-bdr:rgba(122,78,0,0.12);
    --shadow:rgba(0,0,0,0.18);
  }
}

html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Crimson Pro',serif}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--hdr-bg);gap:12px}
.hdr-left{display:flex;align-items:baseline;gap:0;min-width:0}
.logo-t{font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:700;color:var(--amber-b);letter-spacing:3px;white-space:nowrap}
.logo-s{font-family:'Cinzel',serif;font-size:13px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase;margin-left:10px;white-space:nowrap}
.era-disp{text-align:center;font-family:'Cinzel',serif;flex-shrink:0}
.era-y{font-size:22px;font-weight:600;color:var(--amber-b);letter-spacing:1px}
.era-n{font-size:12px;letter-spacing:1.5px;color:var(--txt2);margin-top:1px;text-transform:uppercase;font-weight:600}
.hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.cnt-disp{text-align:right;font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;color:var(--txt3)}
.cnt-n{font-size:22px;font-weight:600;color:var(--amber);display:block;line-height:1}
.theme-btn{background:none;border:1px solid var(--bdr);padding:4px 8px;cursor:pointer;font-size:13px;color:var(--txt2);border-radius:3px;transition:all .15s;flex-shrink:0}
.theme-btn:hover{background:var(--amber-x);color:var(--amber-b)}

/* ── MAIN LAYOUT ── */
.main{position:fixed;top:52px;left:0;right:0;bottom:0;display:flex}
.map-c{flex:1;position:relative;overflow:hidden;min-width:0;min-height:0}
.map-tl-col{display:flex;flex-direction:column;flex:1;min-width:0}
#wsvg{width:100%;height:100%}

/* ── DESKTOP PANEL ── */
.info-panel{width:320px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--bdr);overflow-y:auto;padding:18px 18px 28px;position:relative}
.info-close{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:16px;line-height:1;padding:4px;float:right;margin:-2px -2px 0 0}
.info-close:hover{color:var(--amber-b)}
.info-nm{font-family:'Cinzel Decorative',serif;font-size:16px;font-weight:700;color:var(--amber-b);margin-bottom:3px;clear:both}
.info-sb{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1.5px;color:var(--txt2);text-transform:uppercase;margin-bottom:10px}
.info-dates{display:flex;gap:6px;margin-bottom:14px;align-items:center}
.info-dt{padding:5px 12px;border:1px solid var(--bdr);font-family:'Cinzel',serif;font-size:13.5px;color:var(--amber-b)}
.info-arr{color:var(--txt2);font-size:12px}

/* ── LENS DROPDOWN ── */
.lens-dd-wrap{border:1px solid var(--bdr);margin-bottom:14px}
.lens-dd-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;cursor:pointer;user-select:none;background:var(--amber-xx);border-bottom:1px solid transparent;transition:background .15s}
.lens-dd-hdr:hover{background:var(--amber-x)}
.lens-dd-hdr.open{border-bottom-color:var(--bdr)}
.lens-dd-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:2.5px;color:var(--txt2);text-transform:uppercase;flex-shrink:0}
.lens-dd-summary{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.5px;color:var(--amber-b);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;padding:0 6px}
.lens-dd-arrow{color:var(--txt2);font-size:10px;transition:transform .18s;flex-shrink:0}
.lens-dd-arrow.open{transform:rotate(180deg)}
.lens-dd-list{display:none;max-height:260px;overflow-y:auto}
.lens-dd-list.open{display:block}
.lens-row{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--bdr2);transition:background .15s}
.lens-row:last-child{border-bottom:none}
.lens-row:hover{background:var(--amber-x)}
.lens-row-chk{width:13px;height:13px;border:1px solid var(--bdr);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--amber-b);line-height:1}
.lens-row-chk.on{background:var(--amber-x);border-color:var(--amber-b)}
.lens-row-ico{font-size:14px;width:16px;text-align:center;flex-shrink:0;color:var(--txt2)}
.lens-row-lbl{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.5px;color:var(--txt2)}
.lens-row.on .lens-row-lbl{color:var(--amber-b);font-weight:600}
.lens-row-sep{border-bottom:1px solid var(--bdr);margin-bottom:2px}
.lens-dd-close-btn{text-align:center;padding:10px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;color:var(--amber-b);border-top:1px solid var(--bdr);cursor:pointer;text-transform:uppercase;transition:background .15s}
.lens-dd-close-btn:hover{background:var(--amber-x)}

/* ── DRAWER CONTENT ── */
.lens-section{margin-bottom:18px}
.lens-section-hdr{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.lens-section-ico{font-size:12px;color:var(--txt2)}
.lens-section-lbl{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;color:var(--amber-b);text-transform:uppercase;font-weight:600}
.info-div{border:none;border-top:1px solid var(--bdr);margin:12px 0}
.info-txt{font-size:17.5px;line-height:1.95;color:var(--txt);font-style:italic}
.overview-arc{font-size:17.5px;line-height:1.95;color:var(--txt)}
.overview-arc p{margin-bottom:14px}
.civ-span-bar{height:3px;background:var(--bdr2);position:relative;margin:14px 0 6px;border-radius:2px}
.civ-span-fill{position:absolute;top:0;height:100%;background:var(--amber-b);border-radius:2px;opacity:.8}
.civ-span-lbls{display:flex;justify-content:space-between;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--txt3)}
.conn-hdr{font-family:'Cinzel',serif;font-size:13px;letter-spacing:1.5px;color:var(--txt3);text-transform:uppercase;margin:18px 0 8px;font-weight:600}
.conn-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--conn-bdr);font-size:16px;color:var(--txt2);cursor:pointer;transition:color .15s}
.conn-item:hover{color:var(--amber-b)}
.conn-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── TIMELINE ── */
.tl-wrap{position:relative;height:88px;background:var(--tl-bg);border-top:1px solid var(--bdr);padding:8px 20px 14px;flex-shrink:0}
.tl-lbls{display:flex;justify-content:space-between;margin-bottom:5px}
.tl-lbl{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.8px;color:var(--txt3);text-transform:uppercase;font-weight:600}
.tl-trk{position:relative;height:5px;background:var(--bdr);border-radius:3px}
.tl-fill{position:absolute;top:0;left:0;height:5px;background:var(--amber-b);border-radius:3px;pointer-events:none;opacity:.7}
.tl-thumb{position:absolute;top:50%;width:20px;height:20px;background:var(--amber-b);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--amber),0 0 20px rgba(232,152,32,.3);pointer-events:none;transition:left .04s linear}
input.tl-range{position:absolute;top:50%;left:0;width:100%;height:28px;opacity:0;cursor:pointer;transform:translateY(-50%);margin:0;z-index:2}
.hint{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;color:var(--hint);display:flex;align-items:center;justify-content:center;padding:0 8px;white-space:nowrap;overflow:hidden}
#map-hint-text{pointer-events:none;overflow:hidden;text-overflow:ellipsis}

/* ── MOB MAP BUTTON ── */
.mob-map-btn{display:none}

/* ── PORTRAIT MOBILE ── */
@media(max-width:768px) and (orientation:portrait){
  .logo-s{display:none}
  .cnt-disp{display:none}
  .hdr{padding:8px 12px}
  .logo-t{font-size:16px;letter-spacing:2px}
  .era-y{font-size:18px}
  .era-n{font-size:10px;letter-spacing:1.5px}
  .main{top:52px!important;bottom:0;flex-direction:column}
  .map-tl-col{width:100%}
  .map-c{flex:0 0 42vh;width:100%}
  .info-panel{flex:1;width:100%;border-left:none;border-top:1px solid var(--bdr);overflow-y:auto;padding:0 16px 16px;border-radius:0}
  .tl-wrap{height:76px;padding:6px 14px 10px}
  .tl-lbl{font-size:9px;letter-spacing:.8px}
  .hint{font-size:8px;letter-spacing:.8px}
  .lens-dd-list{max-height:180px}
  .info-txt,.overview-arc{font-size:16px;line-height:1.82}
  .lens-row-lbl{font-size:13px}
}

/* ── LANDSCAPE MOBILE ── */
@media(max-width:900px) and (orientation:landscape){
  .logo-s{display:none}
  .hdr{padding:6px 14px}
  .logo-t{font-size:15px;letter-spacing:2px}
  .era-y{font-size:15px}
  .hint{font-size:7px;letter-spacing:.5px;white-space:normal;text-align:center;line-height:1.4}
  .tl-wrap{height:68px;padding:4px 12px 8px}
  .tl-lbl{font-size:8px}
  .info-panel{width:280px}
}

@keyframes ring-pulse{0%{r:5;opacity:.7}100%{r:26;opacity:0}}

@media(pointer:coarse){
  #mark-layer g[role="button"]{cursor:pointer}
}

/* ── ACCESSIBILITY ── */
:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px;border-radius:2px}
.conn-item:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px}
.lens-row:focus-visible{outline:2px solid var(--amber-b);outline-offset:-2px}
button:focus-visible{outline:2px solid var(--amber-b);outline-offset:2px}
.skip-link{position:absolute;top:-40px;left:0;background:var(--amber-b);color:var(--bg);padding:8px 16px;z-index:9999;font-family:'Cinzel',serif;font-size:11px;text-decoration:none}
.skip-link:focus{top:0}

/* ── THREAD PANEL ── */
.thread-panel{
  position:fixed;top:52px;left:0;right:0;z-index:400;
  background:var(--panel);
  max-height:0;overflow:hidden;
  transition:max-height .32s cubic-bezier(.4,0,.2,1);
}
.thread-panel.open{border-bottom:1px solid var(--bdr);box-shadow:0 6px 24px var(--shadow);max-height:70vh}
.thread-panel-inner{padding:16px 20px 20px;overflow-y:auto;max-height:calc(70vh - 1px)}
.thread-panel-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bdr)}
.thread-panel-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--txt3);text-transform:uppercase}
.thread-close-btn{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:18px;line-height:1;padding:4px;transition:color .15s}
.thread-close-btn:hover{color:var(--amber-b)}
.thread-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.thread-concept-btn{width:100%;background:none;border:1px solid var(--bdr2);padding:9px 12px;text-align:left;cursor:pointer;border-radius:3px;transition:all .15s}
.thread-concept-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.thread-concept-name{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.8px;color:var(--txt2);display:block;margin-bottom:4px}
.thread-concept-chain{font-size:11px;color:var(--txt3);line-height:1.5}
.thread-back-btn{background:none;border:none;padding:0;cursor:pointer;font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--amber-b);text-transform:uppercase;transition:opacity .15s}
.thread-back-btn:hover{opacity:.7}
.thread-active-title{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--amber-b);margin:10px 0 14px}
.thread-steps-grid{display:flex;flex-direction:column;align-items:center;padding:4px 0 16px}
.thread-step{width:min(360px,90%);text-align:center;padding:10px 14px;border:1px solid var(--bdr2);border-radius:4px;font-size:12.5px;color:var(--txt2);background:var(--panel2)}
.thread-step-yr{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);margin-bottom:4px}
.thread-step-txt{line-height:1.6;color:var(--txt2)}
.thread-step-civ{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);margin-bottom:4px}
.thread-chain-link{display:flex;flex-direction:column;align-items:center;padding:2px 0;color:var(--amber-b);opacity:.6}
.thread-chain-line{width:1px;height:8px;background:var(--amber-b);opacity:.4}

/* ── COMPARE MODE ── */
.compare-wrap{display:flex;gap:0;height:100%;width:100%}
.compare-col{flex:1;min-width:0;overflow-y:auto;padding:16px;border-right:1px solid var(--bdr)}
.compare-col:last-child{border-right:none}
.compare-col-hdr{font-family:'Cinzel Decorative',serif;font-size:13px;color:var(--amber-b);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.compare-remove{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:14px;padding:2px}
.compare-remove:hover{color:var(--amber-b)}
.compare-prompt{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--txt3);font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:20px;opacity:.6}
.compare-diff{background:var(--amber-xx);border-left:2px solid var(--amber-b);padding:6px 8px;margin-bottom:2px}

/* ── SHARE TOAST ── */
.share-toast{position:fixed;bottom:108px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--panel);border:1px solid var(--bdr);padding:8px 18px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1.5px;color:var(--amber-b);text-transform:uppercase;border-radius:20px;opacity:0;transition:all .3s;pointer-events:none;z-index:500;white-space:nowrap}
.share-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── FINGERPRINT CHART ── */
.fp-wrap{margin:14px 0 6px}
.fp-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--txt3);text-transform:uppercase;margin-bottom:8px}
.fp-svg{display:block;margin:0 auto}
.fp-label{font-family:'Cinzel',serif;font-size:8px;fill:var(--txt3)}
.fp-poly{fill:rgba(232,37,26,.18);stroke:#e8251a;stroke-width:1.2}
.fp-grid{fill:none;stroke:var(--bdr);stroke-width:.5}

/* ── CONTEMPORARY BAR ── */
.contemp-wrap{margin:12px 0 4px}
.contemp-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;cursor:pointer;transition:opacity .15s}
.contemp-bar-row:hover{opacity:.75}
.contemp-bar-nm{font-family:'Cinzel',serif;font-size:8.5px;color:var(--txt3);width:80px;flex-shrink:0;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.contemp-bar-track{flex:1;height:5px;background:var(--bdr2);border-radius:2px;position:relative}
.contemp-bar-fill{position:absolute;top:0;height:100%;border-radius:2px;opacity:.7}
.contemp-bar-yr{font-family:'Cinzel',serif;font-size:7.5px;color:var(--txt3);white-space:nowrap;width:60px;text-align:right;flex-shrink:0}

/* ── DENSITY SPARKLINE ── */
#density-bar{height:18px;width:100%;display:block;margin-bottom:1px}

/* ── WHAT-IF MODE ── */
.whatif-civ-btn{width:100%;background:none;border:1px solid var(--bdr2);padding:7px 10px;text-align:left;cursor:pointer;font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:.5px;color:var(--txt2);margin-bottom:3px;border-radius:2px;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.whatif-civ-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.whatif-civ-btn.selected{background:rgba(232,37,26,.12);border-color:#e8251a;color:#e8251a}
.whatif-result{margin-top:12px;padding:12px;border:1px solid var(--bdr);border-radius:3px;background:var(--panel2)}
.whatif-chain{padding:6px 0;border-bottom:1px solid var(--bdr2);font-size:12px;color:var(--txt2)}
.whatif-chain:last-child{border-bottom:none}
.whatif-chain.lost{color:#e8251a;text-decoration:line-through;opacity:.6}
.whatif-intro{font-size:13px;line-height:1.7;color:var(--txt2);font-style:italic;margin-bottom:12px}

/* ── HERITAGE MODE ── */
.heritage-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.heritage-btn{background:none;border:1px solid var(--bdr2);padding:8px 6px;cursor:pointer;font-family:'Cinzel',serif;font-size:8.5px;letter-spacing:.5px;color:var(--txt2);border-radius:2px;transition:all .15s;text-align:center}
.heritage-btn:hover{background:var(--amber-x);border-color:var(--bdr)}
.heritage-btn.active{background:var(--amber-x);border-color:var(--amber-b);color:var(--amber-b)}
.heritage-civ{padding:5px 0;border-bottom:1px solid var(--bdr2);font-size:12.5px;cursor:pointer;transition:color .15s}
.heritage-civ:hover{color:var(--amber-b)}
.heritage-civ-nm{font-family:'Cinzel',serif;font-size:9.5px;color:var(--amber-b);display:block;margin-bottom:2px}
.heritage-civ-why{font-size:11px;color:var(--txt3)}

/* ── MAP ZOOM TRANSITION ── */
#wsvg{transition:none}

/* ── HERSTORY MODE ── */
.hs-marker{fill:#c060a0}
.hs-woman{padding:10px 0;border-bottom:1px solid var(--bdr2)}
.hs-woman:last-child{border-bottom:none}
.hs-woman-nm{font-family:'Cinzel',serif;font-size:14px;color:#c060a0;letter-spacing:.5px;margin-bottom:2px}
.hs-woman-role{font-size:10px;color:var(--txt3);margin-bottom:5px;font-style:italic}
.hs-woman-yr{font-family:'Cinzel',serif;font-size:9px;color:var(--amber-b);margin-bottom:5px}
.hs-woman-desc{font-size:15px;line-height:1.85;color:var(--txt2)}
.hs-no-data{font-size:14px;line-height:1.8;color:var(--txt3);font-style:italic;padding:12px 0}
.hs-panel-sub{font-size:15px;color:var(--txt3);margin-bottom:16px;font-style:italic;line-height:1.9}
.hs-panel-hdr{font-family:'Cinzel Decorative',serif;font-size:13px;color:#c060a0;margin-bottom:6px;letter-spacing:1px}

/* ── CLUSTER PICKER ── */
#cluster-picker{
  position:fixed;z-index:900;background:var(--panel);
  border:1px solid var(--bdr);border-radius:6px;
  min-width:180px;max-width:260px;max-height:320px;overflow-y:auto;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  display:none;
}
#cluster-picker.open{display:block}
#cluster-picker-hdr{
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;
  color:var(--txt3);padding:8px 12px 6px;
  border-bottom:1px solid var(--bdr2);text-transform:uppercase;
  display:flex;justify-content:space-between;align-items:center;
}
.cluster-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;
  cursor:pointer;border-bottom:1px solid var(--bdr2);
  transition:background .12s;
}
.cluster-item:last-child{border-bottom:none}
.cluster-item:hover,.cluster-item:active{background:var(--panel2)}
.cluster-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#e8251a}
.cluster-item-nm{font-family:'Cinzel',serif;font-size:13px;color:var(--txt);flex:1}
.cluster-item-sb{font-size:11px;color:var(--txt3);margin-top:1px}

/* ── BURGER MENU ── */
.burger-wrap{position:relative}
.burger-btn{background:none;border:1px solid var(--bdr);color:var(--amber-b);cursor:pointer;
  width:34px;height:34px;border-radius:3px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;padding:0}
.burger-btn:hover{background:var(--panel2);border-color:var(--amber)}
.burger-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--panel);
  border:1px solid var(--bdr);border-radius:4px;min-width:196px;
  box-shadow:0 8px 32px var(--shadow);z-index:800;
  display:none;flex-direction:column;overflow:hidden}
.burger-menu.open{display:flex}
.burger-item{display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:none;border:none;color:var(--txt2);cursor:pointer;text-align:left;
  font-family:'Cinzel',serif;font-size:12px;letter-spacing:.5px;width:100%;
  transition:background .12s;white-space:nowrap}
.burger-item:hover,.burger-item:active{background:var(--panel2);color:var(--txt)}
.burger-item.active,.burger-item.burger-mode.active{background:var(--amber-x);color:var(--amber-b)}
.burger-item-badge{margin-left:auto;font-size:9px;color:var(--amber-b);
  font-family:'Cinzel',serif;letter-spacing:1px;display:none}
.burger-item-badge.on{display:inline}
.burger-divider{height:1px;background:var(--bdr2);margin:2px 0}
body.herstory .burger-item.burger-mode.active{background:rgba(192,96,160,.12);color:#c060a0}
body.herstory .hdr{border-bottom-color:rgba(192,96,160,.3)}

/* ── MAP ZOOM/PAN ── */
#wsvg{touch-action:none;user-select:none;-webkit-user-select:none}
.map-zoom-ctrl{position:absolute;bottom:8px;right:8px;display:flex;flex-direction:column;gap:3px;z-index:50}
.map-zoom-btn{width:28px;height:28px;background:var(--panel);border:1px solid var(--bdr);color:var(--amber-b);
  font-size:16px;cursor:pointer;border-radius:3px;display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;transition:all .15s}
.map-zoom-btn:hover{background:var(--panel2);border-color:var(--amber)}
.cluster-hint{position:absolute;bottom:44px;left:50%;transform:translateX(-50%);
  font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--amber-b);
  background:var(--panel);border:1px solid var(--bdr);padding:4px 12px;border-radius:20px;
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:51}
.cluster-hint.show{opacity:1}

/* ── PULL TO REFRESH ── */
#ptr-indicator{
  position:fixed;top:0;left:0;right:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;gap:10px;
  height:0;overflow:hidden;background:var(--panel);
  border-bottom:1px solid var(--bdr);
  transition:height .2s ease,opacity .2s ease;
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;
  color:var(--txt3);text-transform:uppercase;opacity:0;
  pointer-events:none;
}
#ptr-indicator.pulling{height:52px;opacity:1}
#ptr-indicator.ready{color:var(--amber-b)}
#ptr-indicator.refreshing{height:52px;opacity:1}
#ptr-spinner{
  width:16px;height:16px;border:2px solid var(--bdr);
  border-top-color:var(--amber-b);border-radius:50%;
  transition:transform .25s ease;flex-shrink:0;
}
#ptr-indicator.refreshing #ptr-spinner{animation:ptr-spin .7s linear infinite}
@keyframes ptr-spin{to{transform:rotate(360deg)}}
</style>
</head>

<script>
// ── LENSES ──
const LENSES=[
  {id:'overview',    ico:'◎', lbl:'Strategic Overview',     col:'#c84040'},
  {id:'strategy',    ico:'⚔', lbl:'Strategy & Tactics',     col:'#b83030'},
  {id:'weapons',     ico:'⚒', lbl:'Weapons & Technology',   col:'#8a6020'},
  {id:'leadership',  ico:'★', lbl:'Leadership',              col:'#d4a820'},
  {id:'casualties',  ico:'†', lbl:'Casualties & Cost',       col:'#a04040'},
  {id:'naval',       ico:'⚓', lbl:'Naval Warfare',           col:'#4a7faa'},
  {id:'siege',       ico:'⊞', lbl:'Siege Warfare',           col:'#5a7a8a'},
  {id:'cavalry',     ico:'◇', lbl:'Cavalry & Mobility',      col:'#8a7040'},
  {id:'infantry',    ico:'⊕', lbl:'Infantry',                col:'#606060'},
  {id:'logistics',   ico:'⟳', lbl:'Logistics & Supply',      col:'#4a8870'},
  {id:'intelligence',ico:'◈', lbl:'Intelligence & Espionage',col:'#7060a8'},
  {id:'propaganda',  ico:'⚑', lbl:'Propaganda & Morale',     col:'#b05580'},
  {id:'civilians',   ico:'⊗', lbl:'Civilians & Occupation',  col:'#906040'},
  {id:'aftermath',   ico:'⚖', lbl:'Aftermath & Peace',       col:'#5a9a60'},
  {id:'causes',      ico:'↯', lbl:'Causes & Origins',        col:'#c06090'},
  {id:'alliances',   ico:'≡', lbl:'Alliances & Diplomacy',   col:'#3a9fc0'},
  {id:'guerrilla',   ico:'↑', lbl:'Guerrilla & Asymmetric',  col:'#b06020'},
  {id:'legacy',      ico:'∞', lbl:'Legacy',                  col:'#7890a8'},
  {id:'figures',     ico:'Ψ', lbl:'Key Figures',             col:'#8a6020'},
  {id:'women',       ico:'♀', lbl:'Women in War',            col:'#9b6fd4'},
];

const ERAS=[
  {y:-1300,n:'CHARIOT WARFARE'},
  {y:-800, n:'HOPLITE & LEGION AGE'},
  {y:-334, n:'HELLENISTIC WARFARE'},
  {y:-264, n:'ROMAN MILITARY DOMINANCE'},
  {y:500,  n:'MEDIEVAL WARFARE'},
  {y:1337, n:'LATE MEDIEVAL WARFARE'},
  {y:1500, n:'GUNPOWDER AGE'},
  {y:1700, n:'AGE OF EMPIRE'},
  {y:1800, n:'INDUSTRIAL WARFARE'},
  {y:1914, n:'WORLD WARS ERA'},
  {y:1945, n:'NUCLEAR AGE'},
  {y:1991, n:'ASYMMETRIC WARFARE'},
];

const FP_LABELS=['Scale','Duration','Innovation','Casualties','Geopolitical','Legacy'];
const FP_KEYS=['scale','dur','innov','cas','geo','leg'];

const TRANSMISSIONS=[
  {id:1, concept:'Chariot Warfare', from:'kadesh', to:'persian', year:-900, desc:'Egyptian and Hittite chariot tactics, refined at Kadesh, spread throughout the Near East and were adopted by Persian armies as mobile archery platforms.'},
  {id:2, concept:'Phalanx Formation', from:'persian', to:'alexander', year:-350, desc:'The Greek hoplite phalanx, proven against Persia at Marathon and Plataea, was transformed by Philip II and Alexander into the sarissa-armed Macedonian phalanx that conquered the known world.'},
  {id:3, concept:'Siege Engineering', from:'alexander', to:'punic', year:-200, desc:'Hellenistic siege technology — torsion catapults, siege towers, and mining techniques perfected by Alexander\'s engineers — was adopted by Roman armies during the Punic Wars.'},
  {id:4, concept:'Naval Warfare', from:'peloponnesian', to:'punic', year:-260, desc:'Athenian trireme tactics and naval strategy, developed during the Peloponnesian War, were studied and adapted by Rome when it built its first major fleet to challenge Carthage.'},
  {id:5, concept:'Gunpowder', from:'mongol', to:'constantinople', year:1453, desc:'Gunpowder weapons, carried westward by Mongol armies, were perfected by Ottoman engineers whose massive bombards breached the walls of Constantinople in 1453.'},
  {id:6, concept:'Longbow Tactics', from:'hundredyears', to:'conquest', year:1500, desc:'English longbow tactics that devastated French cavalry at Crécy and Agincourt influenced Spanish military thinking about missile weapons used in the conquest of the Americas.'},
  {id:7, concept:'Fortification Design', from:'constantinople', to:'thirtyyears', year:1550, desc:'The fall of Constantinople to cannon fire drove the development of trace italienne star fortifications that defined European warfare during the Thirty Years\' War.'},
  {id:8, concept:'Combined Arms', from:'napoleonic', to:'ww1', year:1914, desc:'Napoleon\'s integration of infantry, cavalry, and artillery into coordinated combined-arms doctrine was the foundation upon which World War I armies were theoretically organised, even as trench warfare negated it.'},
  {id:9, concept:'Guerrilla Warfare', from:'napoleonic', to:'vietnam', year:1960, desc:'Spanish guerrilla resistance to Napoleon (which gave the tactic its name) established principles of irregular warfare that Vietnamese forces applied against American military superiority.'},
  {id:10, concept:'Total War', from:'civilwar', to:'ww1', year:1914, desc:'Sherman\'s March to the Sea and the Union\'s strategy of destroying Confederate economic capacity pioneered the concept of total war that defined both World Wars.'},
  {id:11, concept:'Trench Warfare', from:'civilwar', to:'ww1', year:1914, desc:'The extensive trench systems of the American Civil War, particularly at Petersburg (1864-65), foreshadowed the Western Front\'s static trench warfare on a continental scale.'},
  {id:12, concept:'Blitzkrieg', from:'ww1', to:'ww2', year:1939, desc:'German analysis of World War I\'s failures — static fronts, attrition warfare — produced the blitzkrieg doctrine of armoured breakthrough and encirclement that conquered France in six weeks.'},
  {id:13, concept:'Nuclear Strategy', from:'ww2', to:'coldwar', year:1945, desc:'The atomic bombings of Hiroshima and Nagasaki created the nuclear deterrence framework — mutually assured destruction — that defined Cold War grand strategy for four decades.'},
  {id:14, concept:'Counterinsurgency', from:'vietnam', to:'terror', year:2006, desc:'Hard-learned Vietnam-era counterinsurgency doctrine was revived and adapted for the War on Terror, forming the basis of the 2006 US Counterinsurgency Field Manual.'},
  {id:15, concept:'Drone Warfare', from:'gulf', to:'terror', year:2001, desc:'Precision-guided munitions demonstrated in the Gulf War evolved into armed drone technology that became the signature weapon of the War on Terror, enabling targeted killing without ground troops.'},
];

// ── STATE ──
let year=-1300,lenses=new Set(),sel=null,sel2=null,lensDD=false,mode="explore",activeThread=null;
const OVERVIEW_COL='#c84040';
let _vbW=1000;

function fmt(y){return y<0?`${Math.abs(y)} BCE`:y===0?'1 CE':`${y} CE`}
function eraName(y){let n=ERAS[0].n;for(const e of ERAS){if(y>=e.y)n=e.n;}return n;}
function active(c){return year>=c.s&&year<=c.e}
function getLensCol(){
  if(!lenses.size)return OVERVIEW_COL;
  const L=LENSES.find(l=>l.id===[...lenses][0]);
  return L?L.col:OVERVIEW_COL;
}

function toggleLensDD(){
  lensDD=!lensDD;
  document.getElementById('lens-dd-list').classList.toggle('open',lensDD);
  document.getElementById('lens-dd-hdr').classList.toggle('open',lensDD);
  document.getElementById('lens-dd-arrow').classList.toggle('open',lensDD);
}

function lensLabel(){
  if(!lenses.size)return'Strategic Overview';
  const names=[...lenses].map(id=>{const L=LENSES.find(l=>l.id===id);return L?L.lbl:'';});
  if(names.length===1)return names[0];
  if(names.length<=3)return names.join(' · ');
  return names.slice(0,2).join(' · ')+` +${names.length-2}`;
}

function renderLensDD(){
  const hook=document.getElementById('lens-position-hook');
  const dt=hook||document.getElementById('drawer-top');
  if(!dt)return;
  if(hook){
    hook.style.cssText='padding:8px 0 4px';
    const drawerTop=document.getElementById('drawer-top');
    if(drawerTop)drawerTop.innerHTML='';
  }
  const arcOn=!lenses.size;
  const rows=LENSES.map(l=>{
    const on=lenses.has(l.id);
    return`<div class="lens-row${on?' on':''}" onclick="toggleLens('${l.id}')">
      <div class="lens-row-chk${on?' on':''}">${on?'✓':''}</div>
      <span class="lens-row-ico">${l.ico}</span>
      <span class="lens-row-lbl">${l.lbl}</span>
    </div>`;
  }).join('');
  dt.innerHTML=`<div class="lens-dd-wrap">
    <div class="lens-dd-hdr${lensDD?' open':''}" id="lens-dd-hdr" onclick="toggleLensDD()">
      <span class="lens-dd-title">Lens</span>
      <span class="lens-dd-summary">${lensLabel()}</span>
      <span class="lens-dd-arrow${lensDD?' open':''}" id="lens-dd-arrow">▾</span>
    </div>
    <div class="lens-dd-list${lensDD?' open':''}" id="lens-dd-list">
      <div class="lens-row${arcOn?' on':''}" onclick="toggleLens('__arc__')">
        <div class="lens-row-chk${arcOn?' on':''}">${arcOn?'✓':''}</div>
        <span class="lens-row-ico">◎</span>
        <span class="lens-row-lbl">Strategic Overview</span>
      </div>
      <div class="lens-row-sep"></div>
      ${rows}
      <div class="lens-dd-close-btn" onclick="toggleLensDD()">Done ▴</div>
    </div>
  </div>`;
}

function toggleLens(id){
  if(id==='__arc__'){lenses.clear();}
  else{
    if(lenses.has(id))lenses.delete(id);
    else lenses.add(id);
  }
  renderLensDD();
  if(sel){
    const c=sel;
    let body='';

// ── NON-LINEAR TIMELINE ──
// Slider 0-1000 maps to year via two segments:
// 0-100   → -1300 to -500
// 100-1000 → -500 to 2024
function sliderToYear(v){
  v=parseInt(v);
  if(v<=100){
    return Math.round(-1300+((-500-(-1300))*(v/100)));
  } else {
    return Math.round(-500+((2024-(-500))*((v-100)/900)));
  }
}
function yearToSlider(yr){
  yr=parseInt(yr);
  if(yr<=-500){
    return Math.round(100*((yr-(-1300))/(-500-(-1300))));
  } else {
    return Math.round(100+900*((yr-(-500))/(2024-(-500))));
  }
}

function itemPt(c){
  if(!c)return[500,260];
  if(!window._proj)return[c.x||500,c.y||260];
  if(typeof c.lon!=='number'||typeof c.lat!=='number')return[c.x||500,c.y||260];
  try{const pt=window._proj([c.lon,c.lat]);return pt&&isFinite(pt[0])&&isFinite(pt[1])?pt:[c.x||500,c.y||260];}
  catch(e){return[c.x||500,c.y||260];}
}

function renderMap(){
  const ids=new Set(ITEMS.filter(c=>active(c)).map(c=>c.id));
  window.ids_cache=ids;
  const col=lenses.size?getLensCol():OVERVIEW_COL;

  const drawn=new Set();
  let cl='';
  ITEMS.forEach(c=>{
    if(!ids.has(c.id))return;
    c.conns.forEach(id=>{
      const k=[c.id,id].sort().join('-');
      if(drawn.has(k)||!ids.has(id))return;
      drawn.add(k);
      const o=ITEMS.find(x=>x&&x.id===id);
      if(!o)return;
      const [cx,cy]=itemPt(c),[ox,oy]=itemPt(o);
      const mx=(cx+ox)/2,my=Math.min(cy,oy)-28;
      cl+=`<path d="M${cx},${cy} Q${mx},${my} ${ox},${oy}" stroke="#c84040" stroke-width=".8" fill="none" stroke-dasharray="3,5" opacity="${sel?0.1:0.25}"/>`;
    });
  });
  document.getElementById('conn-layer').innerHTML=cl;

  let rings='', dots='', ll='';
  const itemData=ITEMS.map(c=>{
    const on=ids.has(c.id);
    const isSel=sel&&sel.id===c.id;
    const mcol=isSel?'#f0d060':'#c84040';
    const op=on?1:0.06;
    const [cx,cy]=itemPt(c);
    return {c,on,isSel,mcol,op,cx,cy};
  });
  // Pass 1: decorative rings
  itemData.filter(Boolean).forEach(({c,on,isSel,mcol,op,cx,cy})=>{
    const _zr=1000/_vbW;
    const _rR=Math.max(4,(16/_zr)).toFixed(1);
    const _pR=Math.max(2,(6/_zr)).toFixed(1);
    const _pMax=Math.max(5,(16/_zr)).toFixed(1);
    rings+=`<g opacity="${op}" pointer-events="none">
      <circle cx="${cx}" cy="${cy}" r="${_rR}" fill="none" stroke="${mcol}" stroke-width=".5" opacity=".15"/>
      <circle cx="${cx}" cy="${cy}" r="${(Math.max(3,10/_zr)).toFixed(1)}" fill="${mcol}" fill-opacity=".06"/>
      ${on?`<circle cx="${cx}" cy="${cy}" r="${_pR}" fill="${mcol}" opacity=".45">
        <animate attributeName="r" values="${_pR};${_pMax};${_pR}" dur="2.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".45;0;.45" dur="2.8s" repeatCount="indefinite"/>
      </circle>`:''}
    </g>`;
  });
  // Pass 2: clickable dots
  const sorted=[...itemData].filter(Boolean).sort((a,b)=>a.isSel?1:b.isSel?-1:0);
  sorted.forEach(({c,on,isSel,mcol,op,cx,cy})=>{
    if(on){
      const zr=1000/_vbW;
      const dotR=Math.max(2, (isSel?9:7)/zr);
      const ringR=Math.max(3, 16/zr);
      const pulseMax=Math.max(8, 16/zr);
      dots+=`<g role="button" tabindex="0" data-item="${c.id}"
          aria-label="${c.nm} — click to explore"
          onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();itemClick('${c.id}')}"
          opacity="${op}" pointer-events="none">
          <circle cx="${cx}" cy="${cy}" r="${dotR.toFixed(1)}"
            fill="${mcol}" filter="url(#glow${isSel?'2':''})"
          />
        </g>`;
      ll+=`<text x="${cx}" y="${cy+26}" font-family="Cinzel,serif" font-size="11"
        letter-spacing="1" fill="${isSel?'#f0d060':'#c84040'}"
        text-anchor="middle" pointer-events="none">${c.nm}</text>`;
    } else {
      dots+=`<circle cx="${cx}" cy="${cy}" r="4" fill="${mcol}" opacity=".12" pointer-events="none"/>`;
    }
  });
  document.getElementById('mark-layer').innerHTML=rings+dots;
  document.getElementById('label-layer').innerHTML=ll;
}

function navigateToItem(id){
  const c=ITEMS.find(x=>x&&x.id===id);
  if(!c)return;
  if(mode==='compare'){
    if(!sel){sel=c;}
    else if(!sel2&&sel.id!==c.id){sel2=c;}
    else{sel=c;sel2=null;}
    renderDrawer();renderMap();updateURL();
    openMobileSheet();
    return;
  }
  if(!active(c)){
    const targetYear=c.s;
    document.getElementById('tl').value=yearToSlider(targetYear);
    setYear(targetYear);
  }
  sel=c;lensDD=false;
  renderDrawer();renderMap();updateURL();
  openMobileSheet();
  document.getElementById('info-panel').scrollTo({top:0,behavior:'smooth'});
}

function itemClick(id){

}

// WORLD MAP (D3 / TopoJSON)
// ══════════════════════════════════════════════════════
function renderWorldMap(world){
  const svg=document.getElementById('wsvg');
  const W=1000,H=520;
  const proj=d3.geoMercator().scale(158).translate([W/2,H/2+40]);
  window._proj=proj;
  const pathGen=d3.geoPath().projection(proj);
  const land=topojson.feature(world,world.objects.land);
  const countries=topojson.feature(world,world.objects.countries);
  // Build SVG path strings
  const isDark=()=>document.documentElement.dataset.theme!=='light';
  let g=document.getElementById('map-layer');
  // Graticule
  const graticule=d3.geoGraticule()();
  const gratPath=pathGen(graticule)||'';
  // Land path
  const landPath=pathGen(land)||'';
  // Country borders
  const borders=topojson.mesh(world,world.objects.countries,(a,b)=>a!==b);
  const borderPath=pathGen(borders)||'';
  g.innerHTML=
    `<path d="${gratPath}" fill="none" stroke="var(--bdr2)" stroke-width=".3"/>` +
    `<path id="land-path" d="${landPath}" fill="var(--land)" stroke="var(--land-s)" stroke-width=".4"/>` +
    `<path d="${borderPath}" fill="none" stroke="var(--land-s)" stroke-width=".3" opacity=".6"/>`;
}

// ══════════════════════════════════════════════════════
// FINGERPRINT RADAR CHART
// ══════════════════════════════════════════════════════
const FP_LABELS=['Military','Commerce','Arts','Science','Reach','Longevity'];
const FP_KEYS=['mil','com','art','sci','reach','lon'];

function renderFingerprint(c){
  if(!c.fp)return'';
  // Larger canvas with generous padding so labels never clip
  const W=360,H=300,cx=W/2,cy=H/2+10,R=88;
  const n=FP_LABELS.length;
  const angles=FP_LABELS.map((_,i)=>(i*2*Math.PI/n)-Math.PI/2);

  let svg=`<svg class="fp-svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  // Grid rings
  [2,4,6,8,10].forEach(level=>{
    const r=R*(level/10);
    const pts=angles.map(a=>`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`).join(' ');
    svg+=`<polygon points="${pts}" class="fp-grid"/>`;
  });
  // Axis lines
  angles.forEach(a=>{
    svg+=`<line x1="${cx}" y1="${cy}" x2="${(cx+R*Math.cos(a)).toFixed(1)}" y2="${(cy+R*Math.sin(a)).toFixed(1)}" class="fp-grid"/>`;
  });
  // Data polygon
  const vals=FP_KEYS.map(k=>c.fp[k]||0);
  const dataPts=angles.map((a,i)=>{
    const r=R*(vals[i]/10);
    return`${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;
  }).join(' ');
  svg+=`<polygon points="${dataPts}" class="fp-poly"/>`;
  // Labels
  const SHORT=['Military','Commerce','Arts','Science','Reach','Longevity'];
  angles.forEach((a,i)=>{
    const lr=R+26;
    const lx=cx+lr*Math.cos(a);
    const ly=cy+lr*Math.sin(a);
    const cosA=Math.cos(a);
    const anchor=cosA>0.15?'start':cosA<-0.15?'end':'middle';
    const dy=Math.sin(a)>0.15?4:Math.sin(a)<-0.15?-4:4;
    svg+=`<text x="${lx.toFixed(1)}" y="${(ly+dy).toFixed(1)}" text-anchor="${anchor}" class="fp-label">${SHORT[i]}</text>`;
  });
  svg+='</svg>';
  return`<div class="fp-wrap"><div class="fp-title">Conflict Fingerprint</div>${svg}</div>`;
}

// ══════════════════════════════════════════════════════
// ENHANCED SPAN BAR WITH CONTEMPORARIES
// ══════════════════════════════════════════════════════
function renderEnhancedSpanBar(c){
  const MIN=-1300,MAX=2024,total=MAX-MIN;
  const left=Math.max(0,(c.s-MIN)/total*100);
  const width=Math.min(100-left,(c.e-c.s)/total*100);

  // Find up to 4 contemporaries that overlap with this conflict's lifespan
  const overlap=ITEMS.filter(x=>x.id!==c.id&&x.s<c.e&&x.e>c.s)
    .map(x=>{
      const overlapStart=Math.max(x.s,c.s);
      const overlapEnd=Math.min(x.e,c.e);
      return{...x,overlapYrs:overlapEnd-overlapStart};
    })
    .sort((a,b)=>b.overlapYrs-a.overlapYrs)
    .slice(0,4);

  const colors=['#e89820','#4a8870','#4a7faa','#9b6fd4'];

  let bars=overlap.map((x,i)=>{
    const xl=Math.max(0,(x.s-MIN)/total*100);
    const xw=Math.min(100-xl,(x.e-x.s)/total*100);
    // Show only the portion overlapping with c
    const ol=Math.max(xl,left);
    const or_=Math.min(xl+xw,left+width);
    const ow=Math.max(0,or_-ol);
    return`<div class="contemp-bar-row" onclick="navigateToItem('${x.id}')" title="Navigate to ${x.nm}">
      <div class="contemp-bar-nm">${x.nm}</div>
      <div class="contemp-bar-track">
        <div class="contemp-bar-fill" style="left:${(ol-left).toFixed(1)}%;width:${ow.toFixed(1)}%;background:${colors[i]}"></div>
      </div>
      <div class="contemp-bar-yr">${fmt(x.s)}–${fmt(x.e)}</div>
    </div>`;
  }).join('');

  const mainBar=`<div class="civ-span-bar" title="${fmt(c.s)} to ${fmt(c.e)}">
    <div class="civ-span-fill" style="left:${left.toFixed(1)}%;width:${width.toFixed(1)}%"></div>
  </div>
  <div class="civ-span-lbls"><span>${fmt(c.s)}</span><span style="color:var(--txt3);font-size:8px">${c.e-c.s} years</span><span>${fmt(c.e)}</span></div>`;

  const contemp=overlap.length?`<div class="contemp-wrap">
    <div class="fp-title" style="margin-top:10px">Active at the same time</div>
    ${bars}
  </div>`:'';

  return mainBar+contemp;
}

// ══════════════════════════════════════════════════════
// TIMELINE DENSITY SPARKLINE
// ══════════════════════════════════════════════════════
function renderDensityBar(){
  const svg=document.getElementById('density-bar');
  if(!svg)return;
  const W=svg.parentElement?svg.parentElement.offsetWidth||600:600;
  svg.setAttribute('viewBox',`0 0 ${W} 18`);
  const MIN=-1300,MAX=2024,total=MAX-MIN;
  const steps=200;
  const stepYr=total/steps;
  const counts=[];
  let mx=0;
  for(let i=0;i<steps;i++){
    const yr=MIN+i*stepYr;
    const n=ITEMS.filter(c=>c.s<=yr&&c.e>=yr).length;
    counts.push(n);
    if(n>mx)mx=n;
  }
  if(!mx)return;
  const pts=counts.map((n,i)=>{
    const x=(i/steps)*W;
    const y=18-(n/mx)*14-1;
    return`${x.toFixed(1)},${y.toFixed(1)}`;
  });
  // Close the polygon at the bottom
  const poly=`0,18 ${pts.join(' ')} ${W},18`;
  svg.innerHTML=`<polygon points="${poly}" fill="rgba(200,64,64,.25)" stroke="rgba(200,64,64,.5)" stroke-width=".5"/>
    <line x1="0" y1="18" x2="${W}" y2="18" stroke="var(--bdr2)" stroke-width=".5"/>`;
}

function setMode(m){
  mode=m;
  ['explore','threads','compare'].forEach(id=>{
    const b=document.getElementById('btn-'+id);
    if(b){b.classList.toggle('active',id===m);b.setAttribute('aria-pressed',id===m);}
  });
  const tp=document.getElementById('thread-panel');
  if(tp)tp.classList.toggle('open',m==='threads');
  if(m==='threads'){
    renderThreadConceptList();
  }
  if(m!=='threads'){
    activeThread=null;
    document.getElementById('thread-layer').innerHTML='';
  }
  if(m==='compare'&&!sel2){
    // show compare prompt
    renderDrawer();
  }
  if(m==='explore'&&sel2){sel2=null;}
  renderMap();
  renderDrawer();
  updateURL();
}

// THREAD VIEW
// ══════════════════════════════════════════════════════
function getUniqueConcepts(){
  const seen=new Set();
  return TRANSMISSIONS.filter(t=>{if(seen.has(t.concept))return false;seen.add(t.concept);return true;})
    .map(t=>t.concept);
}

function getChain(concept){
  return TRANSMISSIONS.filter(t=>t.concept===concept).sort((a,b)=>a.year-b.year);
}

function renderThreadConceptList(){
  const list=document.getElementById('thread-concept-list');
  const steps=document.getElementById('thread-active-steps');
  const title=document.getElementById('thread-panel-title');
  const backBtn=document.getElementById('thread-back-btn');
  if(!list)return;

  if(activeThread){
    // Concept list hidden, steps visible
    list.style.display='none';
    if(steps)steps.style.display='block';
    if(backBtn)backBtn.style.display='inline-block';
    if(title)title.textContent=activeThread;
  } else {
    // Show concept grid, hide steps
    list.style.display='block';
    if(steps){steps.style.display='none';steps.innerHTML='';}
    if(backBtn)backBtn.style.display='none';
    if(title)title.textContent='Concept Threads';
    const concepts=getUniqueConcepts();
    list.innerHTML='<div class="thread-grid">'+concepts.map(c=>{
      const chain=getChain(c);
      return`<button class="thread-concept-btn" onclick="activateThread('${c.replace(/'/g,"\\'")}')" >
        <span class="thread-concept-name">${c}</span>
        <span class="thread-concept-chain">${chain.map(t=>{
          const fc=ITEMS.find(x=>x&&x.id===t.from),tc=ITEMS.find(x=>x&&x.id===t.to);
          return(fc?fc.nm:'?')+' → '+(tc?tc.nm:'?');
        }).join('<br>')}</span>
      </button>`;
    }).join('')+'</div>';
  }
}

function activateThread(concept){
  activeThread=concept;
  renderThreadConceptList();
  renderThreadSteps(concept);
  renderThreadPaths(concept);
  // Scroll the inner wrapper back to top
  const inner=document.querySelector('.thread-panel-inner');
  if(inner)setTimeout(()=>inner.scrollTop=0,0);
}

function closeThread(){
  activeThread=null;
  renderThreadConceptList();
  document.getElementById('thread-layer').innerHTML='';
}

function renderThreadSteps(concept){
  const steps=document.getElementById('thread-active-steps');
  if(!steps)return;
  const chain=getChain(concept);
  if(!chain.length){steps.innerHTML='';return;}
  const LINK=`<div class="thread-chain-link">
    <div class="thread-chain-line"></div>
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </svg>
    <div class="thread-chain-line"></div>
  </div>`;
  const items=chain.map(t=>{
    const fc=ITEMS.find(x=>x&&x.id===t.from),tc=ITEMS.find(x=>x&&x.id===t.to);
    return`<div class="thread-step">
      <div class="thread-step-yr">${fmt(t.year)}</div>
      <div class="thread-step-civ">${fc?fc.nm:'?'} → ${tc?tc.nm:'?'}</div>
      <div class="thread-step-txt">${t.desc}</div>
    </div>`;
  });
  steps.innerHTML='<div class="thread-steps-grid">'+
    items.join(LINK)+
    '</div>';
}

let _threadAnim=null;
function renderThreadPaths(concept){
  const layer=document.getElementById('thread-layer');
  if(!layer)return;
  const chain=getChain(concept);
  if(!chain.length){layer.innerHTML='';return;}
  if(_threadAnim){clearTimeout(_threadAnim);_threadAnim=null;}

  // Build SVG: arrowhead marker + paths + dots + labels
  let out='<defs><marker id="tarrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#f0d060" opacity=".9"/></marker></defs>';
  const drawn=[];
  chain.forEach(t=>{
    const fc=ITEMS.find(x=>x&&x.id===t.from),tc=ITEMS.find(x=>x&&x.id===t.to);
    if(!fc||!tc)return;
    const [fx,fy]=itemPt(fc),[tx,ty]=itemPt(tc);
    const mx=(fx+tx)/2,my=Math.min(fy,ty)-44;
    // Path with arrowhead
    out+=`<path id="tp-${t.id}" d="M${fx},${fy} Q${mx},${my} ${tx},${ty}"
      stroke="#f0d060" stroke-width="1.8" fill="none" stroke-dasharray="6,4"
      marker-end="url(#tarrow)" opacity="0" style="transition:opacity .4s"/>`;
    // Glow dot at destination
    out+=`<circle id="tc-${t.id}" cx="${tx}" cy="${ty}" r="7" fill="#f0d060" opacity="0" style="transition:opacity .4s"/>`;
    // Year + name label mid-path
    const lx=(fx+tx)/2,ly=my-10;
    out+=`<text id="tl-${t.id}" x="${lx}" y="${ly}"
      font-family="Cinzel,serif" font-size="10" fill="#f0d060"
      text-anchor="middle" opacity="0" style="transition:opacity .4s">${fmt(t.year)}</text>`;
    const nm=tc?tc.nm:'';
    out+=`<text id="tn-${t.id}" x="${tx}" y="${ty+22}"
      font-family="Cinzel,serif" font-size="9.5" fill="#f0d060"
      text-anchor="middle" opacity="0" style="transition:opacity .4s">${nm}</text>`;
    drawn.push(t.id);
  });
  layer.innerHTML=out;

  // Animate each step sequentially
  drawn.forEach((id,i)=>{
    setTimeout(()=>{
      ['tp','tc','tl','tn'].forEach(prefix=>{
        const el=document.getElementById(prefix+'-'+id);
        if(el)el.style.opacity=prefix==='tc'?'0.9':'0.85';
      });
    },i*700);
  });
}

// URL STATE
// ══════════════════════════════════════════════════════
function encodeState(){
  const params=new URLSearchParams();
  params.set('y',year);
  if(sel)params.set('c',sel.id);
  if(sel2)params.set('c2',sel2.id);
  if(lenses.size)params.set('l',[...lenses].join(','));
  if(mode!=='explore')params.set('m',mode);
  if(activeThread)params.set('t',activeThread);
  return params.toString();
}

function decodeState(){
  let hash='';
  try{hash=window.location.hash.replace('#','');}catch(e){return;}
  if(!hash)return;
  try{
    const params=new URLSearchParams(hash);
    if(params.get('y')){
      const y=parseInt(params.get('y'));
      year=y;
      document.getElementById('tl').value=y;
    }
    if(params.get('c')){sel=ITEMS.find(x=>x&&x.id===params.get('c'))||null;}
    if(params.get('c2')){sel2=ITEMS.find(x=>x&&x.id===params.get('c2'))||null;}
    if(params.get('l')){params.get('l').split(',').forEach(id=>lenses.add(id));}
    if(params.get('m'))mode=params.get('m');
    if(params.get('t'))activeThread=params.get('t');
  }catch(e){console.warn('Failed to decode state',e);}
}

function updateURL(){
  try{
    const state=encodeState();
    if(history.replaceState&&window.location.href!=='about:srcdoc'){
      history.replaceState(null,'',state?'#'+state:'#');
    }
  }catch(e){/* sandboxed iframe — URL state unavailable */}
}

function shareState(){
  let url='';
  try{url=window.location.href.split('#')[0]+'#'+encodeState();}
  catch(e){url='#'+encodeState();}

  const itemName=sel?sel.nm:null;
  const shareTitle='Bellum — The Atlas of Conflict';
  const shareText=itemName
    ? `Explore ${itemName} on Bellum — wars and conflicts mapped across 3,300 years`
    : 'Bellum — wars and conflicts mapped across 3,300 years of human history';

  // Use native share sheet on devices that support it (iOS, Android, modern desktop)
  if(navigator.share){
    navigator.share({title:shareTitle,text:shareText,url:url})
      .catch(err=>{
        // User cancelled or share failed — fall back to clipboard silently
        if(err.name!=='AbortError') copyToClipboard(url);
      });
    return;
  }
  // Desktop fallback: clipboard
  copyToClipboard(url);
}

function copyToClipboard(url){
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(()=>showToast()).catch(()=>legacyCopy(url));
  } else {
    legacyCopy(url);
  }
}

function legacyCopy(url){
  const ta=document.createElement('textarea');
  ta.value=url;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showToast();}catch(e){}
  document.body.removeChild(ta);
}

function showToast(){
  const t=document.getElementById('share-toast');
  if(!t)return;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ══════════════════════════════════════════════════════
// MAP ZOOM ANIMATION
// ══════════════════════════════════════════════════════
const VB_DEFAULT=[0,0,1000,520];
let _vbCurrent=[0,0,1000,520],_vbAnim=null;

function animateViewBox(target,duration=600){
  if(_vbAnim)cancelAnimationFrame(_vbAnim);
  const svg=document.getElementById('wsvg');
  if(!svg)return;
  const start=[..._vbCurrent];
  const t0=performance.now();
  function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
  function frame(now){
    const raw=Math.min(1,(now-t0)/duration);
    const p=ease(raw);
    const vb=start.map((s,i)=>s+(target[i]-s)*p);
    svg.setAttribute('viewBox',vb.join(' '));
    _vbCurrent=[...vb];
    if(raw<1)_vbAnim=requestAnimationFrame(frame);
    else{_vbCurrent=[...target];_vbAnim=null;}
  }
  _vbAnim=requestAnimationFrame(frame);
}

function zoomToItem(c){
  if(!window._proj)return;
  const [cx,cy]=itemPt(c);
  const zw=300,zh=156; // zoomed viewport size (same aspect ratio)
  const x=Math.max(0,Math.min(1000-zw,cx-zw/2));
  const y=Math.max(0,Math.min(520-zh,cy-zh/2));
  animateViewBox([x,y,zw,zh],600);
}

function zoomOut(){
  animateViewBox(VB_DEFAULT,500);
}

// ══════════════════════════════════════════════════════
// MAP ZOOM / PAN
// ══════════════════════════════════════════════════════
let _vbX=0,_vbY=0,_vbH=520;
let _dragging=false,_wasDragging=false,_lastX=0,_lastY=0,_dragDist=0;
let _pinchDist=0;
const VB_MIN_W=150, VB_MAX_W=1000;

function _applyVB(){
  const svg=document.getElementById('wsvg');
  if(svg) svg.setAttribute('viewBox',`${_vbX} ${_vbY} ${_vbW} ${_vbH}`);
  renderMap();
}

function zoomMap(factor, cx, cy){
  cx = cx ?? (_vbX + _vbW/2);
  cy = cy ?? (_vbY + _vbH/2);
  const newW = Math.max(VB_MIN_W, Math.min(VB_MAX_W, _vbW/factor));
  const newH = newW * (520/1000);
  const scale = newW/_vbW;
  _vbX = cx - (cx-_vbX)*scale;
  _vbY = cy - (cy-_vbY)*scale;
  _vbW = newW; _vbH = newH;
  _clampVB();
  _applyVB();
  _updateZoomHint();
}

function resetMapZoom(){
  _vbX=0;_vbY=0;_vbW=1000;_vbH=520;
  _applyVB();
  const btn=document.getElementById('map-reset-btn');
  if(btn) btn.style.display='none';
}

function _clampVB(){
  _vbX = Math.max(0, Math.min(1000-_vbW, _vbX));
  _vbY = Math.max(0, Math.min(520-_vbH, _vbY));
}

function _updateZoomHint(){
  const btn=document.getElementById('map-reset-btn');
  if(btn) btn.style.display=_vbW<999?'inline-block':'none';
}

// Screen → SVG coords accounting for current viewBox
function _svgScale(rect){
  return Math.min(rect.width/_vbW, rect.height/_vbH);
}
function _svgOffsets(rect, scale){
  return [(rect.width -_vbW*scale)/2, (rect.height-_vbH*scale)/2];
}

function screenToSVG(clientX, clientY){
  const svg=document.getElementById('wsvg');
  const rect=svg.getBoundingClientRect();
  const s=_svgScale(rect);
  const [xOff,yOff]=_svgOffsets(rect,s);
  return [
    _vbX + (clientX-rect.left-xOff)/s,
    _vbY + (clientY-rect.top -yOff)/s
  ];
}

function mapClick(e){
  try{
    if(_wasDragging){_wasDragging=false;return;}
    const src=e.touches?.[0]||e.changedTouches?.[0]||e;
    const clientX=src.clientX, clientY=src.clientY;
    const [svgX,svgY]=screenToSVG(clientX,clientY);
    const isTouch='ontouchstart' in window||navigator.maxTouchPoints>0;
    const zr=1000/_vbW;
    const thresh=(isTouch?55:35)/zr;
    const activeSet=window.ids_cache||new Set(ITEMS.filter(c=>c&&active(c)).map(c=>c.id));
    const candidates=[];
    ITEMS.forEach(c=>{
      if(!c||!c.id||!activeSet.has(c.id))return;
      const pt=itemPt(c);
      if(!pt||!isFinite(pt[0])||!isFinite(pt[1]))return;
      const d=Math.sqrt((pt[0]-svgX)**2+(pt[1]-svgY)**2);
      if(d<thresh)candidates.push({c,d,pt});
    });
    if(!candidates.length)return;
    candidates.sort((a,b)=>a.d-b.d);
    const nearest=candidates[0];
    itemClick(nearest.c.id);
  }catch(err){console.warn('mapClick err:',err);}
}

// Mouse wheel zoom
function _onWheel(e){
  e.preventDefault();
  const [svgX,svgY]=screenToSVG(e.clientX,e.clientY);
  const factor = e.deltaY<0 ? 1.15 : 1/1.15;
  zoomMap(factor, svgX, svgY);
}

// Mouse drag pan
function _onMouseDown(e){
  if(e.button!==0)return;
  _dragging=true;_wasDragging=false;_dragDist=0; _lastX=e.clientX; _lastY=e.clientY;
}
function _onMouseMove(e){
  if(!_dragging)return;
  const svg=document.getElementById('wsvg');
  const rect=svg.getBoundingClientRect();
  const s=_svgScale(rect);
  const dx=(e.clientX-_lastX)/s;
  const dy=(e.clientY-_lastY)/s;
  _dragDist+=Math.abs(dx)+Math.abs(dy);
  if(_dragDist>3)_wasDragging=true;
  _vbX-=dx; _vbY-=dy;
  _clampVB(); _applyVB();
  _lastX=e.clientX; _lastY=e.clientY;
}
function _onMouseUp(){ if(_dragDist>5)_wasDragging=true; _dragging=false; _dragDist=0; }

// Touch events
let _touches={};
let _tapStartX=0,_tapStartY=0,_tapMoved=false,_touchFiredAt=0;
function _onTouchStart(e){
  Array.from(e.changedTouches).forEach(t=>{ _touches[t.identifier]={x:t.clientX,y:t.clientY}; });
  if(Object.keys(_touches).length===1){
    const t=e.changedTouches[0];
    _lastX=t.clientX; _lastY=t.clientY;
    _tapStartX=t.clientX; _tapStartY=t.clientY; _tapMoved=false;
  } else if(Object.keys(_touches).length===2){
    const pts=Object.values(_touches);
    _pinchDist=Math.hypot(pts[1].x-pts[0].x, pts[1].y-pts[0].y);
    _tapMoved=true; // multi-touch cancels tap
  }
}
function _onTouchMove(e){
  e.preventDefault();
  const keys=Object.keys(_touches);
  Array.from(e.changedTouches).forEach(t=>{ if(_touches[t.identifier]) _touches[t.identifier]={x:t.clientX,y:t.clientY}; });
  
  if(keys.length===1){
    // Single finger pan
    const t=e.changedTouches[0];
    if(Math.hypot(t.clientX-_tapStartX, t.clientY-_tapStartY)>8) _tapMoved=true;
    const svg=document.getElementById('wsvg');
    const rect=svg.getBoundingClientRect();
    const s=_svgScale(rect);
    const dx=(t.clientX-_lastX)/s;
    const dy=(t.clientY-_lastY)/s;
    _vbX-=dx; _vbY-=dy;
    _clampVB(); _applyVB();
    _lastX=t.clientX; _lastY=t.clientY;
  } else if(keys.length===2){
    // Pinch zoom
    const pts=Object.values(_touches);
    const newDist=Math.hypot(pts[1].x-pts[0].x, pts[1].y-pts[0].y);
    if(_pinchDist>0){
      const midX=(pts[0].x+pts[1].x)/2;
      const midY=(pts[0].y+pts[1].y)/2;
      const [svgX,svgY]=screenToSVG(midX,midY);
      zoomMap(newDist/_pinchDist, svgX, svgY);
    }
    _pinchDist=newDist;
  }
}
function _onTouchEnd(e){
  const wasMulti=Object.keys(_touches).length>=2;
  Array.from(e.changedTouches).forEach(t=>{ delete _touches[t.identifier]; });
  _pinchDist=0;
  if(!wasMulti && !_tapMoved && e.changedTouches.length===1){
    _touchFiredAt=Date.now();
    mapClick(e);
  }
  _tapMoved=false;
}

// ══════════════════════════════════════════════════════
// MAP INTERACTION INIT
// ══════════════════════════════════════════════════════
function initMapInteraction(){
  const svg=document.getElementById('wsvg');
  if(!svg)return;
  svg.addEventListener('wheel',_onWheel,{passive:false});
  svg.addEventListener('mousedown',_onMouseDown);
  window.addEventListener('mousemove',_onMouseMove);
  window.addEventListener('mouseup',_onMouseUp);
  svg.addEventListener('touchstart',_onTouchStart,{passive:false});
  svg.addEventListener('touchmove',_onTouchMove,{passive:false});
  svg.addEventListener('touchend',_onTouchEnd,{passive:false});
  svg.addEventListener('click',function(e){if(_wasDragging){_wasDragging=false;return;}if(Date.now()-(_touchFiredAt||0)<500)return;mapClick(e);});
}

// MOBILE SHEET
// ══════════════════════════════════════════════════════
const isMobile=()=>window.innerWidth<=768;
function openMobileSheet(){
  if(!isMobile())return;
  document.getElementById('info-panel').classList.add('mob-open');
  document.getElementById('mob-map-btn').classList.remove('hidden');
}
function closeMobileSheet(){
  document.getElementById('info-panel').classList.remove('mob-open');
  document.getElementById('mob-map-btn').classList.add('hidden');
}

// ══════════════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════════════
function applyTheme(t){
  document.documentElement.dataset.theme=t;
  const _tb=document.getElementById('theme-btn');if(_tb)_tb.textContent=t==='dark'?'◑':'◐';
  localStorage.setItem('pangea-theme',t);
  localStorage.setItem('bellum-theme',t);
}
function toggleTheme(){
  const cur=document.documentElement.dataset.theme||
    (window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');
  applyTheme(cur==='dark'?'light':'dark');
}

(function(){
  const saved=localStorage.getItem('pangea-theme')||localStorage.getItem('bellum-theme');
  if(saved){applyTheme(saved);}
  else{
    const sys=window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';
    document.documentElement.dataset.theme=sys;
    const _tb2=document.getElementById('theme-btn');if(_tb2)_tb2.textContent=sys==='dark'?'◑':'◐';
  }
})();

// ══════════════════════════════════════════════════════
// BURGER MENU
// ══════════════════════════════════════════════════════
function toggleBurger(){
  const m=document.getElementById('burger-menu');
  const btn=document.getElementById('burger-btn');
  if(!m)return;
  const open=m.classList.toggle('open');
  btn.setAttribute('aria-expanded',open);
}
function closeBurger(){
  const m=document.getElementById('burger-menu');
  const btn=document.getElementById('burger-btn');
  if(m){m.classList.remove('open');}
  if(btn){btn.setAttribute('aria-expanded','false');}
}

// Close burger on outside click
document.addEventListener('click',function(e){
  const wrap=document.getElementById('burger-wrap');
  if(wrap&&!wrap.contains(e.target))closeBurger();
});

// Keyboard navigation
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){closeBurger();}
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    const tag=document.activeElement&&document.activeElement.tagName;
    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;
    e.preventDefault();
    const tl=document.getElementById('tl');
    if(!tl)return;
    const step=e.shiftKey?10:e.ctrlKey||e.metaKey?50:1;
    const dir=e.key==='ArrowRight'?1:-1;
    const newVal=Math.max(0,Math.min(1000,parseInt(tl.value)+dir*step));
    tl.value=newVal;
    setYear(sliderToYear(newVal));
  }
});

// ══════════════════════════════════════════════════════
// TIMELINE FILL
// ══════════════════════════════════════════════════════
function updateTlFill(pct){
  const f=document.getElementById('tl-fill');
  if(f)f.style.width=pct+'%';
}

document.addEventListener('DOMContentLoaded',init);
